# Default values for the trino chart. Overridden by values-prod.yaml.
#
# Trino is the Brain V4 SOLE serving engine: app / BFF / metric-engine read the Trino
# brain_serving.mv_* views (resolving to iceberg.brain_{gold,silver,serving}.*). This chart is a
# thin, correct coordinator + worker deployment mirroring the local docker-compose Trino bounds
# (trinodb/trino:455, bounded heap MaxRAMPercentage=70, ~7Gi footprint, Iceberg REST + S3 catalog).

# Environment name → resource naming brain-<environment>-trino (e.g. brain-prod-trino) and
# Trino node.environment. Set per-env in values-<env>.yaml.
environment: prod

image:
  repository: trinodb/trino
  tag: "455"          # pinned to the local-prod image; no mutable :latest in the serving tier
  pullPolicy: IfNotPresent

# Coordinator — exactly one. It also serves the discovery service and the HTTP/JDBC endpoint the
# BFF connects to (the brain-<env>-trino ClusterIP Service). Never a worker (include-coordinator=false).
coordinator:
  replicaCount: 1
  # Node placement (AUD-PROD-006/-011). Empty by default (local/dev/kind render unchanged);
  # values-prod.yaml pins the coordinator to stable on-demand capacity.
  nodeSelector: {}
  tolerations: []
  resources:
    # Mirrors the local mem_limit 7g; jvm.config caps the heap at 70% of the memory LIMIT (~4.9Gi),
    # leaving headroom for non-heap (code cache / metaspace / direct buffers).
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 7Gi

# Workers — stateless query executors. Scale these horizontally for serving throughput.
workers:
  replicaCount: 2
  # Node placement (AUD-PROD-006/-011). Empty by default; values-prod.yaml pins workers to the
  # dedicated `trino` Karpenter pool.
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 7Gi
  # ── KEDA CPU-scaler stub (off by default) ───────────────────────────────────────────────────
  # Workers are CPU-bound during scans → CPU is the right scale signal. Enable by installing KEDA
  # in the cluster and flipping autoscaling.enabled; the ScaledObject targets the worker Deployment.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    # cpuTargetUtilization: 70   # KEDA cpu trigger: scale out above 70% average CPU
    # cooldownPeriod: 300        # 5m cooldown before scaling workers back down (avoid query thrash)

service:
  type: ClusterIP
  port: 8080          # BFF / JDBC connect to brain-<env>-trino:8080
  targetPort: 8080

# Trino HTTP port inside the container/pod (config.properties http-server.http.port).
httpPort: 8080

# Cluster-wide query memory limits (config.properties). Brain's serving data is small and queries
# finish sub-second, so these are generous-but-bounded ceilings that match the modest heap.
query:
  maxMemory: "4GB"          # whole-cluster ceiling for a single distributed query
  maxMemoryPerNode: "2GB"   # per-node ceiling; must be < the JVM heap (~4.9Gi)

# ── BATCH cluster — Fault-Tolerant Execution (ADR-0002, research-data-platform §3) ───────────────
# ADDITIVE, OFF BY DEFAULT. The everything-above defines the INTERACTIVE cluster: the always-warm,
# low-latency serving path (QUERY-retry implicitly) the BFF/metric-engine read via the
# brain-<env>-trino Service. It is UNCHANGED and stays the default so nothing regresses on ArgoCD
# auto-sync.
#
# When batchCluster.enabled=true, the SAME Helm release also renders a SECOND logical cluster — a
# `brain-<env>-trino-batch` coordinator + worker Deployment with its OWN Service/discovery, tuned
# for heavy compaction / RTBF / Iceberg-maintenance batch SQL. It runs retry-policy=TASK with a
# Fault-Tolerant Execution exchange manager spooling intermediate data to S3, so a Spot worker loss
# retries tasks (not whole queries) — the enabler for safe scale-to-zero (ADR-0003). The batch
# cluster NEVER serves the BFF; maintenance/RTBF jobs point at its Service explicitly. It is opt-in
# and deletable with zero serving impact (rollback = flip this flag / git revert).
#
# Both clusters keep the bounded-heap + ExitOnOutOfMemoryError jvm.config and mem limits (the OOM
# outage fix) — the base jvm.config is shared.
batchCluster:
  enabled: false
  coordinator:
    replicaCount: 1
    nodeSelector: {}
    tolerations: []
    resources:
      # Same 7Gi mem_limit / 70% bounded heap posture as the interactive coordinator. Batch runs
      # infrequently, so this footprint only exists during a maintenance window (scaled from zero).
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 7Gi
  workers:
    # Static floor when KEDA is off. With FTE the batch cluster can genuinely scale to ZERO between
    # maintenance runs (ADR-0003) — a lost/absent worker retries tasks, it doesn't fail the query.
    replicaCount: 0
    nodeSelector: {}
    tolerations: []
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 7Gi
    # KEDA scale-to-zero for the batch workers (ADR-0003: "Trino batch/FTE cluster → scale to ZERO").
    # minReplicas 0 is SAFE here (unlike interactive, which keeps a warm floor) precisely because FTE
    # makes worker loss/absence recoverable. Off by default (mirrors the interactive KEDA stub);
    # values-prod flips it once a maintenance-driven scaler (e.g. Argo-Workflow-set count) is wired.
    autoscaling:
      enabled: false
      minReplicas: 0
      maxReplicas: 4
      # cpuTargetUtilization: 60
      # cooldownPeriod: 120        # tighter than interactive — reclaim idle batch capacity fast
  # Cluster-wide query memory for BATCH: larger ceilings than interactive (big compaction scans),
  # still bounded under the per-node heap. maxMemoryPerNode must stay < the worker JVM heap (~4.9Gi).
  query:
    maxMemory: "8GB"
    maxMemoryPerNode: "3GB"
  # Fault-Tolerant Execution — the batch-only knobs. exchange.baseDirectories spools intermediate
  # exchange data to S3 so worker loss retries tasks. The prefix lives under the Iceberg medallion
  # (Bronze) bucket reached by the SAME pod IRSA role — no new bucket, no static keys. Research §3
  # notes multiple buckets only matter for S3-request-throttling at high concurrency; Brain's batch
  # concurrency is low, so one prefix is sufficient (the value is a LIST, so add buckets later with
  # no template change). Point elsewhere / at MinIO via s3.endpoint (inherited from iceberg.s3).
  fte:
    retryPolicy: TASK
    exchange:
      # s3://<bucket>/<prefix> spool root(s). Overridden per-env in values-<env>.yaml with the real
      # medallion bucket. Left blank in the default so a stray batchCluster.enable in dev fails loud
      # rather than silently spooling to the wrong store.
      baseDirectories: []
      # Sink/source buffer + parallelism tuning (Trino defaults are conservative for K8s S3).
      encryptionEnabled: true

# Iceberg connector → the SAME Iceberg REST catalog + S3 object store Spark writes. In prod this is
# the in-cluster iceberg-rest Service and real AWS S3 buckets (Bronze/Silver/Gold), reached via the
# pod IRSA role (serviceAccount.annotations) — NO static S3 keys. For non-AWS/MinIO, set s3.endpoint
# + s3.pathStyleAccess and provide keys through s3SecretName.
iceberg:
  restUri: "http://iceberg-rest:8181"
  s3:
    region: "us-east-1"
    endpoint: ""            # empty → native AWS S3 (prod). Set to a MinIO URL for non-AWS object stores.
    pathStyleAccess: false  # true only for MinIO / path-style stores
  # Optional Secret (External Secrets ← AWS Secrets Manager) with TRINO_S3_ACCESS_KEY /
  # TRINO_S3_SECRET_KEY. Leave empty in prod to use the pod IRSA role's credentials.
  s3SecretName: ""

# IRSA role for S3 (Iceberg data buckets) read access. Set per-env in values-<env>.yaml.
serviceAccount:
  annotations: {}

probes:
  enabled: true
  # Trino readiness/liveness endpoint (same as the local healthcheck: /v1/info).
  path: /v1/info

# ── Prometheus JMX exporter on the COORDINATOR (AUD-INFRA-030) ─────────────────────────────────
# Trino is the SOLE serving engine and was completely unscraped — a serving outage was only
# detectable by users seeing 500s. trinodb/trino emits JMX only, so the coordinator runs the
# prometheus/jmx_exporter javaagent (same jar+version as the Kafka broker/Connect paths): an
# initContainer fetches the jar into an emptyDir and coordinator-jvm.config attaches it. The
# PodMonitor relabels job → "trino", driving TrinoServingDown / TrinoQueryFailureRateHigh and the
# BrainTargetDown regex (kube-prometheus-stack values-prod). Coordinator-only by design: it owns
# the cluster-level QueryManager/DispatchManager MBeans, and worker liveness is already the
# coordinator's problem (discovery). Off by default (no Prometheus Operator CRDs in kind/staging);
# values-prod enables it. NOTE deliberate asymmetry with kafka-connect: here the agent is a HARD
# dependency of pod start (jvm.config is static) — acceptable for a stateless serving pod whose
# RollingUpdate keeps the old coordinator running if an init download ever hangs.
metrics:
  enabled: false
  jmxExporterJarUrl: "https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar"
  initImage: curlimages/curl:8.8.0    # same one-shot download image as the local compose jmx-exporter-init
  port: 9404
  podMonitor:
    jobLabel: trino
    interval: 30s
