apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: infra/helm/core
  labels:
    project: brain
    environment: prod
    service: core
spec:
  project: brain-prod
  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    path: infra/helm/core
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: core
  # Automated GitOps sync (2026-07-13): merge→build→prod-promote lands the digest in gitops and
  # ArgoCD auto-applies it (selfHeal reverts drift, prune removes deleted resources) — prod deploys
  # end-to-end on merge, no manual sync. Safety net = promotion-PR CI + deploy health-probe rollback.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 10
