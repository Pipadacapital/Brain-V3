# Default values for the core chart. Overridden by values-staging.yaml / values-prod.yaml.
replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-core
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3001

probes:
  enabled: true
  path: /health           # core exposes a single /health endpoint
  readinessPath: /health

# Secret (External Secrets ← AWS Secrets Manager) with DATABASE_URL, REDIS_URL,
# STARROCKS_*, KAFKA/REDPANDA brokers, AI gateway + connector secrets, etc.
# P1 pre-scale: DATABASE_URL / BRAIN_APP_DATABASE_URL host:port should point at the PgBouncer
# Service (<release>-pgbouncer:6432, see infra/helm/pgbouncer) — NOT the Postgres primary directly.
# Core's request path is all short SET-LOCAL-scoped transactions, so transaction pooling multiplexes
# thousands of request connections onto a small server pool (the connection-exhaustion fix at 1000
# brands). NOTE: the stream-worker stays DIRECT on the primary (its leader lock is a session
# advisory lock that transaction pooling would break).
envSecretName: ""

env:
  - name: SERVICE_NAME
    value: core
  - name: PORT
    value: "3001"

serviceAccount:
  annotations: {}   # IRSA role for AWS Secrets Manager access (set per env)

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi
