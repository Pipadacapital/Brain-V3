# duckdb image — bronze/medallion maintenance + erasure (via the PyIceberg maintenance client it carries) AND the V4
# Silver/Gold transform crons (.sparkV4.image — CI promotes both digests build-once from staging, one
# image). Bronze LANDING is the kafka-connect chart (ADR-0010). Spark→DuckDB cutover: replaces
# brain-spark-bronze-prod. The digest below is a PLACEHOLDER — the first master build of brain-duckdb-prod
# (deploy.yml build-data-images) promotes the real digest here; until then the templates fail-closed on it.
sparkBronze:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
    tag: ""
    digest: "sha256:ca9327390c155e0d2047a4deae545f9ee1477dd59afcc7fd58da39a32a4fe996"
  # AUD-PROD-006: the maintenance/erasure cron pods run on the streaming Karpenter pool (the batch pool
  # was removed in the Spark→DuckDB cutover — the DuckDB crons are lightweight python, no JVM). A
  # Spot/consolidation bounce mid-run is replay-safe: Forbid + Argo retry + idempotent maintenance.
  nodeSelector:
    brain.platform/pool: streaming
# duckdb V4 Silver/Gold transform crons — same image as sparkBronze (one brain-duckdb image carries the
# transform marts + the PyIceberg maintenance client).
sparkV4:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
    tag: ""
    digest: "sha256:ca9327390c155e0d2047a4deae545f9ee1477dd59afcc7fd58da39a32a4fe996"
  # FLUSH-STOP: transform crons suspended (v4-medallion + heavy + identity) so nothing writes the medallion
  # mid-truncate. Revert → false after the flush + producers restart.
  transformSuspend: true
  # Wave 2a (2026-07-21 keystone incident): fold hot-table maintenance into the transform tick. run_all.py
  # compacts + expires these two churn-heavy tables IN-PROCESS at the end of every */5 gold pass (same pod,
  # same run — best-effort, never fails the medallion), so compaction rides the exact MERGE churn that
  # re-fragments them (~2.4 files/min for silver_collector_event) instead of chasing it from the out-of-phase
  # */2h silver-hot cron lane. The v4-maintenance `silver-hot` cron lane below is KEPT as a backstop — do NOT
  # delete it until a week of in-tick evidence proves this out. (Scalar → no Argo list-merge footgun.)
  tickMaintTables: "silver_collector_event,silver_touchpoint"
  # CORE↔IDENTITY re-split (2026-07-19): prod inherits `identity.enabled: true` + `identitySchedule:
  # */5` + the 1h SILVER_IDENTITY_MAX_SLICE_MS from base values.yaml. The v4-identity cron reuses this
  # sparkV4 image (map-export, duckdb) + streamWorkerImage (identity-resolve) + the nodeSelector /
  # podAnnotations / resources / activeDeadlineSeconds declared here, so no prod-specific block is
  # needed. Slow identity catch-up now runs on its OWN Forbid schedule → can't block the core medallion.
  # AUD-PROD-006: v4-silver / v4-gold / v4-maintenance / v4-identity pods → the streaming pool (batch pool removed).
  # Every Silver/Gold MERGE is idempotent — a consolidation bounce is retry-safe.
  nodeSelector:
    brain.platform/pool: streaming
  # do-not-disrupt tells Karpenter not to consolidate/drift-disrupt a node hosting these pods while they
  # run (the exit-143 / "No more retries left" class). Idempotent MERGE jobs, so an involuntary AWS spot
  # reclaim is still safe (bounded retry); this only removes the self-inflicted churn.
  podAnnotations:
    karpenter.sh/do-not-disrupt: "true"
  # DuckDB is single-process python (no JVM heap). 3CPU/8Gi gives the working set + DuckDB's in-memory
  # MERGE/aggregation room; the streaming pool (t4g.large/xlarge) absorbs the silver/gold/maintenance
  # overlap. Re-measure the real DuckDB run-time profile in prod and right-size from there.
  resources:
    requests: {cpu: "2", memory: 6Gi}
    limits: {cpu: "3", memory: 8Gi}
  # GOLD_INCREMENTAL default-on gate (ADR-0016 P1.1). prod inherits the base values.yaml env
  # (GOLD_INCREMENTAL="0" → Gold full-scan). To flip Gold to incremental in prod, uncomment the block
  # below (it REPLACES the base env list, so it must re-declare ICEBERG_CATALOG / SILVER_INCREMENTAL /
  # WATERMARK_LOOKBACK_SECONDS — and should carry WATERMARK_MAX_SLICE_SECONDS=3600 which base sets) —
  # but ONLY after the two-stage gate passes (docs/runbooks/gold-incremental-promotion.md):
  #   1. the comparator + window-arithmetic unit gate runs on every promotion PR (integration.yml step
  #      "Gold-incremental parity gate machinery");
  #   2. tools/ops/gold-parity-check.job.yaml — the LIVE incremental↔full harness — has exited 0 against
  #      a FROZEN prod catalog: money byte-exact, zero orphan drift, all 22 incremental-safe Gold marts.
  # The first incremental Gold run bootstraps (no watermark → full scan) then windows [watermark, now).
  # gold_revenue_ledger / gold_cac / gold_contribution_margin stay full-scan regardless (they never
  # pass enabled=GOLD_INCREMENTAL — delete_orphans / multi-source money-safety). FULL_REFRESH=1 recovers.
  # env:
  #   - { name: ICEBERG_CATALOG, value: "rest" }
  #   - { name: SILVER_INCREMENTAL, value: "1" }
  #   - { name: GOLD_INCREMENTAL, value: "1" }   # ← default-on ONLY after the gold-parity-check.job gate passes
  #   - { name: WATERMARK_LOOKBACK_SECONDS, value: "600" }
  #   - { name: WATERMARK_MAX_SLICE_SECONDS, value: "3600" }
  # MAINTENANCE LANE SPLIT (2026-07-17 fragmentation incident). The single both-namespaces sweep
  # processed Silver first (alphabetically) and burned its whole deadline on Silver's heavy tables
  # (silver_job_watermark ~7.3k tiny files) → Gold never compacted → gold_customer_360 fragmented to
  # ~50 files → 8s serving cold-scans. Split into two lanes so the serving-facing Gold marts are kept
  # compacted on a fast cadence, independent of Silver's slow full sweep:
  maintenance:
    lanes:
      # Gold: serving-facing marts — frequent + tight. Orphan sweep off (it is a no-op SKIP today and
      # the compaction+expiry is what keeps serving fast). Finishes in minutes → 30-min deadline.
      - name: gold
        namespaces: brain_gold
        schedule: "0 */2 * * *" # every 2h — keeps gold_customer_360 &co consolidated for serving
        activeDeadlineSeconds: 1800 # 30 min — Gold-only sweep is quick
        orphanFiles: "0"
      # Silver: heavy tables (job_watermark, fulfillment) — its own daily window with room to finish
      # the full table-by-table optimize+expire without a deadline SIGTERM (the exit-143 history).
      - name: silver
        namespaces: brain_silver
        schedule: "0 4 * * *" # daily 04:00 IST — off the Gold cadence
        activeDeadlineSeconds: 10800 # 3h — enough headroom for the fragmented Silver tables
        orphanFiles: "1"
      # Silver HOT tables (2026-07-21 keystone incident): silver_collector_event re-fragments
      # ~2.4 files/min under the */5 MERGE churn (723→1,442 live files in ~5h) — the daily Silver
      # sweep can't hold it, and serving-mediated reads (the silver-identity lane) then exceed ANY
      # statement budget on file-count alone (the stuck-watermark class, PR #317's other half).
      # A TABLES-scoped fast lane compacts just the churn-heavy tables every 2h without re-running
      # Silver's heavy full sweep (the 2026-07-17 starvation lesson). :30 offset — off Gold's :00.
      # BACKSTOP (Wave 2a, 2026-07-21): the transform tick now ALSO compacts these same tables in-process
      # after every gold pass (sparkV4.tickMaintTables above). This lane is KEPT as a safety net — the
      # tick hook is best-effort (a compaction conflict is skipped, converges next tick), so this */2h
      # sweep guarantees eventual compaction even if the in-tick path is starved. Do NOT delete this lane
      # until a week of in-tick evidence proves the tick hook holds the file count on its own.
      - name: silver-hot
        namespaces: brain_silver
        tables: silver_collector_event,silver_touchpoint
        schedule: "30 */2 * * *" # every 2h at :30 — interleaved with the Gold lane's :00
        activeDeadlineSeconds: 1800 # 30 min — two-table compact+expiry is minutes
        orphanFiles: "0"
# ADR-0016 D3 / CORE↔IDENTITY re-split (2026-07-19) — resident warm transform worker CUTOVER (prod).
# transformWorker.enabled=true SUPPRESSES the v4-medallion (CORE) CronWorkflow — the resident Deployment
# (infra/helm/transform-worker, enabled=true there IN LOCKSTEP) becomes the sole CORE writer, gated on its
# own pg advisory lock 910_005. This does NOT suppress the v4-identity cron (its gate dropped the
# `not transformWorker.enabled` term) — v4-identity STAYS the sole IDENTITY writer (lock 910_004). The
# resident runs CORE-ONLY (TRANSFORM_CORE_ONLY=1) so it never double-writes the identity marts. Two
# tables, two locks, single-writer each. REVERSIBILITY: set this false AND transform-worker enabled=false
# to restore exactly today's behaviour (v4-medallion cron owns core, v4-identity owns identity).
# REVERTED (2026-07-20, "simple cron, robust"): false → v4-medallion cron is the CORE writer again.
# The warm resident 400'd on the high-churn collector_events_connect Bronze (stale warm metadata); the
# cold */5 cron reads fresh each run and is robust. Paired with transform-worker enabled=false.
transformWorker:
  enabled: false
envSecretName: core-env
serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-jobs
