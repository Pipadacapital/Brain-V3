replicaCount: 3

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-collector-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: "sha256:784dc619f7b140cb76bd296f99bf4bb049ebe9c373989978bd1ea476b0a48639"

envSecretName: collector-env

# AUD-OBS-2: OTel export deliberately OFF in prod until the trace/metric backend
# (Grafana Cloud vs in-cluster Tempo) is decided + its endpoint/credentials are seeded
# (OTEL_EXPORTER_OTLP_HEADERS in collector-env). Flipping this value is the entire ON-switch.
otelExporterOtlpEndpoint: ""

# AUD-LOCAL-016-FUP1: prod kube-prometheus-stack scrapes the collector's /metrics (main port)
# as job "brain-collector" — the brain-slo rules' job name (up{job=~"brain-.*"}).
metrics:
  serviceMonitor:
    enabled: true

# AUD-COST-003: the pixel endpoint — THE 99.95%-SLA public edge. Joins the
# shared brain-prod ALB (host-routed); TLS = ACM at the ALB.
ingress:
  enabled: true
  host: px.brain.pipadacapital.com   # e.g. px.<apex-domain>
  groupName: brain-prod
  certificateArn: arn:aws:acm:ap-south-1:380254378136:certificate/684f6184-f357-46ca-8ef9-3be62239c220

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-collector

# AUD-PROD-006: the 99.95%-SLA ingest front rides the streaming pool (t4g.large
# Spot, WhenEmpty consolidation — live pods are never bin-packed off a node; the
# HPA replica floor keeps a warm baseline). Label = the pool's node template label.
nodeSelector:
  brain.platform/pool: streaming

# AUD-COST-2: right-sized from live prod telemetry (Prometheus 2d, 2026-07-12):
# CPU p95 33m / max 39m, mem p95 ~174Mi / max 309Mi per pod. Was 250m/512Mi —
# ~7x over p95, which starved the HPA (0%/65% observed → never scales) and
# reserved ~1 node of dead headroom. New: cpu 100m (HPA fires at 65m ≈ 1.7x max
# seen), mem 384Mi (80% target = 307Mi ≈ observed max). LIMITS UNCHANGED —
# burst ceiling and OOM budget are not touched; this is a scheduling/HPA-math
# change only. Revert = restore the old requests.
resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: "2"
    memory: 1Gi

# P2.5: HPA on in prod — collector is the spike-prone ingest front (widest band).
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 24
