# spark image — bronze-maintenance cron + reused by the V4 Spark silver/gold/mv-refresh crons
# (.sparkV4.image — CI promotes both digests build-once from staging). Bronze LANDING is the
# kafka-connect chart (ADR-0010) — the Spark landing cron was removed 2026-07-05.
sparkBronze:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-spark-bronze-prod
    tag: ""
    digest: ""
  # AUD-PROD-006: Spark cron pods → the batch Karpenter pool (t4g.xlarge Spot).
  # A Spot/consolidation bounce mid-run is replay-safe: Forbid + Argo retry +
  # idempotent maintenance (compaction/snapshot-expiry re-runs are no-ops).
  nodeSelector:
    brain.platform/pool: batch
# spark V4 Silver/Gold transform + mv refresh crons — same image as sparkBronze (the Dockerfile carries the
# V4 marts). Flip enabled:true once the prod V4 cluster + digest are ready (gated off by default).
sparkV4:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-spark-bronze-prod
    tag: ""
    digest: ""
  # AUD-PROD-006: v4-silver / v4-gold / v4-maintenance pods → the batch pool.
  # Every Silver/Gold MERGE is idempotent — a consolidation bounce is retry-safe.
  nodeSelector:
    brain.platform/pool: batch
envSecretName: core-env
serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-jobs
