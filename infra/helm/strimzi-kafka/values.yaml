# Default values for the strimzi-kafka chart (the Kafka CUSTOM RESOURCES only — the operator is
# installed separately, see infra/argocd/envs/prod/strimzi-kafka.yaml). Overridden per env in
# values-<env>.yaml. This mirrors the local docker-compose apache/kafka:3.8.1 KRaft single-broker
# env, scaled to a 3-node production KRaft cluster.
#
# Resource naming: brain-<environment>-kafka  →  Strimzi bootstrap Service
#   brain-<env>-kafka-kafka-bootstrap.<namespace>.svc:9092  (the app's KAFKA_BROKERS target).

# Environment name → resource naming brain-<environment>-kafka. Set per-env in values-<env>.yaml.
environment: prod

# Override the full cluster name; empty → brain-<environment>-kafka (the convention).
clusterName: ""

kafka:
  # Broker version — mirrors the local docker-compose image apache/kafka:3.8.1. Strimzi ships this
  # Kafka line in the matching operator release; keep operator + this version in lockstep.
  version: "3.8.1"
  # KRaft metadata version for Kafka 3.8.x. Bump ONLY after the operator + broker upgrade lands.
  metadataVersion: "3.8-IV0"

  # ── KRaft node pool ─────────────────────────────────────────────────────────────────────────
  # ONE combined node pool (controller + broker roles) → 3 nodes form the KRaft quorum AND serve
  # as the 3 brokers. This matches the local compose single-node combined-role broker, scaled to a
  # production 3-node quorum. Split controllers from brokers later by adding a second node pool.
  nodePool:
    name: combined
    replicas: 3
    roles:
      - controller
      - broker
    storage:
      # 50Gi gp3 EBS per broker (JBOD single volume). The gp3 StorageClass must exist in-cluster
      # (EBS CSI driver); deleteClaim=false keeps data on CR delete.
      size: 50Gi
      class: gp3
      deleteClaim: false
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 6Gi
    # JVM heap bounded below the memory limit (leave headroom for page cache / direct buffers).
    jvm:
      xms: 3072m
      xmx: 3072m
    # Broker pod placement (AUD-PROD-006) — Strimzi PodTemplate affinity/tolerations.
    # Empty by default (local/kind rendering unchanged); values-prod pins the brokers
    # to the streaming node pool.
    affinity: {}
    tolerations: []
    # REL-6: broker AZ-spread. Empty by default (single-AZ local/kind unchanged);
    # values-prod adds a ScheduleAnyway zone spread so the 3 brokers prefer distinct
    # AZs. SOFT by design — it must never block the on-demand broker roll (the hard
    # constraints remain the required hostname anti-affinity + streaming/on-demand
    # nodeAffinity). Reversible: clear this list to revert to hostname-only spread.
    topologySpreadConstraints: []

  # ── Listeners (INTERNAL only — no external/LoadBalancer exposure) ────────────────────────────
  # plain :9092 and tls :9093, both type=internal. The app/BFF/collector/stream-worker + Spark all
  # run in-cluster, so they reach the bootstrap Service directly. Mirrors the compose PLAINTEXT 9092
  # (no public listener). TLS is the recommended in-cluster transport once mTLS clients are wired.
  listeners:
    plain:
      enabled: true
      port: 9092
    tls:
      enabled: true
      port: 9093

  # KIP-392 rack awareness. Strimzi tags each broker with its node AZ (topologyKey) and enables the
  # RackAwareReplicaSelector so consumers that send client.rack fetch from a SAME-AZ replica →
  # eliminates consumer cross-AZ fetch (the dominant DataTransfer-Regional-Bytes $). Needs RF>1
  # (RF=3 here). Safe/reversible: brokers still work with it off; consumers without client.rack are
  # unaffected either way. Toggle off to revert.
  rack:
    enabled: true
    topologyKey: topology.kubernetes.io/zone

  # Broker config. auto.create.topics.enable is OFF (compose parity) — every topic is declared as a
  # KafkaTopic CR below. Replication factors assume the 3-broker pool above.
  config:
    autoCreateTopics: false
    defaultReplicationFactor: 3
    minInsyncReplicas: 2
    offsetsTopicReplicationFactor: 3
    transactionStateLogReplicationFactor: 3
    transactionStateLogMinIsr: 2
    # Default broker-side retention = 7 days (matches the per-topic retention below + compose).
    logRetentionMs: 604800000

# ── Prometheus metrics (AUD-LOCAL-016-FUP1) ─────────────────────────────────────────────────────
# The prod kube-prometheus-stack previously saw NO kafka metrics, so the brain-slo DLQ-growth /
# ingest-freshness / consumer-lag rules were vacuously silent. When enabled this renders, via the
# Strimzi-documented pattern:
#   • spec.kafka.metricsConfig (type jmxPrometheusExporter) ← a ConfigMap whose rules are a
#     VERBATIM copy of infra/observe/kafka-jmx-exporter.yml (the local compose broker agent
#     config) — SAME jmx_exporter, SAME mapping rules ⇒ SAME metric names as local
#     (kafka_log_log_logendoffset, …); no rename delta. KEEP THE TWO IN LOCKSTEP.
#   • spec.kafkaExporter — Strimzi's packaging of danielqsj/kafka_exporter (the exact companion
#     the local compose runs) for kafka_consumergroup_lag; metric names identical.
#   • two PodMonitors relabelling job → "kafka-jmx-exporter" / "kafka-exporter" — the exact job
#     names the local compose Prometheus uses and the brain-slo rules match
#     (up{job=~"…|kafka-jmx-exporter|kafka-exporter"}).
# Off by default (local/kind rendering unchanged; no Prometheus Operator CRDs there);
# values-prod enables it.
metrics:
  enabled: false
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ── Strimzi Entity Operator ────────────────────────────────────────────────────────────────────
# The Topic Operator reconciles the KafkaTopic CRs below into real Kafka topics; the User Operator
# manages KafkaUser CRs (mTLS/ACLs) when clients adopt TLS auth.
entityOperator:
  topicOperator:
    enabled: true
  userOperator:
    enabled: true

# ── Topics ───────────────────────────────────────────────────────────────────────────────────
# Auto-create is OFF, so every topic the platform uses is declared here as a KafkaTopic. These are
# the prod-prefix topics ported 1:1 from the docker-compose kafka-init bootstrap.
topics:
  # Topic name prefix. Prod cluster carries the prod.* lane (compose seeds both dev.* and prod.*).
  prefix: prod

  # Partitions per topic — TENANT-KEYED (brand_id is the partition key on every event), so a tenant's
  # ordered stream stays on one partition. Configurable 6..12; the chart fails outside that band.
  # Default 12 mirrors the compose num.partitions.
  partitions: 12
  replicas: 3

  retention:
    shortMs: 172800000      # 48 h   — live collector lane (ADR-0015: Bronze is the replay
                            #          store with a 15-day collector-lane row-TTL; the log is
                            #          only a delivery buffer, not the replay window)
    standardMs: 604800000   # 7 days  — canonical + control lanes
    longMs: 2592000000      # 30 days — order-backfill (replay window)

  # Collector lane (+ order-backfill). retention: short | standard | long.
  # ADR-0015: collector.event.v1.quarantine is RETIRED — gate-failure quarantine lives in Silver
  # (silver_quarantine). WS4 completion: collector.event.v1.dlq is RETIRED too — the erasure
  # orchestrator (the last stream-worker Kafka consumer) is a PG request-driven poll lane
  # (ops.erasure_request_queue); poison requests park as status='dead' rows.
  collector:
    - { suffix: "collector.event.v1",            retention: "short" }
    - { suffix: "collector.order.backfill.v1",   retention: "long" }

  # 9 connector raw lanes (Kafka Connect Iceberg sink — ADR-0010). Suffix -> <lane>.raw.v1
  rawLanes:
    - shopify.orders
    - woocommerce.orders
    - meta.spend
    - google.spend
    - ga4.rows
    - shiprocket.shipments
    - gokwik.events
    - shopflo.checkout
    - razorpay.settlement

  # Intelligence control/event topics.
  # ADR-0015 WS3 (identity in Silver): the identity.{minted,linked,merged,unmerged,suppressed,
  # review_queued}.v1 + intelligence.cache.invalidate.v1 + intelligence.gold.rewritten.v1 lanes
  # are RETIRED — the Silver identity stage writes the dirty-sets and evicts the serving cache
  # DIRECTLY in-process (no publisher, no consumer); core's A.2.4 admin unmerge now writes
  # ops.restitch_pending/ops.journey_reversion_pending directly too (no Kafka lane).
  control:
    - intelligence.customer360.recomputed.v1
    # M1 application/domain events published by core's M1EventPublisher (workspace-access,
    # pixel, connector, auth). These were never declared before and, with auto-create OFF,
    # silently failed to publish ("This server does not host this topic-partition") — surfaced
    # 2026-07-16 after a full topic wipe. Declared here so they exist in every env.
    - workspace.created.v1
    - brand.created.v1
    - pixel.installed.v1
    - pixel.verified.v1
    - connector.connected.v1
    - connector.sync_started.v1
    - user.registered.v1
    - user.logged_in.v1
    - user.invited.v1

  # Internal canonical fan-out lanes -> brain.<entity>
  fanout:
    - orders
    - customers
    - shipments
    - payments
    - sessions
    - ads
