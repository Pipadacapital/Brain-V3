# Prod overrides for the strimzi-kafka CR chart. Cluster name resolves to brain-prod-kafka.
environment: prod
clusterName: ""   # -> brain-prod-kafka

kafka:
  version: "3.8.1"
  metadataVersion: "3.8-IV0"

  nodePool:
    name: combined
    replicas: 3
    roles:
      - controller
      - broker
    storage:
      size: 50Gi
      class: gp3
      deleteClaim: false
    resources:
      # Sized to fit the CHEAPER streaming node (t4g.large, 2 vCPU / 8 GiB,
      # ~6.3Gi allocatable after Karpenter overhead): cpu request 1 (bursts to
      # limit 4 = whole node), memory request 5Gi / limit 6Gi around a 3Gi JVM
      # heap (below). With the streaming pool's t4g.large|t4g.xlarge range,
      # Karpenter picks the cheaper t4g.large. Raise heap+memory (→ t4g.xlarge)
      # if real traffic needs more.
      requests:
        cpu: "1"
        memory: 5Gi
      limits:
        cpu: "4"
        memory: 6Gi
    jvm:
      xms: 3072m
      xmx: 3072m
    # AUD-PROD-006: pin the KRaft broker pods (stateful, 'no event loss') to the
    # streaming Karpenter pool — its WhenEmpty consolidation NEVER bin-packs live
    # brokers off a node, unlike the batch/trino pools' WhenEmptyOrUnderutilized.
    # Strimzi PodTemplate has no nodeSelector — required nodeAffinity is the contract.
    # 2026-07-12 INCIDENT: brokers additionally pinned to ON-DEMAND capacity.
    # Spot reclaims churned all 3 brokers through 3 node generations in ~40 min
    # (repeated quorum loss; ap-south-1a t4g spot is volatile). Consumers/Connect
    # stay on spot — only the 3 broker nodes pay on-demand (~+$100/mo vs the
    # repeated-outage alternative). Karpenter provisions on-demand nodes for
    # pods that REQUIRE karpenter.sh/capacity-type=on-demand.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: brain.platform/pool
                  operator: In
                  values: ["streaming"]
                - key: karpenter.sh/capacity-type
                  operator: In
                  values: ["on-demand"]

  listeners:
    plain:
      enabled: true
      port: 9092
    tls:
      enabled: true
      port: 9093

  config:
    autoCreateTopics: false
    defaultReplicationFactor: 3
    minInsyncReplicas: 2
    offsetsTopicReplicationFactor: 3
    transactionStateLogReplicationFactor: 3
    transactionStateLogMinIsr: 2
    logRetentionMs: 604800000

# AUD-LOCAL-016-FUP1: broker JMX exporter (metricsConfig ← verbatim copy of
# infra/observe/kafka-jmx-exporter.yml — same metric names as local) + Strimzi
# kafkaExporter (consumer-group lag) + PodMonitors with the SLO rules' job names
# (kafka-jmx-exporter / kafka-exporter).
metrics:
  enabled: true

entityOperator:
  topicOperator:
    enabled: true
  userOperator:
    enabled: true

topics:
  prefix: prod
  # Tenant-keyed (brand_id) partition count; 12 mirrors the local compose num.partitions.
  partitions: 12
  replicas: 3
  retention:
    standardMs: 604800000   # 7 days
    longMs: 2592000000      # 30 days
