################################################################################
# Brain – ArgoCD Applications: secret delivery (prod) — AUD-COST-004
# TWO ordered Applications:
#   1. external-secrets-prod        (sync-wave -3) — upstream External Secrets
#      Operator: CRDs + controller (ns external-secrets), IRSA-authenticated
#      against AWS Secrets Manager.
#   2. external-secrets-config-prod (sync-wave -2) — Brain's ClusterSecretStore
#      + the ExternalSecrets that materialize every envSecretName the workload
#      charts consume (core-env, web-env, collector-env, stream-worker-env,
#      pgbouncer-env, iceberg-rest-catalog-db). Nothing else creates them.
# MUST be synced before any workload app at bring-up (their pods envFrom these
# Secrets and CrashLoop without them).
# MANUAL promotion gate (prod convention) — no automated sync.
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    project: brain
    environment: prod
    service: external-secrets
spec:
  project: brain-prod
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7
    helm:
      valuesObject:
        installCRDs: true
        # IRSA — role with secretsmanager:GetSecretValue/DescribeSecret on
        # brain/prod/k8s/* (terraform: modules/secrets eso_k8s_secrets_read +
        # envs/prod irsa_external_secrets — AUD-COST-017).
        # The SA name is PINNED: the IRSA trust is StringEquals on
        # system:serviceaccount:external-secrets:external-secrets (NN-3); the
        # upstream fullname default would drift with the release name.
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-external-secrets
        # The secret bridge must always be schedulable — pin to the fixed
        # ON-DEMAND system node group, not Karpenter Spot capacity.
        nodeSelector:
          role: system
        webhook:
          nodeSelector:
            role: system
        certController:
          nodeSelector:
            role: system
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    # Repo-root-absolute (leading '/') — a relative value is resolved AGAINST
    # spec.source.path and silently forward-copies stale cached manifests
    # (AUD-INFRA-002 root cause, same bug class as strimzi-kafka.yaml).
    argocd.argoproj.io/manifest-generate-paths: /infra/helm/external-secrets-config
    # AUD-INFRA-003: the ESO CRD conversion webhook / API server default
    # spec fields on the live ExternalSecrets (conversionStrategy,
    # decodingStrategy, deletionPolicy, metadataPolicy, …) that the chart never
    # renders — with client-side diff all 8 ExternalSecrets sat permanently
    # falsely OutOfSync. ServerSideDiff (SSA dry-run prediction) absorbs the
    # defaulted fields AND out-of-band annotations owned by other field
    # managers (the rotation runbooks' transient `force-sync` annotate).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  labels:
    project: brain
    environment: prod
    service: external-secrets
spec:
  project: brain-prod
  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    path: infra/helm/external-secrets-config
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  # AUD-INFRA-003: belt-and-braces for the rotation flow — runbooks poke ESO
  # with `kubectl annotate externalsecret <name> force-sync=$(date +%s)`
  # (out-of-band by design; ESO watches the annotation to refresh early).
  # Never let that transient annotation register as GitOps drift. The 3 STALE
  # annotations found live (argo/core-env, core/core-env,
  # stream-worker/stream-worker-env) cannot be removed by a git-side change —
  # SSA never deletes fields owned by the kubectl manager — so their one-time
  # removal is an operator step:
  #   kubectl -n <ns> annotate externalsecret <name> force-sync-
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/annotations/force-sync
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
