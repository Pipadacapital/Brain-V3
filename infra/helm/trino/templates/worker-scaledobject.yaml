{{- if .Values.workers.autoscaling.enabled }}
# KEDA CPU-scaler for Trino workers (OFF by default — requires KEDA installed in the cluster).
# When enabled, the worker Deployment omits its static replicas (see worker-deployment.yaml) so KEDA
# owns scaling. Workers are CPU-bound during scans, so CPU utilization is the scale signal.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "trino.worker.fullname" . }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "trino.worker.fullname" . }}
  minReplicaCount: {{ .Values.workers.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.workers.autoscaling.maxReplicas }}
  cooldownPeriod: {{ .Values.workers.autoscaling.cooldownPeriod | default 300 }}
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: {{ .Values.workers.autoscaling.cpuTargetUtilization | default 70 | quote }}
{{- end }}
