# SPEC:D.2 (AMD-25) — certified CROSS-ENTITY metric. Change ONLY via PR + recompile.
name: mer
version: v1
entity: semantic_order
time_column: conversion_at
grain: [all]
dimensions_allowed: []
currency_handling: ratio_same_currency
identity_basis: deterministic_only
interactive: false
owner: marketing-team
description: >-
  Marketing Efficiency Ratio (blended): total recognised net revenue (semantic_order) divided by
  total ad spend (semantic_campaign), per currency, whole-period. Cross-entity blend joined on
  (brand_id, currency_code) — the campaign entity has no time axis (AMD-25). Deterministic revenue
  spine only (§1.4). Null when spend is zero.
measures:
  - name: net_revenue_minor
    agg: SUM(net_revenue_minor)
cross:
  entity: semantic_campaign
  measures:
    - name: spend_minor
      agg: SUM(spend_minor)
expression: CAST(net_revenue_minor AS double) / NULLIF(spend_minor, 0)
examples:
  - "Blended MER in INR (total revenue / total spend)."
