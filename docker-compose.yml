# Local dev — profiles per zone (doc 05 §10).
# core    = control-plane + serving (default for most feature work)
# ingest  = strict-SLA event path (Apache Kafka KRaft + Apicurio)
# observe = Grafana + Loki + Prometheus OTel stack
# All profiles combined: docker compose --profile core --profile ingest --profile observe up -d
#
# Iceberg REST catalog (lakekeeper) is included in the ingest profile — it provides
# the local equivalent of AWS Glue for Bronze table metadata.
# MinIO is the local S3 equivalent; it is in core because the stream-worker, seed, and
# testcontainer harness all need a writable object store.

services:
  # ────────────────────────────────────────────────────────────────────────────
  # CORE profile — control plane + serving
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    profiles: ["core"]
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain
    ports: ["5432:5432"]
    # Provision the brain_app LOGIN role on first init of a fresh volume (before migrations).
    # Closes the cold-start gap where a wiped volume leaves brain_app unable to authenticate.
    # See db/init/00_provision_brain_app_role.sql. Local substrate only; no effect on real prod.
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PgBouncer (P1 pre-scale) — TRANSACTION-pooling connection multiplexer in FRONT OF the CORE app's
  # request path. Core opens a connection per concurrent request; at 1000 brands that exhausts
  # Postgres's max_connections. PgBouncer multiplexes thousands of client connections onto a small
  # server pool. Core's DB access is all short, SET-LOCAL-scoped transactions (withBrandTxn /
  # beginRlsTxn) → transaction pooling is safe. The STREAM-WORKER must NOT use this: its periodic
  # loops hold SESSION-level advisory locks (the leader lock) which transaction pooling breaks — it
  # connects to Postgres directly. Auth via auth_query against pg_shadow ($$1 escapes compose subst).
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    profiles: ["core"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: brain
      DB_PASSWORD: brain
      DB_NAME: brain
      AUTH_TYPE: scram-sha-256
      AUTH_QUERY: "SELECT usename, passwd FROM pg_shadow WHERE usename=$$1"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "2"
      ADMIN_USERS: brain
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    ports: ["6432:5432"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U brain -d pgbouncer || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Neo4j — the customer IDENTITY GRAPH store (re-platform Phase D). Nodes: Customer{brain_id} +
  # Identifier{type,hash}; edges link hashed email/phone/device/customer-id to a Customer, and
  # merges fold two Customers into one brain_id. Per-brand isolation = brand_id on every node + a
  # brand-scoped key. The async-off-Bronze identity writer (no synchronous edge gate) writes here.
  neo4j:
    image: neo4j:5.21-community
    profiles: ["core"]
    mem_limit: 1500m   # heap 512m + pagecache 256m + JVM overhead (see budget: docs/ops/local-memory-budget.md)
    environment:
      NEO4J_AUTH: neo4j/brain_neo4j
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports: ["7474:7474", "7687:7687"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    profiles: ["core"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # DEFAULT (always-on): the Iceberg warehouse S3 backend for the Trino serving
    # engine (now a default service the app reads) + bronze/audit S3 for core. Was
    # profiles:[core,lakehouse]; promoted to default so trino's serving substrate
    # resolves without an explicit profile. Always-on services still start under the
    # existing core/lakehouse invocations, so no profile flow regresses.
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    command: server /data --console-address ":9001"
    mem_limit: 5g      # S3 warehouse backend; caps page-cache growth (see budget: docs/ops/local-memory-budget.md)
    environment:
      MINIO_ROOT_USER: brain
      MINIO_ROOT_PASSWORD: brainbrain
      GOMEMLIMIT: "4500MiB"   # soft Go heap ceiling under the 5g hard cap → GC before OOM-kill
    ports: ["9000:9000", "9001:9001"]
    # NOTE: the minio image ships no curl/wget; it does include bash. Use bash's
    # /dev/tcp to probe the API port (a port-open check is sufficient for local dev).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # MinIO bucket + prefix bootstrap (runs once; idempotent). DEFAULT (always-on)
  # alongside minio so the Trino serving warehouse buckets exist without a profile.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 brain brainbrain &&
        mc mb --ignore-existing local/brain-bronze &&
        mc mb --ignore-existing local/brain-audit &&
        echo 'MinIO buckets ready: brain-bronze brain-audit'
      "
    restart: "no"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["core"]
    ports: ["4000:4000"]
    # Mount the gateway config (per-tenant virtual_key budgets + model aliases + routing policy).
    # Dev-authorable: edit infra/litellm.config.yaml and restart this container — no image rebuild.
    # Production: the same file is rendered from Helm values and mounted via a ConfigMap volume.
    volumes:
      - ./infra/litellm.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # Provider API keys — set in .env.local-prod / .env.production (never committed).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Gateway master key — gates the admin UI + virtual-key provisioning API.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-brain-dev-master}
      # OTel trace export (ai-observability-tracing; Tempo at :4317 in the observe profile).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
    healthcheck:
      # The litellm image ships no `curl`, and /health requires the master key (401). Use the
      # bundled python against the unauthenticated lightweight liveliness probe instead.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5

  localstack:
    image: localstack/localstack:3.4
    profiles: ["core"]
    environment:
      SERVICES: "s3,secretsmanager,kms,ses,events"
    ports: ["4566:4566"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ────────────────────────────────────────────────────────────────────────────
  # INGEST profile — Apache Kafka (KRaft) + Apicurio + Iceberg REST catalog
  # ────────────────────────────────────────────────────────────────────────────
  # Apache Kafka in KRaft mode (single combined controller+broker, no ZooKeeper).
  # The service/DNS name stays `redpanda` so every existing reference keeps working
  # unchanged: depends_on, `network_mode: service:redpanda` (spark-bronze-sink +
  # spark-bronze-raw-sink share its netns), `--bootstrap-server redpanda:9092`,
  # and prometheus targets. Only the EXTERNAL host alias was renamed
  # brain-redpanda-ext → brain-kafka-ext.
  #
  # Dual listeners (preserved 1:1 from the Redpanda setup):
  #   • PLAINTEXT 9092  advertised localhost:9092       — host + same-netns clients
  #   • EXTERNAL  19092 advertised brain-kafka-ext:19092 — out-of-network clients
  #     (e.g. a local kind/k8s pod simulating prod, routed to this container's
  #     brainv3_default IP via a hostAlias for brain-kafka-ext).
  # CONTROLLER 9093 is the internal KRaft quorum listener (single self-voter).
  # Topic auto-create is OFF — topics are created idempotently by `redpanda-init`.
  redpanda:
    image: apache/kafka:3.8.1
    profiles: ["ingest"]
    mem_limit: 2500m   # Kafka KRaft broker (see budget: docs/ops/local-memory-budget.md)
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,EXTERNAL://brain-kafka-ext:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "brain-kafka-kraft-0"
      # Prometheus JMX exporter Java-agent — apache/kafka emits ONLY JMX (Redpanda's native
      # /public_metrics is gone). The agent maps the Kafka MBeans declared in
      # infra/observe/kafka-jmx-exporter.yml to kafka_* metrics on :9404, scraped by the
      # 'kafka-jmx-exporter' job in infra/observe/prometheus.yml. brain-slo.rules.yml's
      # DLQ-growth / ingest-freshness / under-replicated alerts read these series. The jar is
      # provisioned into the shared `jmx-agent` volume by `jmx-exporter-init` (below).
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=9404:/etc/jmx-exporter/kafka-jmx-exporter.yml"
    depends_on:
      # Block broker start until the javaagent jar is on the shared volume, otherwise the JVM
      # aborts with "Error opening zip file or JAR manifest missing" and the broker crash-loops.
      jmx-exporter-init:
        condition: service_completed_successfully
    volumes:
      - jmx-agent:/opt/jmx_exporter:ro
      - ./infra/observe/kafka-jmx-exporter.yml:/etc/jmx-exporter/kafka-jmx-exporter.yml:ro
    networks:
      default:
        # The EXTERNAL listener advertises `brain-kafka-ext:19092`; alias the broker to that
        # name on the compose network so in-network clients (the kafka-exporter sidecar) can
        # bootstrap the EXTERNAL listener and have the advertised host resolve.
        aliases:
          - brain-kafka-ext
    ports:
      - "9092:9092"   # Kafka API (PLAINTEXT listener)
      - "19092:19092" # Kafka API (EXTERNAL listener — for kind/k8s pods)
      - "9404:9404"   # Prometheus JMX exporter (kafka_* broker metrics; scraped by prometheus)
    healthcheck:
      # No Redpanda admin API (9644) on Kafka; probe the broker via the Kafka CLI.
      # KAFKA_OPTS= clears the broker's -javaagent JMX exporter for the probe — otherwise the CLI's
      # JVM tries to re-bind the agent on 9404 (already held by the broker) → BindException aborts the
      # JVM → the probe exits non-zero forever → the broker never reports healthy though it serves fine.
      test: ["CMD-SHELL", "KAFKA_OPTS= /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  # Kafka topic bootstrap (idempotent). Ported from `rpk` to the Kafka CLI
  # (kafka-topics.sh) using the same apache/kafka image. Shares the broker's network
  # namespace (like spark-bronze-sink) so the PLAINTEXT advertised listener
  # `localhost:9092` resolves to the broker. `--if-not-exists` keeps it idempotent.
  #
  # NOTE: uses LIST-form entrypoint with a `|` literal block — NOT `entrypoint: >`.
  # The folded scalar (`>`) silently kept the more-indented `--topic/--partitions/--config`
  # continuation lines as separate literal lines, so the shell ran `--topic` as a command
  # (`/bin/sh: --topic: not found`) and NO topics were created. The literal block + `\`
  # line-continuations below pass each kafka-topics.sh call as one shell command.
  #
  # Creates BOTH `dev.*` and `prod.*` prefixes: NODE_ENV picks the live prefix
  # (prod.* under APP_ENV=local-prod, dev.* otherwise) so both boots find their topics.
  # `$$` survives compose interpolation → literal `$` for the shell.
  redpanda-init:
    image: apache/kafka:3.8.1
    profiles: ["ingest"]
    network_mode: "service:redpanda"
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        KT=/opt/kafka/bin/kafka-topics.sh
        mk() {
          "$$KT" --bootstrap-server localhost:9092 --create --if-not-exists \
            --topic "$$1" --partitions "$$2" --replication-factor 1 \
            --config retention.ms="$$3"
        }
        for PFX in dev prod; do
          # Collector lane (+ DLQ / quarantine / order-backfill)
          mk "$$PFX.collector.event.v1"            12 604800000
          mk "$$PFX.collector.order.backfill.v1"   12 2592000000
          mk "$$PFX.collector.event.v1.dlq"        12 2592000000
          mk "$$PFX.collector.event.v1.quarantine" 12 2592000000
          # 9 connector raw lanes (Spark-SS Bronze landing — bronze_raw_landing.py)
          for LANE in shopify.orders woocommerce.orders meta.spend google.spend \
                      ga4.rows shiprocket.shipments gokwik.events shopflo.checkout \
                      razorpay.settlement; do
            mk "$$PFX.$$LANE.raw.v1" 12 604800000
          done
          # Identity + intelligence control/event topics
          for T in intelligence.cache.invalidate.v1 intelligence.customer360.recomputed.v1 \
                   intelligence.gold.rewritten.v1 identity.merged.v1 identity.suppressed.v1 \
                   identity.minted.v1 identity.linked.v1 identity.review_queued.v1; do
            mk "$$PFX.$$T" 12 604800000
          done
          # Internal canonical fan-out lanes
          for E in orders customers shipments payments sessions ads; do
            mk "$$PFX.brain.$$E" 12 604800000
          done
        done
        echo 'Kafka topics ready'
    restart: "no"

  # Apicurio — FULL_TRANSITIVE compatibility enforced globally
  apicurio:
    image: apicurio/apicurio-registry-mem:2.6.3.Final
    profiles: ["ingest"]
    environment:
      REGISTRY_APIS_V2_DATE_FORMAT: "yyyy-MM-dd'T'HH:mm:ss'Z'"
      # FULL_TRANSITIVE: every version must be compatible with ALL prior versions
      REGISTRY_COMPAT_DEFAULT_RULE: "FULL_TRANSITIVE"
      REGISTRY_COMPAT_DEFAULT_ARTIFACT_TYPE: "AVRO"
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/apis/registry/v2/groups/default/artifacts"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Iceberg REST catalog — local equivalent of AWS Glue Data Catalog (ADR-0002).
  # Apache's reference iceberg-rest-fixture, backing the Iceberg warehouse onto MinIO (S3).
  # Replaces the previously-broken projectnessie/nessie:0.90.2 (unpullable tag, PR #72) with
  # a pinned, pullable image. Spark Structured Streaming (the Bronze writer, ADR-0002) and
  # Trino (the serving engine) read Iceberg through this catalog.
  #
  # DEFAULT (always-on): the Trino serving engine (a default service the app reads) resolves
  # the Iceberg medallion through this catalog, so it must be present without a profile. Was
  # profiles:[lakehouse]; promoted to default. Spark Bronze sink / Gold jobs (lakehouse profile)
  # still reach it because always-on services run under every invocation.
  # One-shot: make the `iceberg-catalog` volume writable by the iceberg-rest fixture's runtime user
  # (uid 1000 `iceberg`). A freshly-created named Docker volume is root-owned, so on first boot the
  # file-backed SQLite catalog would fail to open (SQLITE_CANTOPEN: "unable to open database file").
  # Idempotent — a no-op once ownership is already correct. DEFAULT (no profile), like iceberg-rest,
  # so it runs under every invocation that brings the catalog up.
  iceberg-catalog-init:
    image: alpine:latest
    user: "0:0"
    volumes:
      - iceberg-catalog:/catalog
    command:
      - sh
      - -c
      - "chown -R 1000:1000 /catalog && chmod 0775 /catalog && echo 'iceberg-catalog volume writable (uid 1000)'"
    restart: "no"

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.9.2
    depends_on:
      minio:
        condition: service_healthy
      # Gate on the volume-permission init so the file-backed catalog can be created on first boot.
      iceberg-catalog-init:
        condition: service_completed_successfully
    environment:
      CATALOG_WAREHOUSE: s3://brain-bronze/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: brain
      AWS_SECRET_ACCESS_KEY: brainbrain
      AWS_REGION: us-east-1
      # FILE-BACKED shared-cache SQLite on a named volume — DURABLE across container restarts.
      # (Was `jdbc:sqlite:file::memory:?cache=shared`: a shared-cache IN-MEMORY DB — consistent across
      # concurrent connections, but WIPED on every iceberg-rest restart. That wipe orphaned brain_silver/
      # brain_gold from the catalog on any crash/restart while their parquet still lived in MinIO, taking
      # the whole serving tier down until a full Spark rebuild. The file lives on the `iceberg-catalog`
      # volume so the namespace→table pointers survive restarts; `?cache=shared` keeps the multi-connection
      # consistency the in-memory variant gave StarRocks+Spark. Data files remain in MinIO as before.)
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: "jdbc:sqlite:file:/catalog/brain-iceberg-catalog.db?cache=shared"
      CATALOG_JDBC_USER: user
      CATALOG_JDBC_PASSWORD: password
    volumes:
      - iceberg-catalog:/catalog
    ports: ["8181:8181"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # The Bronze WRITER — Spark Structured Streaming: collector.event.v1 → Iceberg Bronze.
  # The architecture's sole Bronze sink for ALL ingested events (pixel + connectors): the same
  # ingestion platform end-to-end (Collector → Kafka → Bronze). Runs CONTINUOUSLY (a long-lived
  # streaming query), the same shape we run in production. Shares Redpanda's network namespace so the
  # advertised listener (localhost:9092) resolves; service-name DNS (iceberg-rest, minio, postgres)
  # still resolves because Redpanda is on the compose network. Jars are baked into the image (no
  # Maven at runtime). Reads start from earliest on a fresh checkpoint; the MERGE is idempotent.
  # ────────────────────────────────────────────────────────────────────────────
  spark-bronze-sink:
    image: apache/spark:3.5.3
    profiles: ["lakehouse"]
    mem_limit: 7g      # 4g driver heap + Iceberg/Kafka/MERGE off-heap overhead (see budget: docs/ops/local-memory-budget.md)
    # Share the Kafka broker's network namespace so its PLAINTEXT advertised listener (localhost:9092)
    # resolves; service DNS (iceberg-rest, minio, postgres) still resolves because the broker is on the
    # compose network. K1: broker is Apache Kafka KRaft (Redpanda removed); the service / DNS name is
    # preserved as `redpanda`, so KAFKA_BROKERS=localhost:9092 via this netns is unchanged + correct.
    network_mode: "service:redpanda"
    user: root
    depends_on:
      redpanda:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Same-netns bootstrap to the Apache Kafka KRaft broker's PLAINTEXT advertised listener (K1).
      KAFKA_BROKERS: "localhost:9092"
      # Topic prefix MUST match the app's NODE_ENV-derived prefix. local-prod runs NODE_ENV=production,
      # so core/collector/stream-worker produce to prod.* — the sink must consume prod.* or it sees no
      # real data and Bronze never fills (the same break would hit prod if these were left as dev.*).
      COLLECTOR_TOPIC: "prod.collector.event.v1"
      BACKFILL_TOPIC: "prod.collector.order.backfill.v1"
      STARTING_OFFSETS: "earliest"
      TRIGGER_MODE: "continuous"
      PROCESSING_TIME: "10 seconds"
      ICEBERG_CATALOG: "rest"
      ICEBERG_REST_URI: "http://iceberg-rest:8181"
      BRONZE_NAMESPACE: "brain_bronze"
      BRONZE_WAREHOUSE: "s3://brain-bronze/"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "brain"
      AWS_SECRET_ACCESS_KEY: "brainbrain"
      AWS_REGION: "us-east-1"
      BRONZE_PG_JDBC_URL: "jdbc:postgresql://postgres:5432/brain"
      BRONZE_PG_USER: "brain"
      BRONZE_PG_PASSWORD: "brain"
      CHECKPOINT_LOCATION: "file:///opt/checkpoint/bronze"
    volumes:
      - ./db/iceberg/spark:/opt/spike:ro
      - brain-spark-ivy:/root/.ivy2
      - brain-spark-checkpoint:/opt/checkpoint
    # Runtime jar resolution (cached in the ivy volume after first start) — mirrors run-bronze-spike.sh,
    # which is the verified-working path (the build-time bake is unreliable behind Maven).
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - "local[2]"
      # Local-sink heap: the default 1g driver (driver==executor under local[*]) OOMs the
      # Iceberg+Kafka+MERGE machinery when draining a large cold-start backlog. The host has ample
      # RAM; pin 4g so the phase-1 backlog drain + continuous MERGE batches stay within heap.
      - --driver-memory
      - "4g"
      - --packages
      - "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.iceberg:iceberg-aws-bundle:1.9.2,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.postgresql:postgresql:42.7.4"
      - --conf
      - spark.jars.ivy=/root/.ivy2
      - /opt/spike/bronze_materialize.py
    restart: unless-stopped

  # ── Bronze writer (ADR-0006, Spark-SS landing REVERT): generic RAW landing for the connector lanes ──
  # Lands the nine connector *.raw.v1 lanes (shopify/woocommerce/meta/google/ga4/shiprocket/gokwik/
  # shopflo/razorpay) VERBATIM into brain_bronze.<lane>_raw — RAW, append-only, NO business logic before
  # Bronze. This REPLACES the retired Kafka Connect Iceberg sinks (kafka-connect + kafka-connect-init +
  # infra/kafka-connect/iceberg-bronze-*.json) so Spark is the SOLE landing compute. One streaming query
  # subscribes to all nine topics and routes each record to its table by Kafka topic (single checkpoint).
  # Offsets commit ONLY after the durable Iceberg append (no data loss); the append is an idempotent MERGE
  # on the Kafka coordinate (topic,partition,offset) so replays never double-write. Shares the KRaft
  # broker's network namespace (localhost:9092 resolves, like spark-bronze-sink); iceberg-rest + minio
  # still resolve over compose DNS because the broker is on the compose network. Jars resolved at runtime
  # (cached in the ivy volume). The collector/pixel lane keeps its OWN gated sink (spark-bronze-sink).
  spark-bronze-raw-sink:
    image: apache/spark:3.5.3
    profiles: ["lakehouse"]
    mem_limit: 6g      # 4g driver heap + off-heap overhead (see budget: docs/ops/local-memory-budget.md)
    network_mode: "service:redpanda"
    user: root
    depends_on:
      redpanda:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "localhost:9092"
      # Topic prefix MUST match the app's NODE_ENV-derived prefix. local-prod runs NODE_ENV=production,
      # so the connectors produce to prod.* — land prod.* or no raw data flows (same break would hit prod).
      TOPIC_ENV_PREFIX: "prod"
      LANE: ""                       # empty → all nine lanes in one stream (set a LANES key for one lane)
      STARTING_OFFSETS: "earliest"
      TRIGGER_MODE: "continuous"
      PROCESSING_TIME: "10 seconds"
      ICEBERG_CATALOG: "rest"
      ICEBERG_REST_URI: "http://iceberg-rest:8181"
      BRONZE_NAMESPACE: "brain_bronze"
      BRONZE_WAREHOUSE: "s3://brain-bronze/"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "brain"
      AWS_SECRET_ACCESS_KEY: "brainbrain"
      AWS_REGION: "us-east-1"
      CHECKPOINT_LOCATION: "file:///opt/checkpoint/bronze-raw"
    volumes:
      - ./db/iceberg/spark:/opt/spike:ro
      - brain-spark-ivy:/root/.ivy2
      - brain-spark-checkpoint:/opt/checkpoint
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - "local[2]"
      # 4g driver (driver==executor under local[*]) so the cold-start backlog drain + the per-lane MERGE
      # machinery stay within heap — mirrors spark-bronze-sink.
      - --driver-memory
      - "4g"
      - --packages
      - "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.iceberg:iceberg-aws-bundle:1.9.2,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3"
      - --conf
      - spark.jars.ivy=/root/.ivy2
      - /opt/spike/bronze_raw_landing.py
    restart: unless-stopped

  # ── Trino — serving query engine over Iceberg (DEFAULT profile) ──
  # Read-only query layer over the SAME Iceberg REST catalog + MinIO that Spark
  # uses. This is now the app serving path: App / BFF / metric-engine read the
  # Trino `mv_*` views (db/trino/views) over Iceberg + a Redis cache. StarRocks
  # has been removed entirely. Host port 8090 (not 8080) avoids collision with
  # Apicurio's 8080:8080 mapping when the ingest profile runs simultaneously.
  trino:
    image: trinodb/trino:455
    # Auto-recover: Trino is the SOLE serving engine — if it ever dies (OOM, crash) every BFF
    # analytics read 500s with "fetch failed". restart:unless-stopped means a crash self-heals
    # instead of staying down until someone notices and runs `docker compose up -d trino`.
    restart: unless-stopped
    # Bound the footprint so Trino can't size its heap to the whole Docker VM and get OOM-killed
    # under refresh-time query load (the cause of the serving-tier outage). jvm.config caps the
    # heap at 70% of this; the remainder is non-heap headroom. See db/trino/jvm.config.
    mem_limit: 7g
    mem_reservation: 3g
    depends_on:
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8090:8080"   # Trino HTTP UI + JDBC (host 8090 → container 8080)
    volumes:
      - ./db/trino/catalog:/etc/trino/catalog:ro
      - ./db/trino/jvm.config:/etc/trino/jvm.config:ro   # bounded heap (prevents OOM-kill of the serving tier)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────────────
  # OBSERVE profile — Grafana + Loki + Prometheus + OTel Collector
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observe"]
    ports: ["9090:9090"]
    volumes:
      - ./infra/observe/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.0.0
    profiles: ["observe"]
    ports: ["3100:3100"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  tempo:
    image: grafana/tempo:2.5.0
    profiles: ["observe"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observe/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo HTTP API / query-frontend
      - "4317"        # OTLP gRPC (internal — otel-collector → tempo; not exposed to host)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["observe"]
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: brain
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["3000:3000"]
    volumes:
      - ./infra/observe/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    profiles: ["observe"]
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    volumes:
      - ./infra/observe/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ────────────────────────────────────────────────────────────────────────────
  # KAFKA OBSERVABILITY — make the Kafka-repointed SLOs actually fire.
  #
  #  • The broker emits kafka_* JMX metrics on :9404 via the prometheus jmx_exporter
  #    javaagent (attached on the `redpanda` service above; jar from `jmx-exporter-init`).
  #  • kafka-exporter (below) emits per-consumer-group LAG on :9308 — NOT a broker JMX
  #    metric — driving BrainConsumerLagHigh.
  #  Both targets are scraped by infra/observe/prometheus.yml (jobs kafka-jmx-exporter /
  #  kafka-exporter) and read by infra/observe/alerts/brain-slo.rules.yml.
  # ────────────────────────────────────────────────────────────────────────────

  # One-shot: download the prometheus jmx_exporter javaagent jar into the shared `jmx-agent`
  # volume so the broker JVM can `-javaagent:` it. Idempotent (skips if already present),
  # pinned + checksum-free fetch from Maven Central. In BOTH ingest+observe profiles so the
  # broker (ingest) always finds the jar, and an observe-only `up` still primes it.
  jmx-exporter-init:
    image: curlimages/curl:8.8.0
    profiles: ["ingest", "observe"]
    # Run as root: curlimages/curl defaults to uid 100, which CANNOT write the root-owned `jmx-agent`
    # volume → curl exits 23 ("ERROR on write"), the init fails, and (being a depends_on of redpanda)
    # it aborts the whole `up --wait` chain before the broker starts. As root the download succeeds.
    user: "0:0"
    volumes:
      - jmx-agent:/opt/jmx_exporter
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        JAR=/opt/jmx_exporter/jmx_prometheus_javaagent.jar
        if [ -f "$$JAR" ]; then echo "jmx_exporter agent already present"; exit 0; fi
        echo "downloading jmx_prometheus_javaagent 1.0.1 ..."
        curl -fsSL -o "$$JAR" \
          https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar
        echo "ok"

  # Consumer-group lag exporter (per-group lag is not a broker JMX metric). Connects to the
  # broker's EXTERNAL advertised listener via the `brain-kafka-ext` network alias and exposes
  # kafka_consumergroup_lag / kafka_topic_* on :9308.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    profiles: ["observe"]
    command:
      - "--kafka.server=brain-kafka-ext:19092"
      - "--web.listen-address=:9308"
    ports:
      - "9308:9308"
    restart: unless-stopped

volumes:
  brain-spark-checkpoint:
  brain-spark-ivy:
  # Holds the prometheus jmx_exporter javaagent jar shared between jmx-exporter-init and the broker.
  jmx-agent:
  # Persists the Iceberg REST JDBC (SQLite) catalog — namespace→table pointers — across iceberg-rest
  # restarts so a crash/restart never wipes brain_silver/brain_gold from the catalog (data is in MinIO).
  iceberg-catalog:
