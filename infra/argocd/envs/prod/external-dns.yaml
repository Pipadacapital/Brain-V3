################################################################################
# Brain – ArgoCD Application: external-dns (prod) — AUD-COST-003
# Publishes Route53 records for the collector/web/core Ingress hosts (source:
# ingress) into the Brain hosted zone. upsert-only + TXT ownership
# (txtOwnerId brain-prod): external-dns never deletes records it doesn't own —
# safe next to any manually-managed DNS. If you prefer manual DNS at go-live,
# skip syncing this app and CNAME each hostname to the shared ALB instead
# (see infra/helm/PLACEHOLDERS.md).
#
# IRSA: brain-prod-external-dns — route53:ChangeResourceRecordSets on the
# hosted zone + route53:List* (terraform half in infra/helm/PLACEHOLDERS.md).
# MANUAL promotion gate (prod convention) — no automated sync.
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    project: brain
    environment: prod
    service: external-dns
spec:
  project: brain-prod
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    targetRevision: 1.15.0
    helm:
      valuesObject:
        provider:
          name: aws
        env:
          - name: AWS_DEFAULT_REGION
            value: ap-south-1
        sources:
          - ingress
        policy: upsert-only
        registry: txt
        txtOwnerId: brain-prod
        # Only manage the Brain zone — never touch anything else.
        domainFilters:
          - brain.pipadacapital.com
        serviceAccount:
          create: true
          name: external-dns
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-external-dns
        nodeSelector:
          role: system
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
