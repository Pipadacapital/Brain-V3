replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-collector-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: collector-env

# AUD-LOCAL-016-FUP1: prod kube-prometheus-stack scrapes the collector's /metrics (main port)
# as job "brain-collector" — the brain-slo rules' job name (up{job=~"brain-.*"}).
metrics:
  serviceMonitor:
    enabled: true

# AUD-COST-003: the pixel endpoint — THE 99.95%-SLA public edge. Joins the
# shared brain-prod ALB (host-routed); TLS = ACM at the ALB.
ingress:
  enabled: true
  host: REPLACE_WITH_COLLECTOR_HOSTNAME   # e.g. px.<apex-domain>
  groupName: brain-prod
  certificateArn: REPLACE_WITH_ACM_CERT_ARN

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-prod-collector

# AUD-PROD-006: the 99.95%-SLA ingest front rides the streaming pool (t4g.large
# Spot, WhenEmpty consolidation — live pods are never bin-packed off a node; the
# HPA replica floor keeps a warm baseline). Label = the pool's node template label.
nodeSelector:
  brain.platform/pool: streaming

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# P2.5: HPA on in prod — collector is the spike-prone ingest front (widest band).
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 24
