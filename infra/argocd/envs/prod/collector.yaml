################################################################################
# Brain – ArgoCD Application: collector (prod)
# MANUAL promote only — no automated sync.
# VP Eng approves via GitHub Environment 'production' gate.
# revisionHistoryLimit=10 for rollback.
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # AUD-NAME-002: {service}-prod under AppProject brain-prod, matching the other
  # 17 prod apps (docs/infra/naming-and-tagging.md §3). An Application rename is
  # a delete+recreate of the Application CR ONLY — do it with the finalizer
  # removed (or `argocd app` move procedure) so the underlying helm release /
  # collector namespace is untouched.
  name: collector-prod
  namespace: argocd
  labels:
    project: brain
    service: collector
    environment: prod
  annotations:
    argocd.argoproj.io/manifest-generate-paths: infra/helm/collector
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: brain-prod

  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    path: infra/helm/collector
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: collector

  revisionHistoryLimit: 10

  syncPolicy:
    # PROD: MANUAL sync only — no automated (PLAYBOOK-deploy §Strategy step 6-8)
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  # Rollback: argocd app rollback collector-prod --revision <N>
  # Feature flag kill-switch: packages/feature-flags sets collector.enabled=false
  # Both within 60s of trigger (PLAYBOOK-deploy §Rollback mechanism)
