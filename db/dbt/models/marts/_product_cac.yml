version: 2

models:
  - name: silver_product
    description: >
      Product master / performance dimension — one row per (brand_id, product_key, currency_code),
      aggregated additively from silver_order_line. product_key = product_id || sku || 'unknown'.
      Gives product analytics a real product master + first/last-sold for product cohorts.
    columns:
      - name: brand_id
        tests: [not_null]
      - name: product_key
        description: "Stable product grain key: product_id, else sku, else 'unknown'."
        tests: [not_null]
      - name: currency_code
        tests: [not_null]
      - name: units_sold
        tests: [not_null]
      - name: gross_revenue_minor
        description: "Additive SUM of line_total, BIGINT minor units (I-S07)."
        tests: [not_null]

  - name: gold_cac
    description: >
      Customer Acquisition Cost components (brain_gold) — one row per (brand_id, acquisition_month,
      currency_code): new_customers + acquisition_spend_minor. The CAC ratio is derived at read
      (metric-engine), never precomputed (ADR-004).
    columns:
      - name: brand_id
        tests: [not_null]
      - name: acquisition_month
        description: "YYYY-MM of the customer's first order / the spend stat_date."
        tests: [not_null]
      - name: currency_code
        tests: [not_null]
      - name: new_customers
        tests: [not_null]
      - name: acquisition_spend_minor
        description: "Additive SUM of ad spend, BIGINT minor units (I-S07)."
        tests: [not_null]
