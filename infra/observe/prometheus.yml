global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules (C2 / R-05): SLO/burn-rate, freshness, DLQ-depth, consumer-lag, liveness.
rule_files:
  - 'alerts/*.rules.yml'

# Route fired alerts to Alertmanager (notification targets injected at deploy time).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # App-tier /metrics (AUD-LOCAL-016): @brain/observability now keeps an in-process counter
  # registry rendered as Prometheus text. Collector serves it on its Fastify port (:8787),
  # stream-worker on its health server (:8091 — NOT :9092, which collides with the Kafka host port).
  - job_name: 'brain-collector'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8787']

  - job_name: 'brain-stream-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8091']

  # Broker metrics — repointed from the retired Redpanda /public_metrics (redpanda_kafka_*) to the
  # Apache Kafka (KRaft) broker, which emits ONLY JMX. The broker runs the prometheus/jmx_exporter
  # Java agent (config: kafka-jmx-exporter.yml) exposing kafka_* metrics on :9404. brain-slo.rules.yml
  # reads kafka_log_log_logendoffset (DLQ growth / ingest freshness) + under-replicated from here.
  - job_name: 'kafka-jmx-exporter'
    static_configs:
      - targets: ['host.docker.internal:9404']  # Kafka broker JMX-exporter agent (local dev)

  # Consumer-group LAG is not a broker JMX metric — sourced from the danielqsj/kafka_exporter
  # companion, which exposes kafka_consumergroup_lag / kafka_topic_*. Drives BrainConsumerLagHigh
  # (and, post-ADR-0010, covers the Iceberg sink's `connect-iceberg-bronze-*` consumer groups).
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['host.docker.internal:9308']  # kafka_exporter (local dev)

  # Kafka Connect Bronze landing worker (ADR-0010) — jmx_exporter agent on the kafka-connect
  # compose service (port published via the `kafka` service; shared netns). Config:
  # kafka-connect-jmx-exporter.yml → kafka_connect_* worker/task metrics, incl. the
  # kafka_connect_connector_task_status{status=} gauge driving BronzeConnectTaskFailed.
  - job_name: 'kafka-connect-jmx'
    static_configs:
      - targets: ['host.docker.internal:9405']  # Connect worker JMX-exporter agent (local dev)
