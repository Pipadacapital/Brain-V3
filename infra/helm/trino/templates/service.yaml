# ClusterIP Service the BFF / metric-engine + the workers' discovery.uri target. Routes to the
# COORDINATOR pods only (the coordinator owns the HTTP/JDBC endpoint + discovery service).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trino.fullname" . }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "trino.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
