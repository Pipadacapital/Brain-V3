# brain-slo.rules.yml — production alert rules for the Brain data spine (C2 / R-05).
#
# Covers the GA-gating signal classes the audit requires: SLO/burn-rate, ingest freshness,
# DLQ depth, consumer lag — plus target-down liveness. Every rule is grounded in a metric that
# is ACTUALLY emitted today (no fantasy alerts that silently never fire — the exact false-safety
# anti-pattern C2 closes). Each rule names its metric SOURCE.
#
# Metric sources (all live):
#   • up                              — Prometheus scrape liveness.
#   • brain_collector_accept_total          — @brain/observability counter; +1 per ACK'd /collect (200/202).
#   • brain_collector_backpressure_shed_total      — counter; +1 per 503 backpressure shed (producer down + disk-WAL saturated, ADR-0015).
#   • brain_collector_wal_oldest_entry_age_seconds — gauge (collector /metrics, scrape-time sample); age of the
#                                       OLDEST event ACK'd into the pod-local disk WAL but not yet produce-ack'd
#                                       onto the log (ADR-0015 WAL durability posture). Siblings:
#                                       brain_collector_wal_pending_{bytes,events} gauges +
#                                       brain_collector_wal_{flushed,flush_failures}_total counters.
#   • collector_dedup_conflict_total  — counter; +1 per pk_conflict/dedup_hit (R4).
#   • kafka_log_log_logendoffset      — Kafka (KRaft) broker JMX via jmx_exporter (job 'kafka-jmx-exporter');
#                                       log end offset / high-watermark per topic-partition.
#   • kafka_consumergroup_lag         — danielqsj/kafka_exporter (job 'kafka-exporter'); per-group lag
#                                       (NOT a broker JMX metric, hence the companion exporter).
#   • kafka_connect_*                 — Connect worker JMX via jmx_exporter (job 'kafka-connect-jmx',
#                                       config infra/observe/kafka-connect-jmx-exporter.yml); the ADR-0010
#                                       Bronze landing writer's task status / sink reads / consumer lag.
#                                       (AUD-INFRA-029: brain_bronze_write_total was DELETED with the
#                                       Spark-SS Bronze sink at the ADR-0010 cutover — the Connect
#                                       series replaced it as the Bronze-landing freshness source.)
#
# Collector ingest SLO = 99.95% accept+ack (matches the bake-window rule in deploy.yml).
#
# Validate: promtool check rules infra/observe/alerts/brain-slo.rules.yml

groups:
  # ── Liveness ────────────────────────────────────────────────────────────────
  - name: brain-liveness
    rules:
      - alert: BrainTargetDown
        # AUD-INFRA-028/-030: regex extended with kafka-connect-jmx (the Bronze landing writer's
        # exporter) and duckdb-serving (the sole serving engine — prod PodMonitor; not scraped
        # locally, so the duckdb-serving matcher is vacuous in compose). NOTE: `up` only exists for
        # CONFIGURED targets — a monitor that was never created cannot fire this; absence coverage
        # for duckdb-serving/freshness lives in DuckDBServingDown / BrainFreshnessExporterDown
        # (absent()-based).
        expr: up{job=~"brain-.*|kafka-jmx-exporter|kafka-exporter|kafka-connect-jmx|duckdb-serving"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target down"
          description: "Prometheus has not scraped {{ $labels.job }} ({{ $labels.instance }}) for 2m."

  # ── Collector ingest SLO / burn-rate (the 99.95% accept+ack durability guarantee) ──
  # Multi-window burn-rate (Google SRE): availability = accept / (accept + shed).
  # Error budget = 0.05%. Fast burn = 14.4× over 5m+1h; slow burn = 6× over 30m+6h.
  # Two windows per alert suppress single-spike flapping.
  - name: brain-collector-slo
    rules:
      - alert: BrainCollectorErrorBudgetFastBurn
        expr: |
          (
            sum(rate(brain_collector_backpressure_shed_total[5m]))
              / (sum(rate(brain_collector_accept_total[5m])) + sum(rate(brain_collector_backpressure_shed_total[5m]))) > (14.4 * 0.0005)
          )
          and
          (
            sum(rate(brain_collector_backpressure_shed_total[1h]))
              / (sum(rate(brain_collector_accept_total[1h])) + sum(rate(brain_collector_backpressure_shed_total[1h]))) > (14.4 * 0.0005)
          )
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Collector accept+ack error budget burning fast (>14.4×)"
          description: "Shed ratio exceeds 14.4× the 0.05% budget over 5m AND 1h — the durability SLO is being consumed in hours, not weeks."

      - alert: BrainCollectorErrorBudgetSlowBurn
        expr: |
          (
            sum(rate(brain_collector_backpressure_shed_total[30m]))
              / (sum(rate(brain_collector_accept_total[30m])) + sum(rate(brain_collector_backpressure_shed_total[30m]))) > (6 * 0.0005)
          )
          and
          (
            sum(rate(brain_collector_backpressure_shed_total[6h]))
              / (sum(rate(brain_collector_accept_total[6h])) + sum(rate(brain_collector_backpressure_shed_total[6h]))) > (6 * 0.0005)
          )
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Collector accept+ack error budget burning slowly (>6×)"
          description: "Shed ratio exceeds 6× the 0.05% budget over 30m AND 6h."

      - alert: BrainCollectorSheddingNow
        # Any sustained back-pressure shedding — the drainer (→ Kafka) is behind RIGHT NOW.
        expr: sum(rate(brain_collector_backpressure_shed_total[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Collector is shedding ingest (503 backpressure)"
          description: "/collect has shed for 2m — the Kafka producer is failing AND the local disk-WAL fallback is saturated (ADR-0015 direct-to-log)."

      - alert: BrainCollectorWalPendingAgeHigh
        # ADR-0015 WAL durability posture: events ACK'd into the pod-local disk WAL but NOT yet
        # produce-ack'd onto the log for >5m — the durability exposure window is OPEN (a hard
        # node loss now would drop these ACK'd events). The flusher retries every tick; a
        # sustained age means Kafka has been unreachable (or the flush failing) that whole time.
        # max() over pods: ANY replica holding old unflushed entries is exposure.
        expr: max(brain_collector_wal_oldest_entry_age_seconds) > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Collector WAL has events pending >5m (durability exposure window open)"
          description: "The oldest event ACK'd into a collector pod's local-disk WAL has not reached the log for over 5 minutes — check Kafka broker health and brain_collector_wal_flush_failures_total. These events survive pod restarts but NOT a hard node loss (ADR-0015 accepted residual risk)."

      - alert: BrainCollectorWalPendingAgeCritical
        # Same signal, 30m: the outage has outlived several flush cycles and the exposure window
        # is now long enough that a node failure would lose a meaningful slice of ACK'd events.
        expr: max(brain_collector_wal_oldest_entry_age_seconds) > 1800
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Collector WAL has events pending >30m (durability exposure critical)"
          description: "Events ACK'd into a collector pod's local-disk WAL have not reached the log for over 30 minutes — the produce path has been down for the whole window. Restore Kafka / the producer path; the WAL drains automatically on reconnect (ADR-0015 drain+alert posture)."

  # ── Stream-worker: DLQ depth + consumer lag + ingest freshness ──────────────
  - name: brain-stream-worker
    rules:
      - alert: BrainDlqGrowing
        # DLQ is a topic; a still-advancing high-watermark (log end offset) on a .dlq topic = terminal failures.
        expr: |
          sum by (topic) (
            rate(kafka_log_log_logendoffset{topic=~".*\\.dlq"}[15m])
          ) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "DLQ topic {{ $labels.topic }} is growing"
          description: "Events are landing in the DLQ (offset advancing for 10m) — terminal processing failures after MAX_RETRY."

      - alert: BrainConsumerLagHigh
        # kafka_consumergroup_lag (kafka_exporter): summed lag across all topic-partitions of a group.
        expr: |
          sum by (consumergroup) (
            kafka_consumergroup_lag{consumergroup=~"stream-worker-.*|.*-bridge"}
          ) > 50000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Consumer group {{ $labels.consumergroup }} lag > 50k"
          description: "The consumer group is >50,000 messages behind for 10m — projection is falling behind production rate."

      - alert: BronzeConnectTaskFailed
        # ADR-0010: a FAILED Iceberg-sink task stays failed until manually restarted — the lane it
        # owns stops landing Bronze rows entirely (this is the shape of the ce107294-class silent
        # freeze). Source: kafka-connect-jmx job / kafka-connect-jmx-exporter.yml mapping.
        expr: kafka_connect_connector_task_status{status="failed"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Bronze Connect task {{ $labels.connector }}/{{ $labels.task }} FAILED"
          description: "The Iceberg sink task is in FAILED state — its Kafka lane is not landing in Bronze. Restart: curl -X POST localhost:8083/connectors/{{ $labels.connector }}/tasks/{{ $labels.task }}/restart (see docs/runbooks/adr-0010-kafka-connect-bronze.md)."

      - alert: BronzeConnectLagHigh
        # ADR-0010: the Bronze landing writer itself is falling behind (or the worker is down and
        # lag is frozen while producers advance). 10k over 10m ≈ well past the 30s commit cadence.
        # AUD-INFRA-028 REWRITE: was kafka_consumergroup_lag{consumergroup=~"connect-iceberg-bronze-.*"}
        # — MEASURED EMPTY even with the groups live: the Iceberg sink coordinates commits over the
        # control topic (offsets live in the Iceberg snapshot metadata), so kafka_exporter's
        # __consumer_offsets-derived lag never materializes. Source now: the worker's OWN embedded
        # consumer JMX (kafka-connect-jmx job, infra/observe/kafka-connect-jmx-exporter.yml);
        # client_id shape connector-consumer-<connector>-<task>.
        expr: |
          sum by (client_id) (
            kafka_connect_consumer_records_lag
          ) > 10000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Bronze Connect landing lag > 10k ({{ $labels.client_id }})"
          description: "The Iceberg sink consumer {{ $labels.client_id }} is >10,000 messages behind for 10m — Bronze landing is falling behind ingest (worker down, catalog contention, or throughput ceiling). See docs/runbooks/adr-0010-kafka-connect-bronze.md."

      - alert: BrainIngestStale
        # Freshness: collector topic advancing but ZERO Bronze landing reads for 10m → the spine
        # stalled. AUD-INFRA-029 REWRITE for the Connect era: the old brain_bronze_write_total
        # (stream-worker Spark-SS sink) was deleted at the ADR-0010 cutover, leaving this alert
        # keyed on a nonexistent series — increase() over a missing metric returns an EMPTY vector
        # (not 0), so the AND never yielded a sample and a total Bronze stall was silent. Now keyed
        # on the collector connector's sink-read counter; the absent() arm keeps the alert HONEST
        # if the Connect exporter's series ever disappears again (fires rather than going quiet —
        # scrape-down alone is also covered by BrainTargetDown{job="kafka-connect-jmx"}).
        expr: |
          (sum(rate(kafka_log_log_logendoffset{topic=~".*\\.collector\\.event\\.v1"}[10m])) > 0)
          and
          (
            (sum(rate(kafka_connect_sink_task_sink_record_read_total{connector="iceberg-bronze-collector"}[10m])) == 0)
            or
            (absent(kafka_connect_sink_task_sink_record_read_total{connector="iceberg-bronze-collector"}) == 1)
          )
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Ingest stalled — events produced but no Bronze landing reads in 10m"
          description: "The collector topic is advancing but the Kafka Connect Iceberg sink (the SOLE Bronze landing writer, ADR-0010) read zero records for 10m — or its metrics vanished. The data spine is stalled. Check the connect worker pod, task status (curl localhost:8083/connectors/iceberg-bronze-collector/status) and the kafka-connect-jmx scrape target. See docs/runbooks/adr-0010-kafka-connect-bronze.md."

      # P1 — the scale-limiting tier. BrainIngestStale only fires at TOTAL zero; these catch the
      # DEGRADATION before it reaches zero (the signals the audit flagged as having no metric).
      - alert: BrainIngestSchedulerOverrun
        # The sequential scheduler tick can no longer finish within its interval → connector freshness
        # silently slips into minutes. The first symptom of "too many brands per replica" (shard/scale).
        expr: sum(increase(brain_ingest_scheduler_tick_overrun_total[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Ingest scheduler tick overrunning its interval"
          description: "A scheduler tick took longer than its poll interval — ingest freshness is degrading. Shard brands across replicas or shorten the per-connector work."

      - alert: BrainConnectorDispatchErrors
        # A provider's repulls are failing on dispatch (rate limit / credential / API) — stale data for
        # that connector with NO other signal today (per-connector observability was missing).
        expr: |
          sum by (provider) (rate(brain_ingest_scheduler_dispatch_error_total[10m]))
            / clamp_min(sum by (provider) (rate(brain_ingest_scheduler_dispatch_total[10m]) + rate(brain_ingest_scheduler_dispatch_error_total[10m])), 1) > 0.25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Connector {{ $labels.provider }} repulls failing > 25%"
          description: "More than a quarter of {{ $labels.provider }} repull dispatches are failing — likely a rate limit, expired credential, or provider outage. That connector's data is going stale."

      - alert: BrainConnectorRateLimited
        # The global per-provider rate limiter is throttling dispatches sustainedly → that provider's
        # shared app quota is the bottleneck at the current brand count. Raise the cap or add capacity.
        expr: sum by (provider) (rate(brain_ingest_scheduler_rate_limited_total[15m])) > 0.1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Connector {{ $labels.provider }} sustainedly rate-limited"
          description: "Brain is throttling {{ $labels.provider }} repulls to protect its shared app quota — those connectors are re-pulling slower than their interval. Quota is the scaling bottleneck for this provider."

      # P2.2 — DLQ redrive. The redrive tool replays transient-failure messages back to their
      # source topic; messages that exhaust the loop guard (x-redrive-count ≥ max) are GENUINE
      # poison left parked. A non-zero exhausted rate means human investigation is needed — the
      # DLQ is no longer self-healing for those messages.
      - alert: BrainDlqRedriveExhausted
        # brain_dlq_redrive_exhausted_total: stream-worker counter (P2.2). A redrive pass left messages
        # parked because they hit the max-redrive ceiling — they keep failing on replay.
        expr: sum by (target_topic) (increase(brain_dlq_redrive_exhausted_total[1h])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ redrive left poison parked for {{ $labels.target_topic }}"
          description: "A redrive pass exhausted the loop guard for messages targeting {{ $labels.target_topic }} — they fail every replay. Investigate the payload/schema; they will not self-heal."

      - alert: BrainDlqRedriveErrors
        # brain_dlq_redrive_error_total: republish to the source topic failed during a redrive (broker
        # issue) — the operator's drain is not making progress.
        expr: sum by (target_topic) (increase(brain_dlq_redrive_error_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ redrive republish failing for {{ $labels.target_topic }}"
          description: "Redrive could not republish to {{ $labels.target_topic }} — the operator drain is stalling. Check broker health."

      # P2.6 — connector auth rejection. A repull whose credential is rejected (Meta/Google token
      # expired, Shopify/Razorpay 401) writes sync_status='error' and RETURNS — it does NOT throw,
      # so the scheduler sees success and that connector's data (spend/settlement/orders) silently
      # goes stale until an operator reconnects. This makes that path loud.
      - alert: BrainConnectorAuthRejected
        # brain_connector_auth_rejected_total: stream-worker counter (P2.6). Non-zero ⇒ a connector needs
        # reconnecting RIGHT NOW and its data is going stale.
        expr: sum by (provider) (increase(brain_connector_auth_rejected_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Connector {{ $labels.provider }} credential rejected — reconnect required"
          description: "A {{ $labels.provider }} repull was rejected on auth (expired token / 401). That connector is no longer ingesting — its spend/settlement/order data is going stale until it is reconnected."

      # feat-meta-token-refresh — the proactive Meta token re-exchange job. A sustained error rate
      # means tokens are NOT being refreshed (app creds missing, or tokens already dead) → spend
      # ingestion will silently stale as those tokens hit their ~60-day expiry.
      - alert: BrainMetaTokenRefreshFailing
        # brain_meta_token_refresh_error_total: stream-worker counter (the daily cron job). Non-zero ⇒
        # tokens are not being kept fresh — investigate app creds / reconnect the flagged connectors.
        expr: sum by (reason) (increase(brain_meta_token_refresh_error_total[2h])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Meta token refresh failing ({{ $labels.reason }})"
          description: "The proactive Meta token re-exchange job is erroring ({{ $labels.reason }}). If app_creds_missing — set META_APP_ID/META_APP_SECRET; if exchange_failed — those connectors need a reconnect before their tokens expire and spend ingestion stalls."

      # Silver freshness. Silver is built by the DuckDB Silver jobs (db/iceberg/duckdb/silver/*.py,
      # scheduled via the cronworkflows chart / tools/dev/duckdb-refresh.sh locally), so it can
      # lag Bronze between batches. The DQ reconciliation executor runs CONTINUOUSLY in the
      # deployed worker and compares Bronze↔Silver order counts; a sustained breach = Silver is
      # stale or unreachable. The continuous Silver-freshness signal.
      # (AUD-INFRA-029: description previously instructed "rebuild via dbt / check StarRocks" —
      # BOTH retired in Brain V4; dbt is removed and serving is duckdb-serving-over-Iceberg. Spark→DuckDB
      # cutover: the transform tier is DuckDB now, not Spark.)
      - alert: BrainSilverLag
        # brain_dq_silver_lag_breach_total: stream-worker DQ counter. Sustained increase ⇒ Silver is
        # lagging Bronze (or duckdb-serving, the reconciliation's read engine, is down) — analytics reads are stale.
        expr: sum by (reason) (increase(brain_dq_silver_lag_breach_total[1h])) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Silver tier lagging Bronze ({{ $labels.reason }})"
          description: "The Bronze↔Silver reconciliation has breached for 30m ({{ $labels.reason }}). Silver (silver_order_state) is stale vs Bronze — check the DuckDB Silver CronWorkflows (v4-silver, db/iceberg/duckdb/silver) and duckdb-serving health. Analytics reads over Silver are behind."

      # Silver identity stage (ADR-0015 WS3 / C1 2026-07-18) — the v4-identity CronWorkflow
      # (infra/helm/cronworkflows/templates/v4-transform.yaml, every 5 min at :02/:07/…).
      # brain_silver_identity_runs_total: stream-worker counter (silver-identity batch job), +1 per
      # CLEAN per-brand pass — including a no-op empty window, so a healthy-but-quiet brand still
      # ticks. absent() ⇒ the job has never run (the C1 failure mode: stage not scheduled) or its
      # series vanished; zero increase over 15m (3 missed ticks = 3× the 5-min cadence, above the
      # required 2× threshold) ⇒ the cron stopped firing or EVERY brand pass is erroring (watermarks
      # held). Either way identity resolution has stalled: new events stop resolving to brain_id,
      # silver_identity_map freezes, and gold_customer_360 + the attribution chain go stale.
      - alert: BrainSilverIdentityStageStalled
        expr: |
          absent(brain_silver_identity_runs_total)
          or
          (sum(increase(brain_silver_identity_runs_total[15m])) == 0)
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Silver identity stage has not completed a clean brand pass in >15m"
          description: "brain_silver_identity_runs_total is absent or flat for over 15m (cadence: every 5 min). Identity resolution is stalled — new events are not resolving to brain_id and the identity map / customer marts are going stale. Check the v4-identity CronWorkflow (argo -n argo list | grep v4-identity), duckdb-serving (the job's read path), Neo4j, and per-brand errors in the job logs (watermarks are held on error and converge on the next clean run)."

  # ── Revenue truth integrity ─────────────────────────────────────────────────
  - name: brain-revenue-integrity
    rules:
      - alert: BrainRevenueOverReversal
        # brain_revenue_over_reversal_total: stream-worker counter (F2). Cumulative reversals exceeded the
        # recognized sale for an order → realized revenue for that order went negative. Usually a
        # duplicate refund or a refund+chargeback on one order — needs reconciliation, not silence.
        expr: sum(increase(brain_revenue_over_reversal_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Over-reversal detected in the revenue ledger"
          description: "An order's cumulative reversals exceeded its recognized sale (realized went negative). Reconcile — likely a duplicate refund or refund+chargeback."

  # ── Webhook produce health ───────────────────────────────────────────────────
  - name: brain-webhook-health
    rules:
      - alert: BrainWebhookProduceFailing
        # collector_webhook_produce_error_total: collector counter (+1 per message the collector
        # failed to produce to Kafka after exhausting retries). A non-zero rate means EVENTS
        # ARE BEING DROPPED at the ingest spine entry — the no-event-loss guarantee (CLAUDE.md) is
        # being violated. Immediate investigation required.
        #
        # Metric source: @brain/observability incrementCounter in the collector's Kafka producer
        # retry wrapper. Zero when the topic is healthy; any increment = a drop in the live lane.
        #
        # Two-window guard: 1m fast burn (drops right now) + 5m sustained (not a single-blip spike).
        expr: |
          (sum(rate(brain_collector_webhook_produce_error_total[1m])) > 0)
          and
          (sum(increase(brain_collector_webhook_produce_error_total[5m])) > 0)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Collector webhook produce failing — events are being dropped"
          description: "The collector cannot produce events to Kafka after retries (brain_collector_webhook_produce_error_total is advancing). The no-event-loss guarantee is violated. Check broker health, topic availability, and producer credentials."
