# Default values for the cronworkflows chart. Overridden by values-staging.yaml / values-prod.yaml.
#
# Each job is an Argo CronWorkflow that runs ONE container (the core or stream-worker image) with a
# job-entrypoint CLI command (doc 06 §"Argo jobs → Core"). The job enumerates active brands and runs
# the per-brand pipeline; it is idempotent, so a missed/retried run is safe.

# Default image (the core image — most jobs are core entrypoints). Per-job `image:` overrides this.
image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-core
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

# Stream-worker image (for jobs whose entrypoint ships in that deployable, e.g. revenue-finalization).
streamWorkerImage:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

# Secret (External Secrets ← AWS Secrets Manager): DATABASE_URL, BRAIN_APP_DATABASE_URL,
# ICEBERG/Trino credentials, etc. Empty in defaults (set per env).
envSecretName: ""

# IST — schedules below are written in Asia/Kolkata (the brands' operating timezone).
timezone: "Asia/Kolkata"

serviceAccount:
  name: brain-jobs   # IRSA role for AWS Secrets Manager access (annotated per env)

env:
  - name: SERVICE_NAME
    value: cronworkflows

defaults:
  concurrencyPolicy: Forbid        # never overlap a brand-enumeration run with itself
  startingDeadlineSeconds: 300     # skip (don't pile up) if the controller was down
  activeDeadlineSeconds: 1800      # 30 min hard cap per run
  backoffLimit: 2                  # retry a failed run twice
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Spark Bronze dual-sink + parity oracle (ADR-0002 Slice 3). GATED OFF by default — enabling it runs
# the Iceberg Bronze sink IN PARALLEL with the live Postgres write (additive, reversible) plus the
# PG⇄Iceberg parity oracle. Flip `enabled: true` per env only when ready to start the migration;
# turn off to instantly stop the dual-sink. See db/iceberg/spark/ + docs/adr/0002-*.
sparkBronze:
  # ENABLED. CORRECTION: the sink runs spark-submit --master local[*] in a SINGLE Argo Workflow pod
  # (see templates/spark-bronze.yaml + the Dockerfile ENTRYPOINT) — it needs NO Spark Operator and NO
  # dedicated cluster, just a pod sized for the driver (resources below give 4Gi; driverMemory 3g). The
  # image is CI-built + digest-pinned (build-data-images). The remaining PREREQUISITE is operational,
  # not infra: core-env (envSecretName) MUST carry the sink's config — KAFKA_BROKERS, ICEBERG_REST_URI/
  # warehouse + AWS creds, CHECKPOINT_LOCATION (a DURABLE s3a:// path), and BOTH lane topics
  # (COLLECTOR_TOPIC + BACKFILL_TOPIC). Without those the runs fail LOUDLY (visible Argo failures, not
  # silent). See docs/runbooks/enable-attribution-unlocks.md. Flip back to false to instantly stop it.
  enabled: true
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/brain-spark-bronze   # built from db/iceberg/spark/Dockerfile
    tag: ""            # B3: digest preferred; CI populates at deploy (fail-closed in the template)
    digest: ""
    pullPolicy: IfNotPresent
  landingSchedule: "*/15 * * * *"       # bronze_landing drains ALL topics → brain_bronze.events every 15m (availableNow)
  maintenanceSchedule: "0 3 * * *"      # daily 03:00 IST — compaction + 24-mo snapshot-expiry (Slice 7)
  activeDeadlineSeconds: 1800
  # Spark driver heap (driver==executor under local[*]). Pinned < resources.limits.memory so the JVM +
  # PySpark + Iceberg/Kafka machinery don't OOM on a backlog drain (the default 1g OOMs — same lesson
  # as the local docker sink). Keep a margin below the pod memory limit for non-heap overhead.
  driverMemory: "3g"
  # Non-secret config. Secrets (envSecretName) MUST include: KAFKA_BROKERS, ICEBERG/Glue, AWS_*, a
  # DURABLE s3a:// CHECKPOINT_LOCATION, and the topic wiring. bronze_landing subscribes to ALL Bronze
  # topics: COLLECTOR_TOPIC + BACKFILL_TOPIC + the nine connector *.raw.v1 lanes (derived from
  # TOPIC_ENV_PREFIX, e.g. `prod`) — so the secret must carry COLLECTOR_TOPIC, BACKFILL_TOPIC AND
  # TOPIC_ENV_PREFIX. This cron NEWLY lands the 9 raw lanes in prod (there was no bronze_raw_landing cron).
  # CUTOVER: CHECKPOINT_LOCATION MUST be a FRESH s3a path (a new query plan + topic set + consumer group —
  # the old bronze_materialize checkpoint can't be reused). Do a ONE-OFF STARTING_OFFSETS=earliest run to
  # backfill brain_bronze.events (idempotent via dedup_key), then leave STARTING_OFFSETS=latest steady-state.
  env:
    - { name: STARTING_OFFSETS, value: "latest" }
  # Workflow-pod placement (AUD-PROD-006). Empty by default (staging/kind unchanged);
  # values-prod pins the Spark cron pods to the batch pool.
  nodeSelector: {}
  tolerations: []
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "2", memory: 4Gi }
  # ── Execution mode (see docs/ops/spark-on-k8s-migration.md §7) ─────────────────────────────────
  # "local" (default) = the proven single-JVM `spark-submit --master local[*]` in the cron pod. "k8s" =
  # Spark-on-Kubernetes cluster mode (real executor pods, same image/catalog/code). Bronze is the lighter,
  # SEPARATE-from-batch decision — migrate only when Bronze itself shows lag (Kafka partitions + executors),
  # NOT coupled to the sparkV4 cutover. DEFAULT local → zero change to today's crons; rollback = flip back.
  executionMode: local
  k8s:
    apiServer: "k8s://https://kubernetes.default.svc"
    namespace: ""                       # "" → the release namespace
    serviceAccountName: spark           # shared with sparkV4; RBAC in spark-k8s-rbac.yaml renders if EITHER is k8s
    executor:
      instances: "3"
      cores: "4"
      memory: "6g"
      minExecutors: "1"
      maxExecutors: "8"

# Brain V4 Spark Silver/Gold transform (templates/spark-v4.yaml). Spark is the SOLE compute, dbt is gone.
# Two staggered CronWorkflows — v4-silver (:05) → v4-gold (:25) — that spark-submit the mart jobs the
# spark image now CARRIES (db/iceberg/spark/{silver,gold}/*.py via the Dockerfile). The serving mv_*
# Trino views resolve straight over the Iceberg Gold/Silver marts (thin projections) and are SYNC-refreshed
# by the Spark v4-refresh path — there is NO separate mysql REFRESH leg (StarRocks is removed). The
# identity-export + journey-stitch node jobs (.Values.jobs) sequence around them by schedule to complete
# the attribution chain (identity → order-state → silver → stitch → gold). ENABLED: the V4 Spark crons
# run the medallion refresh. Requires the CI-built+digest-pinned V4 spark image (B3 fail-closed) + a
# cluster, the same external gate as sparkBronze.
sparkV4:
  enabled: true
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/brain-spark-bronze   # same image — Dockerfile now carries the V4 marts
    tag: ""            # B3: digest preferred; CI populates at deploy (fail-closed in the template)
    digest: ""
    pullPolicy: IfNotPresent
  silverSchedule: "5 * * * *"     # hourly :05 — order_state spine + the rest of Silver (after identity :02)
  goldSchedule: "25 * * * *"      # hourly :25 — revenue → attribution → customer/gap/exec (after stitch :15/:16)
  activeDeadlineSeconds: 2400     # 40 min per Silver/Gold build
  driverMemory: "3g"              # < resources.limits.memory (non-heap overhead margin) — same as sparkBronze
  sparkMaxRetries: "1"            # bounded in-pod retry per spark-submit (idempotent MERGE); + Argo backoffLimit
  # Non-secret config. Secrets (ICEBERG_REST_URI/Glue, AWS_*, NEO4J_*) come from envSecretName.
  env:
    - { name: ICEBERG_CATALOG, value: "rest" }
  # Workflow-pod placement (AUD-PROD-006) — shared by v4-silver / v4-gold /
  # v4-maintenance. Empty by default; values-prod pins to the batch pool.
  nodeSelector: {}
  tolerations: []
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "2", memory: 4Gi }
  # ── Silver/Gold Iceberg maintenance (AUD-COST-013; templates/spark-v4-maintenance.yaml) ────────
  # Weekly medallion_maintenance.py: rewrite_data_files + expire_snapshots (7d) + a GUARDED
  # remove_orphan_files pass — the hourly-rewritten marts otherwise grow S3 unbounded, and no
  # tier swept orphans from failed/aborted writes. ORPHAN_OLDER_THAN_DAYS=7 (job clamps >=3):
  # orphans that old can never belong to an in-flight commit, so overlapping the hourly refresh
  # is safe. remove_orphan_files lists via S3A; since AUD-COST-020 the job's S3A wiring is
  # conditional — with S3_ENDPOINT unset (real S3) it falls back to the default AWS credential
  # provider chain (IRSA WebIdentity, zero static keys; hadoop-aws is baked into the image), so
  # ORPHAN_FILES=1 is safe in prod. ORPHAN_FILES=0 remains the escape hatch (compaction+expiry only).
  maintenance:
    enabled: true
    schedule: "45 4 * * 0"          # weekly Sun 04:45 IST — off the daily 03:00 Bronze maintenance slot
    activeDeadlineSeconds: 3600     # full two-namespace sweep, table-by-table (failures logged, exit≠0)
    env:
      - { name: ORPHAN_FILES, value: "1" }
      - { name: ORPHAN_OLDER_THAN_DAYS, value: "7" }
  # ── Execution mode (see docs/ops/spark-on-k8s-migration.md) ────────────────────────────────────
  # "local" = the current, proven single-JVM `spark-submit --master local[*]` (driver==executor in the
  # cron pod). "k8s" = Spark-on-Kubernetes CLUSTER mode: spark-submit launches real executor pods, the
  # SAME image/catalog/code, gated entirely by this flag. DEFAULT local → zero change to today's crons;
  # flip to k8s ONLY after the migration plan's parity gate. Rollback = flip back to local (one line).
  executionMode: local
  k8s:
    # In-cluster API server (the `k8s://` master). Override only for an out-of-cluster submit.
    apiServer: "k8s://https://kubernetes.default.svc"
    namespace: ""                       # "" → the release namespace (where executor pods launch)
    serviceAccountName: spark           # the driver SA — RBAC templated in spark-k8s-rbac.yaml (k8s mode only)
    # Executor fleet (values are strings — interpolated verbatim into --conf). Dynamic allocation with
    # shuffle tracking (no external shuffle service needed on Spark 3.x/K8s). Tune from the Spark UI.
    executor:
      instances: "4"
      cores: "4"
      memory: "6g"
      minExecutors: "2"
      maxExecutors: "12"
    # Cluster-scale tuning knobs, ACTIVE ONLY in k8s mode. iceberg_base.spark_perf_configs() reads these
    # from env — they are no-ops in local mode and become meaningful with real executors (#312 seam).
    env:
      - { name: SPARK_SHUFFLE_PARTITIONS, value: "256" }
      - { name: SPARK_OFFHEAP_SIZE, value: "2g" }
      - { name: SPARK_AQE_ADVISORY_BYTES, value: "134217728" }   # 128MB

# The scheduled jobs. `image` omitted → the default (core) image.
#
# ── THE ATTRIBUTION CHAIN (post-medallion) — ordered by staggered schedule + idempotency (NOT an
#    Argo DAG; matches this chart's one-container-per-CronWorkflow convention). Each step is
#    idempotent, so the time gaps sequence them and a missed/retried run is safe (Forbid +
#    startingDeadline). MEDALLION REALIGNMENT (Brain V4): there is NO PG `revenue-finalization` cron and
#    NO PG provisional ledger, and dbt is GONE — recognition (incl. prepaid finalization after horizon +
#    COD delivery/RTO) and the attribution gold mart are now Spark-on-Iceberg builds (the v4-silver /
#    v4-gold CronWorkflows in templates/spark-v4.yaml). payment_method drives the COD-vs-prepaid
#    recognition branch entirely inside the Spark Silver path (Bronze → silver_order_state →
#    gold_revenue_ledger), so the obsolete "persist payment_method on provisional" concern no longer
#    exists. The live, scheduled chain interleaves these node jobs with the Spark crons:
#      :02  identity-export                Neo4j identity graph → silver_identity_link so the Silver
#                                          order spine resolves order brain_id. Runs BEFORE v4-silver.
#      :05  v4-silver (Spark)              Bronze → silver_order_state + the rest of Silver.
#      :15  journey-stitch-from-identity   identity links → connector_journey_stitch_map (the stitch)
#      :25  v4-gold (Spark)                gold_revenue_ledger (recognition) → gold_attribution_credit →
#                                          gold_marketing_attribution + customer/gap/exec marts.
#      :30  attribution-reconcile          credit recognized orders to journeys (ALL 5 models incl.
#                                          data_driven) + clawbacks.
jobs:
  - name: recommendation-detectors
    schedule: "0 6 * * *"          # daily 06:00 IST — the Morning Brief
    command: ["node", "dist/jobs/recommendation-detectors.js"]
  - name: identity-export
    schedule: "2 * * * *"          # hourly at :02 — ATTRIBUTION CHAIN step -1: materialize the identity graph
    command: ["node", "dist/jobs/identity-export/run.js"]
    useStreamWorkerImage: true
  - name: journey-stitch-export
    schedule: "3 * * * *"          # hourly at :03 — materialize the PG cart-stitch → silver_journey_stitch
    command: ["node", "dist/jobs/journey-stitch-export/run.js"]
    useStreamWorkerImage: true
    # MEDALLION REALIGNMENT (Epic 4): connectors.connector_journey_stitch_map (PG capture) →
    # silver_journey_stitch (lakehouse Silver), so silver_touchpoint reads the lakehouse, not a
    # PG JDBC shim. Needs BRAIN_APP_DATABASE_URL + the lakehouse (Iceberg) connection env.
    # MEDALLION REALIGNMENT (Epic 3 / ADR-0004): Neo4j is the identity SoR. This materializes the active
    # hash→brain_id edges from Neo4j → silver_identity_link (lakehouse Silver) so the Spark v4-silver
    # build (:05) resolves order brain_id + the customer marts populate. Runs BEFORE v4-silver. Needs
    # NEO4J_* + the lakehouse connection env. (The one-time PG→Neo4j identity seed has been executed and
    # removed — PG identity is dropped, so there is nothing left to backfill.)
  # MEDALLION REALIGNMENT (Brain V4): recognition (Bronze → silver_order_state → gold_revenue_ledger,
  # incl. prepaid finalization after horizon + COD delivery/RTO) is now the Spark v4-silver/v4-gold
  # CronWorkflows (templates/spark-v4.yaml) at :05/:25 — there is no dbt `recognition-refresh` cron and
  # no PG `revenue-finalization` writer. The Spark Gold ledger is what billing + attribution + dashboards
  # read, served by the brain_serving mv_* Trino views over Iceberg.
  - name: journey-stitch-from-identity
    schedule: "15 * * * *"         # hourly at :15 — ATTRIBUTION CHAIN step 2: derive the stitch map
    command: ["node", "dist/jobs/journey-stitch-from-identity.js"]
    useStreamWorkerImage: true
    # Deterministic identity-graph stitch (GAP-1): silver_touchpoint anon → identity_link(anon_id)→
    # brain_id ∩ realized_revenue_ledger(order→brain_id), UNAMBIGUOUS-ONLY (skips multi-anon customers,
    # never guesses). Salt via SaltProvider→resolveSaltHex (prod KMS). Needs the lakehouse (Iceberg)
    # connection env + BRAIN_APP_DATABASE_URL (envSecretName). Without it, repulled orders never stitch → attribution
    # has no journeys to credit.
  - name: attribution-reconcile
    schedule: "30 * * * *"         # hourly at :30 — ATTRIBUTION CHAIN step 3: credit + clawback
    command: ["node", "dist/jobs/attribution-reconcile.js"]
    # Per brand: the 4 per-journey models (reconcileAttribution) + the GLOBAL data-driven Markov model
    # (reconcileDataDrivenAttribution). Credit basis = finalization ∪ cod_delivery_confirmed (COD-inclusive).
    # MEDALLION REALIGNMENT (Brain V4): the attribution serving marts (gold_marketing_attribution /
    # gold_attribution_paths) are materialized by the Spark v4-gold CronWorkflow (templates/spark-v4.yaml,
    # :25), not a dbt `attribution-gold-refresh` cron — Spark is the sole compute, dbt is gone.
  - name: meta-token-refresh
    schedule: "0 3 * * *"          # daily 03:00 — proactively re-exchange Meta long-lived tokens
    command: ["node", "dist/jobs/meta-token-refresh/run.js"]
    useStreamWorkerImage: true
    # Re-exchanges (fb_exchange_token) any connected Meta connector whose token is older than the
    # threshold, BEFORE the ~60-day expiry — closes the silent spend-stale gap (feat-meta-token-refresh).
    # Needs META_APP_ID / META_APP_SECRET in the pod env (via the stream-worker secret); absent → the
    # job records an app_creds_missing error and no-ops (dev-safe).
  - name: shopify-token-refresh
    schedule: "30 3 * * *"         # daily 03:30 — proactively refresh Shopify offline tokens (mirrors meta-token-refresh)
    command: ["node", "dist/jobs/shopify-token-refresh/run.js"]
    useStreamWorkerImage: true
    # Shopify offline-token expiry mandate (2026-04-01 → 1y expiry; 2027-01-01 → ALL expire). Enumerates
    # connected Shopify connectors whose token is older than the threshold and exchanges it for a fresh
    # one (write-back via ISecretsManager.putSecretValue — secret_ref/ARN unchanged, NN-2). Without this
    # cron, offline tokens silently expire → Shopify sync dies. Idempotent (skips fresh tokens).
  - name: phone-guard-reeval
    schedule: "50 * * * *"         # hourly at :50 — re-evaluate expired phone-guard suppression windows
    command: ["node", "dist/jobs/phone-guard-reeval.js"]
    useStreamWorkerImage: true
    # Windowed re-eval of the phone-guard SharedUtility state (Neo4j identity SoR + PG brand config):
    # un-suppress a phone hash once its window slides below the per-brand distinct-brain_id threshold,
    # else extend. Without it, a burst-suppressed (kiosk/COD) phone stays send-ineligible forever.
    # Needs NEO4J_* + BRAIN_APP_DATABASE_URL. Idempotent; Forbid + startingDeadline make retries safe.
  - name: audit-checkpoint
    schedule: "15 * * * *"         # hourly at :15 — WORM-anchor the audit hash-chain head to S3 (R-19)
    command: ["node", "dist/jobs/audit-checkpoint.js"]
    # Activation needs AUDIT_CHECKPOINT_BUCKET (= terraform output s3-audit.audit_bucket_name) +
    # AWS_REGION in the pod env (via core-env secret). The brain-jobs IRSA role already grants
    # Put/Get/List on checkpoints/* (s3-audit). Unset → the job safely no-ops (dev).
  - name: partition-maintenance
    schedule: "30 2 * * *"         # daily 02:30 IST — BEFORE any month rolls over (C4 audit finding)
    command: ["node", "dist/jobs/partition-maintenance.js"]
    useStreamWorkerImage: true
    env:
      # CREATE-AHEAD horizon. >=3 so writes NEVER fall into *_pdefault even if the controller is
      # down for a few days near a month boundary. Without this job scheduled, from Oct 2026 every
      # partitioned write would land in the *_pdefault catch-all (C4 CRITICAL).
      - { name: PARTITION_AHEAD_MONTHS, value: "3" }
      # DROP-OLD horizon (months). Drops partitions older than this; the catalog routine NEVER drops
      # a DEFAULT. 36 months keeps 3y of partitioned data hot — tune per table-class retention.
      - { name: PARTITION_RETENTION_MONTHS, value: "36" }
    # Runs the SECURITY-DEFINER public.maintain_time_partitions(ahead, retention) (migration 0080)
    # as brain_app. Idempotent (CREATE IF NOT EXISTS / guarded DROP) — Forbid + startingDeadline make
    # a missed/retried run safe. ALERT: if any *_pdefault has rows, partition creation has been
    # lagging — page on a non-zero row count (see infra/helm/cronworkflows/README.md → C4 alert).
