# Prod overrides. Fill the Aurora endpoint + IRSA role ARN at M4 turn-on (from terraform output).
# Custom image = apache/iceberg-rest-fixture + PG JDBC driver (db/iceberg/rest/Dockerfile);
# the stock fixture lacks the driver and dies against an Aurora JdbcCatalog.
image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-iceberg-rest-prod
  tag: "1.9.2-pg42.7.4"

# AUD-OPS-011 (SPOF review, docs/ops/scale-knobs.md §4): 2 replicas — EVERY catalog
# operation platform-wide (Spark Silver/Gold commits, Trino serving reads, Kafka-Connect
# Bronze landing commits) rides this facade, and it was single-replica. The server is a
# STATELESS REST front over the JdbcCatalog on Aurora: Iceberg commits are optimistic
# compare-and-swap at the catalog DB, so concurrent replicas are safe (the local-only
# SQLite lock issue does not apply to PG). Cost: one extra 500m/1Gi pod.
replicaCount: 2

catalog:
  # AUD-COST-016: the SINGLE medallion warehouse root — terraform output
  # `warehouse_bucket_name` (modules/s3-iceberg, brain-bronze-prod-<acct>, NO
  # Object Lock). Exactly like local (compose CATALOG_WAREHOUSE=s3://brain-bronze/):
  # ONE REST server, ONE warehouse, and Bronze/Silver/Gold are the Iceberg
  # NAMESPACES brain_{bronze,silver,gold} under it — there are NO per-layer
  # buckets. 380254378136 is the standard fill token (infra/helm/PLACEHOLDERS.md §1).
  warehouse: "s3://brain-bronze-prod-380254378136/"
  jdbcHost: "brain-prod-postgres.cluster-cjy6iicow625.ap-south-1.rds.amazonaws.com"   # module.aurora.endpoint
  jdbcPort: 5432
  jdbcDatabase: iceberg_catalog
  s3Region: ap-south-1

serviceAccount:
  roleArn: "arn:aws:iam::380254378136:role/brain-prod-iceberg-rest"   # IRSA: S3 RW on the warehouse namespace prefixes

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi
