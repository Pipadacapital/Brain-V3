apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cronworkflows-prod
  namespace: argocd
  annotations:
    # Repo-root-absolute (leading '/') — a relative value is resolved AGAINST
    # spec.source.path and silently forward-copies stale cached manifests
    # (AUD-INFRA-002 root cause, same bug class as strimzi-kafka.yaml). On an
    # AUTOMATED app a stale manifest cache silently deploys stale crons.
    argocd.argoproj.io/manifest-generate-paths: /infra/helm/cronworkflows
  labels:
    project: brain
    environment: prod
    service: cronworkflows
spec:
  project: brain-prod
  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    path: infra/helm/cronworkflows
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    # AUD-INFRA-006 — RATIFIED EXCEPTION to the prod manual-promotion gate.
    # WHY automated: the Spark image digest pins in values-prod.yaml are bumped
    # by the deploy pipeline on every release→master promotion; the medallion
    # crons (Silver/Gold/maintenance/erasure) must pick the new digest up
    # hands-off, or every image release needs a human ArgoCD sync that in
    # practice gets forgotten (Wave-1 relied on this behavior).
    # WHY NO prune: a bad chart merge must never be able to DELETE prod
    # CronWorkflows. Removing/renaming a cron therefore leaves the old
    # CronWorkflow live-but-OutOfSync until an operator runs a reviewed
    # prune sync:  argocd app sync cronworkflows-prod --prune
    # All other workload/platform prod apps stay manual-sync by design.
    automated:
      selfHeal: true
      # DR-007: prune orphans. A template that stops rendering a CronWorkflow (e.g. the
      # transformWorker.enabled suppression of v4-medallion) must DELETE it — the unpruned
      # orphan kept an OLD-image core writer running for hours after the resident cutover.
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 10
