version: 2

models:
  - name: silver_shipment_event
    description: >
      Canonical Silver shipment-transition mart. One row per (brand_id, event_id) — every shipment
      status transition from every logistics source (GoKwik AWB + Shiprocket tracking), normalized
      through the shared @brain/logistics-status terminal_class authority. Additive projection of
      Bronze; non-additive rollups (counts / RTO% / courier) live in packages/metric-engine (ADR-004).
      Per-brand isolation is enforced at the Silver READ seam (I-ST01), not in dbt.
    columns:
      - name: brand_id
        description: "Tenant key (UUID→text). First key/distribution column."
        tests: [not_null]
      - name: event_id
        description: "Bronze idempotency key — uniquely identifies the transition."
        tests: [not_null]
      - name: order_id
        description: "Order natural key (ledger/journey spine). Joins to silver_order_state."
        tests: [not_null]
      - name: source
        description: "Logistics source provenance (gokwik | shiprocket)."
      - name: terminal_class
        description: "Deterministic terminal class from the shared normalizer."
        tests:
          - not_null
          - accepted_values:
              values: ['rto', 'delivered', 'other', 'none']
      - name: is_terminal
        description: "True iff terminal_class <> 'none'."
        tests: [not_null]
      - name: courier
        description: "Carrier name (Shiprocket); NULL for sources that don't carry it (GoKwik)."
      - name: pincode
        description: "Destination pincode (RTO%-by-pincode cohort); NULL when absent."
      - name: status_changed_at
        description: "Transition event-time (ISO string)."

  - name: silver_shipment
    description: >
      Canonical Silver shipment latest-state mart. One row per (brand_id, order_id) — the latest
      shipment state per order, folded deterministically from silver_shipment_event (terminal-state
      preferred, then max status_changed_at). Multi-source. Drives the courier/RTO/NDR Gold metrics
      and joins to silver_order_state on (brand_id, order_id). Additive latest-state projection.
    columns:
      - name: brand_id
        description: "Tenant key. First key/distribution/order column."
        tests: [not_null]
      - name: order_id
        description: "Order natural key (one shipment per order in Slice 2)."
        tests: [not_null]
      - name: terminal_class
        description: "Latest deterministic terminal class."
        tests:
          - not_null
          - accepted_values:
              values: ['rto', 'delivered', 'other', 'none']
      - name: is_rto
        description: "True iff the latest state is a terminal RTO."
        tests: [not_null]
      - name: is_delivered
        description: "True iff the latest state is terminal Delivered."
        tests: [not_null]
      - name: courier
        description: "Carrier name (Shiprocket); NULL for GoKwik."
      - name: pincode
        description: "Destination pincode; NULL when absent."
