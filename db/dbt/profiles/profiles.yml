# dbt profiles — Brain platform (Sprint-0: dev profile only)
# Full staging/prod profiles are added in M1 when Silver/Gold marts are built.
# Adapter: dbt-starrocks (https://github.com/StarRocks/starrocks/tree/main/contrib/dbt-starrocks)
#
# Install: pip install dbt-starrocks
# Docs: https://docs.starrocks.io/docs/integrations/dbt/

brain:
  target: dev
  outputs:
    dev:
      type: starrocks
      host: "{{ env_var('STARROCKS_HOST', 'localhost') }}"
      port: "{{ env_var('STARROCKS_PORT', '9030') | int }}"
      schema: brain_silver
      database: brain_silver
      username: "{{ env_var('STARROCKS_USER', 'root') }}"
      password: "{{ env_var('STARROCKS_PASSWORD', '') }}"
      catalog: "default_catalog"  # local StarRocks; switch to Iceberg catalog for Bronze reads
      threads: 4
      connect_timeout: 30

    # Staging (M1) — placeholder, not active in Sprint-0
    # staging:
    #   type: starrocks
    #   host: "{{ env_var('STARROCKS_STAGING_HOST') }}"
    #   ...

