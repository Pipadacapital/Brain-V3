apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brain.fullname" . }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}  # ignored when autoscaling.enabled (HPA owns replicas)
  {{- end }}
  selector:
    matchLabels:
      {{- include "brain.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "brain.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "brain.fullname" . }}
      # AUD-OPS-004: explicit, bounded drain window on eviction/rollout — SIGTERM
      # lets the Kafka consumers commit offsets and leave the group gracefully
      # (clean rebalance) instead of being hard-killed mid-batch on Spot reclaim.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.topologySpread.enabled }}
      # AUD-OPS-002: spread replicas across zones/nodes so a single node or AZ loss
      # can't take the whole tier down. ScheduleAnyway = best-effort — never blocks
      # scale-up on single-pool (Karpenter streaming pool) or kind topologies.
      topologySpreadConstraints:
        {{- range .Values.topologySpread.constraints }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "brain.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else if and .Values.image.tag (ne .Values.image.tag "latest") }}:{{ .Values.image.tag }}{{ else }}{{ fail "image.digest (preferred) or an immutable, non-':latest' image.tag is required (B3) — refusing to deploy an unpinned/mutable image" }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            {{- if .Values.readOnlyRootFilesystem }}
            readOnlyRootFilesystem: true
            {{- end }}
          {{- if .Values.preStopSleepSeconds }}
          # AUD-OPS-004: optional endpoint-drain hold. OFF by default for the worker —
          # it is headless (no Service/ALB in front), so the fastest graceful path is
          # SIGTERM immediately: commit offsets + leave the consumer group.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", {{ .Values.preStopSleepSeconds | quote }}]
          {{- end }}
          {{- if .Values.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
          {{- if or .Values.service.enabled .Values.probes.enabled }}
          # The worker is headless (no Service), but the kubelet still needs a named
          # containerPort to target the liveness/readiness probes (T2-10). Declare it whenever
          # probes are on, independent of whether a Service fronts it.
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default .Values.probes.port }}
              protocol: TCP
          {{- end }}
          {{- if .Values.envSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecretName }}
          {{- end }}
          {{- if or .Values.env .Values.otelExporterOtlpEndpoint }}
          env:
            {{- if .Values.otelExporterOtlpEndpoint }}
            # AUD-OBS-2: OTel export ON-switch — the app's initObservability() is a no-op
            # unless OTEL_EXPORTER_OTLP_ENDPOINT is set (auth headers, if any, come from the
            # envSecretName secret as OTEL_EXPORTER_OTLP_HEADERS). Empty value ⇒ flag OFF.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelExporterOtlpEndpoint | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath | default .Values.probes.path }}
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            periodSeconds: 15
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
