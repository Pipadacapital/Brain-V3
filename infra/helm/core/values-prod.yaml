replicaCount: 3

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-core-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: core-env

# AUD-COST-003: BFF/API + connector webhooks on the shared brain-prod ALB
# (host-routed, ACM TLS).
ingress:
  enabled: true
  host: api.brain.pipadacapital.com   # e.g. api.<apex-domain>
  groupName: brain-prod
  certificateArn: REPLACE_WITH_ACM_CERT_ARN

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-core

# AUD-COST-011: migrations run as a PreSync hook before every core sync.
# core-env must carry DATABASE_URL_DIRECT (Aurora endpoint, NOT pgbouncer) —
# see infra/helm/external-secrets-config/README.md.
migrations:
  enabled: true
  appEnv: prod
  databaseUrlFromKey: DATABASE_URL_DIRECT

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# P2.5: HPA on in prod. minReplicas matches replicaCount (3) so enabling never scales below baseline.
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
