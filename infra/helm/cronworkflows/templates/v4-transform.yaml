{{- /*
Brain V4 DuckDB medallion transform — ONE CHAINED CronWorkflow (ADR-0016 P2.1).

WAS three staggered CronWorkflows (v4-silver :00/5 + v4-identity :02/5 + v4-gold :00/5) whose only
cross-stage sequencing was the ~2-min schedule offset — so end-to-end latency stacked the whole
scheduling wait (Silver commits, then up to 5 min until the Gold tick reads it, etc.). ADR-0016 D2
collapses them into ONE ordered run (`v4-medallion`) that walks keystone → Silver → identity(resolve)
→ silver_identity_map → Gold marts → serving-cache-bust BACK-TO-BACK with NO inter-stage cron wait.
ONE schedule, sequential, `concurrencyPolicy: Forbid` (a long run just skips the next tick, never
overlaps a second writer). This mirrors tools/dev/duckdb-refresh.sh's ordering EXACTLY.

WHY an in-workflow `steps` sequence (not a single container): the chain CROSSES IMAGES — Silver /
map-export / Gold run the brain-duckdb image (`python /opt/brain/duckdb/**`), while the identity
resolve step and the serving-cache-bust step run node entrypoints that ship in the stream-worker
deployable. A single container can't carry both, so the Argo `steps` DAG is the lowest-complexity
way to run them in one ordered workflow (same idiom the old v4-identity/v4-gold workflows already
used for their intra-run ordering). All stages are idempotent watermark+MERGE, so a mid-chain
failure is converge-next-run safe; each step's failure counts toward the workflow status
(TransformTierRunFailed, tier=v4-medallion) except the fail-open serving-cache-bust.

INTERIM before the resident warm worker (ADR-0016 D3 / WS2): this is still a CronWorkflow — it pays a
cold pod + catalog-attach per tick. WS2 supersedes it with a resident Deployment holding a WARM
DuckDB connection. The seam is `.Values.transformWorker.enabled`: when the resident worker is on,
this whole cron is suppressed (the `and .Values.sparkV4.enabled (not .Values.transformWorker.enabled)`
gate below) so the two never both write — single-writer is preserved across the WS2 cutover.

The dirty-set/watermark-driven behavior is unchanged: SILVER_INCREMENTAL / GOLD_INCREMENTAL /
IDENTITY_MAP_DIRTY_ONLY still gate each stage's incremental reads exactly as before — chaining
only removes the scheduling wait, not the incrementality.

Image MUST be pinned by digest (B3) — same fail-closed rule as the Bronze/maintenance templates.
The value block is still named `sparkV4` (chart values compatibility — one image, the DuckDB knobs).
*/ -}}
{{- if and .Values.sparkV4.enabled (not .Values.transformWorker.enabled) }}
{{- $img := .Values.sparkV4.image -}}
{{- $ref := "" -}}
{{- if $img.digest -}}
  {{- $ref = printf "%s@%s" $img.repository $img.digest -}}
{{- else if and $img.tag (ne $img.tag "latest") -}}
  {{- $ref = printf "%s:%s" $img.repository $img.tag -}}
{{- else -}}
  {{- fail "sparkV4.image.digest (preferred) or an immutable non-':latest' tag is required (B3) — refusing to deploy an unpinned image" -}}
{{- end -}}
{{- /* Stream-worker image (B3 fail-closed, same rule): the identity resolve step and the
       serving-cache-bust step run node entrypoints that ship in the stream-worker deployable —
       same image/idiom as the .Values.jobs useStreamWorkerImage jobs. */ -}}
{{- $swImg := .Values.streamWorkerImage -}}
{{- $swRef := "" -}}
{{- if $swImg.digest -}}
  {{- $swRef = printf "%s@%s" $swImg.repository $swImg.digest -}}
{{- else if and $swImg.tag (ne $swImg.tag "latest") -}}
  {{- $swRef = printf "%s:%s" $swImg.repository $swImg.tag -}}
{{- else -}}
  {{- fail "streamWorkerImage.digest (preferred) or an immutable non-':latest' tag is required (B3) — refusing to deploy an unpinned image" -}}
{{- end -}}
{{- $envFrom := .Values.envSecretName -}}
{{- $sa := .Values.serviceAccount.name -}}
{{- $tz := .Values.timezone -}}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: v4-medallion
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: v4-medallion
spec:
  schedule: {{ .Values.sparkV4.medallionSchedule | quote }}
  timezone: {{ $tz | quote }}
  # ONE writer: a long run skips the next tick (never overlaps a second medallion writer). This is
  # the cron-side single-writer guarantee; WS2's resident worker takes over the pg advisory-lock role.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}      # IRSA: S3 (Iceberg warehouse) + REST catalog access
    entrypoint: run
    {{- /* AUD-OPS: keep Karpenter from VOLUNTARILY disrupting (consolidating/draining) the node while
           this idempotent transform tier is mid-run. The DuckDB steps run on the streaming pool
           (untainted, warm baseline) — same podAnnotations seam. */}}
    {{- with .Values.sparkV4.podAnnotations }}
    podMetadata:
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    # ── AUD-IMPL-027 / AUD-OPS-029: per-run wall-time telemetry ─────────────────
    # The Argo controller emits these on its /metrics endpoint (metricsConfig +
    # ServiceMonitor enabled in infra/argocd/envs/prod/argo-workflows.yaml). The
    # realtime duration gauge ticks WHILE the chained tier runs, so the scale-tripwire
    # rules (infra/observe/alerts/scale-tripwires.rules.yml) can fire on approach
    # to activeDeadlineSeconds. Per-stage drill-down stays in each step's structured
    # stdout ({"job":…,"upserted":…} result lines). tier=v4-medallion now covers the
    # whole chain (was v4-silver / v4-identity / v4-gold — the alerts aggregate by tier).
    metrics:
      prometheus:
        - name: brain_transform_workflow_duration_seconds
          help: "Realtime wall-clock (s) of the running v4 DuckDB medallion workflow"
          labels:
            - key: tier
              value: v4-medallion
          gauge:
            realtime: true
            value: {{ `"{{workflow.duration}}"` }}
        - name: brain_transform_workflow_failed_total
          help: "v4 DuckDB medallion workflow runs that ended Failed (deadline/retries exhausted)"
          labels:
            - key: tier
              value: v4-medallion
          when: {{ `"{{workflow.status}} == Failed"` }}
          counter:
            value: "1"
    {{- /* AUD-PROD-006: pin the transform cron pods to the streaming pool (values-prod). */}}
    {{- with .Values.sparkV4.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.sparkV4.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    # The chain now runs ALL stages in ONE workflow (silver ×2 → identity → map → gold → cache-bust),
    # so the deadline must cover the WHOLE run — the union of the old per-stage ceilings. The FIRST
    # run after SILVER_INCREMENTAL is enabled has no watermark → a full-scan BOOTSTRAP (~75 min) that
    # MUST complete to seed the watermark; a low cap would kill it before the watermark write → every
    # run re-bootstraps and never progresses. Leave this ceiling high; Forbid skips ticks until each
    # run completes. After bootstrap, incremental warm ticks finish in minutes (ADR-0016 target).
    activeDeadlineSeconds: {{ .Values.sparkV4.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      # ── THE CHAIN (mirrors tools/dev/duckdb-refresh.sh's `all` stage EXACTLY) ─────────────────────
      # keystone → silver ×2 → identity(resolve) → silver_identity_map → gold marts → cache-bust,
      # each step depending on the prior. continueOn.failed only on the identity resolve (dev doctrine:
      # map-export still re-projects the graph, which may have advanced) and the fail-open cache-bust
      # (TTL is the safety net); every other step is a hard link in the chain.
      - name: run
        steps:
          - - name: silver
              template: silver
          - - name: identity-resolve
              template: identity-resolve
              continueOn:
                failed: true           # dev parity: map-export still re-projects (graph may have advanced)
          - - name: map-export
              template: map-export
          - - name: gold-marts
              template: gold-marts
          - - name: serving-cache-bust
              template: serving-cache-bust
              continueOn:
                failed: true           # fail-open (dev parity): the per-metric TTL is the safety net

      # ── SILVER: keystone silver_collector_event (the admission gate every silver job reads) →
      #    silver_order_state (the brain_id spine) → the rest of Silver, run TWICE so a job that read a
      #    not-yet-produced sibling on pass 1 converges on pass 2. Dirty-set/watermark-driven
      #    (SILVER_INCREMENTAL) — chaining doesn't change the incremental reads.
      - name: silver
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}    # bounded retry: every Silver MERGE is idempotent
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail   # NOT -e: a single mart failure must NOT abort the others (best-effort).
              # Derive BRONZE/SILVER/GOLD PG env from core-env (DATABASE_URL_DIRECT) — else the PG-reading
              # jobs fall back to localhost and silently drop the pixel-lane R2 install→brand resolution.
              {{- include "brain.sparkPgEnvDerivation" $ | nindent 14 }}
              {{- if .Values.sparkV4.singleProcess }}
              # Phase 1d (AUD-2026-07-16): ONE process — attach the Iceberg catalog once, run all 45 jobs
              # against a single connection. Kills the ~85s/job process+attach overhead that made a 90-spawn
              # run take ~130 min. run_all.py preserves each job's run_job discipline + the 2-pass converge.
              echo "── silver: single-process runner (Phase 1d) ──"
              python /opt/brain/duckdb/run_all.py silver
              {{- else }}
              fails=0
              # keystone + spine are HARD deps (every other job reads them) — abort if they fail.
              for req in silver_collector_event.py silver_order_state.py; do
                echo "▶ ${req} (required)"
                python "/opt/brain/duckdb/silver/${req}" || { echo "✗ REQUIRED ${req} failed — aborting run"; exit 1; }
              done
              run_job() { echo "▶ $1"; if ! python "/opt/brain/duckdb/silver/$1"; then echo "✗ FAILED: $1"; fails=$((fails+1)); fi; }
              for pass in 1 2; do
                echo "── silver pass ${pass}/2 ──"
                for j in /opt/brain/duckdb/silver/silver_*.py; do
                  b="$(basename "$j")"
                  case "$b" in silver_collector_event.py|silver_order_state.py) continue;; esac
                  case "$b" in _*) continue;; esac
                  run_job "$b"
                done
              done
              [ "$fails" -eq 0 ] || { echo "── ${fails} silver job(s) failed (rest refreshed) ──"; exit 1; }
              {{- end }}
          env:
            # ADR-0010: the silver jobs read the Kafka Connect Bronze tables (collector_events_connect
            # + <lane>_raw_connect) — fixed, no BRONZE_SOURCE switch (rollback = git revert).
            {{- toYaml .Values.sparkV4.env | nindent 12 }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* + NEO4J_* (identity mart reads)
          {{- end }}
          resources:
            {{- toYaml .Values.sparkV4.resources | nindent 12 }}

      # ── IDENTITY RESOLVE (ADR-0015 WS3: identity resolves in Silver) — stream-worker image ─────────
      # `pnpm exec tsx src/jobs/silver-identity/run.ts` (the exact node-job invocation idiom of
      # .Values.jobs; the dev script's `pnpm --filter @brain/stream-worker run job:silver-identity` is
      # the same entrypoint behind a package script whose --env-file only exists in the repo checkout).
      # Reads new keystone rows over duckdb-serving, resolves via IdentityResolver → Neo4j (the identity
      # SoR, ADR-0004), writes dirty-sets/consent/CAPI. Watermark-driven, leader-locked, per-brand
      # idempotent; emits brain_silver_identity_runs_total per clean brand pass (absence-alerted in
      # infra/observe/alerts/brain-slo.rules.yml — BrainSilverIdentityStageStalled). A failed brand
      # HOLDS its watermark; the next run re-processes the same idempotent window (no loss).
      - name: identity-resolve
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}   # watermark-held + idempotent — retry-safe
          retryPolicy: OnError
        metrics:
          prometheus:
            - name: brain_transform_workflow_failed_total
              help: "v4 DuckDB medallion workflow runs that ended Failed (deadline/retries exhausted)"
              labels:
                - key: tier
                  value: v4-medallion
              when: {{ `"{{status}} == Failed"` }}
              counter:
                value: "1"
        container:
          image: {{ $swRef | quote }}
          imagePullPolicy: {{ $swImg.pullPolicy }}
          command: ["pnpm", "exec", "tsx", "src/jobs/silver-identity/run.ts"]
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}
          {{- end }}
          resources:
            {{- toYaml .Values.defaults.resources | nindent 12 }}

      # ── MAP-EXPORT — duckdb image ─────────────────────────────────────────────────────────────────
      # silver/silver_identity_map.py re-projects the Neo4j graph (the identity SoR, ADR-0004) into the
      # Iceberg bi-temporal map so gold (customer_360 &co) reads THIS run's resolutions, not the
      # previous tick's. IDENTITY_MAP_DIRTY_ONLY (default OFF, DE parity gate) scopes the re-export to
      # only the brain_ids mutated this tick when validated — dirty-set-driven, chaining unchanged.
      - name: map-export
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}   # idempotent MERGE — retry-safe
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              {{- include "brain.sparkPgEnvDerivation" $ | nindent 14 }}
              exec python /opt/brain/duckdb/silver/silver_identity_map.py
          env:
            {{- toYaml .Values.sparkV4.env | nindent 12 }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* + NEO4J_*
          {{- end }}
          resources:
            {{- toYaml .Values.sparkV4.resources | nindent 12 }}

      # ── GOLD MARTS — duckdb image ─────────────────────────────────────────────────────────────────
      # gold_revenue_ledger (recognized basis) FIRST, then attribution (reads the stitched
      # silver_touchpoint + the ledger basis), then the remaining Gold marts + the snap_* jobs.
      # GOLD_INCREMENTAL gates the watermark-windowed Gold reads (default "0" until parity passes).
      - name: gold-marts
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail   # NOT -e: one mart failure must not abort the rest (best-effort refresh).
              # Derive BRONZE/SILVER/GOLD PG env from core-env (DATABASE_URL_DIRECT) — the cost/margin
              # Gold marts read PG (gold_measurement_costs/contribution_margin/product_costs).
              {{- include "brain.sparkPgEnvDerivation" $ | nindent 14 }}
              {{- if .Values.sparkV4.singleProcess }}
              # Phase 1d: ONE process (attach once, run all 45 gold jobs) — run_all.py keeps the required
              # gold_revenue_ledger + the ordered attribution chain (credit → marketing → paths) first.
              echo "── gold: single-process runner (Phase 1d) ──"
              python /opt/brain/duckdb/run_all.py gold
              {{- else }}
              fails=0
              # gold_revenue_ledger is the revenue basis many marts read — hard-fail if it breaks.
              echo "▶ gold_revenue_ledger.py (required)"
              python "/opt/brain/duckdb/gold/gold_revenue_ledger.py" || { echo "✗ REQUIRED gold_revenue_ledger failed — aborting run"; exit 1; }
              run_job() { echo "▶ $1"; if ! python "/opt/brain/duckdb/gold/$1"; then echo "✗ FAILED: $1"; fails=$((fails+1)); fi; }
              run_job gold_attribution_credit.py
              run_job gold_marketing_attribution.py
              run_job gold_attribution_paths.py
              for j in /opt/brain/duckdb/gold/gold_*.py /opt/brain/duckdb/gold/snap_*.py; do
                b="$(basename "$j")"
                case "$b" in gold_revenue_ledger.py|gold_attribution_credit.py|gold_marketing_attribution.py|gold_attribution_paths.py) continue;; esac
                case "$b" in _*) continue;; esac
                run_job "$b"
              done
              [ "$fails" -eq 0 ] || { echo "── ${fails} gold job(s) failed (rest refreshed) ──"; exit 1; }
              {{- end }}
          env:
            # ADR-0010: the gold jobs' Silver inputs derive from the Kafka Connect Bronze tables —
            # fixed, no BRONZE_SOURCE switch (rollback = git revert).
            {{- toYaml .Values.sparkV4.env | nindent 12 }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}
          {{- end }}
          resources:
            {{- toYaml .Values.sparkV4.resources | nindent 12 }}

      # ── SERVING-CACHE-BUST — stream-worker image (fail-open) ───────────────────────────────────────
      # After the Gold marts rewrite, gold-rewritten-publish evicts the brand-scoped serving cache
      # DIRECTLY (ServingCacheEvictor — the gold.rewritten.v1 Kafka lane is retired, ADR-0015 WS3).
      # FAIL-OPEN (dev parity): continueOn.failed on the step above — a bust failure never fails the
      # refresh; the per-metric TTL is the correctness safety net. Whole-brand eviction for every
      # active brand (BRAIN_APP_DATABASE_URL + REDIS_URL from core-env); brand_id leads every key.
      - name: serving-cache-bust
        container:
          image: {{ $swRef | quote }}
          imagePullPolicy: {{ $swImg.pullPolicy }}
          command: ["pnpm", "exec", "tsx", "src/jobs/gold-rewritten-publish/run.ts"]
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}
          {{- end }}
          resources:
            {{- toYaml .Values.defaults.resources | nindent 12 }}
{{- end }}
