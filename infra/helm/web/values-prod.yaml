replicaCount: 3

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-web-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: "sha256:aa0316c335c83d7fec5f49d0aad8fdac2ce525ddd4179c043a2cb60b80ec80aa"

envSecretName: web-env

# AUD-COST-003: the app UI on the shared brain-prod ALB (host-routed, ACM TLS).
ingress:
  enabled: true
  host: app.brain.pipadacapital.com   # e.g. app.<apex-domain>
  groupName: brain-prod
  certificateArn: arn:aws:acm:ap-south-1:380254378136:certificate/5247056b-bbaf-4041-8c97-84e190c8d818

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-web

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# P2.5: HPA on in prod.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
