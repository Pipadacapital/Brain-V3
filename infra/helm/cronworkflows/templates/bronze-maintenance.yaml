{{- /*
Bronze MAINTENANCE CronWorkflows (was spark-bronze.yaml — Spark→DuckDB cutover; Trino removed per
ADR-0014).

Iceberg is the SOLE Bronze system-of-record. Maintenance is the PyIceberg + DuckDB client that the
brain-duckdb image carries: these invoke `python /opt/brain/duckdb/maintenance/<script>.py`, which
runs the compaction (COW rewrite) + expire_snapshots (with the physical file sweep) against the
SAME REST catalog + object store (_maintenance_base.py). No spark-submit, no JVM, no Trino.

ADR-0010: Bronze LANDING is the Kafka Connect Iceberg sink (infra/helm/kafka-connect) — the sole
landing writer. The former Spark-SS bronze-landing CronWorkflow was removed 2026-07-05; Connect keeps
offsets in the Iceberg snapshots + its own topics (no CHECKPOINT_LOCATION / STARTING_OFFSETS wiring).

This template renders TWO CronWorkflows:
  - bronze-maintenance: small-file compaction (optimize) + snapshot-expiry TTL (Slice 7; 7d default,
    14d on the durable collector lane — AUD-OPS-015, see docs/runbooks/DR.md) over the Bronze tables,
    including the Connect-written collector_events_connect / <lane>_raw_connect.
  - bronze-raw-retention (ADR-0006 D4; AUD-IMPL-019/AUD-OPS-038): the 7-day raw-PII retention window
    on the <lane>_raw_connect tables — row-TTL DELETE + snapshot expiry (bronze_raw_retention.py).
    collector_events_connect is deliberately NOT swept (system-of-record; the job excludes it itself).

Gated by .Values.sparkBronze.enabled (defaults true — both must run regardless of who lands Bronze).

Image MUST be pinned by digest (B3) — same fail-closed rule as the transform/maintenance templates.

NOTE: the value block is still named `sparkBronze` (chart values compatibility — one image, minimal
diff); it now carries the brain-duckdb image (PyIceberg maintenance client) + the maintenance-relevant
knobs only (no executionMode / k8s / driverMemory — those were spark-submit-only and were removed in
the cutover).
*/ -}}
{{- if .Values.sparkBronze.enabled }}
{{- $img := .Values.sparkBronze.image -}}
{{- $ref := "" -}}
{{- if $img.digest -}}
  {{- $ref = printf "%s@%s" $img.repository $img.digest -}}
{{- else if and $img.tag (ne $img.tag "latest") -}}
  {{- $ref = printf "%s:%s" $img.repository $img.tag -}}
{{- else -}}
  {{- fail "sparkBronze.image.digest (preferred) or an immutable non-':latest' tag is required (B3) — refusing to deploy an unpinned image" -}}
{{- end -}}
{{- $envFrom := .Values.envSecretName -}}
{{- $sa := .Values.serviceAccount.name -}}
{{- $tz := .Values.timezone -}}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: bronze-maintenance
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: bronze-maintenance
spec:
  # Slice 7: compaction (optimize) + snapshot-expiry TTL (7d; 14d durable collector lane — AUD-OPS-015).
  # The ERASURE mode (ERASE_BRAND_ID=…) is NOT a cron — it is invoked on-demand by the right-to-erasure
  # orchestrator (erasure_raw_delete.py) after a brand's DEK is crypto-shredded (D13 / I-S05).
  schedule: {{ .Values.sparkBronze.maintenanceSchedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}
    entrypoint: run
    {{- /* AUD-PROD-006: pin the maintenance cron pods to the streaming pool (values-prod). */}}
    {{- with .Values.sparkBronze.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.sparkBronze.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    activeDeadlineSeconds: {{ .Values.sparkBronze.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    {{- /* Failure telemetry (same emission idiom as v4-transform): the DEDUP step's failure is
           tolerated by the run (continueOn below) so the workflow still ends Succeeded — its
           failed counter is therefore emitted at TEMPLATE level (template {{status}}), while the
           workflow-level counter covers a genuine maintenance failure. Both land on the shared
           brain_transform_workflow_failed_total series the scale-tripwire workflow-failure alert
           watches (infra/observe/alerts/scale-tripwires.rules.yml). */}}
    metrics:
      prometheus:
        - name: brain_transform_workflow_failed_total
          help: "Maintenance/transform workflow runs that ended Failed (deadline/retries exhausted)"
          labels:
            - key: tier
              value: bronze-maintenance
          when: {{ `"{{workflow.status}} == Failed"` }}
          counter:
            value: "1"
    templates:
      {{- /* H4 (2026-07-18): dedup is DECOUPLED from compaction/snapshot-expiry. It used to run
             `python bronze_dedup.py` inside the same set -e script — any dedup failure (e.g. the
             COW memory valve refusing an oversized rewrite) aborted the WHOLE run, so Bronze also
             lost compaction + snapshot expiry until an operator intervened. Now dedup is its own
             step with continueOn.failed: Argo marks the step Failed (loud + metered via the
             template-level counter above) while the maintenance step still runs. Dedup converges
             on a later run (idempotent); Silver's admission MERGE remains the dupe backstop. */}}
      - name: run
        steps:
          {{- if .Values.sparkBronze.dedup.enabled }}
          - - name: dedup
              template: dedup
              continueOn:
                failed: true
          {{- end }}
          - - name: maintain
              template: maintain
      {{- if .Values.sparkBronze.dedup.enabled }}
      - name: dedup
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}   # idempotent targeted COW delete — retry-safe
          retryPolicy: OnError
        metrics:
          prometheus:
            - name: brain_transform_workflow_failed_total
              help: "Maintenance/transform workflow runs that ended Failed (deadline/retries exhausted)"
              labels:
                - key: tier
                  value: bronze-dedup
              when: {{ `"{{status}} == Failed"` }}
              counter:
                value: "1"
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # ADR-0015 D2(b): compaction-time Bronze dedup FIRST — keep-latest on the
              # (brand_id, event_id) lifted from the collector lane's payload (bronze_dedup.py:
              # targeted COW loser deletes), so the optimize pass in the next step compacts an
              # already-deduped layout and expire_snapshots sweeps the superseded files.
              # FAIL-SOFT contract: a non-zero exit marks THIS step Failed (alertable via the
              # bronze-dedup tier counter) but never blocks the maintain step (continueOn).
              rc=0
              python /opt/brain/duckdb/maintenance/bronze_dedup.py || rc=$?
              if [ "${rc}" -ne 0 ]; then
                echo "✗ BRONZE-DEDUP FAILED (rc=${rc}) — Bronze may still hold duplicates; compaction/snapshot-expiry continue in the maintain step. See bronze_dedup.py output above (memory valve ⇒ rerun with BRONZE_DEDUP_FORCE=1 on a bigger pod)." >&2
                exit "${rc}"
              fi
          env:
            {{- with .Values.sparkBronze.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* (REST catalog + S3 seams)
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
      {{- end }}
      - name: maintain
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              exec python /opt/brain/duckdb/maintenance/bronze_maintenance.py
          env:
            - { name: MODE, value: "maintain" }
            {{- with .Values.sparkBronze.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* (REST catalog + S3 seams)
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
{{- if .Values.sparkBronze.hot.enabled }}
---
{{- /*
ADR-0018 D3 — bronze-hot maintenance lane. Bronze is Kafka-Connect-written (NOT the transform
tick), fragmenting continuously; the daily bronze-maintenance cron above cannot keep pace. This
lane mirrors the Silver-hot pattern: every 2h it runs dedup → optimize → expire SCOPED TO THE HOT
MONTH(S) ONLY (BRONZE_DEDUP_PARTITION_SCOPED / MONTHS_BACK on dedup; BRONZE_TABLE pins the
collector lane for the month-chunked optimize+expire). Each unit is a bounded month-partition COW
rewrite (fits the 8Gi pod; the whole-table OOM class is eliminated). concurrencyPolicy Forbid.
The daily cron stays the frozen-month sweep — a fast no-op on already-hot-deduped months.

The dedup step is FAIL-SOFT (continueOn.failed), same contract as the daily lane: a valve refusal
marks the step Failed (metered via the bronze-dedup tier counter) but never blocks the compaction/
expiry maintain step — dedup converges on a later run (idempotent), Silver's MERGE is the backstop.
*/ -}}
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: bronze-hot
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: bronze-hot
spec:
  schedule: {{ .Values.sparkBronze.hot.schedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid            # never overlap the hot lane with itself
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}
    entrypoint: run
    {{- with .Values.sparkBronze.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.sparkBronze.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    activeDeadlineSeconds: {{ .Values.sparkBronze.hot.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    metrics:
      prometheus:
        - name: brain_transform_workflow_failed_total
          help: "Maintenance/transform workflow runs that ended Failed (deadline/retries exhausted)"
          labels:
            - key: tier
              value: bronze-hot
          when: {{ `"{{workflow.status}} == Failed"` }}
          counter:
            value: "1"
    templates:
      - name: run
        steps:
          - - name: dedup
              template: dedup-hot
              continueOn:
                failed: true
          - - name: maintain
              template: maintain-hot
      - name: dedup-hot
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}   # idempotent month-scoped COW delete — retry-safe
          retryPolicy: OnError
        metrics:
          prometheus:
            - name: brain_transform_workflow_failed_total
              help: "Maintenance/transform workflow runs that ended Failed (deadline/retries exhausted)"
              labels:
                - key: tier
                  value: bronze-dedup
              when: {{ `"{{status}} == Failed"` }}
              counter:
                value: "1"
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # ADR-0018 D1/D3: month-scoped hot dedup — one hot month-partition at a time,
              # checkpointed (recheck-and-commit per month). PARTITION_SCOPED=1 / MONTHS_BACK=1 are
              # the defaults; pinned here for auditability. FAIL-SOFT: a non-zero exit marks THIS
              # step Failed (alertable via the bronze-dedup tier counter) but never blocks maintain.
              rc=0
              python /opt/brain/duckdb/maintenance/bronze_dedup.py || rc=$?
              if [ "${rc}" -ne 0 ]; then
                echo "✗ BRONZE-HOT-DEDUP FAILED (rc=${rc}) — hot month(s) may still hold duplicates; compaction/expiry continue in maintain. See output above." >&2
                exit "${rc}"
              fi
          env:
            - { name: BRONZE_DEDUP_PARTITION_SCOPED, value: "1" }
            - { name: BRONZE_DEDUP_MONTHS_BACK, value: "1" }
            {{- with .Values.sparkBronze.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* (REST catalog + S3 seams)
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
      - name: maintain-hot
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # BRONZE_TABLE pins the collector lane so the optimize + expire are month-chunked over
              # just this table (D2: _rewrite_units chunks month(kafka_timestamp) one partition at a
              # time) rather than sweeping the whole namespace — the hot lane never touches the raw
              # lanes (that stays the daily bronze-maintenance sweep).
              exec python /opt/brain/duckdb/maintenance/bronze_maintenance.py
          env:
            - { name: MODE, value: "maintain" }
            - { name: BRONZE_TABLE, value: "collector_events_connect" }
            {{- with .Values.sparkBronze.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* (REST catalog + S3 seams)
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
{{- end }}
{{- if .Values.sparkBronze.rawRetention.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: bronze-raw-retention
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: bronze-raw-retention
spec:
  # ADR-0006 D4 (AUD-IMPL-019/AUD-OPS-038): 7-day retention on the *_raw_connect lanes —
  # row-TTL DELETE + snapshot expiry so raw un-hashed PII/PCI never outlives the landing-buffer
  # window (Silver, gated/normalized/hashed, is the durable layer). Daily, off the 03:00
  # bronze-maintenance slot. Idempotent — a missed/retried run just re-applies the same window.
  schedule: {{ .Values.sparkBronze.rawRetention.schedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}
    entrypoint: run
    {{- with .Values.sparkBronze.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.sparkBronze.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    activeDeadlineSeconds: {{ .Values.sparkBronze.rawRetention.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}   # row-TTL DELETE + expire_snapshots are retry-safe
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              exec python /opt/brain/duckdb/maintenance/bronze_raw_retention.py
          env:
            {{- with .Values.sparkBronze.rawRetention.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
{{- end }}
{{- end }}
