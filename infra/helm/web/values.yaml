# Default values for the web chart. Overridden by values-staging.yaml / values-prod.yaml.
replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-web
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000

probes:
  enabled: true
  path: /                 # SSR root; any non-5xx is healthy
  readinessPath: /

# Next.js needs the BFF base URL at runtime (BFF_BASE_URL / CORE_API_URL).
envSecretName: ""

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3000"

serviceAccount:
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Horizontal Pod Autoscaler (P2.5). Stateless Next.js server → CPU-target HPA; modest band.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
