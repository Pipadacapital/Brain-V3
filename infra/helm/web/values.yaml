# Default values for the web chart. Overridden by values-staging.yaml / values-prod.yaml.
replicaCount: 2

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-web
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000

# Public edge (AUD-COST-003): shared Brain ALB (aws-load-balancer-controller),
# host-routed, ACM TLS. Off by default; enabled per env in values-prod.yaml.
ingress:
  enabled: false
  className: alb
  host: ""            # e.g. app.<domain>
  groupName: brain    # all Brain Ingresses share ONE ALB via this group
  certificateArn: ""  # ACM cert covering the host (TLS terminates at the ALB)
  annotations: {}

probes:
  enabled: true
  path: /                 # SSR root; any non-5xx is healthy
  readinessPath: /

# Next.js needs the BFF base URL at runtime (BFF_BASE_URL / CORE_API_URL).
envSecretName: ""

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3000"

serviceAccount:
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Horizontal Pod Autoscaler (P2.5). Stateless Next.js server → CPU-target HPA; modest band.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300

# ── Wave-2 workload hardening (AUD-OPS-001/002/004, AUD-INFRA-022) ────────────
# AUD-OPS-001: survive node drains / Spot reclaims / Karpenter consolidation.
pdb:
  enabled: true
  minAvailable: 1

# AUD-OPS-002: best-effort zone + node spread (ScheduleAnyway never blocks
# scheduling on kind/single-pool topologies).
topologySpread:
  enabled: true
  constraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

# AUD-OPS-004: SIGTERM → next start shutdown; preStop sleep first so the ALB
# (target-type=ip) stops routing to the Terminating pod before shutdown begins.
terminationGracePeriodSeconds: 30
preStopSleepSeconds: 10

# AUD-INFRA-022: read-only root FS. OFF until verified against the runtime image
# (next start writes .next/cache — emptyDirs are mounted at /tmp and .next/cache
# when enabled). Flip after a staging soak; PSA `restricted` does NOT require it.
readOnlyRootFilesystem: false
