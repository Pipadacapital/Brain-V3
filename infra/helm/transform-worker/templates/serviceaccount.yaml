{{- if .Values.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "transform-worker.fullname" . }}
  labels:
    {{- include "transform-worker.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    # IRSA (eks.amazonaws.com/role-arn) — S3 (Iceberg warehouse) + REST catalog + AWS Secrets Manager.
    # The SAME brain-<env>-jobs role the cronworkflows medallion steps assume (identical permissions).
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
