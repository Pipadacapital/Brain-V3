# duckdb image — bronze/medallion maintenance + erasure (via the PyIceberg maintenance client it carries) AND the V4
# Silver/Gold transform crons (.sparkV4.image — CI promotes both digests build-once from staging, one
# image). Bronze LANDING is the kafka-connect chart (ADR-0010). Spark→DuckDB cutover: replaces
# brain-spark-bronze-prod. The digest below is a PLACEHOLDER — the first master build of brain-duckdb-prod
# (deploy.yml build-data-images) promotes the real digest here; until then the templates fail-closed on it.
sparkBronze:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
    tag: ""
    digest: "sha256:bc865113d9f4a17c87d8a7e19819c8f50fd4796d174d32e48436342f1240d1d8"
  # AUD-PROD-006: the maintenance/erasure cron pods run on the streaming Karpenter pool (the batch pool
  # was removed in the Spark→DuckDB cutover — the DuckDB crons are lightweight python, no JVM). A
  # Spot/consolidation bounce mid-run is replay-safe: Forbid + Argo retry + idempotent maintenance.
  nodeSelector:
    brain.platform/pool: streaming
# duckdb V4 Silver/Gold transform crons — same image as sparkBronze (one brain-duckdb image carries the
# transform marts + the PyIceberg maintenance client).
sparkV4:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
    tag: ""
    digest: "sha256:bc865113d9f4a17c87d8a7e19819c8f50fd4796d174d32e48436342f1240d1d8"
  # AUD-PROD-006: v4-silver / v4-gold / v4-maintenance pods → the streaming pool (batch pool removed).
  # Every Silver/Gold MERGE is idempotent — a consolidation bounce is retry-safe.
  nodeSelector:
    brain.platform/pool: streaming
  # do-not-disrupt tells Karpenter not to consolidate/drift-disrupt a node hosting these pods while they
  # run (the exit-143 / "No more retries left" class). Idempotent MERGE jobs, so an involuntary AWS spot
  # reclaim is still safe (bounded retry); this only removes the self-inflicted churn.
  podAnnotations:
    karpenter.sh/do-not-disrupt: "true"
  # DuckDB is single-process python (no JVM heap). 3CPU/8Gi gives the working set + DuckDB's in-memory
  # MERGE/aggregation room; the streaming pool (t4g.large/xlarge) absorbs the silver/gold/maintenance
  # overlap. Re-measure the real DuckDB run-time profile in prod and right-size from there.
  resources:
    requests: {cpu: "2", memory: 6Gi}
    limits: {cpu: "3", memory: 8Gi}
  # MAINTENANCE LANE SPLIT (2026-07-17 fragmentation incident). The single both-namespaces sweep
  # processed Silver first (alphabetically) and burned its whole deadline on Silver's heavy tables
  # (silver_job_watermark ~7.3k tiny files) → Gold never compacted → gold_customer_360 fragmented to
  # ~50 files → 8s serving cold-scans. Split into two lanes so the serving-facing Gold marts are kept
  # compacted on a fast cadence, independent of Silver's slow full sweep:
  maintenance:
    lanes:
      # Gold: serving-facing marts — frequent + tight. Orphan sweep off (it is a no-op SKIP today and
      # the compaction+expiry is what keeps serving fast). Finishes in minutes → 30-min deadline.
      - name: gold
        namespaces: brain_gold
        schedule: "0 */2 * * *" # every 2h — keeps gold_customer_360 &co consolidated for serving
        activeDeadlineSeconds: 1800 # 30 min — Gold-only sweep is quick
        orphanFiles: "0"
      # Silver: heavy tables (job_watermark, fulfillment) — its own daily window with room to finish
      # the full table-by-table optimize+expire without a deadline SIGTERM (the exit-143 history).
      - name: silver
        namespaces: brain_silver
        schedule: "0 4 * * *" # daily 04:00 IST — off the Gold cadence
        activeDeadlineSeconds: 10800 # 3h — enough headroom for the fragmented Silver tables
        orphanFiles: "1"
envSecretName: core-env
