{{- if .Values.batchCluster.enabled }}
# ClusterIP Service for the BATCH cluster (ADR-0002 — additive FTE cluster; OFF by default). This is
# the discovery.uri + JDBC endpoint maintenance/RTBF/compaction jobs target — SEPARATE from the
# interactive brain-<env>-trino serving Service the BFF reads. Routes to batch-coordinator pods only.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trino.batch.fullname" . }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: batch
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "trino.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: batch-coordinator
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
