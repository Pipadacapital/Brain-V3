{{- if .Values.batchCluster.enabled }}
{{/*
BATCH coordinator (ADR-0002 — additive FTE cluster; OFF by default). A SEPARATE logical Trino
cluster from the interactive serving path: its discovery.uri is the batch Service, so batch workers
NEVER join the interactive cluster and vice versa. It runs retry-policy=TASK + the S3 exchange
manager (batch config ConfigMap). Compaction / RTBF / Iceberg-maintenance jobs target this cluster's
Service explicitly; the BFF never does. No JMX agent (interactive owns serving alerting). Keeps the
same bounded-heap jvm.config + mem limits as interactive (the OOM outage fix).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trino.batch.coordinator.fullname" . }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: batch-coordinator
spec:
  replicas: {{ .Values.batchCluster.coordinator.replicaCount }}   # exactly one batch coordinator
  selector:
    matchLabels:
      {{- include "trino.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: batch-coordinator
  template:
    metadata:
      labels:
        {{- include "trino.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: batch-coordinator
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "trino.fullname" . }}
      {{- with .Values.batchCluster.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.batchCluster.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000        # trinodb/trino runs as uid 1000 ("trino")
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: trino-batch-coordinator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
          {{- if .Values.iceberg.s3SecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.iceberg.s3SecretName }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            periodSeconds: 15
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.batchCluster.coordinator.resources | nindent 12 }}
          volumeMounts:
            - name: server-config
              mountPath: /etc/trino/config.properties
              subPath: coordinator-config.properties
            - name: server-config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: server-config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: server-config
              mountPath: /etc/trino/exchange-manager.properties
              subPath: exchange-manager.properties
            - name: catalog
              mountPath: /etc/trino/catalog/iceberg.properties
              subPath: iceberg.properties
            - name: data
              mountPath: /data/trino
      volumes:
        - name: server-config
          configMap:
            name: {{ include "trino.batch.fullname" . }}-config
        - name: catalog
          configMap:
            name: {{ include "trino.batch.fullname" . }}-catalog
        - name: data
          emptyDir: {}
{{- end }}
