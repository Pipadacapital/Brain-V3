replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-web-prod
  tag: latest

envSecretName: web-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-web-prod

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
