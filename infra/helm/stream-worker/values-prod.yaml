replicaCount: 3

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-stream-worker-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: "sha256:60961178a452dd3d97166487ef34744348c7a60ab656a8c6f082243ea603f5c2"

envSecretName: stream-worker-env

# AUD-LOCAL-016-FUP1: prod kube-prometheus-stack scrapes the worker's /metrics (HealthServer
# containerPort — headless, so a PodMonitor) as job "brain-stream-worker" (up{job=~"brain-.*"}).
metrics:
  podMonitor:
    enabled: true

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-stream-worker

# AUD-PROD-006: the live Kafka consumers ride the streaming pool (t4g.large Spot,
# WhenEmpty consolidation — never bin-packs live consumers off a node; the HPA
# replica floor keeps the warm baseline the karpenter README relies on).
nodeSelector:
  brain.platform/pool: streaming

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# P2.5: HPA on in prod. The live-topic partition count is the HARD ceiling on useful replicas
# (a replica beyond the partition count owns no partition → idle). The prod live topic is now 96
# partitions (infra/helm/strimzi-kafka → live_topic_partition_count, H5 audit), so the
# worker is no longer pinned at the old hard 12. maxReplicas=48 gives generous headroom while
# staying well under 96. Raise toward 96 if sustained lag warrants; never exceed the partition
# count. A *real* repartition (per-brand key) is gated on the producer key change (analytics/identity
# stream) — see the kafka module header.
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 48
