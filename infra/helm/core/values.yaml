# Default values for the core chart. Overridden by values-staging.yaml / values-prod.yaml.
replicaCount: 2

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-core
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3001

# Public edge (AUD-COST-003): shared Brain ALB (aws-load-balancer-controller),
# host-routed, ACM TLS. Off by default; enabled per env in values-prod.yaml.
ingress:
  enabled: false
  className: alb
  host: ""            # e.g. api.<domain> — BFF/API + connector webhooks
  groupName: brain    # all Brain Ingresses share ONE ALB via this group
  certificateArn: ""  # ACM cert covering the host (TLS terminates at the ALB)
  annotations: {}

probes:
  enabled: true
  path: /health           # core exposes a single /health endpoint
  readinessPath: /health

# Prometheus scrape (AUD-INFRA-033). Core serves /metrics on its MAIN Fastify port
# (apps/core/src/main.ts, next to /health) — the @brain/observability counters it already records
# (connector_auth_rejected_total in the WebhookPipeline, job counters, …) previously never reached
# Prometheus. The ServiceMonitor rides the existing `http` Service port; the job relabel pins
# "brain-core" so BrainTargetDown{job=~"brain-.*"} covers the API/BFF tier.
# Off by default (kind/staging have no Prometheus Operator CRDs); values-prod enables it.
metrics:
  serviceMonitor:
    enabled: false
    jobLabel: brain-core
    interval: 15s

# Secret (External Secrets ← AWS Secrets Manager) with DATABASE_URL, REDIS_URL,
# STARROCKS_*, KAFKA brokers, AI gateway + connector secrets, etc.
# P1 pre-scale: DATABASE_URL / BRAIN_APP_DATABASE_URL host:port should point at the PgBouncer
# Service (<release>-pgbouncer:6432, see infra/helm/pgbouncer) — NOT the Postgres primary directly.
# Core's request path is all short SET-LOCAL-scoped transactions, so transaction pooling multiplexes
# thousands of request connections onto a small server pool (the connection-exhaustion fix at 1000
# brands). NOTE: the stream-worker stays DIRECT on the primary (its leader lock is a session
# advisory lock that transaction pooling would break).
envSecretName: ""

env:
  - name: SERVICE_NAME
    value: core
  - name: PORT
    value: "3001"

# AUD-OBS-2: OTel OTLP export flag — empty (default) keeps initObservability() a no-op
# (no SDK loaded; spans/metrics stay in-process). Set per env to the collector/vendor
# OTLP endpoint to turn tracing+metrics export ON; auth headers (if the endpoint needs
# them) belong in the envSecretName secret as OTEL_EXPORTER_OTLP_HEADERS.
otelExporterOtlpEndpoint: ""

serviceAccount:
  annotations: {}   # IRSA role for AWS Secrets Manager access (set per env)

# DB migration runner (AUD-COST-011): pre-install/pre-upgrade + ArgoCD PreSync
# hook Job that runs `pnpm migrate:up` (db/migrations, node-pg-migrate) from the
# core image against DATABASE_URL — MUST succeed before core/stream-worker roll.
# Off by default (dev/CI migrate out-of-band); enabled per env.
migrations:
  enabled: false
  appEnv: prod              # PGOPTIONS app.env stamp — dev-only migrations RAISE on 'production'
  # core-env key holding the DIRECT Aurora URL (node-pg-migrate's session
  # advisory lock breaks through pgbouncer transaction pooling). Empty → use
  # the secret's DATABASE_URL as-is.
  databaseUrlFromKey: ""
  backoffLimit: 1
  activeDeadlineSeconds: 900

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Horizontal Pod Autoscaler (P2.5). Off by default; enabled per-env in values-staging/prod.
# Core is a stateless BFF → CPU-target HPA is the right signal. When enabled, the Deployment drops
# its static replicas (replicaCount is then only the pre-HPA seed). minReplicas matches replicaCount
# so there is no scale-down surprise on first enable.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5m cooldown — avoid thrashing on bursty BFF traffic

# ── Wave-2 workload hardening (AUD-OPS-001/002/004, AUD-INFRA-022) ────────────
# AUD-OPS-001: survive node drains / Spot reclaims / Karpenter consolidation.
pdb:
  enabled: true
  minAvailable: 1

# AUD-OPS-002: best-effort zone + node spread (ScheduleAnyway never blocks
# scheduling on kind/single-pool topologies).
topologySpread:
  enabled: true
  constraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

# AUD-OPS-004: SIGTERM → graceful Fastify close; preStop sleep first so the ALB
# (target-type=ip) stops routing to the Terminating pod before shutdown begins.
terminationGracePeriodSeconds: 30
preStopSleepSeconds: 10

# AUD-INFRA-022: read-only root FS. OFF until verified against the runtime image
# (tsx/pnpm may write under /tmp — an emptyDir is mounted there when enabled).
# Flip to true after a staging soak; PSA `restricted` does NOT require it.
readOnlyRootFilesystem: false
