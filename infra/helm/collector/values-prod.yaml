replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-collector-prod
  tag: latest
  digest: ""

envSecretName: collector-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-collector-prod

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi
