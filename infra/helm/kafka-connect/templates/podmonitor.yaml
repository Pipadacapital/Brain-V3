{{- /*
PodMonitor for the Connect worker's JMX exporter (AUD-INFRA-028). The worker's Service fronts
only the REST port (:8083, used by the connector-registration hook Job) — the metrics port is a
pod-level concern, so this is a PodMonitor against the named `metrics` containerPort (same
posture as the stream-worker chart). The job relabel pins the EXACT job name the brain-slo rules
and the local compose Prometheus use ("kafka-connect-jmx") — without it the job label defaults
to "<namespace>/<name>" and BronzeConnectTaskFailed / BronzeConnectLagHigh / BrainIngestStale /
BrainTargetDown all go silent.

Selected by the monitoring Prometheus via podMonitorSelector {} + namespaceSelector {}
(kube-prometheus-stack values-prod sets podMonitorSelectorNilUsesHelmValues: false), so the
monitor lives HERE, in the chart that owns the port.
*/ -}}
{{- if and .Values.enabled .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}-kafka-connect
  labels:
    app.kubernetes.io/name: kafka-connect
    app.kubernetes.io/part-of: brain
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-connect
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.podMonitor.interval }}
      relabelings:
        - action: replace
          targetLabel: job
          replacement: {{ .Values.metrics.podMonitor.jobLabel }}
{{- end }}
