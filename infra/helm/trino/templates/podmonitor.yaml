{{- /*
PodMonitor for the coordinator's JMX exporter (AUD-INFRA-030). A PodMonitor (not a
ServiceMonitor) because the metrics port is deliberately NOT on the serving Service — the BFF's
JDBC endpoint stays exactly as it was, and the scrape targets the pod directly (same posture as
the stream-worker chart). The job relabel pins job="trino" — the exact name TrinoServingDown /
TrinoQueryFailureRateHigh and the BrainTargetDown regex (kube-prometheus-stack values-prod)
match on; without it the job label defaults to "<namespace>/<name>" and serving stays
detection-dark.

Selected by the monitoring Prometheus via podMonitorSelector {} + namespaceSelector {}
(kube-prometheus-stack values-prod sets podMonitorSelectorNilUsesHelmValues: false).
*/ -}}
{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "trino.coordinator.fullname" . }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  selector:
    matchLabels:
      {{- include "trino.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coordinator
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.podMonitor.interval }}
      relabelings:
        - action: replace
          targetLabel: job
          replacement: {{ .Values.metrics.podMonitor.jobLabel }}
{{- end }}
