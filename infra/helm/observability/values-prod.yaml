# brain-observability — PROD overrides (AUD-INFRA-030/-032).
# Deployed to ns `monitoring` (next to kube-prometheus-stack) by
# infra/argocd/envs/prod/observability.yaml. Sync AFTER kube-prometheus-stack (needs the
# ServiceMonitor CRD + the Grafana dashboard sidecar) and duckdb-serving (the exporter's query
# target) — though the exporter degrades honestly if duckdb-serving is unreachable
# (brain_data_freshness_up=0 → BrainFreshnessExporterDown, by design).
freshnessExporter:
  enabled: true
  # The sole serving engine's Service (duckdb-serving chart, ns duckdb-serving) — same endpoint
  # the BFF uses, queried the same way (single POST /v1/query).
  servingUrl: "http://brain-prod-duckdb-serving.duckdb-serving.svc.cluster.local:8091"

dashboards:
  enabled: true
