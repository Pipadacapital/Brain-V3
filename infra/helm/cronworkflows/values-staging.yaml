    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-spark-bronze-prod
    tag: ""
    digest: "sha256:9ca750c470d3870e42a3e0bb7f34ce77bc7e5930d8e61c7bf3cb2901ff9f2036"
