apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stream-worker-staging
  namespace: argocd
  annotations:
    # Selective deploy: only syncs when stream-worker manifests change
    argocd.argoproj.io/manifest-generate-paths: infra/helm/stream-worker
  labels:
    project: brain
    environment: staging
    service: stream-worker
spec:
  project: brain-staging
  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    path: infra/helm/stream-worker
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stream-worker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 10
