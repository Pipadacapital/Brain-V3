# brain-kafka-connect — the ADR-0010 Bronze landing writer.
#
# This chart is the SOLE Bronze landing writer (collector_events_connect). The 9 <lane>_raw_connect
# raw-lane sinks were RETIRED by ADR-0016 (2026-07-18) — connectors emit canonical events to the
# collector lane, so the raw lanes never received data.
# The cronworkflows sparkBronze block now runs ONLY bronze-maintenance (compaction/
# snapshot-expiry) — the Spark-SS landing path was removed 2026-07-05 (rollback = git revert).
# See docs/runbooks/adr-0010-kafka-connect-bronze.md.
enabled: true

# KIP-392: at pod start, resolve this pod's AZ from IMDSv2 and export CONNECT_CONSUMER_CLIENT_RACK so
# the Iceberg sink consumers read a SAME-AZ replica (brokers must run RackAwareReplicaSelector — see
# infra/helm/strimzi-kafka kafka.rack) instead of the cross-AZ leader → cuts DataTransfer-Regional
# spend. Best-effort + reversible: unresolved AZ (or disabled) = today's leader-fetch behaviour.
rackAwareness:
  enabled: true

image:
  repository: confluentinc/cp-kafka-connect
  tag: "7.6.1"
  pullPolicy: IfNotPresent

# Apache Iceberg Kafka Connect runtime — MUST stay version-locked to the platform Iceberg version
# (iceberg-rest fixture / iceberg-spark-runtime are 1.9.2). Downloaded at pod start (cached in an
# emptyDir; bake into a custom image for air-gapped clusters).
icebergConnectVersion: "1.9.2"
pluginZipUrl: "https://hub-downloads.confluent.io/api/plugins/iceberg/iceberg-kafka-connect/versions/1.9.2/iceberg-iceberg-kafka-connect-1.9.2.zip"

replicas: 1                # base/local default: single worker. values-prod runs 2 (REL-4 HA).
# REL-4: broker/worker pod placement. Empty by default (single-replica local/kind
# rendering unchanged); values-prod adds anti-affinity + AZ spread so the 2 HA workers
# never co-locate. Reversible: clear these to revert to unconstrained placement.
affinity: {}
topologySpreadConstraints: []
heapOpts: "-Xms256M -Xmx1G"
resources:
  requests:
    cpu: 250m
    memory: 1280Mi
  limits:
    cpu: "1"
    memory: 1792Mi

worker:
  bootstrapServers: "REPLACE_WITH_MSK_OR_STRIMZI_BOOTSTRAP:9092"
  groupId: brain-bronze-connect
  configStorageTopic: _connect-configs
  offsetStorageTopic: _connect-offsets
  statusStorageTopic: _connect-status
  storageReplicationFactor: "3"     # prod RF; local compose uses 1

# Iceberg catalog properties shared by EVERY connector below (prod: real S3 + IRSA credential chain —
# omit the s3.access-key/secret keys entirely and grant the pod's service account; local-dev values
# shown in infra/kafka-connect/*.json).
icebergCatalog:
  iceberg.catalog.type: "rest"
  iceberg.catalog.uri: "REPLACE_WITH_ICEBERG_REST_URI"
  iceberg.catalog.warehouse: "s3://REPLACE_BRONZE_BUCKET/"
  iceberg.catalog.io-impl: "org.apache.iceberg.aws.s3.S3FileIO"
  iceberg.catalog.client.region: "ap-south-1"

# Common sink props merged into every connector (control topic must exist — broker auto-create off).
sinkDefaults:
  "iceberg.tables.auto-create-enabled": "true"
  "iceberg.tables.evolve-schema-enabled": "true"
  "iceberg.tables.schema-force-optional": "true"
  "iceberg.tables.auto-create-props.write.parquet.compression-codec": "zstd"
  "iceberg.control.topic": "control-iceberg"
  "iceberg.control.commit.interval-ms": "30000"
  "iceberg.control.commit.timeout-ms": "60000"
  # ADR-0015 WS2 (EOS transport, keep in LOCKSTEP with infra/kafka-connect/*.json): the sink's
  # main consumers never surface aborted transactional writes. The sink itself is exactly-once
  # by design (KIP-447 commit coordination over the control topic; offsets stored in the Iceberg
  # snapshot metadata — connect 1.9.2 has no separate EOS toggle). Needs the worker's
  # CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY=All (deployment.yaml).
  "consumer.override.isolation.level": "read_committed"

service:
  # Cross-AZ topology-aware routing for the REST Service (REL-4). Empty by default
  # (single-replica local/kind unchanged — no cross-AZ concept there); values-prod
  # sets "PreferClose" (k8s ≥1.31 GA). Reversible: clear to remove.
  trafficDistribution: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}            # IRSA role for S3/Glue access goes here

# ── Prometheus JMX exporter (AUD-INFRA-028) ─────────────────────────────────────────────────────
# The Bronze landing writer previously emitted ZERO metrics in-cluster — BronzeConnectTaskFailed /
# BronzeConnectLagHigh / BrainIngestStale could never fire while a FAILED sink task silently
# stopped its lane. Mirrors the local compose wiring (jmx-exporter-init + KAFKA_OPTS javaagent):
# the startup script fetches the agent jar next to the connect plugin zip and attaches it; the
# mapping ConfigMap is a VERBATIM copy of infra/observe/kafka-connect-jmx-exporter.yml (that file
# stays canonical — KEEP IN LOCKSTEP). GRACEFUL DEGRADATION: if the jar download fails the worker
# STARTS WITHOUT the agent (loud log line) — detection must never take down the SOLE Bronze
# landing writer; the then-unscraped target trips BrainTargetDown{job="kafka-connect-jmx"}.
# Off by default (kind/staging have no Prometheus Operator CRDs); values-prod enables it.
metrics:
  enabled: false
  # Same agent + version as the local compose jmx-exporter-init and the Strimzi broker path.
  jmxExporterJarUrl: "https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar"
  # :9404 (broker convention). Local compose uses :9405 only because Connect shares the broker's
  # netns there; an in-cluster pod has its own network namespace.
  port: 9404
  podMonitor:
    # The job relabel pins the EXACT job name the brain-slo rules + the local compose Prometheus
    # use ('kafka-connect-jmx') — without it the job label defaults to "<ns>/<name>" and
    # BronzeConnectTaskFailed / BronzeConnectLagHigh / BrainIngestStale / BrainTargetDown all
    # go silent.
    jobLabel: kafka-connect-jmx
    interval: 15s

# The collector Bronze lane — keep in LOCKSTEP with infra/kafka-connect/iceberg-bronze-collector.json
# (the local-dev copy). `config` carries only the per-connector fields; icebergCatalog + sinkDefaults
# are merged in by the template. Collector: raw payload preserved verbatim (StringConverter +
# HoistField) + kafka coords. (ADR-0016: the 9 <lane>_raw_connect raw-lane sinks were retired.)
connectors:
  iceberg-bronze-collector:
    connector.class: org.apache.iceberg.connect.IcebergSinkConnector
    tasks.max: "2"
    topics: "prod.collector.event.v1,prod.collector.order.backfill.v1"
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.storage.StringConverter
    transforms: "hoist,coords"
    transforms.hoist.type: org.apache.kafka.connect.transforms.HoistField$Value
    transforms.hoist.field: payload
    transforms.coords.type: org.apache.kafka.connect.transforms.InsertField$Value
    transforms.coords.topic.field: kafka_topic
    transforms.coords.partition.field: kafka_partition
    transforms.coords.offset.field: kafka_offset
    transforms.coords.timestamp.field: kafka_timestamp
    iceberg.tables: brain_bronze.collector_events_connect
    # Wave-1 partition right-sizing (was day(kafka_timestamp), AUD-IMPL-025): partition NEW auto-creates
    # of the collector table by MONTH(kafka_timestamp) — the sink's PHYSICAL InsertField column. Bronze
    # accrues indefinitely, so it needs SOME temporal partition to stay <100MB/partition, but day() over
    # a multi-year spread floored ~700 daily partitions (the same pathology Silver hit); month() bounds
    # it to ~12 partitions/yr while keeping each partition well under the target file size at current
    # volume. AUTO-CREATE ONLY (the LIVE prod table is UNPARTITIONED and stays as-is — it was never
    # day-migrated; the one-time Spark migrate script was deleted with the Spark tree, so a fresh env is
    # the only place this spec applies). Collector-lane only — the raw lanes carry NO kafka_timestamp
    # (no InsertField transform), a default-partition-by would break their creates.
    iceberg.table.brain_bronze.collector_events_connect.partition-by: "month(kafka_timestamp)"
  # ADR-0016 (2026-07-18): the 9 <lane>_raw_connect sink connectors are RETIRED — connectors emit
  # canonical events to the collector lane, so the <lane>.raw.v1 topics never received data and
  # their shadow-parity normalize jobs were dead-ends. Only the collector sink remains.
