apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino-prod
  namespace: argocd
  annotations:
    # Selective deploy: only syncs when trino manifests change
    argocd.argoproj.io/manifest-generate-paths: infra/helm/trino
  labels:
    project: brain
    environment: prod
    service: trino
spec:
  project: brain-prod
  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    path: infra/helm/trino
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: trino
  # NO automated sync for prod — manual promotion gate required (Trino is the SOLE serving engine)
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 10
