# Local dev — profiles per zone (doc 05 §10).
# core    = control-plane + serving (default for most feature work)
# ingest  = strict-SLA event path (Redpanda + Apicurio)
# observe = Grafana + Loki + Prometheus OTel stack
# All profiles combined: docker compose --profile core --profile ingest --profile observe up -d
#
# Iceberg REST catalog (lakekeeper) is included in the ingest profile — it provides
# the local equivalent of AWS Glue for Bronze table metadata.
# MinIO is the local S3 equivalent; it is in core because the stream-worker, seed, and
# testcontainer harness all need a writable object store.

services:
  # ────────────────────────────────────────────────────────────────────────────
  # CORE profile — control plane + serving
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    profiles: ["core"]
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain
    ports: ["5432:5432"]
    # Provision the brain_app LOGIN role on first init of a fresh volume (before migrations).
    # Closes the cold-start gap where a wiped volume leaves brain_app unable to authenticate.
    # See db/init/00_provision_brain_app_role.sql. Local substrate only; no effect on real prod.
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PgBouncer (P1 pre-scale) — TRANSACTION-pooling connection multiplexer in FRONT OF the CORE app's
  # request path. Core opens a connection per concurrent request; at 1000 brands that exhausts
  # Postgres's max_connections. PgBouncer multiplexes thousands of client connections onto a small
  # server pool. Core's DB access is all short, SET-LOCAL-scoped transactions (withBrandTxn /
  # beginRlsTxn) → transaction pooling is safe. The STREAM-WORKER must NOT use this: its periodic
  # loops hold SESSION-level advisory locks (the leader lock) which transaction pooling breaks — it
  # connects to Postgres directly. Auth via auth_query against pg_shadow ($$1 escapes compose subst).
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    profiles: ["core"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: brain
      DB_PASSWORD: brain
      DB_NAME: brain
      AUTH_TYPE: scram-sha-256
      AUTH_QUERY: "SELECT usename, passwd FROM pg_shadow WHERE usename=$$1"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "2"
      ADMIN_USERS: brain
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    ports: ["6432:5432"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U brain -d pgbouncer || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Neo4j — the customer IDENTITY GRAPH store (re-platform Phase D). Nodes: Customer{brain_id} +
  # Identifier{type,hash}; edges link hashed email/phone/device/customer-id to a Customer, and
  # merges fold two Customers into one brain_id. Per-brand isolation = brand_id on every node + a
  # brand-scoped key. The async-off-Bronze identity writer (no synchronous edge gate) writes here.
  neo4j:
    image: neo4j:5.21-community
    profiles: ["core"]
    environment:
      NEO4J_AUTH: neo4j/brain_neo4j
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports: ["7474:7474", "7687:7687"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    profiles: ["core"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    # core: bronze/audit S3. lakehouse: nessie/Iceberg warehouse depends_on minio
    # (so nessie's dependency resolves under --profile lakehouse). NOT in ingest —
    # the ingest apps (collector/stream-worker) write Bronze to Postgres, not S3.
    profiles: ["core", "lakehouse"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: brain
      MINIO_ROOT_PASSWORD: brainbrain
    ports: ["9000:9000", "9001:9001"]
    # NOTE: the minio image ships no curl/wget; it does include bash. Use bash's
    # /dev/tcp to probe the API port (a port-open check is sufficient for local dev).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # MinIO bucket + prefix bootstrap (runs once; idempotent)
  minio-init:
    image: minio/mc:latest
    profiles: ["core", "lakehouse"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 brain brainbrain &&
        mc mb --ignore-existing local/brain-bronze &&
        mc mb --ignore-existing local/brain-audit &&
        echo 'MinIO buckets ready: brain-bronze brain-audit'
      "
    restart: "no"

  starrocks:
    image: starrocks/allin1-ubuntu:3.3.2
    profiles: ["core"]
    ports:
      - "9030:9030"   # MySQL protocol (FE)
      - "8030:8030"   # HTTP REST (FE)
      - "8040:8040"   # BE HTTP
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # StarRocks post-startup bootstrap — row-policy template + external catalog (NN-2)
  starrocks-init:
    image: mysql:8.0
    profiles: ["core"]
    depends_on:
      starrocks:
        condition: service_healthy
    volumes:
      - ./db/starrocks:/sql:ro
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for StarRocks FE...' &&
        mysql -h starrocks -P 9030 -u root --connect-timeout=10 < /sql/bootstrap.sql &&
        echo 'Registering external Silver/Gold Iceberg catalogs...' &&
        mysql -h starrocks -P 9030 -u root < /sql/external_iceberg_silver_gold_catalog.sql &&
        echo 'StarRocks bootstrap complete'
      "
    restart: "no"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["core"]
    ports: ["4000:4000"]
    # Mount the gateway config (per-tenant virtual_key budgets + model aliases + routing policy).
    # Dev-authorable: edit infra/litellm.config.yaml and restart this container — no image rebuild.
    # Production: the same file is rendered from Helm values and mounted via a ConfigMap volume.
    volumes:
      - ./infra/litellm.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # Provider API keys — set in .env.local-prod / .env.production (never committed).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Gateway master key — gates the admin UI + virtual-key provisioning API.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-brain-dev-master}
      # OTel trace export (ai-observability-tracing; Tempo at :4317 in the observe profile).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
    healthcheck:
      # The litellm image ships no `curl`, and /health requires the master key (401). Use the
      # bundled python against the unauthenticated lightweight liveliness probe instead.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5

  localstack:
    image: localstack/localstack:3.4
    profiles: ["core"]
    environment:
      SERVICES: "s3,secretsmanager,kms,ses,events"
    ports: ["4566:4566"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ────────────────────────────────────────────────────────────────────────────
  # INGEST profile — Redpanda + Apicurio + Iceberg REST catalog
  # ────────────────────────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    profiles: ["ingest"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --node-id
      - "0"
      - --kafka-addr
      # PLAINTEXT (localhost:9092) for host + same-netns clients; EXTERNAL (19092) advertised as a
      # resolvable hostname so out-of-network clients (e.g. a local kind/k8s pod simulating prod, which
      # routes to this container's brainv3_default IP via a hostAlias for brain-redpanda-ext) can consume.
      - PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092,EXTERNAL://brain-redpanda-ext:19092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - localhost:8082
      - --schema-registry-addr
      - 0.0.0.0:8081
    ports:
      - "9092:9092"   # Kafka API (PLAINTEXT listener)
      - "19092:19092" # Kafka API (EXTERNAL listener — for kind/k8s pods)
      - "8081:8081"   # Redpanda schema registry (unused; Apicurio is canonical)
      - "8082:8082"   # Pandaproxy REST
      - "9644:9644"   # Admin API
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # Redpanda topic bootstrap (idempotent)
  redpanda-init:
    image: redpandadata/redpanda:v24.1.7
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        rpk topic create dev.collector.event.v1 --brokers redpanda:9092
          --config retention.ms=604800000
          --partitions 12 --replicas 1 2>/dev/null || true &&
        rpk topic create dev.collector.order.backfill.v1 --brokers redpanda:9092
          --config retention.ms=2592000000
          --partitions 12 --replicas 1 2>/dev/null || true &&
        rpk topic create dev.collector.event.v1.dlq --brokers redpanda:9092
          --config retention.ms=2592000000
          --partitions 12 --replicas 1 2>/dev/null || true &&
        rpk topic create dev.collector.event.v1.quarantine --brokers redpanda:9092
          --config retention.ms=2592000000
          --partitions 12 --replicas 1 2>/dev/null || true &&
        for e in orders customers shipments payments sessions ads; do
          rpk topic create dev.brain.$$e --brokers redpanda:9092
            --config retention.ms=604800000
            --partitions 12 --replicas 1 2>/dev/null || true;
        done &&
        echo 'Redpanda topics ready'
      "
    restart: "no"

  # Apicurio — FULL_TRANSITIVE compatibility enforced globally
  apicurio:
    image: apicurio/apicurio-registry-mem:2.6.3.Final
    profiles: ["ingest"]
    environment:
      REGISTRY_APIS_V2_DATE_FORMAT: "yyyy-MM-dd'T'HH:mm:ss'Z'"
      # FULL_TRANSITIVE: every version must be compatible with ALL prior versions
      REGISTRY_COMPAT_DEFAULT_RULE: "FULL_TRANSITIVE"
      REGISTRY_COMPAT_DEFAULT_ARTIFACT_TYPE: "AVRO"
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/apis/registry/v2/groups/default/artifacts"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Iceberg REST catalog — local equivalent of AWS Glue Data Catalog (ADR-0002).
  # Apache's reference iceberg-rest-fixture, backing the Iceberg warehouse onto MinIO (S3).
  # Replaces the previously-broken projectnessie/nessie:0.90.2 (unpullable tag, PR #72) with
  # a pinned, pullable image. Spark Structured Streaming (the Bronze writer, ADR-0002) and
  # StarRocks read Bronze through this catalog.
  #
  # OPTIONAL lakehouse infra, NOT part of the default dev loop — start via `pnpm dev:lakehouse`.
  # Kept out of "ingest" because the live ingest path still writes Bronze to Postgres until the
  # Iceberg flip completes (ADR-0002 dual-sink); this catalog is the target SoR substrate.
  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.9.2
    profiles: ["lakehouse"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      CATALOG_WAREHOUSE: s3://brain-bronze/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: brain
      AWS_SECRET_ACCESS_KEY: brainbrain
      AWS_REGION: us-east-1
      # The fixture defaults the JDBC catalog to `jdbc:sqlite::memory:` — a SEPARATE in-memory DB
      # per connection, so concurrent catalog clients (StarRocks + Spark) see inconsistent state
      # ("iceberg_tables doesn't exist" → ServiceFailureException, crashing the Spark sink). Use a
      # SHARED-CACHE in-memory DB: ONE in-memory database shared across all connections (consistent),
      # with no file/volume/permission needed. (Resets on container restart — the catalog rebuilds
      # from the topic; the data files live in MinIO. A bind-mounted file DB would add durability.)
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: "jdbc:sqlite:file::memory:?cache=shared"
      CATALOG_JDBC_USER: user
      CATALOG_JDBC_PASSWORD: password
    ports: ["8181:8181"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # The Bronze WRITER — Spark Structured Streaming: collector.event.v1 → Iceberg Bronze.
  # The architecture's sole Bronze sink for ALL ingested events (pixel + connectors): the same
  # ingestion platform end-to-end (Collector → Kafka → Bronze). Runs CONTINUOUSLY (a long-lived
  # streaming query), the same shape we run in production. Shares Redpanda's network namespace so the
  # advertised listener (localhost:9092) resolves; service-name DNS (iceberg-rest, minio, postgres)
  # still resolves because Redpanda is on the compose network. Jars are baked into the image (no
  # Maven at runtime). Reads start from earliest on a fresh checkpoint; the MERGE is idempotent.
  # ────────────────────────────────────────────────────────────────────────────
  spark-bronze-sink:
    image: apache/spark:3.5.3
    profiles: ["lakehouse"]
    # Share Redpanda's network namespace so its advertised listener (localhost:9092) resolves; service
    # DNS (iceberg-rest, minio, postgres) still resolves because Redpanda is on the compose network.
    network_mode: "service:redpanda"
    user: root
    depends_on:
      redpanda:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "localhost:9092"
      # Topic prefix MUST match the app's NODE_ENV-derived prefix. local-prod runs NODE_ENV=production,
      # so core/collector/stream-worker produce to prod.* — the sink must consume prod.* or it sees no
      # real data and Bronze never fills (the same break would hit prod if these were left as dev.*).
      COLLECTOR_TOPIC: "prod.collector.event.v1"
      BACKFILL_TOPIC: "prod.collector.order.backfill.v1"
      STARTING_OFFSETS: "earliest"
      TRIGGER_MODE: "continuous"
      PROCESSING_TIME: "10 seconds"
      ICEBERG_CATALOG: "rest"
      ICEBERG_REST_URI: "http://iceberg-rest:8181"
      BRONZE_NAMESPACE: "brain_bronze"
      BRONZE_WAREHOUSE: "s3://brain-bronze/"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "brain"
      AWS_SECRET_ACCESS_KEY: "brainbrain"
      AWS_REGION: "us-east-1"
      BRONZE_PG_JDBC_URL: "jdbc:postgresql://postgres:5432/brain"
      BRONZE_PG_USER: "brain"
      BRONZE_PG_PASSWORD: "brain"
      CHECKPOINT_LOCATION: "file:///opt/checkpoint/bronze"
    volumes:
      - ./db/iceberg/spark:/opt/spike:ro
      - brain-spark-ivy:/root/.ivy2
      - brain-spark-checkpoint:/opt/checkpoint
    # Runtime jar resolution (cached in the ivy volume after first start) — mirrors run-bronze-spike.sh,
    # which is the verified-working path (the build-time bake is unreliable behind Maven).
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - "local[2]"
      # Local-sink heap: the default 1g driver (driver==executor under local[*]) OOMs the
      # Iceberg+Kafka+MERGE machinery when draining a large cold-start backlog. The host has ample
      # RAM; pin 4g so the phase-1 backlog drain + continuous MERGE batches stay within heap.
      - --driver-memory
      - "4g"
      - --packages
      - "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.iceberg:iceberg-aws-bundle:1.9.2,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.postgresql:postgresql:42.7.4"
      - --conf
      - spark.jars.ivy=/root/.ivy2
      - /opt/spike/bronze_materialize.py
    restart: unless-stopped

  # ── Bronze writer (ADR-0006): Kafka Connect + Apache Iceberg Sink — the Spark-sink REPLACEMENT ──
  # Writes RAW Redpanda topic records DIRECTLY to Iceberg Bronze. No app-managed streaming checkpoint —
  # the sink's coordinator ties Kafka offset commits to Iceberg snapshot commits (the Spark-sink
  # "Incomplete log file" checkpoint-corruption class is gone). Shares Redpanda's network namespace
  # (localhost:9092 resolves, exactly like spark-bronze-sink); iceberg-rest + minio still resolve over
  # compose DNS because Redpanda is on the compose network. Connect REST API → redpanda:8083.
  # P1 of the migration: runs IN PARALLEL with the Spark sink (no cutover yet) onto a SEPARATE raw table
  # (brain_bronze.collector_events_raw), so Bronze parity can be checked before retiring the Spark leg.
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    profiles: ["lakehouse"]
    # root so the runtime plugin install can write the /opt/connect-plugins volume (the image's default
    # appuser cannot mkdir there); Connect's run script is root-safe (mirrors spark-bronze-sink user: root).
    user: root
    # Same netns trick as spark-bronze-sink (see its comment) — resolves Redpanda's localhost:9092
    # advertised listener while keeping compose-DNS for iceberg-rest/minio.
    network_mode: "service:redpanda"
    depends_on:
      redpanda:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "localhost:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "redpanda"
      CONNECT_REST_PORT: "8083"
      CONNECT_GROUP_ID: "brain-bronze-connect"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components,/opt/connect-plugins"
      # Tabular's iceberg-kafka-connect distribution (the connector later donated to Apache Iceberg).
      # Published as a GitHub release asset; connector.class = io.tabular.iceberg.connect.IcebergSinkConnector.
      ICEBERG_CONNECT_VERSION: "0.6.19"
    # Resolve the Iceberg connect plugin at runtime (cached in the volume), mirroring spark-bronze-sink's
    # runtime-package approach (build-time bakes are unreliable behind Maven).
    command:
      - bash
      - -c
      - |
        set -e
        # Plugin must be a DIRECT child of a plugin.path entry (with lib/*.jar) for Connect to scan it.
        # The cp image ships no `unzip`, but DOES ship `jar` (it's a JDK image) — extract with that.
        PLUGIN_DIR=/opt/connect-plugins/iceberg-kafka-connect-runtime-$${ICEBERG_CONNECT_VERSION}
        if [ ! -f "$$PLUGIN_DIR/manifest.json" ]; then
          echo "Downloading Apache Iceberg (Tabular) Kafka Connect runtime $${ICEBERG_CONNECT_VERSION}..."
          curl -fsSL -o /tmp/iceberg-connect.zip \
            "https://github.com/tabular-io/iceberg-kafka-connect/releases/download/v$${ICEBERG_CONNECT_VERSION}/iceberg-kafka-connect-runtime-$${ICEBERG_CONNECT_VERSION}.zip"
          ( cd /opt/connect-plugins && jar xf /tmp/iceberg-connect.zip )
          echo "Iceberg connect plugin installed ($$(ls $$PLUGIN_DIR/lib/*.jar | wc -l) jars)."
        fi
        exec /etc/confluent/docker/run
    volumes:
      - brain-connect-plugins:/opt/connect-plugins
    restart: unless-stopped

  # Registers the iceberg-bronze-collector connector once Connect is up (idempotent PUT .../config).
  kafka-connect-init:
    image: curlimages/curl:8.8.0
    profiles: ["lakehouse"]
    depends_on:
      kafka-connect:
        condition: service_started
    volumes:
      - ./infra/kafka-connect:/config:ro
    entrypoint:
      - sh
      - -c
      - |
        echo 'Waiting for Kafka Connect REST (redpanda:8083)...'
        until curl -fsS http://redpanda:8083/connectors >/dev/null 2>&1; do sleep 3; done
        echo 'Registering iceberg-bronze-collector...'
        code=$$(curl -s -o /tmp/resp -w '%{http_code}' -X POST -H 'Content-Type: application/json' \
          --data @/config/iceberg-bronze-collector.json http://redpanda:8083/connectors)
        if [ "$$code" = "201" ] || [ "$$code" = "409" ]; then
          echo "connector registered (HTTP $$code)"; else
          echo "FAILED (HTTP $$code):"; cat /tmp/resp; exit 1; fi
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────
  # OBSERVE profile — Grafana + Loki + Prometheus + OTel Collector
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observe"]
    ports: ["9090:9090"]
    volumes:
      - ./infra/observe/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.0.0
    profiles: ["observe"]
    ports: ["3100:3100"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  tempo:
    image: grafana/tempo:2.5.0
    profiles: ["observe"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observe/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo HTTP API / query-frontend
      - "4317"        # OTLP gRPC (internal — otel-collector → tempo; not exposed to host)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["observe"]
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: brain
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["3000:3000"]
    volumes:
      - ./infra/observe/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    profiles: ["observe"]
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    volumes:
      - ./infra/observe/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  brain-spark-checkpoint:
  brain-spark-ivy:
  brain-connect-plugins:
