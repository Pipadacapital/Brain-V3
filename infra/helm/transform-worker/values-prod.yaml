environment: prod
# ADR-0016 D3 MASTER CUTOVER GATE — OFF in prod until the resident worker passes the staging
# validation gate (24h soak, warm-tick p95 < 60s, parity vs the v4-medallion cron). While false the
# chart renders NOTHING and the interim v4-medallion CronWorkflow (cronworkflows chart, still
# transformWorker.enabled=false there) remains the sole medallion writer. FLIP PROCEDURE (lockstep):
#   1. set cronworkflows values-prod transformWorker.enabled=true   → suppresses the v4-medallion cron
#   2. set this enabled=true                                        → starts the resident Deployment
# Both land in the SAME promotion PR so the two are never both writing across the deploy.
#
# CUTOVER (CORE↔IDENTITY re-split, 2026-07-19): the resident worker replaces ONLY the CORE v4-medallion
# cron. The v4-identity cron STAYS enabled alongside it (its gate no longer suppresses on transformWorker)
# and remains the SOLE writer of the identity-owned Silver marts. The resident runs CORE-ONLY
# (TRANSFORM_CORE_ONLY=1, worker.coreOnly below) so it never double-writes those tables. Resident lock
# 910_005 (core) vs v4-identity lock 910_004 (identity) — two tables, two locks, single-writer each.
#
# REVERTED TO CRON (2026-07-20, owner decision "simple cron, robust"): the warm resident kept 400ing on
# the high-churn Kafka-Connect Bronze table collector_events_connect (it held stale snapshot metadata
# across ticks — the cold */5 cron re-reads fresh each run and never hit this). Simplicity + robustness
# over 45s freshness: resident OFF, v4-medallion cron back ON (cronworkflows transformWorker.enabled=false).
enabled: false
image:
  # Same brain-duckdb-prod image the cronworkflows medallion steps run (sparkV4.image in
  # cronworkflows/values-prod). MUST be an image whose db/iceberg/duckdb/run_all.py carries the
  # `resident` tier (ADR-0016 P2) — the Deployment command is `run_all.py resident`. AUTO-BUMPED:
  # deploy.yml's staging-bump + prod-promote steps now update this chart IN LOCKSTEP with
  # cronworkflows sparkV4.image (same duckdb imgref/digest — the hand-pin era ended after the
  # sha256:bc865113… pre-resident pin CrashLooped prod for 3h, 2026-07-19).
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
  tag: ""
  digest: "sha256:32086d1b05c8f99097f34dbcb286c7d6151bd198319ca30573adaea8c49c53d8"
# The SAME catalog-creds secret the cronworkflows medallion steps envFrom.
envSecretName: core-env
serviceAccount:
  annotations:
    # The SAME brain-prod-jobs IRSA role the cronworkflows medallion steps assume (S3 warehouse +
    # REST catalog + Secrets Manager). No new role — identical medallion read/write permissions.
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-jobs
# Ride the untainted `streaming` Spot pool (same pool as duckdb-serving + the cron transform pods).
# A Spot reclaim just restarts the resident loop on a new node; the watermark makes it converge-safe.
nodeSelector:
  karpenter.sh/nodepool: streaming
# MATCH the cronworkflows sparkV4.resources (values-prod: req 2CPU/6Gi, lim 3CPU/8Gi) — the resident runs
# the IDENTICAL DuckDB silver/gold jobs on the IDENTICAL image, and it holds the catalog WARM across ticks
# with the same WATERMARK_MAX_SLICE_SECONDS=3600 slice folds. A lower ceiling than the cron's would OOM
# the resident on the same 1h-slice working set the cron sized 8Gi for (the warm resident must have AT
# LEAST the medallion cron pod's memory ceiling — the 2Gi/4Gi base default is undersized for prod).
resources:
  requests:
    cpu: "2"
    memory: 6Gi
  limits:
    cpu: "3"
    memory: 8Gi
# Resident-worker knobs — prod pins the ADR-0016 defaults explicitly so they don't drift from the base
# chart / run_all.py / the cronworkflows transformWorker documentation block.
worker:
  tickMs: 45000
  healthPort: 8092
  lockKey: 910005
  # CORE-ONLY: the resident is the CORE writer only; the v4-identity cron owns the identity tables.
  coreOnly: true
# Incremental-read / OOM-safety env — mirrors the cronworkflows sparkV4.env (values.yaml). The resident
# chart does NOT inherit that env, so pin it here: SILVER_INCREMENTAL=1 (watermark-windowed reads, prod-on)
# + WATERMARK_MAX_SLICE_SECONDS=3600 (the OOM-safe 1h forward-slice cap — a resident tick with cap=0 does
# an unbounded full-scan bootstrap → OOM). GOLD_INCREMENTAL stays "0" (full-scan) until the two-stage gate
# passes (docs/runbooks/gold-incremental-promotion.md: the integration.yml comparator+window unit gate, then
# tools/ops/gold-parity-check.job.yaml exit 0 on a frozen prod catalog), exactly like the cron default.
# staging (values-staging) already flips this to "1" for the soak; prod flips only after the gate passes.
transform:
  iceberg:
    catalog: "rest"
  silverIncremental: "1"
  goldIncremental: "0"
  watermarkMaxSliceSeconds: "3600"
  watermarkLookbackSeconds: "600"
