{{- /*
The workflow-pod ServiceAccount every CronWorkflow runs as (workflowSpec.
serviceAccountName). Terraform creates the matching IRSA role (module
irsa_spark_jobs → trust on system:serviceaccount:argo:brain-jobs) but only the
IAM side — nothing else creates the K8s ServiceAccount, so without this
template every workflow pod fails admission with
'serviceaccount "brain-jobs" not found' (first prod run, 2026-07-11).
The per-env eks.amazonaws.com/role-arn annotation comes from values-*.yaml.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- /*
Argo Workflows ≥3.4 executor requirement: the wait container reports step
results via workflowtaskresults.argoproj.io USING THE WORKFLOW'S OWN SA.
Without this Role the main container succeeds but every node still ends
Error (exit 64) — observed on the first prod v4-silver run: Spark completed,
"cannot create resource workflowtaskresults" killed the status report.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.serviceAccount.name }}-executor
  labels:
    {{- include "brain.labels" . | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.serviceAccount.name }}-executor
  labels:
    {{- include "brain.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.serviceAccount.name }}-executor
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
