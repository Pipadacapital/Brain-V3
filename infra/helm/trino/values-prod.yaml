environment: prod

image:
  repository: trinodb/trino
  tag: "455"

coordinator:
  replicaCount: 1
  # AUD-OPS-006 revisit (Wave-3): coordinator+worker co-located on ONE Spot node
  # meant a single reclaim took the SOLE serving engine down entirely (~30-120s,
  # measured). Now that the Wave-3 cost levers land (EKS 1.33 −$360/mo, endpoint
  # trim −$95/mo), pin the coordinator to the `ondemand` pool instead — it
  # BIN-PACKS onto the EXISTING on-demand t4g.xlarge that Neo4j holds
  # (Neo4j 2cpu/4Gi + coordinator 1cpu/6Gi fit the ~3.9cpu/~14.5Gi allocatable),
  # so the expected marginal cost is ~$0; worst case Karpenter adds a second
  # on-demand node (~$35-60/mo, pool limit cpu:8). Workers stay on Spot — losing
  # a worker only re-runs in-flight queries; losing the coordinator loses the
  # discovery service + HTTP endpoint. cpu request stays 1 (go-live trim).
  nodeSelector:
    karpenter.sh/nodepool: ondemand
  # Guard the SOLE coordinator against Karpenter voluntarily draining its on-demand node for
  # consolidation — a coordinator eviction loses the discovery service + HTTP endpoint (full serving
  # outage), not just in-flight queries. On-demand → no Spot reclaim; this closes the voluntary-disruption
  # gap.
  podAnnotations:
    karpenter.sh/do-not-disrupt: "true"
  tolerations:
    - key: brain.platform/pool
      operator: Equal
      value: ondemand
      effect: NoSchedule
  resources:
    requests:
      cpu: "1"
      memory: 6Gi
    limits:
      cpu: "2"
      memory: 7Gi

workers:
  # 2, not 3 (2026-07-15 stability incident). The `trino` Karpenter nodepool caps at
  # cpu:8 (infra/helm/karpenter/values.yaml) = 2 × t4g.xlarge, and a 2-cpu worker +
  # coordinator/daemonsets fills one node → the pool fits at most 2 workers. With
  # replicaCount/maxReplicas=3, KEDA perpetually spawned an UNSCHEDULABLE 3rd worker
  # → continuous FailedScheduling + Karpenter "exceeds nodepool limit" reconcile churn,
  # which helped tip workers into TOO_MANY_REQUESTS_FAILED during the heavy compaction
  # sweep. Aligning to 2 is cost-neutral (the 3rd never ran) and REMOVES the churn.
  # If daily v4-maintenance later shows worker crashes under compaction, escalate by
  # either bumping the trino nodepool limits.cpu 8→12 (adds ~1 spot node, headroom for
  # a real 3rd worker) or enabling the pre-wired batchCluster FTE below.
  replicaCount: 2
  # AUD-PROD-006/-011: workers pin to the dedicated `trino` Karpenter pool (t4g.xlarge
  # Spot, infra/helm/karpenter/values.yaml) via Karpenter's automatic nodepool label —
  # without this, pool weights preferred the streaming pool for worker pods.
  nodeSelector:
    karpenter.sh/nodepool: trino
  # SERVING STABILITY (2026-07-16): stop Karpenter VOLUNTARILY draining a worker's node for
  # consolidation — observed live as TaintManagerEviction + karpenter.sh/disrupted, which evicts the
  # sole-per-node worker; during the reschedule+new-node gap every query that fans to that worker 500s
  # (EofException). Mirrors the v4-transform pods' guard. (Spot RECLAIM churn is separate — inherent to
  # the Spot trino pool; a worker off Spot / a warmer replica is the deeper, cost-bearing fix left to the
  # owner.) do-not-disrupt only blocks Karpenter's voluntary disruption, never a real Spot interruption.
  podAnnotations:
    karpenter.sh/do-not-disrupt: "true"
  resources:
    requests:
      cpu: "2"
      memory: 6Gi
    limits:
      cpu: "4"
      memory: 7Gi
  # KEDA worker autoscaling ON (AUD-PROD-007/-010): the operator is installed via
  # infra/argocd/envs/prod/keda.yaml (2.15.1) — the old "until KEDA is installed"
  # gate is satisfied. When enabled, the worker Deployment omits static replicas
  # (worker-deployment.yaml) so KEDA solely owns scaling; replicaCount above
  # becomes the rollback value for enabled:false. 1..3 per the ratified decision
  # (min 1, not the spec's scale-to-zero — the SOLE serving engine keeps one warm
  # worker so first queries never wait on a node claim); CPU trigger 70% (chart
  # default), 5m cooldown.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2    # 2026-07-15: was 3 — nodepool cpu:8 fits only 2 workers (see replicaCount note)

# ── BATCH cluster — Fault-Tolerant Execution (ADR-0002) ──────────────────────────────────────────
# OFF by default per the selective-rebuild ground rules: the interactive serving cluster above is
# UNCHANGED and stays the default, so ArgoCD auto-sync of this file renders ZERO batch objects and
# nothing regresses. Flip batchCluster.enabled=true (one line) to stand up the additive
# brain-prod-trino-batch cluster for compaction / RTBF / Iceberg-maintenance; everything below is
# pre-wired so enabling is the only change. Rollback = flip back / git revert (no serving impact).
batchCluster:
  enabled: false
  coordinator:
    # Batch coordinator rides the same dedicated Spot `trino` Karpenter pool as the workers — it is
    # NOT the serving path (the interactive coordinator, pinned to `ondemand`, is), so a Spot reclaim
    # only aborts an in-flight maintenance run, which FTE/retry re-drives.
    nodeSelector:
      karpenter.sh/nodepool: trino
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 7Gi
  workers:
    # Batch workers share the dedicated `trino` Spot pool (t4g.xlarge, infra/helm/karpenter). They
    # scale to zero between maintenance windows, so they only draw against the pool's 8-vCPU limit
    # during an actual run (interactive load is low in maintenance windows).
    nodeSelector:
      karpenter.sh/nodepool: trino
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 7Gi
    # KEDA scale-to-zero ON (ADR-0003): FTE makes worker absence recoverable, so min 0 is safe. The
    # batch cluster costs nothing between maintenance runs. Rollback value when disabled: replicaCount 0.
    autoscaling:
      enabled: true
      minReplicas: 0
      maxReplicas: 4
      cpuTargetUtilization: 60
      cooldownPeriod: 120
  query:
    maxMemory: "8GB"
    maxMemoryPerNode: "3GB"
  fte:
    retryPolicy: TASK
    exchange:
      # FTE spool root under the EXISTING Iceberg medallion (Bronze) bucket — reached by the SAME
      # brain-prod-trino pod IRSA role, ap-south-1, SSE-KMS (no new bucket, no static keys). A
      # dedicated `trino-exchange/` prefix keeps spool data out of the table namespaces; the bucket's
      # abort-MPU-7d + noncurrent-90d lifecycle already reaps stragglers. LIST — add buckets later
      # (S3-request-throttling mitigation) with no template change.
      baseDirectories:
        - "s3://brain-bronze-prod-380254378136/trino-exchange"
      encryptionEnabled: true

# Real AWS S3 Iceberg buckets reached via the pod IRSA role — no static keys, no MinIO endpoint.
iceberg:
  # The Iceberg REST catalog is the chart-fullname service in ns `iceberg-rest`
  # (NOT a plain `iceberg-rest` in ns `iceberg`). Wrong DNS = Trino can't read any
  # Iceberg mart → the sole serving engine 500s at go-live.
  restUri: "http://brain-prod-iceberg-rest.iceberg-rest.svc.cluster.local:8181"
  s3:
    # AUD-COST-008: MUST be ap-south-1 — every bucket/VPC/endpoint lives there; a SigV4
    # region mismatch 400s (AuthorizationHeaderMalformed) every S3 read through the sole
    # serving engine at go-live.
    region: ap-south-1
    endpoint: ""
    pathStyleAccess: false
  s3SecretName: ""

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-trino

# AUD-INFRA-030: scrape the sole serving engine (coordinator JMX exporter + PodMonitor,
# job "trino") — lights up TrinoServingDown / TrinoQueryFailureRateHigh in
# kube-prometheus-stack values-prod.
metrics:
  enabled: true
