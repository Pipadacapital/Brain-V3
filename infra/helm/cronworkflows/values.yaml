# Default values for the cronworkflows chart. Overridden by values-staging.yaml / values-prod.yaml.
#
# Each job is an Argo CronWorkflow that runs ONE container (the core or stream-worker image) with a
# job-entrypoint CLI command (doc 06 §"Argo jobs → Core"). The job enumerates active brands and runs
# the per-brand pipeline; it is idempotent, so a missed/retried run is safe.

# Default image (the core image — most jobs are core entrypoints). Per-job `image:` overrides this.
image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-core
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

# Stream-worker image (for jobs whose entrypoint ships in that deployable, e.g. revenue-finalization).
streamWorkerImage:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-stream-worker
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

# Secret (External Secrets ← AWS Secrets Manager): DATABASE_URL, BRAIN_APP_DATABASE_URL,
# ICEBERG/lakehouse credentials, etc. Empty in defaults (set per env).
envSecretName: ""

# IST — schedules below are written in Asia/Kolkata (the brands' operating timezone).
timezone: "Asia/Kolkata"

serviceAccount:
  name: brain-jobs   # IRSA role for AWS Secrets Manager access (annotated per env)

# NO global SERVICE_NAME: the app config schemas require their OWN literal
# (z.literal('stream-worker') / ('core')) and are self-satisfying via defaults
# when unset. Setting 'cronworkflows' here failed EVERY job's config parse the
# moment the tsx entrypoints made jobs actually load config (2026-07-12:
# "SERVICE_NAME: Invalid literal value, expected \"stream-worker\"").
env: []

defaults:
  concurrencyPolicy: Forbid        # never overlap a brand-enumeration run with itself
  startingDeadlineSeconds: 300     # skip (don't pile up) if the controller was down
  activeDeadlineSeconds: 1800      # 30 min hard cap per run
  backoffLimit: 2                  # retry a failed run twice
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Spark Bronze MAINTENANCE cron (templates/spark-bronze.yaml). ADR-0010: Bronze LANDING is the
# Kafka Connect Iceberg sink — the infra/helm/kafka-connect chart is the SOLE landing writer; the
# former bronze-landing CronWorkflow (bronze_landing.py, Spark-SS) was REMOVED 2026-07-05 with the
# whole Spark-SS landing path (rollback = git revert). What remains here is bronze-maintenance:
# small-file compaction + snapshot-expiry (7d; 14d durable collector lane, AUD-OPS-015) over the Bronze tables, including the
# Connect-written collector_events_connect / <lane>_raw_connect tables.
sparkBronze:
  # `enabled` gates the bronze-maintenance CronWorkflow; landing is the kafka-connect chart
  # (ADR-0010). Maintenance must run regardless of who lands Bronze, so it defaults ON.
  enabled: true
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb   # built from db/iceberg/duckdb/Dockerfile (carries the PyIceberg maintenance client)
    tag: ""            # B3: digest preferred; CI populates at deploy (fail-closed in the template)
    digest: ""
    pullPolicy: IfNotPresent
  maintenanceSchedule: "0 3 * * *"      # daily 03:00 IST — compaction + snapshot-expiry (Slice 7; 7d / 14d durable lane)
  activeDeadlineSeconds: 1800
  # ── Bronze compaction-time dedup (ADR-0015 D2b) ────────────────────────────────────────────────
  # bronze_dedup.py runs FIRST inside the bronze-maintenance CronWorkflow pod (dedup → optimize →
  # expire, one sequenced run): keep-latest on the (brand_id, event_id) lifted from the collector
  # lane's verbatim payload, COW rewrite (no MoR deletes). Steady state under the EOS transport is
  # a fast no-op; the memory valve refuses an oversized rewrite loudly (BRONZE_DEDUP_FORCE=1 for a
  # deliberate one-off backlog clear). Silver's admission MERGE remains the final backstop.
  dedup:
    enabled: true
  # ── Bronze HOT maintenance lane (ADR-0018 D3) ──────────────────────────────────────────────────
  # Bronze is written by Kafka-Connect (NOT the transform tick), fragmenting at ~5,760 files/day —
  # the daily bronze-maintenance cron above cannot keep pace. This lane mirrors the proven Silver
  # HOT lane (values-prod v4-maintenance silver-hot): every 2h it runs dedup → optimize → expire
  # scoped to the HOT month(s) ONLY (BRONZE_DEDUP_PARTITION_SCOPED=1 / MONTHS_BACK=1 +
  # BRONZE_TABLE=collector_events_connect on the optimize/expire), so each unit is a bounded
  # month-partition COW rewrite (well within the 8Gi pod, no whole-table OOM). concurrencyPolicy
  # Forbid — never overlaps itself. The daily bronze-maintenance cron stays the frozen-month sweep
  # (now a fast no-op on already-hot-deduped months). DEFAULT-OFF: the merge-time fix is the D1
  # month-scoped dedup that auto-heals the EXISTING daily cron (no whole-table OOM); this extra 2h
  # cadence is owner-enabled after review (set hot.enabled=true in values-prod/staging to activate).
  hot:
    enabled: false
    schedule: "0 */2 * * *"             # every 2h — keeps collector_events_connect deduped + compacted
    activeDeadlineSeconds: 1800         # 30 min — one hot-month dedup+compact+expiry is minutes
  # ── Raw-lane PII retention (ADR-0006 D4; AUD-IMPL-019/AUD-OPS-038) + ADR-0015 collector TTL ─────
  # bronze_raw_retention.py: row-TTL DELETE + snapshot expiry over the *_raw_connect lanes so raw
  # un-hashed PII/PCI never outlives the 7-day landing-buffer window. ADR-0015 D7 adds the
  # COLLECTOR lane on its own window: collector_events_connect is a 15-day REPLAY BUFFER, no
  # longer keep-forever — Silver (canonical, deduped) is the durable event layer past that
  # window. Silver/Gold row-retention stays OFF until GOLD_INCREMENTAL is validated (a Silver
  # trim before append-mode Gold would shrink recomputed history). The job's env defaults ARE
  # the D4 posture (RAW_RETENTION_HOURS=168, RAW_ROW_TTL=1); both windows are pinned explicitly
  # so they are auditable from values. Prod half of the D4 gate — the dev half runs on the daily
  # guard-file cadence in tools/dev/v4-refresh-loop.sh.
  rawRetention:
    enabled: true
    schedule: "40 3 * * *"              # daily 03:40 IST — after the 03:00 compaction/snapshot-expiry pass
    activeDeadlineSeconds: 1800
    env:
      - { name: RAW_RETENTION_HOURS, value: "168" }   # 7 days (D4); tighten per region/regime
      - { name: COLLECTOR_RETENTION_HOURS, value: "360" } # 15 days (ADR-0015 D7) — collector-lane replay buffer
  # Non-secret extra env for the maintenance run. Secrets (envSecretName)
  # MUST include ICEBERG_REST_URI/Glue + AWS_*. There is NO CHECKPOINT_LOCATION / STARTING_OFFSETS
  # anymore — those belonged to the removed Spark-SS landing; Kafka Connect keeps its offsets in the
  # Iceberg snapshots + its own topics.
  # AUD-OPS-015 (amended by ADR-0015 D7): the collector lane (collector_events_connect) keeps a
  # 14-day Iceberg time-travel window — now nested inside its 15-day row-TTL replay buffer (rows
  # older than 15d are deleted by bronze_raw_retention; Silver is the durable layer). Default 7d
  # snapshot window stays for everything else, incl. the PII *_raw_connect lanes whose short
  # window is a privacy contract. Pinned explicitly for auditability — see docs/runbooks/DR.md.
  env:
    - { name: DURABLE_SNAPSHOT_TTL_MS, value: "1209600000" } # 14d
    - { name: DURABLE_TABLES, value: "collector_events_connect" }
  # Workflow-pod placement (AUD-PROD-006). Empty by default (staging/kind unchanged);
  # values-prod pins the Spark cron pods to the batch pool.
  nodeSelector: {}
  tolerations: []
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "2", memory: 4Gi }
  # ── On-demand subject erasure (AUD-OPS-037; templates/bronze-erasure.yaml) ─────────────────────
  # WorkflowTemplate `bronze-raw-erasure` wrapping db/iceberg/duckdb/maintenance/erasure_raw_delete.py
  # (RTBF hard-delete of one subject's rows across the raw Bronze tables + the payload-path sweep of
  # collector_events_connect, run via the PyIceberg+DuckDB maintenance client the brain-duckdb image
  # carries). NOT a cron:
  # the stream-worker erasure orchestrator submits a Workflow from this template (workflowTemplateRef
  # via the Kubernetes API — the prod argo-workflows app is controller-only, no REST server) after the
  # subject DEK crypto-shred. Same image/secret/placement as the maintenance cron above.
  erasure:
    enabled: true
    # Per-run hard cap. The payload-path DELETEs full-scan collector_events_connect once per
    # predicate group — give it the same ceiling as the weekly medallion maintenance sweep.
    activeDeadlineSeconds: 3600
    # Completed/failed Workflow CRs are TTL'd (one-shot submits have no history limits): 7 days
    # keeps the audit/investigation trail without unbounded CR accumulation.
    ttlSecondsAfterCompletion: 604800
    # The in-cluster identity allowed to submit from the template (Role/RoleBinding in the
    # template file): the stream-worker deployable, which hosts the erasure orchestrator.
    submitter:
      serviceAccountName: stream-worker
      serviceAccountNamespace: stream-worker

# ── ADR-0016 D3 / WS2 seam: resident warm transform worker ─────────────────────────────────────
# When `transformWorker.enabled` is true, the resident Deployment (a warm DuckDB process looping the
# chained pipeline every TRANSFORM_TICK_MS) SUPERSEDES the v4-medallion CronWorkflow below, which is
# then suppressed (the template gates on `and sparkV4.enabled (not transformWorker.enabled)`). This
# keeps the medallion SINGLE-WRITER across the WS2 cutover — the cron and the resident worker never
# both write. Default OFF here (the interim CronWorkflow owns the medallion); WS2 ships the Deployment
# chart + flips this true. The Deployment itself is out of scope for P2.1.
transformWorker:
  enabled: false
  # ADR-0016 P2.2 — the resident worker's env contract (db/iceberg/duckdb/run_all.py resident). WS3
  # wires these into the Deployment's container env; they are documented here as the single source of
  # the knob defaults so the code (run_all.py) and the chart never drift.
  #   tickMs        micro-batch cadence — run the chained pipeline once per this interval (worker default 45s)
  #   healthPort    stdlib /healthz liveness port the k8s livenessProbe hits (worker default 8092)
  #   lockKey       pg_try_advisory_lock key for the single-writer gate — 910_005, mirrors the 910_00x
  #                 namespace of apps/stream-worker/src/infrastructure/pg/LeaderLock.ts (do NOT collide)
  tickMs: 45000
  healthPort: 8092
  lockKey: 910005

# Brain V4 DuckDB medallion transform (templates/v4-transform.yaml). DuckDB is the transform compute
# now (Spark removed — Spark→DuckDB cutover); dbt/StarRocks were already gone. ADR-0016 P2.1 chains the
# whole medallion into ONE CronWorkflow — v4-medallion — that runs keystone → silver ×2 → identity →
# silver_identity_map → gold → serving-cache-bust BACK-TO-BACK (an in-workflow Argo `steps` sequence,
# images differ so a single container can't carry both) with NO inter-stage cron wait, mirroring
# tools/dev/duckdb-refresh.sh EXACTLY. Was three staggered crons (v4-silver / v4-identity / v4-gold);
# that scheduling stack is gone. The serving brain_serving.mv_* views (duckdb-serving) resolve straight
# over the Iceberg Gold/Silver marts (thin projections) — no separate REFRESH leg. The journey-stitch
# node jobs (.Values.jobs) still sequence around it by schedule. ENABLED: the chained cron runs the
# medallion refresh. Requires the CI-built+digest-pinned brain-duckdb image (B3 fail-closed) + a cluster.
sparkV4:
  enabled: true
  # Wave 2a (2026-07-21): hot-table maintenance folded into the transform tick. A comma-separated list of
  # hot tables run_all.py compacts + expires IN-PROCESS at the end of the gold pass (best-effort, never
  # fails the run). SCALAR (not a list) → immune to Argo's list-index element-wise merge. Default EMPTY =
  # the in-tick hook is a NO-OP (base/staging behaviour unchanged); values-prod turns it on. Bare names
  # resolve against the Silver namespace; `ns:table` (e.g. brain_gold:gold_customer_360) qualifies.
  tickMaintTables: ""
  # ADR-0016 P2: each tier runs as ONE process (attach the Iceberg catalog once, run all 45 jobs on a
  # single connection via db/iceberg/duckdb/run_all.py) — the retired 90-spawn bash loop paid ~85s FIXED
  # per-process overhead per job (~130 min per run). This is now the ONLY transform path (the singleProcess
  # dual-path flag was removed); the resident warm worker (transformWorker) loops the SAME runner.
  # ADR-0010: the v4-silver/v4-gold crons read the Kafka Connect Bronze tables
  # (collector_events_connect + <lane>_raw_connect) — fixed in the jobs, no BRONZE_SOURCE
  # switch (rollback = git revert).
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb   # carries db/iceberg/duckdb (the transform marts)
    tag: ""            # B3: digest preferred; CI populates at deploy (fail-closed in the template)
    digest: ""
    pullPolicy: IfNotPresent
  # ADR-0016 P2.1 — ONE CHAINED SCHEDULE. Was three staggered crons (silverSchedule / identitySchedule /
  # goldSchedule); collapsed into a SINGLE v4-medallion CronWorkflow that walks keystone → silver ×2 →
  # identity → map → gold → cache-bust back-to-back with NO inter-stage cron wait (kills the ~15-min
  # scheduling stack). Every 5 min, incremental — ONLY safe because SILVER_INCREMENTAL is ON below (each
  # run reads only the [watermark, now) window, not the full ~75-min Bronze re-scan). concurrencyPolicy:
  # Forbid self-throttles: a long run skips the next tick (never overlaps a second medallion writer), so
  # freshness degrades gracefully to whatever the whole chain can sustain warm.
  medallionSchedule: "*/5 * * * *"   # every 5 min — the CORE chain (keystone → silver ×2 → gold → cache-bust)
  # GitOps-driven freeze: true → suspends v4-medallion + v4-medallion-heavy + v4-identity (durable, ArgoCD
  # applies it — a manual `kubectl patch suspend` is reverted by selfHeal). Set true in an overlay for a
  # maintenance op needing a frozen Silver snapshot (the gold-incremental parity harness), then back to false.
  transformSuspend: false
  # ── Tiered gold cadence (P1 medallion-slowness fix) ──────────────────────────────────────────────
  # heavyLane.enabled splits the always-full-scan heavy/money gold marts (revenue_ledger ~21min +
  # cac + contribution_margin — all always-full-scan money marts) OFF the */5 fast
  # lane and onto their OWN slower CronWorkflow (v4-medallion-heavy). WHY: they can't be made incremental
  # (delete_orphans full-fold + two independent Silver source clocks — money-safety), don't need */5
  # freshness, and running them every tick dragged the whole run to ~99min > the 2.5h deadline on variance
  # → Failed runs + ~100min effective freshness. Split ON: fast lane finishes far under deadline; recognized
  # -revenue freshness = the heavy schedule (*/20). Split OFF: run_all defaults GOLD_LANE=all → the single
  # v4-medallion runs every gold mart (today's behaviour) — a clean one-flag revert.
  heavyLane:
    enabled: true
    schedule: "*/20 * * * *"          # every 20 min — recognized-revenue / cm2 freshness (money marts)
    activeDeadlineSeconds: 5400        # 90 min — heavy pass is ~34min; generous margin for variance
  # ── CORE↔IDENTITY re-split (2026-07-19 freshness incident; templates/v4-identity.yaml) ──────────
  # The SLOW identity(resolve) → map-export pair used to be two steps INSIDE the v4-medallion chain
  # (ADR-0016 D2). A data-heavy brand's identity watermark ran ~6 DAYS behind (each 6h slice ~2h), so
  # with Forbid the whole */5 medallion tick was skipped underneath → core revenue/orders/spend barely
  # advanced → fresh Bronze never reached serving. Identity is now its OWN v4-identity CronWorkflow on
  # its OWN */5 Forbid schedule: a slow identity run skips its OWN tick but NEVER blocks core freshness.
  # gold-marts reads the LAST-written silver_identity_map (persistent Iceberg — slightly stale, converges).
  # Gated on `identity.enabled` so it can be toggled independently; suppressed with v4-medallion when the
  # resident transformWorker is on (that worker loops identity in-process).
  identity:
    enabled: true
  # Same */5 cadence as the core medallion, but on an INDEPENDENT Forbid schedule (the two crons never
  # block each other). The identity lane's per-run forward slice is capped to 1h (SILVER_IDENTITY_MAX_SLICE_MS
  # in the template) so each slice finishes fast and the backlog drains over more, shorter ticks.
  identitySchedule: "*/5 * * * *"    # every 5 min — the identity lane (identity-resolve → map-export)
  # activeDeadlineSeconds stays HIGH (9000s / 2.5h) as a generous ceiling. With WATERMARK_MAX_SLICE_SECONDS
  # set (below), the first run no longer does a single unbounded full-scan bootstrap — it walks the backlog
  # in bounded [oldest, oldest+slice] chunks over successive ticks, each seeding the watermark forward — so
  # a large accumulated Bronze backlog (e.g. after a flush/outage) can never OOM the keystone in one pass.
  # Each sliced run finishes in minutes; Forbid skips ticks until each completes. Leave this ceiling as-is.
  activeDeadlineSeconds: 9000
  # Non-secret config. Secrets (ICEBERG_REST_URI, AWS_*, NEO4J_*) come from envSecretName.
  # SILVER_INCREMENTAL=1 activates the flag-gated incremental reads shipped in #193/#194 (default OFF).
  # The first run bootstrap-walks from the oldest row in WATERMARK_MAX_SLICE_SECONDS-wide chunks, then
  # windows [watermark, min(now, watermark+slice)). WATERMARK_LOOKBACK_SECONDS re-scans a trailing margin
  # (idempotent MERGE dedups it) so a slightly out-of-order Kafka arrival is never skipped.
  env:
    - { name: ICEBERG_CATALOG, value: "rest" }
    - { name: SILVER_INCREMENTAL, value: "1" }
    # GOLD_INCREMENTAL (ADR-0016 P1.1) gates the Gold tier's watermark-windowed reads INDEPENDENTLY of
    # SILVER_INCREMENTAL. The env is shared by v4-silver and v4-gold, but ONLY the Gold marts read it
    # (each passes enabled=GOLD_INCREMENTAL to incremental_window; Silver jobs use the SILVER_INCREMENTAL
    # default and ignore this var). Default "0" (full-scan, byte-identical to the pre-incremental path).
    # GO DEFAULT-ON ("1") IN values-prod ONLY AFTER db/iceberg/duckdb/parity_check.py's Gold
    # incremental-vs-full harness passes in CI/staging (money byte-exact, no orphan drift). The
    # full-recompute money marts stay full-scan regardless: gold_revenue_ledger / gold_cac /
    # gold_contribution_margin do NOT pass enabled=GOLD_INCREMENTAL (delete_orphans / multi-source
    # money-safety), so flipping this flag never touches their orphan-shed path. FULL_REFRESH=1 is the
    # recovery escape (forces a full pass on any tier).
    - { name: GOLD_INCREMENTAL, value: "0" }
    - { name: WATERMARK_LOOKBACK_SECONDS, value: "600" }
    # WATERMARK_MAX_SLICE_SECONDS (ADR-0016) — forward-slice cap: one run advances the watermark at most
    # this many seconds, so a watermark-less first run (or a watermark left far behind after a flush/outage)
    # walks the backlog in bounded chunks instead of one full-scan fold that OOMs the DuckDB keystone. 1h @
    # the observed collector rate is a safe per-slice row count well under the fold's memory ceiling; steady
    # state (a batch smaller than the slice) is a no-op, so this is invisible once caught up. 0 disables it
    # (reverts to the unbounded full-scan bootstrap). Converges to now over successive */5 ticks.
    - { name: WATERMARK_MAX_SLICE_SECONDS, value: "3600" }
  # Workflow-pod placement (AUD-PROD-006) — shared by v4-medallion / v4-maintenance. Empty by
  # default; values-prod pins to the streaming pool (the batch pool is gone).
  nodeSelector: {}
  tolerations: []
  # Annotations stamped on the v4-medallion run pods. Empty by default; values-prod sets
  # karpenter.sh/do-not-disrupt to stop Karpenter voluntarily draining the node mid-run.
  podAnnotations: {}
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "2", memory: 4Gi }
  # ── Silver/Gold Iceberg maintenance (AUD-COST-013; templates/v4-maintenance.yaml) ──────────────
  # db/iceberg/duckdb/maintenance/medallion_maintenance.py (PyIceberg + DuckDB): optimize + expire_snapshots
  # (7d) + a GUARDED remove_orphan_files pass — the hourly-rewritten marts otherwise grow S3 unbounded,
  # and no tier swept orphans from failed/aborted writes. ORPHAN_OLDER_THAN_DAYS=7 (job clamps >=3):
  # orphans that old can never belong to an in-flight commit, so overlapping the hourly refresh is safe.
  # With S3_ENDPOINT unset (real S3) the job uses the default AWS credential chain (IRSA WebIdentity,
  # zero static keys), so ORPHAN_FILES=1 is safe in prod. ORPHAN_FILES=0 remains the escape hatch.
  maintenance:
    # DAILY, not weekly (2026-07-15 incident). silver_collector_event is MERGE-rewritten HOURLY;
    # weekly compaction let it fragment to ~14k tiny files by mid-week → every DuckDB silver scan
    # paid thousands of S3 GETs (~390s/job) → v4-silver/gold blew their deadline. Daily compaction
    # keeps the hot keystone consolidated so per-job read cost stays flat. (Requires the medallion
    # write/delete grant — s3-iceberg AllowMedallionMaintenanceWrite — or optimize 403s.)
    enabled: true
    # REALTIME PHASE 1: daily → every 2h. At */5 Silver+Gold cadence the marts commit ~12× more often,
    # so daily compaction would let the hot keystone re-fragment mid-day (the 2026-07-15 incident). Every
    # 2h keeps optimize()/expire_snapshots ahead of the higher commit rate on BOTH namespaces. Forbid
    # serializes; the guarded orphan sweep (>7d) never touches an in-flight commit.
    schedule: "0 */2 * * *"         # every 2h — compaction/snapshot-expiry keeps pace with */5 transforms
    activeDeadlineSeconds: 3600     # full two-namespace sweep, table-by-table (failures logged, exit≠0)
    env:
      - { name: ORPHAN_OLDER_THAN_DAYS, value: "7" }
    # LANES (2026-07-17): the maintenance cron renders once per lane so Gold/Silver can run on
    # independent cadences and neither starves the other (see templates/v4-maintenance.yaml). This
    # default MUST stay EMPTY: Argo CD/Helm merge overlapping list indices element-wise (base-wins), so
    # a non-empty default swallowed prod's Gold lane at index 0. Empty → the template renders the single
    # default lane (name:"" → both namespaces, Gold-first, orphan on); prod overrides `lanes` verbatim.
    lanes: []

# The scheduled jobs. `image` omitted → the default (core) image.
#
# ── THE ATTRIBUTION CHAIN (post-medallion) — ordered by staggered schedule + idempotency (NOT an
#    Argo DAG; matches this chart's one-container-per-CronWorkflow convention). Each step is
#    idempotent, so the time gaps sequence them and a missed/retried run is safe (Forbid +
#    startingDeadline). MEDALLION REALIGNMENT (Brain V4): there is NO PG `revenue-finalization` cron and
#    NO PG provisional ledger, and dbt is GONE — recognition (incl. prepaid finalization after horizon +
#    COD delivery/RTO) and the attribution gold mart are now Spark-on-Iceberg builds (the v4-silver /
#    v4-gold CronWorkflows in templates/spark-v4.yaml). payment_method drives the COD-vs-prepaid
#    recognition branch entirely inside the Spark Silver path (Bronze → silver_order_state →
#    gold_revenue_ledger), so the obsolete "persist payment_method on provisional" concern no longer
#    exists. The live, scheduled chain interleaves these node jobs with the Spark crons:
#      :02  identity-export                Neo4j identity graph → silver_identity_link so the Silver
#                                          order spine resolves order brain_id. Runs BEFORE v4-silver.
#      :05  v4-silver (Spark)              Bronze → silver_order_state + the rest of Silver.
#      :15  journey-stitch-from-identity   identity links → connector_journey_stitch_map (the stitch)
#      :25  v4-gold (Spark)                gold_revenue_ledger (recognition) → gold_attribution_credit →
#                                          gold_marketing_attribution + customer/gap/exec marts.
#      :30  attribution-reconcile          credit recognized orders to journeys (ALL 5 models incl.
#                                          data_driven) + clawbacks.
jobs:
  - name: recommendation-detectors
    # REALTIME PHASE 1: daily → every 15 min. Recommendations now refresh off the ~5-min-fresh Gold marts
    # instead of once each morning. (Phase 2 moves the detector logic to the request-time serving path for
    # true per-request freshness; this batch cadence is the interim.) Idempotent + Forbid → safe overlap.
    schedule: "*/15 * * * *"       # every 15 min — recompute recommendations off fresh Gold (was daily 06:00)
    command: ["pnpm", "exec", "tsx", "src/jobs/recommendation-detectors.ts"]
  - name: identity-export
    schedule: "2 * * * *"          # hourly at :02 — ATTRIBUTION CHAIN step -1: materialize the identity graph
    command: ["pnpm", "exec", "tsx", "src/jobs/identity-export/run.ts"]
    useStreamWorkerImage: true
  - name: journey-stitch-export
    schedule: "3 * * * *"          # hourly at :03 — materialize the PG cart-stitch → silver_journey_stitch
    command: ["pnpm", "exec", "tsx", "src/jobs/journey-stitch-export/run.ts"]
    useStreamWorkerImage: true
    # MEDALLION REALIGNMENT (Epic 4): connectors.connector_journey_stitch_map (PG capture) →
    # silver_journey_stitch (lakehouse Silver), so silver_touchpoint reads the lakehouse, not a
    # PG JDBC shim. Needs BRAIN_APP_DATABASE_URL + the lakehouse (Iceberg) connection env.
    # MEDALLION REALIGNMENT (Epic 3 / ADR-0004): Neo4j is the identity SoR. This materializes the active
    # hash→brain_id edges from Neo4j → silver_identity_link (lakehouse Silver) so the Spark v4-silver
    # build (:05) resolves order brain_id + the customer marts populate. Runs BEFORE v4-silver. Needs
    # NEO4J_* + the lakehouse connection env. (The one-time PG→Neo4j identity seed has been executed and
    # removed — PG identity is dropped, so there is nothing left to backfill.)
  # MEDALLION REALIGNMENT (Brain V4): recognition (Bronze → silver_order_state → gold_revenue_ledger,
  # incl. prepaid finalization after horizon + COD delivery/RTO) is now the Spark v4-silver/v4-gold
  # CronWorkflows (templates/spark-v4.yaml) at :05/:25 — there is no dbt `recognition-refresh` cron and
  # no PG `revenue-finalization` writer. The Gold ledger is what billing + attribution + dashboards
  # read, served by the brain_serving.mv_* duckdb-serving views over Iceberg.
  - name: journey-stitch-from-identity
    schedule: "15 * * * *"         # hourly at :15 — ATTRIBUTION CHAIN step 2: derive the stitch map
    command: ["pnpm", "exec", "tsx", "src/jobs/journey-stitch-from-identity.ts"]
    useStreamWorkerImage: true
    # Deterministic identity-graph stitch (GAP-1): silver_touchpoint anon → identity_link(anon_id)→
    # brain_id ∩ realized_revenue_ledger(order→brain_id), UNAMBIGUOUS-ONLY (skips multi-anon customers,
    # never guesses). Salt via SaltProvider→resolveSaltHex (prod KMS). Needs the lakehouse (Iceberg)
    # connection env + BRAIN_APP_DATABASE_URL (envSecretName). Without it, repulled orders never stitch → attribution
    # has no journeys to credit.
  - name: attribution-reconcile
    schedule: "30 * * * *"         # hourly at :30 — ATTRIBUTION CHAIN step 3: credit + clawback
    command: ["pnpm", "exec", "tsx", "src/jobs/attribution-reconcile.ts"]
    # Per brand: the 4 per-journey models (reconcileAttribution) + the GLOBAL data-driven Markov model
    # (reconcileDataDrivenAttribution). Credit basis = finalization ∪ cod_delivery_confirmed (COD-inclusive).
    # MEDALLION REALIGNMENT (Brain V4): the attribution serving marts (gold_marketing_attribution /
    # gold_attribution_paths) are materialized by the Spark v4-gold CronWorkflow (templates/spark-v4.yaml,
    # :25), not a dbt `attribution-gold-refresh` cron — Spark is the sole compute, dbt is gone.
  - name: meta-token-refresh
    schedule: "0 3 * * *"          # daily 03:00 — proactively re-exchange Meta long-lived tokens
    command: ["pnpm", "exec", "tsx", "src/jobs/meta-token-refresh/run.ts"]
    useStreamWorkerImage: true
    # Re-exchanges (fb_exchange_token) any connected Meta connector whose token is older than the
    # threshold, BEFORE the ~60-day expiry — closes the silent spend-stale gap (feat-meta-token-refresh).
    # Needs META_APP_ID / META_APP_SECRET in the pod env (via the stream-worker secret); absent → the
    # job records an app_creds_missing error and no-ops (dev-safe).
  - name: shopify-token-refresh
    schedule: "30 */6 * * *"       # every 6h — client-credentials tokens expire in 24h (see below)
    command: ["pnpm", "exec", "tsx", "src/jobs/shopify-token-refresh/run.ts"]
    useStreamWorkerImage: true
    # Two token classes, one pass:
    #  - GENERIC PER-BRAND CONNECT (custom-app client-credentials grant, 2026-07): tokens expire in
    #    24 HOURS with no refresh token — the job RE-EXCHANGES them on every run using the brand's
    #    stored app creds. A daily schedule raced the 24h expiry; every-6h keeps tokens ≤6h old.
    #  - Legacy offline tokens (expiry mandate 2026-04-01 → 1y; 2027-01-01 → ALL): age-threshold
    #    exchange as before (skips fresh tokens — idempotent).
    # Write-back via ISecretsManager.putSecretValue — secret_ref/ARN unchanged (NN-2).
  - name: phone-guard-reeval
    schedule: "50 * * * *"         # hourly at :50 — re-evaluate expired phone-guard suppression windows
    command: ["pnpm", "exec", "tsx", "src/jobs/phone-guard-reeval.ts"]
    useStreamWorkerImage: true
    # Windowed re-eval of the phone-guard SharedUtility state (Neo4j identity SoR + PG brand config):
    # un-suppress a phone hash once its window slides below the per-brand distinct-brain_id threshold,
    # else extend. Without it, a burst-suppressed (kiosk/COD) phone stays send-ineligible forever.
    # Needs NEO4J_* + BRAIN_APP_DATABASE_URL. Idempotent; Forbid + startingDeadline make retries safe.
  - name: audit-checkpoint
    schedule: "15 * * * *"         # hourly at :15 — WORM-anchor the audit hash-chain head to S3 (R-19)
    command: ["pnpm", "exec", "tsx", "src/jobs/audit-checkpoint.ts"]
    # Activation needs AUDIT_CHECKPOINT_BUCKET (= terraform output s3-audit.audit_bucket_name) +
    # AWS_REGION in the pod env (via core-env secret). The brain-jobs IRSA role already grants
    # Put/Get/List on checkpoints/* (s3-audit). Unset → the job safely no-ops (dev).
  - name: partition-maintenance
    schedule: "30 2 * * *"         # daily 02:30 IST — BEFORE any month rolls over (C4 audit finding)
    command: ["pnpm", "exec", "tsx", "src/jobs/partition-maintenance.ts"]
    useStreamWorkerImage: true
    env:
      # CREATE-AHEAD horizon. >=3 so writes NEVER fall into *_pdefault even if the controller is
      # down for a few days near a month boundary. Without this job scheduled, from Oct 2026 every
      # partitioned write would land in the *_pdefault catch-all (C4 CRITICAL).
      - { name: PARTITION_AHEAD_MONTHS, value: "3" }
      # DROP-OLD horizon (months). Drops partitions older than this; the catalog routine NEVER drops
      # a DEFAULT. 36 months keeps 3y of partitioned data hot — tune per table-class retention.
      - { name: PARTITION_RETENTION_MONTHS, value: "36" }
    # Runs the SECURITY-DEFINER public.maintain_time_partitions(ahead, retention) (migration 0080)
    # as brain_app. Idempotent (CREATE IF NOT EXISTS / guarded DROP) — Forbid + startingDeadline make
    # a missed/retried run safe. ALERT: if any *_pdefault has rows, partition creation has been
    # lagging — page on a non-zero row count (see infra/helm/cronworkflows/README.md → C4 alert).
  - name: semantic-preagg-refresh
    schedule: "40 * * * *"         # hourly at :40 — the entity views read Gold marts the */5 v4-gold keeps fresh
    useDuckdbImage: true           # ships in the brain-duckdb image (db/iceberg/duckdb/serving_preagg_refresh.py)
    command: ["python", "/opt/brain/duckdb/serving_preagg_refresh.py"]
    env:
      # The compiler-emitted pre-agg SQL + the ported serving views hardcode the `iceberg` catalog
      # handle (the one duckdb-serving attaches as). The job also pins this internally — set here so
      # the posture is auditable from values (the v4 transform crons attach as `rest`).
      - { name: ICEBERG_CATALOG, value: "iceberg" }
    # The aggregation runs IN-POD now (the retired TS job pushed the CTAS compute to the serving
    # engine) — give it the transform tier's headroom, not the 1Gi node-job default.
    resources:
      requests: { cpu: "1", memory: 2Gi }
      limits: { cpu: "2", memory: 4Gi }
    # AUD-SL-10: MATERIALIZES the semantic-layer pre-aggs. The @brain/semantic-metrics compiler
    # emits an atomic DuckDB rebuild per interactive metric×grain (§1.11.1) into
    # db/iceberg/duckdb/serving_preaggs/*.duckdb.sql (snapshot-pinned, carried by this image); the
    # compiled FAST views read iceberg.brain_serving.preagg_*. Each rebuild is CREATE TABLE IF NOT
    # EXISTS + ONE DELETE+INSERT TRANSACTION — a single Iceberg replace commit, so readers see old
    # rows until it commits (DuckDB-Iceberg has no CREATE OR REPLACE TABLE over a REST catalog).
    # The job first applies the semantic entity views (db/iceberg/duckdb/views/semantic_*.sql) into
    # a local brain_serving schema, continue-on-error. Cross-brand batch build: brand_id is a
    # GROUPING KEY here; serving reads only ever go through the compiled ${BRAND_PREDICATE}-guarded
    # mv_metric_* views. Idempotent (re-run = replace again); exits non-zero if ANY table failed so
    # a partial failure surfaces. Needs ICEBERG_REST_URI + AWS_* in the pod env (core-env secret).
