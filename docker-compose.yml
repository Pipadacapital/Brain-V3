# Local dev — profiles (blueprint §4.1/§4.2/§4.3 profile model).
# core      = the default everyday stack: control plane + ingest + serving + base observability.
#             Members: kafka, postgres (+pgbouncer), neo4j, redis, minio, iceberg-rest, trino,
#             prometheus, grafana, localstack, apicurio + the kafka/minio/iceberg/jmx init jobs.
# full-obs  = trace/log pipeline layered on core: tempo, loki, otel-collector.
# debug     = deep Kafka introspection layered on core: jmx-exporter(-init), kafka-exporter.
# ai        = the LiteLLM model gateway (opt-in; keeps the base stack lean).
#
# Everyday:        docker compose --profile core up -d
# With tracing:    docker compose --profile core --profile full-obs up -d
# With AI gateway: docker compose --profile core --profile ai up -d
# Kafka debug:     docker compose --profile core --profile debug up -d
#
# MIGRATION NOTE (from the old core/ingest/observe/lakehouse model):
#   • ingest (kafka+apicurio+inits) was FOLDED INTO core — the event path is now part of the
#     default stack, so `--profile core` alone brings up the broker + schema registry.
#   • lakehouse (the spark-bronze-sink / spark-bronze-raw-sink containers) was REMOVED — the
#     combined Bronze sink now runs on the HOST (see db/iceberg/spark), not as a compose service.
#   • observe was SPLIT: prometheus+grafana → core (base metrics always on); tempo+loki+otel →
#     full-obs; the jmx/kafka exporters → debug.
#   • litellm moved core → ai (opt-in).
#   Unknown --profile names are ignored by compose, so a legacy `--profile core --profile ingest
#   --profile lakehouse` invocation still brings up the full core stack (ingest/lakehouse = no-ops).
#
# Iceberg REST catalog is the local equivalent of AWS Glue for Bronze table metadata.
# MinIO is the local S3 equivalent; the stream-worker, seed, and testcontainer harness all need a
# writable object store, and Trino serving resolves its warehouse through it — so both are in core.

services:
  # ────────────────────────────────────────────────────────────────────────────
  # CORE profile — control plane + serving
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    profiles: ["core"]
    mem_limit: 512m         # blueprint §4.2; budget doc lumps PG in the "small, unbounded" group → applied as-is
    oom_score_adj: -900     # operational SoR — kernel kills this LAST under VM pressure
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain
    ports: ["5432:5432"]
    # Provision the brain_app LOGIN role on first init of a fresh volume (before migrations).
    # Closes the cold-start gap where a wiped volume leaves brain_app unable to authenticate.
    # See db/init/00_provision_brain_app_role.sql. Local substrate only; no effect on real prod.
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PgBouncer (P1 pre-scale) — TRANSACTION-pooling connection multiplexer in FRONT OF the CORE app's
  # request path. Core opens a connection per concurrent request; at 1000 brands that exhausts
  # Postgres's max_connections. PgBouncer multiplexes thousands of client connections onto a small
  # server pool. Core's DB access is all short, SET-LOCAL-scoped transactions (withBrandTxn /
  # beginRlsTxn) → transaction pooling is safe. The STREAM-WORKER must NOT use this: its periodic
  # loops hold SESSION-level advisory locks (the leader lock) which transaction pooling breaks — it
  # connects to Postgres directly. Auth via auth_query against pg_shadow ($$1 escapes compose subst).
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    profiles: ["core"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: brain
      DB_PASSWORD: brain
      DB_NAME: brain
      AUTH_TYPE: scram-sha-256
      AUTH_QUERY: "SELECT usename, passwd FROM pg_shadow WHERE usename=$$1"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "2"
      ADMIN_USERS: brain
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    ports: ["6432:5432"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U brain -d pgbouncer || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Neo4j — the customer IDENTITY GRAPH store (re-platform Phase D). Nodes: Customer{brain_id} +
  # Identifier{type,hash}; edges link hashed email/phone/device/customer-id to a Customer, and
  # merges fold two Customers into one brain_id. Per-brand isolation = brand_id on every node + a
  # brand-scoped key. The async-off-Bronze identity writer (no synchronous edge gate) writes here.
  neo4j:
    image: neo4j:5.21-community
    profiles: ["core"]
    # CONFLICT REFUSED: blueprint §4.2 says 512m, but that is the JVM HEAP alone — a 512m hard
    # mem_limit would OOM-kill neo4j on boot. Kept the budget-verified 1500m (heap 512m + pagecache
    # 256m + JVM overhead — docs/ops/local-memory-budget.md). See structured notes.
    mem_limit: 1500m
    oom_score_adj: -500   # identity graph store — protected, but below PG/Kafka/Trino
    environment:
      NEO4J_AUTH: neo4j/brain_neo4j
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports: ["7474:7474", "7687:7687"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    profiles: ["core"]
    mem_limit: 256m         # blueprint §4.2 (cache; rebuildable)
    oom_score_adj: -300     # serving-critical cache, but rebuildable → killed before the SoRs
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # core: the Iceberg warehouse S3 backend for the Trino serving engine + bronze/audit S3 for the
    # app. Previously profile-less ("always-on"); now an explicit core member (blueprint §4.1) — the
    # everyday `--profile core` invocation brings it (and Trino's warehouse) up.
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    profiles: ["core"]
    command: server /data --console-address ":9001"
    # CONFLICT REFUSED: blueprint §4.2 says 256m, but minio runs with GOMEMLIMIT=4500MiB and serves
    # the whole Iceberg warehouse — a 256m hard limit would OOM-kill it instantly. Kept the
    # budget-verified 5g (docs/ops/local-memory-budget.md). See structured notes.
    mem_limit: 5g
    oom_score_adj: -500     # object store / warehouse backend — protected
    environment:
      MINIO_ROOT_USER: brain
      MINIO_ROOT_PASSWORD: brainbrain
      GOMEMLIMIT: "4500MiB"   # soft Go heap ceiling under the 5g hard cap → GC before OOM-kill
    ports: ["9000:9000", "9001:9001"]
    # NOTE: the minio image ships no curl/wget; it does include bash. Use bash's
    # /dev/tcp to probe the API port (a port-open check is sufficient for local dev).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # MinIO bucket + prefix bootstrap (runs once; idempotent). DEFAULT (always-on)
  # alongside minio so the Trino serving warehouse buckets exist without a profile.
  minio-init:
    image: minio/mc:latest
    profiles: ["core"]   # bootstrap for minio (core); runs whenever the warehouse comes up
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 brain brainbrain &&
        mc mb --ignore-existing local/brain-bronze &&
        mc mb --ignore-existing local/brain-audit &&
        echo 'MinIO buckets ready: brain-bronze brain-audit'
      "
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────────────────────────
  # litellm — DISABLED (commented out) 2026-07-02: the AI/NLQ features (Ask-Brain, MCP) that use this
  # model gateway are not active yet, so we don't run the container. The app-side seam
  # (@brain/ai-gateway-client → LITELLM_BASE_URL) is UNCHANGED — re-enable by uncommenting this whole
  # block (it stays in the opt-in `ai` profile, started via `--profile ai`) when the AI features go live.
  # ────────────────────────────────────────────────────────────────────────────────────────────────
  # litellm:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   profiles: ["ai"]   # opt-in model gateway (blueprint §4.1) — `--profile ai`; keeps the base stack lean
  #   ports: ["4000:4000"]
  #   # Mount the gateway config (per-tenant virtual_key budgets + model aliases + routing policy).
  #   # Dev-authorable: edit infra/litellm.config.yaml and restart this container — no image rebuild.
  #   # Production: the same file is rendered from Helm values and mounted via a ConfigMap volume.
  #   volumes:
  #     - ./infra/litellm.config.yaml:/app/config.yaml:ro
  #   command: ["--config", "/app/config.yaml", "--port", "4000"]
  #   environment:
  #     # Provider API keys — set in .env.local-prod / .env.production (never committed).
  #     ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     # Gateway master key — gates the admin UI + virtual-key provisioning API.
  #     LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-brain-dev-master}
  #     # OTel trace export (ai-observability-tracing; Tempo at :4317 in the observe profile).
  #     OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
  #   healthcheck:
  #     # The litellm image ships no `curl`, and /health requires the master key (401). Use the
  #     # bundled python against the unauthenticated lightweight liveliness probe instead.
  #     test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  localstack:
    image: localstack/localstack:3.4
    profiles: ["core"]
    mem_limit: 512m         # blueprint §4.2 (dev AWS substrate)
    oom_score_adj: 200      # ephemeral dev substrate — killed before stateful services
    environment:
      SERVICES: "s3,secretsmanager,kms,ses,events"
      # NOTE: LocalStack *community* does NOT persist Secrets Manager / KMS across restarts
      # (PERSISTENCE is Pro-only and silently ignored here — verified). So a Docker restart
      # wipes all secrets + connector OAuth tokens. Durability is instead handled by mirroring
      # connector tokens into PG `dev_secret` (persistent) via `pnpm dev:secrets-snapshot`;
      # `pnpm bootstrap` restores dev_secret → Secrets Manager on every run. See that script.
    ports: ["4566:4566"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ────────────────────────────────────────────────────────────────────────────
  # Apache Kafka (KRaft) — the event backbone, now part of the CORE profile.
  # ────────────────────────────────────────────────────────────────────────────
  # Apache Kafka in KRaft mode (single combined controller+broker, no ZooKeeper).
  # RENAMED redpanda → kafka (blueprint §4.3): the service key, its DNS name, and every in-compose
  # reference (depends_on, `network_mode: service:kafka`, the kafka-init topic bootstrap) now say
  # `kafka`. The EXTERNAL advertised host alias is `brain-kafka-ext`. NOTE: the previous container-side
  # spark sinks that shared this netns (spark-bronze-sink / spark-bronze-raw-sink) were REMOVED — the
  # combined Bronze sink now runs on the HOST; only kafka-init still shares this broker's netns.
  #
  # Dual listeners:
  #   • PLAINTEXT 9092  advertised localhost:9092       — host + same-netns clients (kafka-init)
  #   • EXTERNAL  19092 advertised brain-kafka-ext:19092 — out-of-network clients
  #     (e.g. a local kind/k8s pod simulating prod, routed to this container's
  #     brainv3_default IP via a hostAlias for brain-kafka-ext; the kafka-exporter sidecar).
  # CONTROLLER 9093 is the internal KRaft quorum listener (single self-voter).
  # Topic auto-create is OFF — topics are created idempotently by `kafka-init`.
  kafka:
    image: apache/kafka:3.8.1
    profiles: ["core"]
    # CONFLICT REFUSED: blueprint §4.2 says 1g, but the budget doc verifies the KRaft broker at 2.5g
    # steady (docs/ops/local-memory-budget.md). A 1g hard limit risks an OOM-kill of the event
    # backbone under load. Kept 2500m. See structured notes.
    mem_limit: 2500m
    oom_score_adj: -800   # event backbone — protected just below Postgres
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,EXTERNAL://brain-kafka-ext:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "brain-kafka-kraft-0"
      # Prometheus JMX exporter Java-agent — apache/kafka emits ONLY JMX (Redpanda's native
      # /public_metrics is gone). The agent maps the Kafka MBeans declared in
      # infra/observe/kafka-jmx-exporter.yml to kafka_* metrics on :9404, scraped by the
      # 'kafka-jmx-exporter' job in infra/observe/prometheus.yml. brain-slo.rules.yml's
      # DLQ-growth / ingest-freshness / under-replicated alerts read these series. The jar is
      # provisioned into the shared `jmx-agent` volume by `jmx-exporter-init` (below).
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=9404:/etc/jmx-exporter/kafka-jmx-exporter.yml"
    depends_on:
      # Block broker start until the javaagent jar is on the shared volume, otherwise the JVM
      # aborts with "Error opening zip file or JAR manifest missing" and the broker crash-loops.
      jmx-exporter-init:
        condition: service_completed_successfully
    volumes:
      - jmx-agent:/opt/jmx_exporter:ro
      - ./infra/observe/kafka-jmx-exporter.yml:/etc/jmx-exporter/kafka-jmx-exporter.yml:ro
    networks:
      default:
        # The EXTERNAL listener advertises `brain-kafka-ext:19092`; alias the broker to that
        # name on the compose network so in-network clients (the kafka-exporter sidecar) can
        # bootstrap the EXTERNAL listener and have the advertised host resolve.
        aliases:
          - brain-kafka-ext
    ports:
      - "9092:9092"   # Kafka API (PLAINTEXT listener)
      - "19092:19092" # Kafka API (EXTERNAL listener — for kind/k8s pods)
      - "9404:9404"   # Prometheus JMX exporter (kafka_* broker metrics; scraped by prometheus)
    healthcheck:
      # No Redpanda admin API (9644) on Kafka; probe the broker via the Kafka CLI.
      # KAFKA_OPTS= clears the broker's -javaagent JMX exporter for the probe — otherwise the CLI's
      # JVM tries to re-bind the agent on 9404 (already held by the broker) → BindException aborts the
      # JVM → the probe exits non-zero forever → the broker never reports healthy though it serves fine.
      test: ["CMD-SHELL", "KAFKA_OPTS= /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  # Kafka topic bootstrap (idempotent). Ported from `rpk` to the Kafka CLI
  # (kafka-topics.sh) using the same apache/kafka image. Shares the broker's network
  # namespace (network_mode: service:kafka) so the PLAINTEXT advertised listener
  # `localhost:9092` resolves to the broker. `--if-not-exists` keeps it idempotent.
  #
  # NOTE: uses LIST-form entrypoint with a `|` literal block — NOT `entrypoint: >`.
  # The folded scalar (`>`) silently kept the more-indented `--topic/--partitions/--config`
  # continuation lines as separate literal lines, so the shell ran `--topic` as a command
  # (`/bin/sh: --topic: not found`) and NO topics were created. The literal block + `\`
  # line-continuations below pass each kafka-topics.sh call as one shell command.
  #
  # Creates BOTH `dev.*` and `prod.*` prefixes: NODE_ENV picks the live prefix
  # (prod.* under APP_ENV=local-prod, dev.* otherwise) so both boots find their topics.
  # `$$` survives compose interpolation → literal `$` for the shell.
  kafka-init:
    image: apache/kafka:3.8.1
    profiles: ["core"]
    network_mode: "service:kafka"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        KT=/opt/kafka/bin/kafka-topics.sh
        mk() {
          "$$KT" --bootstrap-server localhost:9092 --create --if-not-exists \
            --topic "$$1" --partitions "$$2" --replication-factor 1 \
            --config retention.ms="$$3"
        }
        for PFX in dev prod; do
          # Collector lane (+ DLQ / quarantine / order-backfill)
          mk "$$PFX.collector.event.v1"            12 604800000
          mk "$$PFX.collector.order.backfill.v1"   12 2592000000
          mk "$$PFX.collector.event.v1.dlq"        12 2592000000
          mk "$$PFX.collector.event.v1.quarantine" 12 2592000000
          # 9 connector raw lanes (Spark-SS Bronze landing — bronze_raw_landing.py)
          for LANE in shopify.orders woocommerce.orders meta.spend google.spend \
                      ga4.rows shiprocket.shipments gokwik.events shopflo.checkout \
                      razorpay.settlement; do
            mk "$$PFX.$$LANE.raw.v1" 12 604800000
          done
          # Identity + intelligence control/event topics
          for T in intelligence.cache.invalidate.v1 intelligence.customer360.recomputed.v1 \
                   intelligence.gold.rewritten.v1 identity.merged.v1 identity.suppressed.v1 \
                   identity.minted.v1 identity.linked.v1 identity.review_queued.v1; do
            mk "$$PFX.$$T" 12 604800000
          done
          # Internal canonical fan-out lanes
          for E in orders customers shipments payments sessions ads; do
            mk "$$PFX.brain.$$E" 12 604800000
          done
        done
        echo 'Kafka topics ready'
    restart: "no"

  # Apicurio — schema registry for the event path (FULL_TRANSITIVE compatibility enforced globally).
  # Folded into core alongside kafka (blueprint §4.1) so the strict-SLA ingest path is part of the
  # default stack (the collector/stream-worker validate schemas against it).
  apicurio:
    image: apicurio/apicurio-registry-mem:2.6.3.Final
    profiles: ["core"]
    environment:
      REGISTRY_APIS_V2_DATE_FORMAT: "yyyy-MM-dd'T'HH:mm:ss'Z'"
      # FULL_TRANSITIVE: every version must be compatible with ALL prior versions
      REGISTRY_COMPAT_DEFAULT_RULE: "FULL_TRANSITIVE"
      REGISTRY_COMPAT_DEFAULT_ARTIFACT_TYPE: "AVRO"
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/apis/registry/v2/groups/default/artifacts"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Iceberg REST catalog — local equivalent of AWS Glue Data Catalog (ADR-0002).
  # Apache's reference iceberg-rest-fixture, backing the Iceberg warehouse onto MinIO (S3).
  # Replaces the previously-broken projectnessie/nessie:0.90.2 (unpullable tag, PR #72) with
  # a pinned, pullable image. Spark Structured Streaming (the Bronze writer, ADR-0002) and
  # Trino (the serving engine) read Iceberg through this catalog.
  #
  # core member: the Trino serving engine resolves the Iceberg medallion through this catalog, and the
  # host-run Spark Bronze/Silver/Gold jobs write through it — so it belongs to the default core stack.
  # One-shot: make the `iceberg-catalog` volume writable by the iceberg-rest fixture's runtime user
  # (uid 1000 `iceberg`). A freshly-created named Docker volume is root-owned, so on first boot the
  # file-backed SQLite catalog would fail to open (SQLITE_CANTOPEN: "unable to open database file").
  # Idempotent — a no-op once ownership is already correct. In the core profile, like iceberg-rest,
  # so it runs whenever the catalog comes up.
  iceberg-catalog-init:
    image: alpine:latest
    profiles: ["core"]
    user: "0:0"
    volumes:
      - iceberg-catalog:/catalog
    command:
      - sh
      - -c
      - "chown -R 1000:1000 /catalog && chmod 0775 /catalog && echo 'iceberg-catalog volume writable (uid 1000)'"
    restart: "no"

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.9.2
    profiles: ["core"]   # Iceberg catalog (Glue-equivalent) — core member; Trino + host Spark resolve through it
    # CONFLICT REFUSED: blueprint §4.2 says 128m, but iceberg-rest-fixture is a JVM (Jetty) — a 128m
    # hard limit would OOM-kill the JVM on startup. The budget doc lumps it as "small/unbounded".
    # Applied a SAFE bounded 512m (defense-in-depth without being OOM-prone). See structured notes.
    mem_limit: 512m
    oom_score_adj: -700   # catalog namespace→table pointer SoR — critical, protected
    depends_on:
      minio:
        condition: service_healthy
      # Gate on the volume-permission init so the file-backed catalog can be created on first boot.
      iceberg-catalog-init:
        condition: service_completed_successfully
    environment:
      CATALOG_WAREHOUSE: s3://brain-bronze/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: brain
      AWS_SECRET_ACCESS_KEY: brainbrain
      AWS_REGION: us-east-1
      # FILE-BACKED SQLite on a named volume — DURABLE across container restarts. The file lives on the
      # `iceberg-catalog` volume so the namespace→table pointers survive restarts (data files are in MinIO).
      #
      # CONCURRENCY (the durable lock fix): the catalog is written CONCURRENTLY by the continuous Bronze
      # streaming sinks, the Silver/Gold batch loop, and serving DDL. The previous `?cache=shared` put all
      # in-process connections on one shared cache, so any table-level write surfaced contention as
      # SQLITE_LOCKED_SHAREDCACHE — an IMMEDIATE error that busy_timeout cannot rescue (it only retries the
      # file-level SQLITE_BUSY). That intermittently failed CREATE VIEW / mart commits ("UncheckedSQLException:
      # database table is locked: iceberg_tables"). Shared-cache was only needed when the DB was `:memory:`
      # (per-connection unless shared); for a FILE-backed DB the file IS the shared state, so we DROP it and
      # instead use WAL (readers never block the writer) + busy_timeout (a contending writer WAITS up to 30s
      # for the file lock instead of erroring). synchronous=NORMAL is safe under WAL. This serializes writers
      # gracefully under concurrent Spark commits rather than failing them.
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: "jdbc:sqlite:file:/catalog/brain-iceberg-catalog.db?journal_mode=WAL&busy_timeout=30000&synchronous=NORMAL"
      # SQLite has exactly ONE writer; iceberg's JdbcClientPool defaults to 2 connections, so two pooled
      # connections contend on `iceberg_tables` and surface SQLITE_LOCKED/BUSY as UncheckedSQLException —
      # intermittently failing CREATE VIEW / mart commits under concurrent Bronze-sink + batch-loop writes.
      # Pin the pool to a SINGLE connection so every catalog op serializes through it (no inter-connection
      # lock is even possible); WAL + busy_timeout above remain as defense-in-depth. Catalog writes are tiny
      # metadata ops, so single-connection serialization is not a throughput concern for this lakehouse.
      CATALOG_CLIENTS: "1"
      CATALOG_JDBC_USER: user
      CATALOG_JDBC_PASSWORD: password
    volumes:
      - iceberg-catalog:/catalog
    ports: ["8181:8181"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # NOTE: the container-side Bronze sinks (spark-bronze-sink + spark-bronze-raw-sink) were REMOVED
  # here (blueprint §4.3 / Deliverable B). Their combined replacement — the continuous Spark
  # Structured Streaming Bronze landing (collector.event.v1 + the nine connector *.raw.v1 lanes →
  # Iceberg Bronze) — now runs on the HOST via spark-submit (see db/iceberg/spark). It bootstraps to
  # the broker over the host-mapped PLAINTEXT listener (localhost:9092) instead of sharing the
  # broker's container netns. The now-orphaned `brain-spark-ivy` / `brain-spark-checkpoint` named
  # volumes were dropped from the `volumes:` block below.
  # ────────────────────────────────────────────────────────────────────────────

  # ── Trino — serving query engine over Iceberg (core profile) ──
  # Read-only query layer over the SAME Iceberg REST catalog + MinIO that Spark
  # uses. This is now the app serving path: App / BFF / metric-engine read the
  # Trino `mv_*` views (db/trino/views) over Iceberg + a Redis cache. StarRocks
  # has been removed entirely. Host port 8090 (not 8080) avoids collision with
  # Apicurio's 8080:8080 mapping when the ingest profile runs simultaneously.
  trino:
    image: trinodb/trino:455
    profiles: ["core"]   # sole serving engine — core member; app/BFF/metric-engine read its mv_* views
    # Auto-recover: Trino is the SOLE serving engine — if it ever dies (OOM, crash) every BFF
    # analytics read 500s with "fetch failed". restart:unless-stopped means a crash self-heals
    # instead of staying down until someone notices and runs `docker compose up -d trino`.
    restart: unless-stopped
    # CONFLICT REFUSED: blueprint §4.2 says 1g, but the budget doc verifies Trino needs 7g
    # (jvm.config MaxRAMPercentage=70 → ~4.9g heap + non-heap headroom). A 1g limit reproduces the
    # serving-tier OOM-kill outage. Kept 7g (docs/ops/local-memory-budget.md). See structured notes.
    mem_limit: 7g
    mem_reservation: 3g
    oom_score_adj: -700   # sole serving engine — protected (a kill 500s every analytics read)
    depends_on:
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8090:8080"   # Trino HTTP UI + JDBC (host 8090 → container 8080)
    volumes:
      - ./db/trino/catalog:/etc/trino/catalog:ro
      - ./db/trino/jvm.config:/etc/trino/jvm.config:ro   # bounded heap (prevents OOM-kill of the serving tier)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────────────
  # Observability (blueprint §4.1 split):
  #   • prometheus + grafana → CORE   (base metrics dashboards always available)
  #   • tempo + loki + otel-collector → FULL-OBS (trace/log pipeline, layered on core)
  # ────────────────────────────────────────────────────────────────────────────
  # ────────────────────────────────────────────────────────────────────────────────────────────────
  # prometheus — DISABLED (commented out) 2026-07-02: its only consumer (grafana) is disabled, so the
  # metrics scraper has no dashboard/alert consumer right now. Nothing active depends_on it (the kafka
  # JMX exporter + otel-collector are SCRAPED BY it, not the reverse), so they run fine without it.
  # Re-enable alongside grafana by uncommenting this block.
  # ────────────────────────────────────────────────────────────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:v2.52.0
  #   profiles: ["core"]
  #   mem_limit: 256m         # blueprint §4.2
  #   oom_score_adj: 300      # observability — disposable, killed before stateful services
  #   ports: ["9090:9090"]
  #   volumes:
  #     - ./infra/observe/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   healthcheck:
  #     test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  loki:
    image: grafana/loki:3.0.0
    profiles: ["full-obs"]
    ports: ["3100:3100"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  tempo:
    image: grafana/tempo:2.5.0
    profiles: ["full-obs"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observe/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo HTTP API / query-frontend
      - "4317"        # OTLP gRPC (internal — otel-collector → tempo; not exposed to host)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ────────────────────────────────────────────────────────────────────────────────────────────────
  # grafana — DISABLED (commented out) 2026-07-02: the metrics dashboards aren't in active use, so we
  # don't run the UI. Nothing depends_on grafana, and prometheus (its data source) still runs standalone
  # and keeps scraping — so re-enabling is just uncommenting this block (dashboards come back at :3004).
  # ────────────────────────────────────────────────────────────────────────────────────────────────
  # grafana:
  #   image: grafana/grafana:10.4.2
  #   profiles: ["core"]
  #   mem_limit: 256m         # blueprint §4.2
  #   oom_score_adj: 500      # observability UI — most disposable, killed first under VM pressure
  #   # Grafana is core but its Loki/Tempo datasources live in full-obs. depends_on is reduced to
  #   # prometheus (same core profile) ONLY — a hard depends_on loki/tempo would make a core-only
  #   # `up` fail (cross-profile dependency). Grafana boots fine without them; the provisioned
  #   # Loki/Tempo datasources simply show "down" until `--profile full-obs` is also active.
  #   depends_on:
  #     prometheus:
  #       condition: service_healthy
  #   environment:
  #     GF_SECURITY_ADMIN_USER: admin
  #     GF_SECURITY_ADMIN_PASSWORD: brain
  #     GF_USERS_ALLOW_SIGN_UP: "false"
  #   # Host 3004 → Grafana's internal 3000. Host 3000 is reserved for the Brain web app (next dev);
  #   # mapping Grafana to host 3000 shadowed the product (localhost:3000 opened Grafana). Grafana → :3004.
  #   ports: ["3004:3000"]
  #   volumes:
  #     - ./infra/observe/grafana/provisioning:/etc/grafana/provisioning:ro
  #   # Healthcheck runs INSIDE the container, where Grafana listens on its internal 3000 —
  #   # NOT the host-published 3004 (that mapping only exists on the host). Curling 3004 here
  #   # always failed (curl exit 7), which kept the container "unhealthy" and aborted dev-up.
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    profiles: ["full-obs"]
    # Prometheus (core) SCRAPES this collector at :8889 (pull) — so the collector does NOT need
    # prometheus up to start, and a hard cross-profile depends_on prometheus is dropped. It exports
    # logs→loki and traces→tempo (both same full-obs profile), kept as hard deps.
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    volumes:
      - ./infra/observe/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ────────────────────────────────────────────────────────────────────────────
  # KAFKA OBSERVABILITY — make the Kafka-repointed SLOs actually fire.
  #
  #  • The broker emits kafka_* JMX metrics on :9404 via the prometheus jmx_exporter
  #    javaagent (attached on the `kafka` service above; jar from `jmx-exporter-init`).
  #  • kafka-exporter (below) emits per-consumer-group LAG on :9308 — NOT a broker JMX
  #    metric — driving BrainConsumerLagHigh.
  #  Both targets are scraped by infra/observe/prometheus.yml (jobs kafka-jmx-exporter /
  #  kafka-exporter) and read by infra/observe/alerts/brain-slo.rules.yml.
  # ────────────────────────────────────────────────────────────────────────────

  # One-shot: download the prometheus jmx_exporter javaagent jar into the shared `jmx-agent`
  # volume so the broker JVM can `-javaagent:` it. Idempotent (skips if already present),
  # pinned + checksum-free fetch from Maven Central. In BOTH core+debug profiles: the kafka broker
  # (core) HARD-depends on this init for its javaagent jar, so it must run with core; it is also
  # tagged debug so it appears in the blueprint's debug-tooling group.
  jmx-exporter-init:
    image: curlimages/curl:8.8.0
    profiles: ["core", "debug"]
    # Run as root: curlimages/curl defaults to uid 100, which CANNOT write the root-owned `jmx-agent`
    # volume → curl exits 23 ("ERROR on write"), the init fails, and (being a depends_on of kafka)
    # it aborts the whole `up --wait` chain before the broker starts. As root the download succeeds.
    user: "0:0"
    volumes:
      - jmx-agent:/opt/jmx_exporter
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        JAR=/opt/jmx_exporter/jmx_prometheus_javaagent.jar
        if [ -f "$$JAR" ]; then echo "jmx_exporter agent already present"; exit 0; fi
        echo "downloading jmx_prometheus_javaagent 1.0.1 ..."
        curl -fsSL -o "$$JAR" \
          https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar
        echo "ok"

  # Consumer-group lag exporter (per-group lag is not a broker JMX metric). Connects to the
  # broker's EXTERNAL advertised listener via the `brain-kafka-ext` network alias and exposes
  # kafka_consumergroup_lag / kafka_topic_* on :9308.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    profiles: ["debug"]
    command:
      - "--kafka.server=brain-kafka-ext:19092"
      - "--web.listen-address=:9308"
    ports:
      - "9308:9308"
    restart: unless-stopped

volumes:
  # NOTE: brain-spark-checkpoint / brain-spark-ivy were REMOVED with the spark-bronze-sink /
  # spark-bronze-raw-sink services — the host-run Spark Bronze landing owns its own checkpoint/ivy
  # dirs on the host, not these compose-named volumes.
  # Holds the prometheus jmx_exporter javaagent jar shared between jmx-exporter-init and the broker.
  jmx-agent:
  # Persists the Iceberg REST JDBC (SQLite) catalog — namespace→table pointers — across iceberg-rest
  # restarts so a crash/restart never wipes brain_silver/brain_gold from the catalog (data is in MinIO).
  iceberg-catalog:
