image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-core-staging
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

streamWorkerImage:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker-staging
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

# The job pods read the same secret as the core/stream-worker deployments (DATABASE_URL,
# BRAIN_APP_DATABASE_URL, STARROCKS_*). External Secrets ← AWS Secrets Manager.
envSecretName: core-env

serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-jobs-staging
