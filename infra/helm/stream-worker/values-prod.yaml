replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: stream-worker-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-stream-worker-prod

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# P2.5: HPA on in prod. maxReplicas capped at the live-topic partition count (12) — beyond that,
# consumers sit idle. Raise BOTH this and the topic partition count together to scale further.
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
