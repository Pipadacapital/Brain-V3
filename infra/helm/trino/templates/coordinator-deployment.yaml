apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trino.coordinator.fullname" . }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicaCount }}   # exactly one coordinator
  selector:
    matchLabels:
      {{- include "trino.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        {{- include "trino.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coordinator
      annotations:
        # Roll the pods when server config / catalog changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "trino.fullname" . }}
      {{- with .Values.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000        # trinodb/trino runs as uid 1000 ("trino")
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.metrics.enabled }}
      initContainers:
        # AUD-INFRA-030: fetch the JMX-exporter agent jar (same one-shot download pattern as the
        # local compose jmx-exporter-init and the kafka-connect chart). coordinator-jvm.config
        # references the jar, so it must exist before the JVM starts. Runs as the pod's uid 1000
        # into the shared emptyDir (fsGroup makes it writable).
        - name: jmx-exporter-init
          image: {{ .Values.metrics.initImage }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              JAR=/opt/jmx-exporter/jmx_prometheus_javaagent.jar
              [ -f "$JAR" ] && { echo "jmx_exporter agent already present"; exit 0; }
              curl -fsSL --retry 3 -o "$JAR" "{{ .Values.metrics.jmxExporterJarUrl }}"
              echo "ok"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: jmx-agent
              mountPath: /opt/jmx-exporter
      {{- end }}
      containers:
        - name: trino-coordinator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.iceberg.s3SecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.iceberg.s3SecretName }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            periodSeconds: 15
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.coordinator.resources | nindent 12 }}
          volumeMounts:
            - name: server-config
              mountPath: /etc/trino/config.properties
              subPath: coordinator-config.properties
            - name: server-config
              mountPath: /etc/trino/jvm.config
              # AUD-INFRA-030: coordinator gets its own jvm.config key (base + optional javaagent);
              # workers keep the shared plain `jvm.config`.
              subPath: coordinator-jvm.config
            - name: server-config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            {{- if .Values.metrics.enabled }}
            - name: server-config
              mountPath: /etc/trino/jmx-exporter.yml
              subPath: jmx-exporter.yml
            - name: jmx-agent
              mountPath: /opt/jmx-exporter
              readOnly: true
            {{- end }}
            - name: catalog
              mountPath: /etc/trino/catalog/iceberg.properties
              subPath: iceberg.properties
            - name: data
              mountPath: /data/trino
      volumes:
        - name: server-config
          configMap:
            name: {{ include "trino.fullname" . }}-config
        - name: catalog
          configMap:
            name: {{ include "trino.fullname" . }}-catalog
        - name: data
          emptyDir: {}
        {{- if .Values.metrics.enabled }}
        - name: jmx-agent
          emptyDir: {}
        {{- end }}
