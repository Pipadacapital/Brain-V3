image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-core-staging
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

streamWorkerImage:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker-staging
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

# dbt-runner image — runs the scheduled mart rebuilds (recognition-refresh / attribution-gold-refresh).
# CI (build-data-images) builds db/dbt/Dockerfile, pushes, and digest-pins this. Fail-closed until set.
dbtRunnerImage:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-dbt-runner-staging
  tag: ""
  digest: ""

# spark-bronze image — runs the Iceberg Bronze sink + maintenance crons (db/iceberg/spark/Dockerfile).
sparkBronze:
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/brain-spark-bronze-staging
    tag: ""
    digest: ""

# spark V4 Silver/Gold transform + mv refresh crons — same image as sparkBronze (the Dockerfile now
# COPYs the V4 marts). GATED OFF by default; flip sparkV4.enabled once the V4 cluster + digest are ready.
sparkV4:
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/brain-spark-bronze-staging
    tag: ""
    digest: ""

# The job pods read the same secret as the core/stream-worker deployments (DATABASE_URL,
# BRAIN_APP_DATABASE_URL, STARROCKS_*). External Secrets ← AWS Secrets Manager.
envSecretName: core-env

serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-jobs-staging
