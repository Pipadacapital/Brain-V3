################################################################################
# Brain — prod values for the UPSTREAM kube-prometheus-stack chart
# (prometheus-community), consumed by
# infra/argocd/envs/prod/kube-prometheus-stack.yaml via an ArgoCD multi-source
# $values ref (same pattern as keda/neo4j).
#
# Closes AUD-PROD-001/-002: prod previously had NO Prometheus at all — the SLO
# rules (infra/observe/alerts/brain-slo.rules.yml), the Argo Rollouts analysis
# templates (infra/argocd/rollouts/*) and the CD bake-window auto-rollback
# signals had no evaluator. Also carries the chart half of AUD-PROD-012: the
# Thanos sidecar ships TSDB blocks to the long-term metrics S3 bucket
# (terraform half: modules/s3-metrics + envs/prod module.irsa_thanos).
#
# PLACEMENT: every long-running component is pinned to the fixed ON-DEMAND
# system node group (role: system) — the metrics/alerting control plane must
# not ride the Karpenter Spot capacity it observes (same doctrine as
# keda/karpenter/ESO/ALB-controller). node-exporter is a DaemonSet and runs on
# every node (it tolerates the tainted ondemand pool so those nodes are
# scraped too). Resources are sized for t4g.medium (2 vCPU / 4 GiB) system
# nodes; all images involved are multi-arch (arm64 Graviton).
################################################################################

## EKS is a MANAGED control plane: controller-manager/scheduler/etcd are not
## scrapable and kube-proxy binds its metrics to 127.0.0.1. Leaving these on
## creates permanently-down targets + alerts that can never inform anyone —
## the exact false-safety anti-pattern the brain-slo rules header forbids.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

prometheusOperator:
  nodeSelector:
    role: system
  admissionWebhooks:
    patch:
      nodeSelector:
        role: system
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

prometheus:
  serviceAccount:
    create: true
    # PINNED (NN-3): the IRSA trust in terraform (envs/prod module.irsa_thanos,
    # role brain-prod-thanos) is StringEquals on
    # system:serviceaccount:monitoring:kube-prometheus-stack-prometheus — a
    # rename here (or of the ArgoCD helm releaseName) is a deterministic STS
    # AccessDenied for the Thanos sidecar's S3 uploads.
    name: kube-prometheus-stack-prometheus
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-thanos
  prometheusSpec:
    nodeSelector:
      role: system
    # ── AUD-LOCAL-016-FUP1: SELECT the app/kafka monitors ───────────────────
    # The chart default (…NilUsesHelmValues: true) makes Prometheus select ONLY
    # monitors labelled release=kube-prometheus-stack — i.e. the stack's own.
    # The Brain monitors live in their OWNING charts' namespaces (collector
    # ServiceMonitor, stream-worker PodMonitor, strimzi-kafka PodMonitors ×2)
    # and are NOT release-labelled. false ⇒ the rendered Prometheus CR gets
    # serviceMonitorSelector/podMonitorSelector {} (select all), and the chart
    # already renders *NamespaceSelector {} (all namespaces) — verified against
    # the pulled 65.1.1 chart. Rules are unaffected: additionalPrometheusRulesMap
    # PrometheusRules carry the release label and keep matching the default
    # ruleSelector.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Thanos owns long-term retention (S3, AUD-PROD-012) — keep the local TSDB
    # short + size-bounded so Prometheus fits the t4g.medium system nodes.
    retention: 2d
    retentionSize: 8GiB
    externalLabels:
      cluster: brain-prod
      environment: prod
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: "1"
        memory: 1536Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          # gp3 via the EBS CSI driver (addon = terraform modules/eks; the
          # StorageClass is applied by infra/argocd/bootstrap/install.sh).
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    # ── AUD-PROD-012: Thanos sidecar → S3 long-term metrics ────────────────
    # The sidecar uploads 2h TSDB blocks to the metrics bucket. IRSA-NATIVE:
    # no static keys anywhere — the pod's ServiceAccount role
    # (brain-prod-thanos) carries the thanos_objstore policy and the AWS SDK
    # default chain picks up the web-identity credentials; SSE-KMS is the
    # bucket's default encryption. Retention/compaction of uploaded blocks is
    # Thanos's job (compactor, when one is added), NEVER an S3 lifecycle
    # expiry (modules/s3-metrics header). Fill the bucket suffix from
    # `terraform output metrics_bucket_name`.
    thanos:
      objectStorageConfig:
        secret:
          type: S3
          config:
            bucket: brain-metrics-prod-380254378136
            endpoint: s3.ap-south-1.amazonaws.com
            region: ap-south-1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      role: system
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

grafana:
  nodeSelector:
    role: system
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi

kube-state-metrics:
  nodeSelector:
    role: system
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  # DaemonSet — must also land on the TAINTED ondemand Karpenter pool
  # (Neo4j's home, AUD-COST-018) so the identity SoR's node is scraped.
  tolerations:
    - operator: Exists

################################################################################
# Brain SLO alert rules (AUD-PROD-013 prod half). VERBATIM conversion of
# infra/observe/alerts/brain-slo.rules.yml — that file stays the canonical,
# promtool-checkable source (the local compose Prometheus mounts it directly);
# KEEP THE TWO IN LOCKSTEP when a rule changes. Rendered as a PrometheusRule
# the operator loads via the default release ruleSelector.
################################################################################
additionalPrometheusRulesMap:
  brain-slo:
    groups:
      # ── Liveness ────────────────────────────────────────────────────────────────
      - name: brain-liveness
        rules:
          - alert: BrainTargetDown
            # AUD-INFRA-028/-030: regex extended with kafka-connect-jmx (Bronze landing writer's
            # exporter) + duckdb-serving (sole serving engine). `up` only exists for CONFIGURED
            # targets — absence coverage lives in DuckDBServingDown / BrainFreshnessExporterDown
            # (absent()).
            expr: up{job=~"brain-.*|kafka-jmx-exporter|kafka-exporter|kafka-connect-jmx|duckdb-serving"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} target down"
              description: "Prometheus has not scraped {{ $labels.job }} ({{ $labels.instance }}) for 2m."

      # ── Collector ingest SLO / burn-rate (the 99.95% accept+ack durability guarantee) ──
      # Multi-window burn-rate (Google SRE): availability = accept / (accept + shed).
      # Error budget = 0.05%. Fast burn = 14.4× over 5m+1h; slow burn = 6× over 30m+6h.
      # Two windows per alert suppress single-spike flapping.
      - name: brain-collector-slo
        rules:
          - alert: BrainCollectorErrorBudgetFastBurn
            expr: |
              (
                sum(rate(brain_collector_backpressure_shed_total[5m]))
                  / (sum(rate(brain_collector_accept_total[5m])) + sum(rate(brain_collector_backpressure_shed_total[5m]))) > (14.4 * 0.0005)
              )
              and
              (
                sum(rate(brain_collector_backpressure_shed_total[1h]))
                  / (sum(rate(brain_collector_accept_total[1h])) + sum(rate(brain_collector_backpressure_shed_total[1h]))) > (14.4 * 0.0005)
              )
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Collector accept+ack error budget burning fast (>14.4×)"
              description: "Shed ratio exceeds 14.4× the 0.05% budget over 5m AND 1h — the durability SLO is being consumed in hours, not weeks."

          - alert: BrainCollectorErrorBudgetSlowBurn
            expr: |
              (
                sum(rate(brain_collector_backpressure_shed_total[30m]))
                  / (sum(rate(brain_collector_accept_total[30m])) + sum(rate(brain_collector_backpressure_shed_total[30m]))) > (6 * 0.0005)
              )
              and
              (
                sum(rate(brain_collector_backpressure_shed_total[6h]))
                  / (sum(rate(brain_collector_accept_total[6h])) + sum(rate(brain_collector_backpressure_shed_total[6h]))) > (6 * 0.0005)
              )
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Collector accept+ack error budget burning slowly (>6×)"
              description: "Shed ratio exceeds 6× the 0.05% budget over 30m AND 6h."

          - alert: BrainCollectorSheddingNow
            # Any sustained back-pressure shedding — the drainer (→ Kafka) is behind RIGHT NOW.
            expr: sum(rate(brain_collector_backpressure_shed_total[5m])) > 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Collector is shedding ingest (503 backpressure)"
              description: "/collect has shed for 2m — the Kafka producer is failing AND the local disk-WAL fallback is saturated (ADR-0015 direct-to-log)."

          - alert: BrainCollectorWalPendingAgeHigh
            # ADR-0015 WAL durability posture: events ACK'd into the pod-local disk WAL but NOT yet
            # produce-ack'd onto the log for >5m — the durability exposure window is OPEN (a hard
            # node loss now would drop these ACK'd events). The flusher retries every tick; a
            # sustained age means Kafka has been unreachable (or the flush failing) that whole time.
            # max() over pods: ANY replica holding old unflushed entries is exposure.
            expr: max(brain_collector_wal_oldest_entry_age_seconds) > 300
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Collector WAL has events pending >5m (durability exposure window open)"
              description: "The oldest event ACK'd into a collector pod's local-disk WAL has not reached the log for over 5 minutes — check Kafka broker health and brain_collector_wal_flush_failures_total. These events survive pod restarts but NOT a hard node loss (ADR-0015 accepted residual risk)."

          - alert: BrainCollectorWalPendingAgeCritical
            # Same signal, 30m: the outage has outlived several flush cycles and the exposure window
            # is now long enough that a node failure would lose a meaningful slice of ACK'd events.
            expr: max(brain_collector_wal_oldest_entry_age_seconds) > 1800
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Collector WAL has events pending >30m (durability exposure critical)"
              description: "Events ACK'd into a collector pod's local-disk WAL have not reached the log for over 30 minutes — the produce path has been down for the whole window. Restore Kafka / the producer path; the WAL drains automatically on reconnect (ADR-0015 drain+alert posture)."

      # ── Stream-worker: erasure queue + consumer lag + ingest freshness ──────────
      - name: brain-stream-worker
        rules:
          - alert: BrainErasureQueueDead
            # ADR-0015 WS4: the Kafka DLQ lane (.dlq topics + DlqProducer + redrive CLI) is DELETED —
            # the erasure lane's poison path is now ops.erasure_request_queue status='dead'
            # (attempts >= MAX_RETRY(5), or an invalid envelope). brain_erasure_queue_dead_total is the
            # PG replacement for the old DLQ signal. A dead row = an RTBF erasure NOT completed —
            # operator action required (inspect ops.erasure_request_queue WHERE status='dead').
            # Absent-safe: increase() over the not-yet-registered counter yields an empty vector (no
            # false fire); the counter registers on first dead row. NOTE: only dead_total exists today —
            # the lane emits no oldest-pending-age gauge, so a parked-but-not-dead (stale) queue is not
            # directly alertable yet; the head-of-line blocking design means sustained retries surface
            # here at MAX_RETRY within ~30 min.
            expr: sum by (reason) (increase(brain_erasure_queue_dead_total[15m])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Erasure queue has dead rows (reason: {{ $labels.reason }})"
              description: "An RTBF erasure request went status='dead' in ops.erasure_request_queue ({{ $labels.reason }}) — the crypto-shred sequence did NOT complete for that subject and will not retry. Investigate ops.erasure_request_queue WHERE status='dead' (last_error column) and re-enqueue after fixing the cause."

          - alert: BrainConsumerLagHigh
            # kafka_consumergroup_lag (kafka_exporter): summed lag across all topic-partitions of a group.
            expr: |
              sum by (consumergroup) (
                kafka_consumergroup_lag{consumergroup=~"stream-worker-.*|.*-bridge"}
              ) > 50000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Consumer group {{ $labels.consumergroup }} lag > 50k"
              description: "The consumer group is >50,000 messages behind for 10m — projection is falling behind production rate."

          - alert: BronzeConnectTaskFailed
            # ADR-0010: a FAILED Iceberg-sink task stays failed until manually restarted — the lane it
            # owns stops landing Bronze rows entirely. Source: kafka-connect-jmx job.
            expr: kafka_connect_connector_task_status{status="failed"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Bronze Connect task {{ $labels.connector }}/{{ $labels.task }} FAILED"
              description: "The Iceberg sink task is in FAILED state — its Kafka lane is not landing in Bronze. Restart: curl -X POST localhost:8083/connectors/{{ $labels.connector }}/tasks/{{ $labels.task }}/restart (see docs/runbooks/adr-0010-kafka-connect-bronze.md)."

          - alert: BronzeConnectLagHigh
            # ADR-0010: the Bronze landing writer itself is falling behind (or the worker is down and
            # lag is frozen while producers advance). 10k over 10m ≈ well past the 30s commit cadence.
            # AUD-INFRA-028 REWRITE: kafka_consumergroup_lag was MEASURED EMPTY for the sink's groups
            # (Iceberg sink commits offsets via its control-topic coordinator into snapshot metadata,
            # not __consumer_offsets) — lag now comes from the worker's embedded consumer JMX
            # (kafka-connect-jmx job; canonical mapping infra/observe/kafka-connect-jmx-exporter.yml).
            expr: |
              sum by (client_id) (
                kafka_connect_consumer_records_lag
              ) > 10000
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Bronze Connect landing lag > 10k ({{ $labels.client_id }})"
              description: "The Iceberg sink consumer {{ $labels.client_id }} is >10,000 messages behind for 10m — Bronze landing is falling behind ingest (worker down, catalog contention, or throughput ceiling). See docs/runbooks/adr-0010-kafka-connect-bronze.md."

          - alert: BrainIngestStale
            # AUD-INFRA-029 REWRITE for the Connect era: the old brain_bronze_write_total died with
            # the Spark-SS sink at the ADR-0010 cutover (empty vector ⇒ the AND never sampled ⇒ a
            # total Bronze stall was silent). Now keyed on the collector connector's sink-read
            # counter; the absent() arm keeps it honest if the series ever disappears again.
            expr: |
              (sum(rate(kafka_log_log_logendoffset{topic=~".*\\.collector\\.event\\.v1"}[10m])) > 0)
              and
              (
                (sum(rate(kafka_connect_sink_task_sink_record_read_total{connector="iceberg-bronze-collector"}[10m])) == 0)
                or
                (absent(kafka_connect_sink_task_sink_record_read_total{connector="iceberg-bronze-collector"}) == 1)
              )
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Ingest stalled — events produced but no Bronze landing reads in 10m"
              description: "The collector topic is advancing but the Kafka Connect Iceberg sink (the SOLE Bronze landing writer, ADR-0010) read zero records for 10m — or its metrics vanished. The data spine is stalled. Check the connect worker pod, task status (curl localhost:8083/connectors/iceberg-bronze-collector/status) and the kafka-connect-jmx scrape target. See docs/runbooks/adr-0010-kafka-connect-bronze.md."

          # P1 — the scale-limiting tier. BrainIngestStale only fires at TOTAL zero; these catch the
          # DEGRADATION before it reaches zero (the signals the audit flagged as having no metric).
          - alert: BrainIngestSchedulerOverrun
            # The sequential scheduler tick can no longer finish within its interval → connector freshness
            # silently slips into minutes. The first symptom of "too many brands per replica" (shard/scale).
            expr: sum(increase(brain_ingest_scheduler_tick_overrun_total[15m])) > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Ingest scheduler tick overrunning its interval"
              description: "A scheduler tick took longer than its poll interval — ingest freshness is degrading. Shard brands across replicas or shorten the per-connector work."

          - alert: BrainConnectorDispatchErrors
            # A provider's repulls are failing on dispatch (rate limit / credential / API) — stale data for
            # that connector with NO other signal today (per-connector observability was missing).
            expr: |
              sum by (provider) (rate(brain_ingest_scheduler_dispatch_error_total[10m]))
                / clamp_min(sum by (provider) (rate(brain_ingest_scheduler_dispatch_total[10m]) + rate(brain_ingest_scheduler_dispatch_error_total[10m])), 1) > 0.25
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Connector {{ $labels.provider }} repulls failing > 25%"
              description: "More than a quarter of {{ $labels.provider }} repull dispatches are failing — likely a rate limit, expired credential, or provider outage. That connector's data is going stale."

          - alert: BrainConnectorRateLimited
            # The global per-provider rate limiter is throttling dispatches sustainedly → that provider's
            # shared app quota is the bottleneck at the current brand count. Raise the cap or add capacity.
            expr: sum by (provider) (rate(brain_ingest_scheduler_rate_limited_total[15m])) > 0.1
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Connector {{ $labels.provider }} sustainedly rate-limited"
              description: "Brain is throttling {{ $labels.provider }} repulls to protect its shared app quota — those connectors are re-pulling slower than their interval. Quota is the scaling bottleneck for this provider."

          # (BrainDlqRedriveExhausted / BrainDlqRedriveErrors REMOVED — ADR-0015 WS4 deleted the Kafka
          # dlq-redrive CLI along with the last Kafka consumer; brain_dlq_redrive_*_total are never
          # emitted. The poison-path signal is BrainErasureQueueDead above.)

          # P2.6 — connector auth rejection. A repull whose credential is rejected (Meta/Google token
          # expired, Shopify/Razorpay 401) writes sync_status='error' and RETURNS — it does NOT throw,
          # so the scheduler sees success and that connector's data (spend/settlement/orders) silently
          # goes stale until an operator reconnects. This makes that path loud.
          - alert: BrainConnectorAuthRejected
            # brain_connector_auth_rejected_total: stream-worker counter (P2.6). Non-zero ⇒ a connector needs
            # reconnecting RIGHT NOW and its data is going stale.
            expr: sum by (provider) (increase(brain_connector_auth_rejected_total[15m])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Connector {{ $labels.provider }} credential rejected — reconnect required"
              description: "A {{ $labels.provider }} repull was rejected on auth (expired token / 401). That connector is no longer ingesting — its spend/settlement/order data is going stale until it is reconnected."

          # feat-meta-token-refresh — the proactive Meta token re-exchange job. A sustained error rate
          # means tokens are NOT being refreshed (app creds missing, or tokens already dead) → spend
          # ingestion will silently stale as those tokens hit their ~60-day expiry.
          - alert: BrainMetaTokenRefreshFailing
            # brain_meta_token_refresh_error_total: stream-worker counter (the daily cron job). Non-zero ⇒
            # tokens are not being kept fresh — investigate app creds / reconnect the flagged connectors.
            expr: sum by (reason) (increase(brain_meta_token_refresh_error_total[2h])) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Meta token refresh failing ({{ $labels.reason }})"
              description: "The proactive Meta token re-exchange job is erroring ({{ $labels.reason }}). If app_creds_missing — set META_APP_ID/META_APP_SECRET; if exchange_failed — those connectors need a reconnect before their tokens expire and spend ingestion stalls."

          # Silver freshness. Silver is built by the DuckDB Silver jobs (db/iceberg/duckdb/silver/*.py,
          # scheduled via the cronworkflows chart / tools/dev/duckdb-refresh.sh locally), so it can
          # lag Bronze between batches. The DQ reconciliation executor runs CONTINUOUSLY in the
          # deployed worker; a sustained breach = Silver is stale or unreachable.
          # (AUD-INFRA-029: description previously said "rebuild via dbt / check StarRocks" — both
          # retired in Brain V4. Spark→DuckDB cutover: the transform tier is DuckDB now, not Spark.)
          - alert: BrainSilverLag
            # brain_dq_silver_lag_breach_total: stream-worker DQ counter. Sustained increase ⇒ Silver is
            # lagging Bronze (or duckdb-serving, the reconciliation's read engine, is down) — analytics reads are stale.
            expr: sum by (reason) (increase(brain_dq_silver_lag_breach_total[1h])) > 0
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Silver tier lagging Bronze ({{ $labels.reason }})"
              description: "The Bronze↔Silver reconciliation has breached for 30m ({{ $labels.reason }}). Silver (silver_order_state) is stale vs Bronze — check the chained v4-medallion CronWorkflow's silver step (db/iceberg/duckdb/silver) and duckdb-serving health. Analytics reads over Silver are behind."

          # Silver identity stage (ADR-0015 WS3 / C1 2026-07-18) — the v4-identity CronWorkflow
          # (infra/helm/cronworkflows/templates/v4-identity.yaml, every 5 min). Note (2026-07-19 re-split):
          # identity-resolve → map-export moved OUT of the chained v4-medallion into its own v4-identity
          # cron so its slow catch-up can't block core freshness; this alert now tracks that cron.
          # brain_silver_identity_runs_total: stream-worker counter (silver-identity batch job), +1 per
          # CLEAN per-brand pass — including a no-op empty window, so a healthy-but-quiet brand still
          # ticks. absent() ⇒ the job has never run (the C1 failure mode: stage not scheduled) or its
          # series vanished; zero increase over 15m (3 missed ticks = 3× the 5-min cadence, above the
          # required 2× threshold) ⇒ the cron stopped firing or EVERY brand pass is erroring (watermarks
          # held). Either way identity resolution has stalled: new events stop resolving to brain_id,
          # silver_identity_map freezes, and gold_customer_360 + the attribution chain go stale.
          - alert: BrainSilverIdentityStageStalled
            expr: |
              absent(brain_silver_identity_runs_total)
              or
              (sum(increase(brain_silver_identity_runs_total[15m])) == 0)
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Silver identity stage has not completed a clean brand pass in >15m"
              description: "brain_silver_identity_runs_total is absent or flat for over 15m (cadence: every 5 min). Identity resolution is stalled — new events are not resolving to brain_id and the identity map / customer marts are going stale. Check the v4-identity CronWorkflow (argo -n argo list | grep v4-identity) — its identity-resolve step, duckdb-serving (the job's read path), Neo4j, and per-brand errors in the job logs (watermarks are held on error and converge on the next clean run). NOTE: a slow identity catch-up here no longer blocks the core v4-medallion (revenue/orders/spend) — the two crons are decoupled (2026-07-19)."

      # ── Revenue truth integrity ─────────────────────────────────────────────────
      - name: brain-revenue-integrity
        rules:
          - alert: BrainRevenueOverReversal
            # brain_revenue_over_reversal_total: stream-worker counter (F2). Cumulative reversals exceeded the
            # recognized sale for an order → realized revenue for that order went negative. Usually a
            # duplicate refund or a refund+chargeback on one order — needs reconciliation, not silence.
            expr: sum(increase(brain_revenue_over_reversal_total[15m])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Over-reversal detected in the revenue ledger"
              description: "An order's cumulative reversals exceeded its recognized sale (realized went negative). Reconcile — likely a duplicate refund or refund+chargeback."

      # ── Webhook produce health ───────────────────────────────────────────────────
      - name: brain-webhook-health
        rules:
          - alert: BrainWebhookProduceFailing
            # collector_webhook_produce_error_total: collector counter (+1 per message the collector
            # failed to produce to Kafka after exhausting retries). A non-zero rate means EVENTS
            # ARE BEING DROPPED at the ingest spine entry — the no-event-loss guarantee (CLAUDE.md) is
            # being violated. Immediate investigation required.
            #
            # Metric source: @brain/observability incrementCounter in the collector's Kafka producer
            # retry wrapper. Zero when the topic is healthy; any increment = a drop in the live lane.
            #
            # Two-window guard: 1m fast burn (drops right now) + 5m sustained (not a single-blip spike).
            expr: |
              (sum(rate(brain_collector_webhook_produce_error_total[1m])) > 0)
              and
              (sum(increase(brain_collector_webhook_produce_error_total[5m])) > 0)
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Collector webhook produce failing — events are being dropped"
              description: "The collector cannot produce events to Kafka after retries (brain_collector_webhook_produce_error_total is advancing). The no-event-loss guarantee is violated. Check broker health, topic availability, and producer credentials."

  ##############################################################################
  # Brain data-freshness rules (AUD-PROD-B8-FUP2 — prod evaluator for the Gold
  # serving-mart freshness SLAs). VERBATIM conversion of
  # infra/observe/alerts/freshness.rules.yml — that file stays the canonical,
  # promtool-checkable source (the local compose Prometheus mounts it directly);
  # KEEP THE TWO IN LOCKSTEP when a rule changes (same doctrine as brain-slo
  # above; python-verified identical at commit time).
  #
  # The brain_data_freshness_* series come from the freshness exporter
  # (tools/observability/freshness-exporter — Prometheus job
  # 'brain-freshness-exporter'), deployed to prod by the observability chart
  # (infra/helm/observability, ArgoCD app observability-prod — AUD-INFRA-030;
  # closes AUD-OBS-1). BrainFreshnessExporterDown's absent() clause keeps the
  # SLO honest if the exporter target ever disappears (the C2 anti-false-safety
  # doctrine). Consistent with local, where the compose Prometheus loads the
  # same canonical file.
  ##############################################################################
  freshness:
    groups:
      # ── Gold serving-mart freshness SLA ─────────────────────────────────────────
      - name: brain-data-freshness
        rules:
          - alert: BrainExecutiveMartStale
            # Executive dashboard marts (revenue ledger, CAC, executive_metrics, …) must be ≤15m fresh.
            expr: brain_data_freshness_seconds{sla_class="executive"} > 900
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Executive mart {{ $labels.mart }} stale (> 15m)"
              description: "iceberg.{{ $labels.schema }}.{{ $labels.mart }} has not committed a successful Gold snapshot for {{ $value | humanizeDuration }} (SLA 15m). The executive dashboard is serving stale data — check the Spark Silver→Gold refresh (tools/dev/v4-refresh-loop.sh) and the Gold CronWorkflows."

          - alert: BrainSegmentMartStale
            # Customer-segment marts (segments, scores, health, cohorts, retention) must be ≤1h fresh.
            expr: brain_data_freshness_seconds{sla_class="segment"} > 3600
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Customer-segment mart {{ $labels.mart }} stale (> 1h)"
              description: "iceberg.{{ $labels.schema }}.{{ $labels.mart }} has not committed a successful Gold snapshot for {{ $value | humanizeDuration }} (SLA 1h). Segment/audience surfaces are stale — check the Gold customer-segment Spark jobs and their CronWorkflows."

          - alert: BrainMartSnapshotMissing
            # The exporter reached duckdb-serving but a registered mart returned NO snapshot (table missing or never
            # written). Without this, a never-built mart would emit no freshness series and silently dodge
            # the staleness alerts above — the exact false-safety the C2 doctrine forbids.
            expr: brain_data_freshness_query_success == 0
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Mart {{ $labels.mart }} has no Gold snapshot"
              description: "The freshness exporter could not read a snapshot for iceberg.{{ $labels.schema }}.{{ $labels.mart }} for 30m (table missing or never written). It cannot be evaluated against its SLA — verify the Spark Gold job for this mart has ever run."

          # ── ADR-0016 near-real-time serving SLO (end-to-end medallion freshness) ──
          - alert: MedallionFreshnessStale
            # The objective guardrail for the ADR-0016 NRT improvement: the newest data a dashboard
            # can read (now - max(ingested_at) over the Silver spine) must be ≤ 5m. If this fires, the
            # whole Bronze→Silver→serving path has regressed past the near-real-time target — check the
            # chained transform pipeline / warm worker (TRANSFORM_TICK_MS), incremental map-export
            # (IDENTITY_DIRTY_ONLY), and duckdb-serving catalog refresh (DUCKDB_SERVING_CATALOG_REFRESH_S).
            expr: medallion_freshness_seconds > 300
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Medallion end-to-end freshness stale (> 5m)"
              description: "The newest data visible in serving is {{ $value | humanizeDuration }} old (ADR-0016 SLO 5m). The Bronze→Silver→serving path has regressed past near-real-time — check the chained transform pipeline / warm transform worker, the incremental map-export, and the duckdb-serving catalog refresh cadence."

          - alert: MedallionFreshnessProbeFailing
            # Anti-fantasy (C2 doctrine): if medallion_freshness_seconds silently stops being emitted
            # (serving unreachable or the spine view empty/never-written), MedallionFreshnessStale can
            # never fire and the NRT SLO goes unverified. This surfaces that blind spot explicitly.
            expr: |
              (medallion_freshness_query_success == 0)
              or
              (absent(medallion_freshness_query_success) == 1)
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Medallion freshness probe not reporting"
              description: "medallion_freshness_query_success is 0 or absent for 15m — the exporter could not read max(ingested_at) from the Silver spine serving view (duckdb-serving unreachable, or the view is empty/never written). The ADR-0016 near-real-time SLO is unverified until it recovers."

          - alert: BrainFreshnessExporterDown
            # The exporter cannot reach duckdb-serving at all (or is not scraped). If this fires, the
            # staleness alerts above are blind — treat the freshness SLO as unverified until it recovers.
            expr: |
              (brain_data_freshness_up == 0)
              or
              (absent(brain_data_freshness_up) == 1)
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Data-freshness exporter cannot reach duckdb-serving"
              description: "brain_data_freshness_up is 0 or absent for 10m — the freshness exporter is down or cannot query duckdb-serving (the sole serving engine). All freshness SLAs are unverified until it recovers; check the duckdb-serving service and the brain-freshness-exporter target."

  ##############################################################################
  # Brain runtime-health rules — PROD-ONLY BY DESIGN (AUD-INFRA-030/-031): these
  # read cAdvisor/kube-state-metrics series and the prod-only duckdb-serving
  # scrape job, none of which exist in the local compose Prometheus. A canonical
  # infra/observe/alerts copy would either fire falsely forever locally
  # (absent(up{job="duckdb-serving"})) or be vacuously loaded — so there is
  # deliberately no local twin (tools/lint/slo-rules-parity.sh reports prod-only
  # keys as a WARN, which is this map's documented, intended state).
  ##############################################################################
  brain-runtime:
    groups:
      # ── Serving engine liveness (AUD-INFRA-030) ─────────────────────────────
      - name: brain-duckdb-serving
        rules:
          - alert: DuckDBServingDown
            # duckdb-serving is the SOLE serving engine (ADR-0014) — every BFF/app analytics read
            # 500s without it (the exact recurring outage class Trino had: OOM-killed serving pod).
            # The absent() arm covers the never-scraped case BrainTargetDown structurally cannot
            # see (no target ⇒ no `up` series) — e.g. the PodMonitor deleted or the duckdb-serving
            # chart's metrics disabled. Fires only when EVERY replica is down/unscraped (max ==
            # 0/absent) — a single lost Spot replica is the HPA's problem, not a page.
            expr: |
              (max(up{job="duckdb-serving"}) == 0)
              or
              (absent(up{job="duckdb-serving"}) == 1)
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "duckdb-serving (sole serving engine) is down or unscraped"
              description: "Every duckdb-serving replica's /metrics target is down or absent for 2m — all serving reads (brain_serving.mv_*) are failing or serving health is unverifiable. Check the pods in ns duckdb-serving (kubectl -n duckdb-serving get pods), their memory_limit posture (infra/helm/duckdb-serving), and the duckdb-serving PodMonitor."

          - alert: DuckDBServingQueryFailureRateHigh
            # Serving degradation BEFORE total outage: sustained engine-side (5xx) query failures.
            # duckdb_serving_query_failures_total counts ONLY engine errors (db/iceberg/duckdb/
            # serving/server.py) — guard rejections (400) and semaphore refusals (503 saturated)
            # have their own counters and are excluded, matching the old rule's internal-only intent.
            expr: |
              sum(rate(duckdb_serving_query_failures_total[5m]))
                / clamp_min(sum(rate(duckdb_serving_queries_total[5m])), 0.001) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "duckdb-serving query failures > 10% for 10m"
              description: "More than 10% of duckdb-serving queries are failing with engine errors — serving reads over brain_serving.mv_* are degrading (memory pressure, Iceberg REST/S3 trouble, or a bad view — check /readyz views_skipped). Check pod logs in ns duckdb-serving and iceberg-rest health."

      # ── OOM kills (AUD-INFRA-031) ───────────────────────────────────────────
      # OOM is the platform's dominant historical failure mode (the retired Trino coordinator,
      # connect worker, stream-worker under batch), and a single OOM that restarts cleanly never
      # trips KubePodCrashLooping. Sources are both live in prod: container_oom_events_total
      # (cAdvisor) and kube_pod_container_status_last_terminated_reason (kube-state-metrics).
      - name: brain-oom
        rules:
          - alert: BrainContainerOomKilled
            # Either signal suffices: a cAdvisor-counted OOM event, or a container whose LAST
            # termination was OOMKilled and which restarted inside the window (the join guards
            # against alerting forever on a stale last_terminated_reason from days ago).
            expr: |
              (sum by (namespace, pod, container) (increase(container_oom_events_total{container!=""}[15m])) > 0)
              or
              (
                (max by (namespace, pod, container) (kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}) == 1)
                and
                (sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total[15m])) > 0)
              )
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "OOM kill: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
              description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOM-killed in the last 15m. Even a clean restart loses in-flight work — check its memory limit vs working set and the tier's heap bounds (duckdb-serving memory_limit / connect KAFKA_HEAP_OPTS / node heap)."

          - alert: BrainDataSpineOomKilled
            # CRITICAL escalation for the tiers where one OOM means event risk or serving outage:
            # kafka (broker + the SOLE Bronze landing writer), duckdb-serving (sole serving engine),
            # collector (ingest edge, 99.95% SLA), stream-worker (projections/DQ).
            expr: |
              (sum by (namespace, pod, container) (increase(container_oom_events_total{container!="", namespace=~"kafka|duckdb-serving|collector|stream-worker"}[15m])) > 0)
              or
              (
                (max by (namespace, pod, container) (kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace=~"kafka|duckdb-serving|collector|stream-worker"}) == 1)
                and
                (sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace=~"kafka|duckdb-serving|collector|stream-worker"}[15m])) > 0)
              )
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Data-spine OOM kill: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
              description: "A data-spine container ({{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}) was OOM-killed in the last 15m — Bronze landing, ingest, or serving took an availability hit (no-event-loss budget). Check memory sizing (kafka-connect values-prod heapOpts per AUD-IMPL-024; duckdb-serving DUCKDB_SERVING_MEMORY_LIMIT vs its container limit) before it recurs."

  ##############################################################################
  # Brain scale-posture tripwires (Wave-3: AUD-IMPL-027 / AUD-OPS-029 /
  # AUD-OPS-030). VERBATIM conversion of
  # infra/observe/alerts/scale-tripwires.rules.yml — that file stays the
  # canonical, promtool-checkable source (the local compose Prometheus loads
  # alerts/*.rules.yml directly); KEEP THE TWO IN LOCKSTEP (same doctrine as
  # brain-slo/freshness above). NEW rule file appended by the Wave-3
  # scale-infra pass — the brain-slo/freshness blocks above are owned by other
  # waves and were not touched.
  #
  # Series source: the Argo Workflows controller /metrics (metricsConfig +
  # ServiceMonitor flipped on in infra/argocd/envs/prod/argo-workflows.yaml);
  # the v4 transform + bronze-maintenance CronWorkflows emit the
  # brain_transform_workflow_* metrics (Spark→DuckDB rename tracked 2026-07-18).
  #
  # HONESTY NOTE (AUD-OPS-032): the Aurora ACU / Redis eviction tripwires are
  # CloudWatch metric alarms in terraform (modules/aurora + modules/elasticache)
  # — no CloudWatch exporter runs in-cluster, so PromQL rules over those series
  # would be loaded-but-dead. Knob decisions: docs/ops/scale-knobs.md.
  ##############################################################################
  scale-tripwires:
    groups:
      - name: brain-scale-tripwires
        rules:
          - alert: TransformTierSlow
            # A Silver/Gold tier sustaining >20 min wall-time — far past the incremental steady state
            # (minutes) and eating into the 9000s bootstrap ceiling. Realtime gauge → this fires
            # DURING the slow run, and the frozen final value keeps it visible after completion.
            expr: max by (tier) (brain_transform_workflow_duration_seconds) > 1200
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Transform {{ $labels.tier }} tier ran > 20 min"
              description: "The {{ $labels.tier }} CronWorkflow wall-time exceeded 1200s (value {{ $value | humanizeDuration }}). At the */5 realtime cadence Forbid is skipping ticks — freshness is degrading. Per-mart durations: kubectl -n argo logs the workflow pod (structured {\"job\":…} result lines)."

          - alert: TransformTierNearDeadline
            # 8100s = 90% of the 9000s activeDeadlineSeconds — the run is about to be killed and the
            # medallion (and every mv_* serving view over it) goes stale platform-wide.
            expr: max by (tier) (brain_transform_workflow_duration_seconds) > 8100
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Transform {{ $labels.tier }} tier at {{ $value | humanizeDuration }} — approaching the 9000s deadline"
              description: "The {{ $labels.tier }} CronWorkflow is within ~15 min of activeDeadlineSeconds (9000s). If it is killed, Silver/Gold freshness stalls platform-wide (serving reads only brain_serving.mv_* over these marts). Check for a re-bootstrap (lost watermark) or keystone fragmentation before it recurs."

          - alert: TransformTierRunFailed
            # A tier run ended Failed (deadline, OOMKill, retries exhausted) — covers the chained
            # v4-medallion transform tier AND the bronze-maintenance workflow + its fail-soft
            # bronze-dedup step (H4: dedup failure no longer aborts compaction/expiry — it surfaces
            # HERE as tier=bronze-dedup instead). Downstream mart staleness is caught by the freshness
            # rules; this points at the CAUSE hours earlier.
            expr: sum by (tier) (increase(brain_transform_workflow_failed_total[2h])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.tier }} workflow FAILED in the last 2h"
              description: "A {{ $labels.tier }} CronWorkflow run (or fail-soft step) ended Failed (deadline overrun, OOMKill, valve refusal, or retries exhausted). Inspect: argo -n argo list; kubectl -n argo logs <pod>. tier=bronze-dedup ⇒ Bronze may still hold duplicates (Silver MERGE remains the backstop) — see bronze_dedup.py output for the memory-valve / BRONZE_DEDUP_FORCE guidance."
