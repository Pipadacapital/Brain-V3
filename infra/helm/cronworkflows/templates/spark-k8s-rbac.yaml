{{/*
spark-k8s-rbac.yaml — RBAC for Spark-on-Kubernetes CLUSTER mode (the migration in
docs/ops/spark-on-k8s-migration.md). Rendered ONLY when sparkV4.executionMode == "k8s".

In cluster mode the Spark DRIVER pod (running as sparkV4.k8s.serviceAccountName) creates, watches,
and deletes its own EXECUTOR pods (+ the per-app configmap/service). This grants exactly that, scoped
to the release namespace (least privilege — no cluster-wide rights). In "local" mode (default) the
crons are single-JVM, no executor pods are launched, and none of this renders.
*/}}
{{- $v4k8s := eq (.Values.sparkV4.executionMode | default "local") "k8s" -}}
{{- $brk8s := eq (.Values.sparkBronze.executionMode | default "local") "k8s" -}}
{{- if or $v4k8s $brk8s -}}
{{/* sparkV4 + sparkBronze share the same driver SA ("spark"); render its RBAC if EITHER is in k8s mode. */}}
{{- $k := ternary .Values.sparkV4.k8s .Values.sparkBronze.k8s $v4k8s -}}
{{- $ns := $k.namespace | default .Release.Namespace -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $k.serviceAccountName }}
  namespace: {{ $ns }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/component: spark-driver
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $k.serviceAccountName }}-executor-mgmt
  namespace: {{ $ns }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
rules:
  # Driver manages the lifecycle of its executor pods.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection"]
  # Per-application driver configmap (Spark writes the executor config here) + executor metrics service.
  - apiGroups: [""]
    resources: ["configmaps", "services"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read pod logs/status for in-driver diagnostics.
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $k.serviceAccountName }}-executor-mgmt
  namespace: {{ $ns }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $k.serviceAccountName }}
    namespace: {{ $ns }}
roleRef:
  kind: Role
  name: {{ $k.serviceAccountName }}-executor-mgmt
  apiGroup: rbac.authorization.k8s.io
{{- end }}
