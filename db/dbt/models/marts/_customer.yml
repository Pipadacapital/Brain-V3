version: 2

models:
  - name: silver_customer
    description: >
      Canonical customer entity — one row per (brand_id, brain_id), the identity-resolved customer
      spine. Lifetime orders/value + first/last seen, derived additively from silver_order_state.
    columns:
      - name: brand_id
        tests: [not_null]
      - name: brain_id
        description: "Identity-resolved customer key (from the identity graph)."
        tests: [not_null]
      - name: lifetime_orders
        tests: [not_null]
      - name: lifetime_value_minor
        description: "Additive SUM of realized order value, BIGINT minor units (I-S07)."
        tests: [not_null]

  - name: gold_customer_360
    description: >
      Customer 360 serving mart (brain_gold): per-customer lifetime value + order counts + lifecycle
      breakdown (delivered/rto/cancelled/refunded). Additive components only; scores live in features.
    columns:
      - name: brand_id
        tests: [not_null]
      - name: brain_id
        tests: [not_null]
      - name: lifetime_value_minor
        tests: [not_null]
      - name: delivered_orders
        tests: [not_null]
      - name: rto_orders
        tests: [not_null]
