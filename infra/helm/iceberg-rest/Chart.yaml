apiVersion: v2
name: iceberg-rest
description: >-
  Brain V4 Iceberg REST catalog (apache/iceberg-rest-fixture) for prod — the namespace→table
  pointer store fronting Trino + the Spark medallion jobs. Prod backs the JdbcCatalog with
  Aurora PostgreSQL (NOT the local file/SQLite, which doesn't scale concurrent writers —
  see the iceberg-catalog-sqlite-lock learnings) and reads/writes S3 via the pod IRSA role.
type: application
version: 0.1.0
appVersion: "1.9.2"
