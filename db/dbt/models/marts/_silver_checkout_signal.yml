version: 2

models:
  - name: silver_checkout_signal
    description: >
      Canonical Silver payments/checkout-signal mart. One row per (brand_id, event_id) — every
      checkout/risk signal from every payments source (GoKwik RTO-Predict + Shopflo abandoned-checkout),
      normalized through one shape. signal_type is the deterministic discriminant; per-signal columns are
      NULL for the other signal. Additive projection of Bronze; non-additive rollups (RTO-risk
      distribution, abandoned-checkout funnel) live in packages/metric-engine (ADR-004). Per-brand
      isolation is enforced at the Silver READ seam (I-ST01), not in dbt.
    columns:
      - name: brand_id
        description: "Tenant key (UUID→text). First key/distribution/order column."
        tests: [not_null]
      - name: event_id
        description: >
          Bronze idempotency key — uniquely identifies the signal event. Grain key with brand_id;
          uniqueness of (brand_id, event_id) is guaranteed by the deterministic full-rebuild model + an assert_*_grain singular test (the mart is DUPLICATE-key + date-partitioned per ADR-0005).
        tests: [not_null]
      - name: signal_type
        description: "Deterministic signal discriminant."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rto_predict', 'checkout_abandoned']
      - name: source
        description: "Payments source provenance (gokwik | shopflo)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['gokwik', 'shopflo']
      - name: order_id
        description: "Order/checkout natural key (ledger spine for rto_predict; may be NULL for pre-order checkout)."
      - name: risk_flag
        description: "Normalized categorical RTO risk band (rto_predict only; NULL for checkout). Closed set + 'unknown'."
        tests:
          - accepted_values:
              arguments:
                values: ['high', 'medium', 'low', 'control', 'unknown']
      - name: total_price_minor
        description: "Abandoned-cart value, minor units BIGINT (checkout_abandoned only; I-S07)."
      - name: total_discount_minor
        description: "Abandoned-cart discount, minor units BIGINT (checkout_abandoned only; I-S07)."
      - name: has_address
        description: "True iff the abandoned checkout reached the address step (checkout_abandoned only)."
      - name: currency_code
        description: "CHAR(3) paired with the money columns (checkout_abandoned only)."
      - name: occurred_at
        description: "Signal event-time (timestamp). Drives the metric windows + latest-per-order fold."
      - name: is_synthetic
        description: "True iff the contributing row was synthetic-sourced (drives the UI Synthetic badge)."
        tests: [not_null]
