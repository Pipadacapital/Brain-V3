# Prod overrides for the strimzi-kafka CR chart. Cluster name resolves to brain-prod-kafka.
environment: prod
clusterName: ""   # -> brain-prod-kafka

kafka:
  version: "3.8.1"
  metadataVersion: "3.8-IV0"

  nodePool:
    name: combined
    replicas: 3
    roles:
      - controller
      - broker
    storage:
      size: 50Gi
      class: gp3
      deleteClaim: false
    resources:
      # Sized to fit the CHEAPER streaming node (t4g.large, 2 vCPU / 8 GiB,
      # ~6.3Gi allocatable after Karpenter overhead): cpu request 1 (bursts to
      # limit 4 = whole node), memory request 5Gi / limit 6Gi around a 3Gi JVM
      # heap (below). With the streaming pool's t4g.large|t4g.xlarge range,
      # Karpenter picks the cheaper t4g.large. Raise heap+memory (→ t4g.xlarge)
      # if real traffic needs more.
      requests:
        cpu: "1"
        memory: 5Gi
      limits:
        cpu: "4"
        memory: 6Gi
    jvm:
      xms: 3072m
      xmx: 3072m
    # AUD-PROD-006: pin the KRaft broker pods (stateful, 'no event loss') to the
    # streaming Karpenter pool — its WhenEmpty consolidation NEVER bin-packs live
    # brokers off a node, unlike the batch/trino pools' WhenEmptyOrUnderutilized.
    # Strimzi PodTemplate has no nodeSelector — required nodeAffinity is the contract.
    # 2026-07-12 INCIDENT: brokers additionally pinned to ON-DEMAND capacity.
    # Spot reclaims churned all 3 brokers through 3 node generations in ~40 min
    # (repeated quorum loss; ap-south-1a t4g spot is volatile). Consumers/Connect
    # stay on spot — only the 3 broker nodes pay on-demand (~+$100/mo vs the
    # repeated-outage alternative). Karpenter provisions on-demand nodes for
    # pods that REQUIRE karpenter.sh/capacity-type=on-demand.
    # REL-6 (04-architecture-review Reliability + 06-redesign §2.7): spread the 3
    # brokers across AZs so an AZ loss can't take 2 of 3 and break the KRaft quorum
    # (minInsyncReplicas=2 tolerates ONE broker loss — an AZ carrying 2 brokers would
    # exceed that). topologyKey is the AZ label (same key rack-awareness resolves from).
    # whenUnsatisfiable=ScheduleAnyway makes this a SOFT preference: it steers the
    # scheduler toward 3 distinct AZs but NEVER blocks the on-demand broker roll if
    # Karpenter can only place them in fewer AZs (quorum availability > perfect spread;
    # 'no event loss' core rule). The required hostname anti-affinity (distinct nodes)
    # and the streaming/on-demand nodeAffinity below remain the HARD contract, and
    # rack-awareness (kafka.rack) is untouched — this is purely additive placement.
    # maxSkew=1 with 3 brokers over (up to) 3 AZs targets a 1/1/1 layout. Reversible:
    # remove this block to revert to hostname-only spread.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            strimzi.io/name: brain-prod-kafka-kafka
    affinity:
      # 2026-07-12 post-roll finding: two brokers landed on ONE node (quorum =
      # one node loss away). REQUIRED anti-affinity spreads the 3 brokers across
      # distinct nodes — with 3 on-demand broker nodes this is always satisfiable.
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                strimzi.io/name: brain-prod-kafka-kafka
            topologyKey: kubernetes.io/hostname
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: brain.platform/pool
                  operator: In
                  values: ["streaming"]
                # RE-ENABLED 2026-07-12 (same day): the vCPU quota increase
                # (L-1216C47A → 32) was APPROVED, unblocking the #47 pin that
                # VcpuLimitExceeded rolled back (#50). Brokers require on-demand
                # (~+$100/mo) — spot reclaims broke quorum 3× on 2026-07-12;
                # 'no event loss' is a core rule. Syncing this rolls the brokers
                # ONE controlled time (operator healthy, PDB minAvailable=2).
                - key: karpenter.sh/capacity-type
                  operator: In
                  values: ["on-demand"]

  listeners:
    plain:
      enabled: true
      port: 9092
    tls:
      enabled: true
      port: 9093

  config:
    autoCreateTopics: false
    # REL-6 AZ-fault tolerance: RF=3 / minISR=2 is UNCHANGED (do not touch blindly).
    # With the 1/1/1 AZ spread above, a single-AZ loss = a single-broker loss: 2 of 3
    # replicas + 2 of 3 KRaft controllers survive, so minISR=2 is still met and the
    # quorum holds (writes continue). Losing an AZ that carried 2 brokers would drop
    # below minISR — which is exactly what the ScheduleAnyway spread now works to
    # prevent. RF=3 already tolerates one AZ loss; no replication change required.
    defaultReplicationFactor: 3
    minInsyncReplicas: 2
    offsetsTopicReplicationFactor: 3
    transactionStateLogReplicationFactor: 3
    transactionStateLogMinIsr: 2
    logRetentionMs: 604800000

# AUD-LOCAL-016-FUP1: broker JMX exporter (metricsConfig ← verbatim copy of
# infra/observe/kafka-jmx-exporter.yml — same metric names as local) + Strimzi
# kafkaExporter (consumer-group lag) + PodMonitors with the SLO rules' job names
# (kafka-jmx-exporter / kafka-exporter).
metrics:
  enabled: true

entityOperator:
  topicOperator:
    enabled: true
  userOperator:
    enabled: true

topics:
  prefix: prod
  # Tenant-keyed (brand_id) partition count; 12 mirrors the local compose num.partitions.
  partitions: 12
  replicas: 3
  retention:
    standardMs: 604800000   # 7 days
    longMs: 2592000000      # 30 days
