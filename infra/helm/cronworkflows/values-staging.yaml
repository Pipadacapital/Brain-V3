# duckdb image (db/iceberg/duckdb/Dockerfile) — runs the bronze/medallion maintenance + erasure (via the
# PyIceberg maintenance client it carries) AND the V4 Silver/Gold transform crons (.sparkV4.image — CI digest-pins both,
# one image). Bronze LANDING is the kafka-connect chart (ADR-0010). Spark→DuckDB cutover replaces
# brain-spark-bronze-prod. Single-account posture: staging references the same immutable digest in the
# -prod repo (build once, promote the same artifact). The digest is a PLACEHOLDER until the first
# brain-duckdb build lands (deploy.yml build-data-images bumps it).
sparkBronze:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
    tag: ""
    digest: "sha256:899cb5f32f72478020d72649f16c88a62d8308472e7d4440ebf9dffd48a57b57"
# duckdb V4 Silver/Gold transform crons — same image as sparkBronze (one brain-duckdb image).
sparkV4:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
    tag: ""
    digest: "sha256:899cb5f32f72478020d72649f16c88a62d8308472e7d4440ebf9dffd48a57b57"
# ADR-0016 D3 / CORE↔IDENTITY re-split — resident warm transform worker (staging validation env).
# transform-worker values-staging already has enabled=true; this is the LOCKSTEP flag its header calls
# for — it SUPPRESSES the v4-medallion (CORE) cron so the resident Deployment is the sole CORE writer.
# v4-identity is NOT suppressed (gate dropped the `not transformWorker.enabled` term) — it stays the sole
# IDENTITY writer. Resident runs CORE-ONLY so it never double-writes the identity marts. Rollback = flip
# this + transform-worker enabled back to false together.
transformWorker:
  enabled: true
# The job pods read the same secret as the core/stream-worker deployments (DATABASE_URL,
# BRAIN_APP_DATABASE_URL, DUCKDB_SERVING_HOST, ICEBERG_*). External Secrets ← AWS Secrets Manager.
envSecretName: core-env
serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-staging-jobs
