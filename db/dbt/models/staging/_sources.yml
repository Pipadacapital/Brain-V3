# ============================================================================
# Silver-tier source declaration — the Bronze/source → dbt read boundary.
# feat-silver-tier-order-state (Stage 3, @data-engineer).
#
# THE PROD-SWAP BOUNDARY: this file is what changes when the read path graduates from
# the dev JDBC catalog to the Iceberg Bronze catalog. The intermediate + mart models
# never reference a catalog name — they only `ref()` upstream models.
#
# NUANCE (ADR-0002 Slice 4, verified against StarRocks): the flip is NOT a single
# database-name swap. Only the BRONZE-DERIVED sources read raw events and move to the
# Iceberg catalog (brain_bronze_local → brain_bronze.collector_events):
#   - bronze_touchpoint_src, bronze_order_line_src
# The other two are DERIVED Postgres tables (NOT raw Bronze) and STAY on the JDBC catalog:
#   - realized_revenue_ledger (worker-written ledger), connector_journey_stitch_map_src
# And the Iceberg table is RAW collector_events — so the per-event-type filter + line_items
# UNNEST that today live in the PG read-shim views must move INTO the staging models when
# the Bronze sources flip (the shims are PG-only). That staging refactor + mart parity is
# gated on a dbt-capable env + richer Iceberg event data (today Iceberg holds order.live.v1
# only). The runtime gate is the PG⇄Iceberg parity oracle (db/iceberg/spark/bronze_parity_check.py).
#
# DEV: `database` is the StarRocks external JDBC catalog `brain_oltp_pg`
# (db/starrocks/oltp_jdbc_catalog.sql), `schema` is the Postgres schema `public`.
# dbt renders `brain_oltp_pg.public.realized_revenue_ledger` for cross-catalog reads.
#
# DEV BOUNDARY (honest): the JDBC catalog connects to Postgres as superuser `brain`,
# which BYPASSES RLS — so this source is CROSS-BRAND by construction. That is correct:
# dbt is the ETL writer (it builds Silver for all brands). Per-brand isolation is
# enforced downstream at the Silver READ path (metric-engine seam, I-ST01), NOT here.
# ============================================================================
version: 2

sources:
  - name: oltp
    description: "Canonical order/commerce truth in Postgres OLTP, read via the brain_oltp_pg JDBC external catalog. PROD: swaps to the Iceberg Bronze catalog with no downstream change."
    database: brain_oltp_pg   # StarRocks external catalog name (DEV: JDBC→Postgres; PROD: Iceberg Bronze)
    schema: public            # Postgres schema
    tables:
      # ── Medallion realignment (Epic 1): Silver recognition-from-Bronze shims ────────────────
      - name: brand_horizons_src
        identifier: brand_horizons_src
        description: "Per-brand COD/prepaid recognition horizons (tenancy.brand, operational config) for finalization."
        columns:
          - name: brand_id
            description: "Tenant key (UUID→text)."
          - name: cod_recognition_horizon_days
            description: "Days after order before a COD order's revenue is considered final (recognized on delivery instead)."
          - name: prepaid_recognition_horizon_days
            description: "Days after order before a prepaid order finalizes (return/cancel window)."

      # ── feat-journey-touchpoint (Phase 4) sources ──────────────────────────────
      - name: bronze_touchpoint_src
        # Read THROUGH the Postgres read-shim view (db/starrocks/bronze_touchpoint_src.sql):
        # casts bronze_events.brand_id/event_id uuid→text and pre-filters to journey
        # event_types. JSONB payload rides through; staging extracts via get_json_string.
        identifier: bronze_touchpoint_src
        description: >
          SDK journey events from Bronze (bronze_events, migration 0016) filtered to
          page.viewed / cart.viewed / cart.item_added. The journey signal lives inside
          payload.properties.{brain_anon_id,session_id,utm.*,click_ids.*,referrer,landing_path}.
          Cross-brand by construction (superuser JDBC read — ETL-writer posture);
          per-brand isolation is enforced at the Silver READ seam (I-ST01), not here.
        columns:
          - name: brand_id
            description: "Tenant key (UUID→text). First key column of every Silver table."
          - name: event_id
            description: "Bronze idempotency key (UUID→text). Dedup grain with brand_id."
          - name: event_type
            description: "page.viewed | cart.viewed | cart.item_added."
          - name: occurred_at
            description: "Event-time (timestamptz)."
          - name: payload
            description: "JSONB — the SDK event payload. Journey signal under .properties."

      # ── feat-shopify-order-depth (Silver line-grain) source ────────────────────
      - name: bronze_order_line_src
        # Read THROUGH the Postgres read-shim view (db/starrocks/bronze_order_line_src.sql):
        # picks the LATEST order.* event per (brand_id, order_id) and UNNESTS its
        # payload.properties.line_items into one row per (order, line_index); casts uuid/jsonb
        # → text. The staging model types + dedups; no StarRocks JSON-array unnest needed.
        identifier: bronze_order_line_src
        description: >
          Per-line composition of each order's latest state, unnested from bronze_events
          payload.properties.line_items (the mapper's order-depth output). Money is minor-units
          BIGINT-as-string. Cross-brand by construction (superuser JDBC read — ETL-writer
          posture); per-brand isolation is enforced at the Silver READ seam (I-ST01), not here.
        columns:
          - name: brand_id
            description: "Tenant key (UUID→text). First key/distribution/order column."
          - name: order_id
            description: "Order natural key (TEXT). Grain key with line_index."
          - name: line_index
            description: "1-based ordinal within the order's line_items (INT). Grain key."
          - name: sku
            description: "Line SKU (TEXT, nullable)."
          - name: quantity
            description: "Line quantity (TEXT→BIGINT in staging)."
          - name: unit_price_minor
            description: "Per-unit price, minor units (TEXT→BIGINT; I-S07)."
          - name: line_total_minor
            description: "Line total, minor units (TEXT→BIGINT; I-S07)."
          - name: line_discount_minor
            description: "Line discount, minor units (TEXT→BIGINT; I-S07)."
          - name: currency_code
            description: "CHAR(3), paired with the money columns."
          - name: occurred_at
            description: "Event-time of the order's latest state (timestamptz)."

      # ── Phase G (marketing) sources — ad-spend + attribution-credit ledgers ──────
      - name: ad_spend_ledger
        # Read THROUGH the Postgres read-shim view (db/starrocks/oltp_pg_read_shim.sql):
        # casts brand_id uuid→text for the JDBC catalog. Feeds silver_marketing_spend.
        identifier: silver_marketing_spend_src
        description: >
          Per-(platform, level, stat_date) ad spend (migration 0029). spend_minor is BIGINT
          minor units (I-S07), click-date anchored (stat_date, ADR-AD-8). Cross-brand by
          construction (superuser JDBC read); per-brand isolation at the Silver READ seam.
        columns:
          - name: brand_id
            description: "Tenant key (UUID→text). First key column of every Silver table."
          - name: spend_event_id
            description: "Deterministic dedup id (ADR-AD-5). Grain key with brand_id."
          - name: platform
            description: "'meta' | 'google_ads'."
          - name: stat_date
            description: "Click-date-anchored stat date (canonical, ADR-AD-8)."
          - name: spend_minor
            description: "Money in BIGINT minor units (I-S07). Never float."
          - name: currency_code
            description: "CHAR(3), always paired with spend_minor."

  # ── ADR-0002 Slice 4b: the Iceberg Bronze source (the flip target) ──────────────
  # The StarRocks external Iceberg catalog over Bronze (db/starrocks/external_iceberg_catalog.sql,
  # written by the Spark materializer). RAW collector_events — native string brand_id/event_id and a
  # STRING payload (no uuid/jsonb cast → no read-shim). Staging models gated by var('bronze_source',
  # 'pg'): when 'iceberg' they read this source + apply the event-type filter the PG shim used to do.
  - name: bronze_iceberg
    description: "Raw Bronze events on Iceberg (StarRocks REST catalog → S3). The Phase-3 Bronze read path."
    database: brain_bronze_local   # StarRocks external Iceberg catalog
    schema: brain_bronze           # Iceberg namespace
    tables:
      - name: collector_events
        description: >
          The raw append-only Bronze event log (one row per (brand_id, event_id)). payload is the
          verbatim envelope JSON STRING — payload.event_name + payload.properties.* resolve exactly
          as the PG BronzeRow payload, so staging extraction is identical.
        columns:
          - name: brand_id
            description: "Tenant key (native STRING — no uuid cast needed)."
          - name: event_id
            description: "Bronze idempotency key (native STRING)."
          - name: event_type
            description: "Semantic event type — filter to journey types in staging."
          - name: occurred_at
            description: "Event-time (timestamp)."
          - name: payload
            description: "Verbatim envelope JSON (STRING). Journey signal under .properties."

