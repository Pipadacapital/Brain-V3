image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-core-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

streamWorkerImage:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

# spark-bronze image — Iceberg Bronze sink + maintenance crons. Also reused by the V4 Spark
# silver/gold/mv-refresh crons (.sparkV4.image — CI promotes both digests build-once from staging).
sparkBronze:
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/brain-spark-bronze-prod
    tag: ""
    digest: ""

# spark V4 Silver/Gold transform + mv refresh crons — same image as sparkBronze (the Dockerfile carries the
# V4 marts). Flip enabled:true once the prod V4 cluster + digest are ready (gated off by default).
sparkV4:
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/brain-spark-bronze-prod
    tag: ""
    digest: ""

envSecretName: core-env

serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-prod-jobs
