replicaCount: 3

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-stream-worker-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: "sha256:77837afda6ef39d413c4bac50916ef4841bb44a911e3ae9aa6eee44914e885e3"

envSecretName: stream-worker-env

# AUD-OBS-2: OTel export deliberately OFF in prod until the trace/metric backend
# (Grafana Cloud vs in-cluster Tempo) is decided + its endpoint/credentials are seeded
# (OTEL_EXPORTER_OTLP_HEADERS in stream-worker-env). Flipping this value is the entire ON-switch.
otelExporterOtlpEndpoint: ""

# Helm lists REPLACE (no merge) — the two defaults are repeated verbatim, then the prod-only wiring.
env:
  - name: SERVICE_NAME
    value: stream-worker
  # T2-10: the health server binds this port; the helm probes (probes.port) target it.
  - name: HEALTH_PORT
    value: "8090"
  # AUD-OPS-037: activate the erasure orchestrator's Bronze raw-PII step (STEP 4) — submit the
  # `bronze-raw-erasure` WorkflowTemplate (cronworkflows chart, ns argo). Default submit mode is
  # 'k8s': the prod argo-workflows app is CONTROLLER-ONLY (no REST server), so the submit is a
  # Kubernetes-API Workflow create using the pod's projected SA token; RBAC comes from the
  # bronze-raw-erasure-submitter Role/RoleBinding in the cronworkflows chart. Unset this var to
  # fall back to the registered-DISABLED seam (honest no-op, logged — never a silent success).
  - name: ARGO_SERVER_URL
    value: https://kubernetes.default.svc
  # AUD-OPS-041 (2026-07-18): throttle the connector ingest scheduler 45s → 1h. The default
  # 45s cadence re-dispatches every connector's repull run() 80×/hour; each ad-spend run()
  # re-emits its trailing ~28-day window, and each order run() its recent window — all appended
  # to APPEND-ONLY Bronze (dedup is Silver's job). At steady state Silver's watermark clips each
  # tick to the newest slice, but the volume (~135 spend rows/s observed) inflates Bronze and,
  # after any Silver rebuild-from-empty, makes the cold fold OOM. Ad spend / order state don't
  # change sub-hourly, so hourly repull loses no freshness that matters. Floor is 15s in code.
  # Rollback: delete this var (returns to the 45s default).
  - name: SYNC_SCHEDULER_INTERVAL_MS
    value: "3600000"

# AUD-LOCAL-016-FUP1: prod kube-prometheus-stack scrapes the worker's /metrics (HealthServer
# containerPort — headless, so a PodMonitor) as job "brain-stream-worker" (up{job=~"brain-.*"}).
metrics:
  podMonitor:
    enabled: true

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-stream-worker

# AUD-PROD-006: the live Kafka consumers ride the streaming pool (t4g.large Spot,
# WhenEmpty consolidation — never bin-packs live consumers off a node; the HPA
# replica floor keeps the warm baseline the karpenter README relies on).
#
# AUD-COST (2026-07-13): ALSO require capacity-type=spot. The streaming pool is
# spot-first ["spot","on-demand"], but the Kafka BROKERS pin required
# on-demand nodes into this pool, and stream-worker (no capacity-type
# constraint) was bin-packing onto those broker on-demand nodes → the whole
# consumer tier ran on the priciest capacity for no reason. Pinning spot forces
# Karpenter to provision cheap spot nodes for the consumers instead. SAFE: these
# consumers are interruption-tolerant by design (idempotent writes,
# commit-after-write, DLQ, durable Redis retry counters) — a spot reclaim just
# triggers a rebalance+resume, no loss. Tradeoff: during a genuine spot drought
# across ALL streaming instance types (t4g.large/xlarge + m7g.large/xlarge —
# rare) these pods sit Pending instead of falling back to on-demand; lag builds
# harmlessly (Kafka retains, KEDA/DLQ) and self-heals when spot returns.
# Rollback: delete the capacity-type line (falls back to spot-or-on-demand).
nodeSelector:
  brain.platform/pool: streaming
  karpenter.sh/capacity-type: spot

# AUD-COST-2: right-sized from live prod telemetry (Prometheus 2d, 2026-07-12):
# CPU p95 138m / max 156m, mem p95 ~242Mi / max 479Mi (replay burst) per pod.
# Was 500m/1Gi. New: cpu 250m — the CPU-only HPA (70%) now fires at 175m, just
# above the observed max, so real consumer lag scales out instead of sitting at
# 20%/70% forever; mem 640Mi keeps ~1.3x the burst max (no memory HPA target on
# this chart). LIMITS UNCHANGED (2 CPU / 2Gi burst+OOM budget). Revert =
# restore old requests.
resources:
  requests:
    cpu: 250m
    memory: 640Mi
  limits:
    cpu: "2"
    memory: 2Gi

# P2.5 + AUD-OPS-030: autoscaling on in prod, now KEDA-lag-driven. The live-topic partition
# count is the HARD ceiling on useful replicas (a replica beyond it owns no partition → idle).
# MEASURED prod reality (2026-07-11 audit): ALL topics are 12 partitions — the strimzi chart
# clamps `partitions` to 6..12 and values-prod sets 12; the previous "96 partitions (H5)"
# comment here was never true against that chart. The old maxReplicas=48 was ALSO
# unschedulable: 48×500m = 24 CPU > the whole 20-CPU streaming pool (shared with Kafka
# 3×1CPU + collector). maxReplicas=12 == partitions == honest schedulable capacity; raise
# partitions + pool limits + this ceiling together as ONE deliberate change.
# CPU was also the wrong trigger for an I/O-bound consumer (lag grows under 70% CPU —
# burst recovery after downtime/replay) → keda.enabled renders the kafka-lag ScaledObject
# (KEDA operator installed via infra/argocd/envs/prod/keda.yaml, proven on trino) and
# suppresses the plain CPU HPA. Rollback = keda.enabled: false (plain CPU HPA returns).
autoscaling:
  enabled: true
  # ADR-0015 right-size: stream-worker is no longer the live-lane consumer fleet
  # (CollectorEventConsumer + identity/consent/cache consumers removed; Kafka
  # Connect lands Bronze, identity is a Silver-stage batch job; WS4 completion:
  # the erasure orchestrator is a PG poll lane over ops.erasure_request_queue —
  # NO Kafka consumers remain in this process). What remains is the erasure poll
  # lane + the cron-invoked connector pull jobs — a job-runner, not a throughput
  # tier. 1 warm replica suffices; CPU HPA bursts to 3 for job overlap. A drain
  # gap on the erasure lane is acceptable (the request queue is durable PG; the
  # poll lane resumes, and stale 'processing' claims self-requeue). Rollback: 2/12.
  minReplicas: 1
  maxReplicas: 3
  # ADR-0015: kafka-lag KEDA scaling DISABLED — VESTIGIAL block (WS4 completion):
  # the stream-worker runs NO Kafka consumers at all now (live-lane group retired by
  # WS2; the erasure orchestrator group 'stream-worker-erasure-orchestrator' is gone
  # entirely — the erasure lane drains ops.erasure_request_queue). There is no
  # consumer group to lag-scale on; the plain CPU HPA (minReplicas/maxReplicas
  # above) is the scaler. Do NOT re-enable without a new ADR reintroducing a
  # consumer (and set consumerGroup/topic to that consumer's lane then).
  keda:
    enabled: false
    kafka:
      # Strimzi in-cluster plaintext bootstrap (same host the app's KAFKA_BROKERS points at).
      bootstrapServers: "brain-prod-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
      consumerGroup: ""
      topic: prod.collector.event.v1
      lagThreshold: "1000"

# ADR-0015 right-size companion: with minReplicas 1, the base pdb (minAvailable: 1)
# would BLOCK node drains / Spot reclaims / Karpenter consolidation whenever only
# the single warm replica exists. The erasure lane tolerates a drain gap (the
# request queue is durable PG — ops.erasure_request_queue; the poll lane resumes
# and stale claims self-requeue), so the PDB is disabled in prod. Re-enable if
# minReplicas returns to >= 2.
pdb:
  enabled: false
