environment: staging
# ADR-0016 D3 — the resident worker is VALIDATED in staging first (this is where the 24h soak +
# warm-tick p95 < 60s + parity-vs-cron gate runs). ON in staging; the cronworkflows staging values
# must set transformWorker.enabled=true IN LOCKSTEP so the v4-medallion cron is suppressed and the
# two never both write. Rollback = flip both back to false.
enabled: true
image:
  # Same brain-duckdb image + digest the cronworkflows staging medallion steps run.
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod
  tag: ""
  digest: "sha256:ca9327390c155e0d2047a4deae545f9ee1477dd59afcc7fd58da39a32a4fe996"
# Same catalog-creds secret the cronworkflows staging medallion steps envFrom.
envSecretName: core-env
serviceAccount:
  annotations:
    # The staging brain-jobs IRSA role (same one the cronworkflows staging medallion steps assume).
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-jobs
nodeSelector:
  karpenter.sh/nodepool: streaming
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
worker:
  tickMs: 45000
  healthPort: 8092
  lockKey: 910005
# GOLD_INCREMENTAL staging soak (ADR-0016 P1.1). Staging is where the resident worker is validated, so
# the resident (enabled:true above) — NOT the cronworkflows v4-medallion (suppressed in staging) — is the
# active CORE writer here; flipping Gold to incremental in staging means flipping IT. This partial
# transform map deep-merges over base values.yaml (Helm merges maps, unlike lists), overriding ONLY
# goldIncremental — silverIncremental / watermark* / iceberg.catalog keep the base values. Turning this on
# in STAGING (a throwaway validation env, safe to drift) exercises the real Gold windowed-read path under
# live churn and is the soak that precedes the prod flip. PROD STAYS "0" until the gate passes:
#   1. every promotion PR runs the comparator+window unit gate (integration.yml);
#   2. before the prod flip, run tools/ops/gold-parity-check.job.yaml against a frozen prod catalog —
#      exit 0 (money byte-exact, zero orphan drift, all 22 marts) is the merge precondition;
# see docs/runbooks/gold-incremental-promotion.md. FULL_REFRESH=1 is the recovery escape if a staging
# incremental Gold build ever diverges.
transform:
  goldIncremental: "1"
