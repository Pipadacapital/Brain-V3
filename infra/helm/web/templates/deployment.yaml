apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brain.fullname" . }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}  # ignored when autoscaling.enabled (HPA owns replicas)
  {{- end }}
  selector:
    matchLabels:
      {{- include "brain.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "brain.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "brain.fullname" . }}
      # AUD-OPS-004: explicit, bounded drain window on eviction/rollout (everything
      # stateless rides Spot) instead of relying on the kubelet default.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.topologySpread.enabled }}
      # AUD-OPS-002: spread replicas across zones/nodes so a single node or AZ loss
      # can't take the whole tier down. ScheduleAnyway = best-effort — never blocks
      # scale-up on single-pool (Karpenter) or single-node (kind) topologies.
      topologySpreadConstraints:
        {{- range .Values.topologySpread.constraints }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "brain.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else if and .Values.image.tag (ne .Values.image.tag "latest") }}:{{ .Values.image.tag }}{{ else }}{{ fail "image.digest (preferred) or an immutable, non-':latest' image.tag is required (B3) — refusing to deploy an unpinned/mutable image" }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            {{- if .Values.readOnlyRootFilesystem }}
            readOnlyRootFilesystem: true
            {{- end }}
          {{- if .Values.preStopSleepSeconds }}
          # AUD-OPS-004: hold SIGTERM until the ALB (target-type=ip) has observed the
          # Terminating pod and stopped routing to it — otherwise in-flight requests
          # land on a replica that is already shutting down.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", {{ .Values.preStopSleepSeconds | quote }}]
          {{- end }}
          {{- if .Values.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # next start writes its image-optimizer/ISR cache under .next/cache.
            - name: next-cache
              mountPath: /repo/apps/web/.next/cache
          {{- end }}
          {{- if .Values.service.enabled }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- end }}
          {{- if .Values.envSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecretName }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath | default .Values.probes.path }}
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            periodSeconds: 15
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
      {{- end }}
