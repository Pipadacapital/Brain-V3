replicaCount: 1

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-collector-staging
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: collector-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-staging-collector

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
