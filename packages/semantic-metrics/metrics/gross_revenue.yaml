# SPEC:D.2 — certified metric definition (metrics-as-code). Change ONLY via PR + recompile.
name: gross_revenue
version: v1
entity: semantic_order
time_column: conversion_at
grain: [day, week, month, all]
dimensions_allowed: [channel]
currency_handling: per_currency
identity_basis: deterministic_only
interactive: true
owner: measurement-team
description: >-
  Gross order value recognised per period, per currency: SUM of silver_order_state order_value_minor
  (before refunds/returns). Deterministic order spine only (§1.4). Never blended across currency.
measures:
  - name: gross_revenue_minor
    agg: SUM(order_value_minor)
expression: gross_revenue_minor
examples:
  - "Gross revenue in AED for last week at grain=week."
