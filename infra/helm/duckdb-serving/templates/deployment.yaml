apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "duckdb-serving.fullname" . }}
  labels:
    {{- include "duckdb-serving.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}  # ignored when autoscaling.enabled (HPA owns replicas)
  {{- end }}
  selector:
    matchLabels:
      {{- include "duckdb-serving.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "duckdb-serving.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "duckdb-serving.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001       # the serving Dockerfile's non-root uid (db/iceberg/duckdb/serving)
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: duckdb-serving
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else if and .Values.image.tag (ne .Values.image.tag "latest") }}:{{ .Values.image.tag }}{{ else }}{{ fail "image.digest (preferred) or an immutable, non-':latest' image.tag is required (B3) — refusing to deploy an unpinned/mutable image" }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
          env:
            # ── Iceberg catalog wiring (db/iceberg/duckdb/_catalog.py env contract) ──
            # ICEBERG_CATALOG MUST be `iceberg`: the ported view bodies reference
            # iceberg.brain_gold.* / iceberg.brain_silver.* three-part names verbatim.
            - name: ICEBERG_CATALOG
              value: {{ .Values.iceberg.catalog | quote }}
            - name: ICEBERG_REST_URI
              value: {{ .Values.iceberg.restUri | quote }}
            - name: ICEBERG_WAREHOUSE
              value: {{ .Values.iceberg.warehouse | quote }}
            - name: ICEBERG_REST_AUTH
              value: {{ .Values.iceberg.restAuth | quote }}
            - name: AWS_REGION
              value: {{ .Values.iceberg.region | quote }}
            {{- if .Values.iceberg.s3Endpoint }}
            # Non-AWS/MinIO only — prod leaves this empty (IRSA credential chain, no static keys).
            - name: S3_ENDPOINT
              value: {{ .Values.iceberg.s3Endpoint | quote }}
            {{- end }}
            # ── Serving engine knobs (db/iceberg/duckdb/serving/{server,engine}.py env contract) ──
            - name: PORT
              value: {{ .Values.httpPort | quote }}
            - name: DUCKDB_SERVING_MEMORY_LIMIT
              value: {{ .Values.serving.memoryLimit | quote }}
            - name: DUCKDB_SERVING_THREADS
              value: {{ .Values.serving.threads | quote }}
            - name: DUCKDB_SERVING_MAX_CONCURRENT
              value: {{ .Values.serving.maxConcurrent | quote }}
            - name: STATEMENT_TIMEOUT_MS
              value: {{ .Values.serving.statementTimeoutMs | quote }}
            - name: DUCKDB_SERVING_CATALOG_REFRESH_S
              value: {{ .Values.serving.catalogRefreshSeconds | quote }}
            - name: DUCKDB_SERVING_TEMP_DIRECTORY
              value: {{ .Values.serving.tempDirectory | quote }}
            - name: DUCKDB_SERVING_MAX_TEMP_DIRECTORY_SIZE
              value: {{ .Values.serving.maxTempDirectorySize | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.enabled }}
          # Startup gates on /readyz — the epoch build (catalog attach + view apply + PRE-WARM scans
          # when DUCKDB_SERVING_PREWARM_TABLES is set) must finish before the replica joins the
          # Service. Values-driven since the pre-warm (2026-07-21): a fragmented hot table warms in
          # minutes on the FIRST epoch, and a too-small budget kill-loops the pod at exactly the
          # moment the warm completes (observed live: 300s budget vs ~330s boot).
          startupProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            failureThreshold: {{ .Values.probes.startupFailureThreshold | default 60 }}
            periodSeconds: {{ .Values.probes.startupPeriodSeconds | default 5 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            periodSeconds: 15
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Spill + runtime scratch. DuckDB's temp_directory (serving.tempDirectory) lives under
            # /tmp, so a heavy sort/join spills to this bounded emptyDir instead of RAM — the
            # sizeLimit is the disk analogue of memory_limit (kubelet evicts past it).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.serving.tmpSizeLimit }}
