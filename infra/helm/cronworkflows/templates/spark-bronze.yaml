{{- /*
Spark Bronze materializer + maintenance (Iceberg is the SOLE Bronze system-of-record).

MEDALLION REALIGNMENT: the PG data_plane.bronze_events table was DROPPED (migration 0070) — the Iceberg
flip is complete, so the former dual-sink + PG⇄Iceberg parity oracle (bronze-parity / bronze_parity_check.py)
are RETIRED (there is no PG side left to reconcile). The Spark sink is the only Bronze writer.

Two CronWorkflows (Spark image, spark-submit), distinct from the generic node-image .Values.jobs loop:
  - bronze-materialize: TRIGGER_MODE=availableNow drains the collector lane AND the backfill lane
    (COLLECTOR_TOPIC + BACKFILL_TOPIC, both from the env secret) → Iceberg MERGE WHEN NOT MATCHED
    (idempotent on (brand_id, event_id), I-E02). availableNow drains the current backlog then exits —
    a missed/retried run is safe (Forbid + idempotent MERGE). (A long-lived TRIGGER_MODE=continuous
    Deployment is the alternative real-time shape; this chart schedules the periodic-drain cron.)
  - bronze-maintenance: small-file compaction + 24-month snapshot-expiry TTL (Slice 7).

GATED OFF by default (.Values.sparkBronze.enabled=false): flipping it on needs the CI-built Spark image
pinned by digest (B3, fail-closed below) + a cluster — the same external gate as the dbt-runner crons.

Image MUST be pinned by digest (B3) — same fail-closed rule as the generic template.
*/ -}}
{{- if .Values.sparkBronze.enabled }}
{{- $img := .Values.sparkBronze.image -}}
{{- $ref := "" -}}
{{- if $img.digest -}}
  {{- $ref = printf "%s@%s" $img.repository $img.digest -}}
{{- else if and $img.tag (ne $img.tag "latest") -}}
  {{- $ref = printf "%s:%s" $img.repository $img.tag -}}
{{- else -}}
  {{- fail "sparkBronze.image.digest (preferred) or an immutable non-':latest' tag is required (B3) — refusing to deploy an unpinned image" -}}
{{- end -}}
{{- $envFrom := .Values.envSecretName -}}
{{- $sa := .Values.serviceAccount.name -}}
{{- $tz := .Values.timezone -}}
{{- $dm := .Values.sparkBronze.driverMemory -}}
{{/* ── Execution-mode submit flags (local[*] vs Spark-on-K8s cluster) — mirrors spark-v4.yaml.
     See docs/ops/spark-on-k8s-migration.md §7 (Bronze is the lighter, separate-from-batch decision).
     $lp = in-image path scheme ("" local; "local://" cluster — driver reads the app from the SAME image). */}}
{{- $mode := .Values.sparkBronze.executionMode | default "local" -}}
{{- $lp := "" -}}
{{- $submitFlags := printf "--master local[*] --driver-memory %s" $dm -}}
{{- if eq $mode "k8s" -}}
  {{- $k := .Values.sparkBronze.k8s -}}
  {{- $ns := $k.namespace | default .Release.Namespace -}}
  {{- $lp = "local://" -}}
  {{- $submitFlags = printf "--master %s --deploy-mode cluster --conf spark.kubernetes.container.image=%s --conf spark.kubernetes.namespace=%s --conf spark.kubernetes.authenticate.driver.serviceAccountName=%s --conf spark.driver.memory=%s --conf spark.executor.instances=%s --conf spark.executor.cores=%s --conf spark.executor.memory=%s --conf spark.dynamicAllocation.enabled=true --conf spark.dynamicAllocation.shuffleTracking.enabled=true --conf spark.dynamicAllocation.minExecutors=%s --conf spark.dynamicAllocation.maxExecutors=%s" $k.apiServer $ref $ns $k.serviceAccountName $dm $k.executor.instances $k.executor.cores $k.executor.memory $k.executor.minExecutors $k.executor.maxExecutors -}}
{{- end -}}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: bronze-materialize
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: bronze-materialize
spec:
  schedule: {{ .Values.sparkBronze.materializeSchedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid            # never overlap a materialize run with itself (offset safety)
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}      # IRSA: S3 (per-brand bronze prefix) + Glue catalog access (NN-5)
    entrypoint: run
    activeDeadlineSeconds: {{ .Values.sparkBronze.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              PFX="{{ $lp }}"   # "" (local[*]) or "local://" (k8s cluster — driver reads the app from the SAME image)
              exec /opt/spark/bin/spark-submit {{ $submitFlags }} "${PFX}/opt/brain/bronze_materialize.py"
          env:
            - { name: TRIGGER_MODE, value: "availableNow" }
            {{- toYaml .Values.sparkBronze.env | nindent 12 }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # KAFKA_BROKERS, ICEBERG_REST_URI/Glue, CHECKPOINT_LOCATION (s3a), AWS_*
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: bronze-maintenance
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: bronze-maintenance
spec:
  # Slice 7: compaction (small-file rewrite) + 24-month snapshot-expiry TTL. The ERASURE mode
  # (MODE=erase ERASE_BRAND_ID=…) is NOT a cron — it is invoked on-demand by the right-to-erasure
  # orchestrator after a brand's DEK is crypto-shredded (D13 / I-S05).
  schedule: {{ .Values.sparkBronze.maintenanceSchedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}
    entrypoint: run
    activeDeadlineSeconds: {{ .Values.sparkBronze.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              PFX="{{ $lp }}"   # "" (local[*]) or "local://" (k8s cluster — driver reads the app from the SAME image)
              exec /opt/spark/bin/spark-submit {{ $submitFlags }} "${PFX}/opt/brain/bronze_maintenance.py"
          env:
            - { name: MODE, value: "maintain" }
            {{- toYaml .Values.sparkBronze.env | nindent 12 }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}
          {{- end }}
          resources:
            {{- toYaml .Values.sparkBronze.resources | nindent 12 }}
{{- end }}
