version: 2

models:
  - name: gold_revenue_ledger
    description: >
      Realized-revenue ledger served from the lakehouse (brain_gold). One row per
      (brand_id, ledger_event_id); signed BIGINT minor units. MEDALLION REALIGNMENT (Epic 1 / decision B):
      built unconditionally from Bronze (stg_order_events_bronze → silver_order_recognition → this mart);
      the PG realized_revenue_ledger has been DROPPED (migration 0098) and PostgreSQL is no longer a
      revenue read OR write source — the lakehouse is the sole revenue SoR.
    columns:
      - name: brand_id
        tests: [not_null]
      - name: ledger_event_id
        tests: [not_null]
      - name: event_type
        tests: [not_null]
      - name: amount_minor
        description: "Signed realized amount, BIGINT minor units (I-S07)."
        tests: [not_null]
      - name: currency_code
        tests: [not_null]
