replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-web-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: web-env

# AUD-COST-003: the app UI on the shared brain-prod ALB (host-routed, ACM TLS).
ingress:
  enabled: true
  host: REPLACE_WITH_WEB_HOSTNAME   # e.g. app.<apex-domain>
  groupName: brain-prod
  certificateArn: REPLACE_WITH_ACM_CERT_ARN

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-web-prod

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# P2.5: HPA on in prod.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
