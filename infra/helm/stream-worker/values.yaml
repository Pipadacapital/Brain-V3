# Default values for the stream-worker chart. Overridden by values-staging.yaml / values-prod.yaml.
# Headless Kafka/Kafka consumer: NO Service (it serves no traffic), but it DOES expose a
# health port for liveness/readiness probes (T2-10 — apps/stream-worker/src/.../HealthServer.ts).
# /healthz = liveness (process up), /readyz = readiness (consumers started + Postgres reachable).
replicaCount: 2

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-stream-worker
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: false        # headless consumer — no Service fronts it
  targetPort: ""        # unset: probes fall back to probes.port below

probes:
  enabled: true
  port: 8090            # must match HEALTH_PORT in env below + HealthServer default
  path: /healthz        # liveness: process is up
  readinessPath: /readyz # readiness: consumers started AND Postgres reachable

# Prometheus scrape (AUD-LOCAL-016-FUP1). The worker's HealthServer also serves /metrics
# (a1965e28 — same port as /healthz: HEALTH_PORT, i.e. the named `http` containerPort above;
# :8091 in local dev only to dodge the Kafka host-port collision). The worker is deliberately
# headless (no Service), so this is a PodMonitor against the containerPort — no Service is
# introduced just to scrape it. The job relabel pins "brain-stream-worker" — the exact job name
# the local compose Prometheus uses (infra/observe/prometheus.yml) and the brain-slo rules match
# (up{job=~"brain-.*"}). Off by default (kind/staging have no Prometheus Operator CRDs);
# values-prod enables it for the prod kube-prometheus-stack.
metrics:
  podMonitor:
    enabled: false
    jobLabel: brain-stream-worker
    interval: 15s

# Secret (External Secrets ← AWS Secrets Manager). MUST contain a brain_app (NOT superuser)
# DATABASE_URL so RLS is enforced (see apps/stream-worker/src/main.ts).
envSecretName: ""

env:
  - name: SERVICE_NAME
    value: stream-worker
  # T2-10: the health server binds this port; the helm probes (probes.port) target it.
  - name: HEALTH_PORT
    value: "8090"

serviceAccount:
  annotations: {}

# Node placement (AUD-PROD-006). Empty by default (staging/kind unchanged);
# values-prod pins the live consumers to the streaming pool.
nodeSelector: {}
tolerations: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Horizontal Pod Autoscaler (P2.5). IMPORTANT CEILING: the worker's live consumers are Kafka
# consumer-group members bound to the collector topic's partitions — scaling BEYOND the partition
# count yields IDLE consumers (no partition to own), so maxReplicas must stay <= the live-topic
# partition count. AUD-OPS-030 correction: EVERY env's topics are 12 partitions today — the
# strimzi chart clamps `partitions` to the 6..12 band (infra/helm/strimzi-kafka/values.yaml)
# and prod sets 12 (values-prod.yaml); the earlier "prod live topic = 96 partitions (H5)"
# claim here was never true against that chart. maxReplicas therefore stays 12 EVERYWHERE
# until partitions + pool limits are raised together as one deliberate change.
# The P1.2 due-time work-queue (claim_due_repull_connectors, SKIP LOCKED) lets the ingest scheduler
# parallelise across these replicas without ordinals. CPU target is conservative (consumers are
# I/O-bound on PG/Trino).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 12        # == live-topic partition count (strimzi chart clamps to <=12) in EVERY env
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10m — consumer-group rebalances are disruptive; scale down slowly
  # ── AUD-OPS-030: KEDA kafka-lag scaling (replaces the plain CPU HPA when enabled) ──
  # CPU is the WRONG signal for an I/O-bound consumer: lag can grow while CPU sits under
  # the 70% target (matters most for burst recovery after downtime/replay). When
  # keda.enabled=true the chart renders a ScaledObject (templates/scaledobject.yaml)
  # carrying BOTH a kafka-lag trigger and the CPU trigger, and SUPPRESSES the plain HPA
  # (templates/hpa.yaml) — KEDA materialises its own HPA and two controllers must never
  # fight over one Deployment. Requires the KEDA operator (installed in prod via
  # infra/argocd/envs/prod/keda.yaml; the trino chart's ScaledObject already proved it).
  # OFF by default: dev/staging keep the plain HPA (or static replicas).
  keda:
    enabled: false
    cooldownPeriod: 600            # mirrors the HPA scaleDown stabilization (rebalances are disruptive)
    kafka:
      # Plaintext in-cluster listener (same value the app's KAFKA_BROKERS uses in that env).
      bootstrapServers: ""
      # The LIVE collector lane consumer group (packages/config stream-worker CONSUMER_GROUP_ID).
      consumerGroup: stream-worker-live
      # The live collector topic (env-prefixed; strimzi chart `prefix`).
      topic: ""
      # Scale out when average per-replica lag on the topic exceeds this many messages.
      lagThreshold: "1000"
      # Never scale past partition count on idle consumers' account (KEDA also caps at maxReplicas).
      allowIdleConsumers: "false"

# ── Wave-2 workload hardening (AUD-OPS-001/002/004, AUD-INFRA-022) ────────────
# AUD-OPS-001: survive node drains / Spot reclaims / Karpenter consolidation —
# keep at least one consumer owning partitions through any drain wave.
pdb:
  enabled: true
  minAvailable: 1

# AUD-OPS-002: best-effort zone + node spread (ScheduleAnyway never blocks
# scheduling on the single streaming pool or kind).
topologySpread:
  enabled: true
  constraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

# AUD-OPS-004: SIGTERM → commit offsets + leave the consumer group cleanly.
# No preStop hold: the worker is headless (no Service/ALB), so delaying SIGTERM
# only delays the rebalance.
terminationGracePeriodSeconds: 60
preStopSleepSeconds: 0

# AUD-INFRA-022: read-only root FS. OFF until verified against the runtime image
# (tsx/pnpm may write under /tmp — an emptyDir is mounted there when enabled).
readOnlyRootFilesystem: false
