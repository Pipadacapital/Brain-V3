# Default values for the karpenter-nodepools chart. Overridden by values-prod.yaml.
#
# This chart declares ONLY Karpenter intent objects (NodePool + EC2NodeClass). The Karpenter
# controller + CRDs come from the upstream chart wired in infra/argocd/envs/prod/karpenter.yaml.
#
# IMPORTANT (do NOT confuse with modules/eks): the EKS `system` managed node group
# (brain-<env>-system, t4g.medium, ON-DEMAND, fixed min/max) is intentionally left untouched and
# keeps running the platform add-ons (CoreDNS, kube-proxy, the Karpenter controller itself,
# ArgoCD, KEDA). Karpenter manages EVERYTHING ELSE via the pools below — see README.md.

# Cluster identity — MUST equal the eks module cluster name "${project}-${environment}"
# (aws_eks_cluster.main.name → e.g. brain-prod). Drives Karpenter subnet/SG discovery.
clusterName: brain-prod

# The IAM role Karpenter-launched nodes assume. We REUSE the eks module's node role
# (aws_iam_role.node → "${project}-${environment}-eks-node") so launched nodes already carry
# AmazonEKSWorkerNodePolicy / AmazonEKS_CNI_Policy / AmazonEC2ContainerRegistryReadOnly.
# Karpenter v1 manages the instance profile for this role automatically.
nodeRole: brain-prod-eks-node

# Value of the `karpenter.sh/discovery` tag that Karpenter matches to find the private subnets
# and the cluster node security group to launch into. The eks/network modules do NOT set this tag
# yet — the operator must add `karpenter.sh/discovery=<this value>` to the private subnets and the
# node SG (see README.md "Wiring the operator must do"). Conventionally equals the cluster name.
discoveryTag: brain-prod

# AMI selection. t4g.* are Graviton/arm64 → AL2023 arm64. "alias" pins the EKS-optimized AMI family
# and tracks the latest patched release for the cluster's Kubernetes version.
amiAlias: al2023@latest

ec2NodeClass:
  name: brain-default
  # Root volume for launched nodes (encrypted gp3). DuckDB spill (serving temp_directory) +
  # container images need room.
  rootVolume:
    deviceName: /dev/xvda
    sizeGi: 50
    type: gp3
    encrypted: true

# Mandatory Brain platform tags propagated onto every Karpenter-launched EC2 instance + volume.
tags:
  Environment: prod
  Service: karpenter-managed
  Owner: data-team
  CostCenter: brain-platform
  project: brain
  environment: prod

# ── Node pools (match the blueprint node groups) ────────────────────────────────────────────────
# All pools are arm64 + Spot. Karpenter naturally scales a pool to ZERO when no pod requires it,
# bounded above by `limits`. "no scale-to-zero" for streaming is achieved by the streaming workload
# pinning a warm baseline of replicas (see README); all Spot pools use WhenEmptyOrUnderutilized so
# idle capacity is reclaimed AND on-demand fallback nodes re-consolidate to Spot (AUD-INFRA-013) —
# streaming just gets a much longer consolidateAfter so live consumers aren't thrashed.
#
# ── AUD-OPS-033: the INTENDED aggregate ceiling + spot instance diversity ──────────────────────
# Aggregate pool limits = streaming 24 + ondemand 8 = 32 vCPU / 132Gi.
# (ADR-0016 resident worker, 2026-07-19: streaming raised 20→24 vCPU / 80→100Gi to fit the NEW
# PERMANENT brain-prod-transform-worker Deployment — a warm DuckDB core-only micro-batch worker,
# 2 vCPU / req 6Gi-limit 8Gi, that needs an m7g.xlarge/t4g.xlarge held continuously. Before this,
# the streaming pool was full at 20/80 and Karpenter could not provision its node → the pod sat
# Pending and the transformWorker cutover could not complete. Raised limits + the workload's maxima
# together, per the rule below.)
# (The `batch` pool — 12 vCPU / 48Gi — was REMOVED in the Spark→DuckDB cutover: the Spark
# transforms that needed a dedicated 4vCPU/16Gi batch node are gone; the lightweight DuckDB crons
# run on the streaming pool. The `trino` pool — 8 vCPU / 32Gi — was REMOVED in the Trino→
# duckdb-serving cutover, ADR-0014: the stateless duckdb-serving replicas ride the streaming
# pool via their chart's nodeSelector.)
# That ceiling is DELIBERATE — it is LESS than the sum of every HPA's max×request under a
# fully-correlated burst (traffic spike scaling collector/core/stream-worker WHILE hourly crons
# run and duckdb-serving scales out): overflow pods queue Pending until a pool frees, and per-workload
# honest maxima (e.g. stream-worker maxReplicas == partition count, AUD-OPS-030) keep the
# capacity math truthful. Raise a pool's `limits` + its workloads' maxima TOGETHER, as one
# deliberate change. Spot diversity: every pool lists m7g.* (Graviton3, same 1:4 vCPU:GiB
# shape) beside t4g.* so a t4g spot drought in ap-south-1 falls back to another family instead
# of stalling the pool — all arm64, so the single AL2023 arm64 EC2NodeClass covers every type.
# Karpenter provisions the cheapest available type first (t4g), so cost is unchanged outside
# drought windows.
nodePools:
  streaming:
    # Range so Karpenter right-sizes per workload: light consumers → t4g.large
    # (2/8), a Kafka broker (6Gi req / 4Gi heap) → t4g.xlarge (4/16). Pinning a
    # single t4g.large left the brokers permanently unschedulable.
    # m7g.* = t4g spot-drought fallback (AUD-OPS-033), identical vCPU:GiB shape.
    instanceTypes: ["t4g.large", "t4g.xlarge", "m7g.large", "m7g.xlarge"]
    instanceType: t4g.large          # fallback (unused when instanceTypes is set)
    # Spot-first with on-demand FALLBACK: when the pinned Spot types have no
    # capacity (a reclaim left Kafka/collector/stream-worker unschedulable at
    # go-live), Karpenter provisions on-demand instead of leaving pods Pending;
    # it consolidates back to Spot once capacity returns.
    capacityType: ["spot", "on-demand"]
    # AUD-INFRA-013: WhenEmpty never re-consolidated an on-demand FALLBACK node
    # back to Spot — one capacity blip became a permanent ~3× price increase
    # (measured: an 11h-old on-demand t4g.xlarge sitting beside 2 Spot nodes).
    # WhenEmptyOrUnderutilized lets Karpenter replace it once Spot returns;
    # the GENEROUS 15m consolidateAfter keeps live consumers from thrashing
    # (streaming pods restart cleanly per consumer-group semantics, but frequent
    # rebalances cost lag). Rollback: WhenEmpty / 5m.
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 15m
    expireAfter: 720h                # 30d node rotation for patching
    weight: 30                       # prefer the smaller streaming node for general pods
    limits:                          # upper bound (no fixed minimum → Karpenter has no idle floor)
      cpu: "24"                       # 20→24 (ADR-0016 resident transform-worker node, +1 xlarge)
      memory: 100Gi                   # 80→100Gi (fits the resident's 8Gi limit on an xlarge)
    taints: []                       # untainted: existing untainted workloads can land here today
    # ADR-0003: integer disruption budget. The streaming pool hosts the live ingest
    # front (collector), the Kafka consumers (stream-worker) AND the on-demand-pinned
    # Kafka brokers — never disrupt more than ONE node at a time so a quorum member +
    # a consumer partition are never bounced together. The business-hours FREEZE
    # (`Underutilized`/`Drifted` only, weekdays 09:00–18:00 IST = 03:30 UTC for 9h)
    # holds voluntary consolidation off the hot path during the day; `Empty` reclaim
    # (a fully-drained node) is intentionally NOT frozen so idle Spot still returns.
    # PDBs (each workload's pdb.minAvailable:1) are the second guard. Revert: drop this.
    disruptionBudgets:
      - nodes: "1"
      - nodes: "0"
        reasons: ["Underutilized", "Drifted"]
        schedule: "30 3 * * mon-fri"   # 09:00 IST (UTC+5:30)
        duration: "9h"                  # through 18:00 IST
  # NOTE: the `batch` pool was REMOVED in the Spark→DuckDB cutover (feat/spark-to-duckdb-cutover). It
  # existed for the Spark Silver/Gold transforms (a dedicated 4vCPU/16Gi off-peak node); those are gone.
  # The `trino` pool (8 vCPU / 32Gi, KEDA-scaled Trino scan workers) was REMOVED in the Trino→
  # duckdb-serving cutover (ADR-0014): the stateless duckdb-serving replicas + the DuckDB transform
  # and PyIceberg-maintenance crons are all lightweight (no JVM) and run on the untainted
  # `streaming` pool (nodeSelector brain.platform/pool / karpenter.sh/nodepool: streaming).
  # AUD-COST-018: ON-DEMAND home for single-instance stateful SoRs. Neo4j (the
  # identity SYSTEM OF RECORD, ADR-0004, Community = no HA) must not ride Spot —
  # a reclaim bounces the only replica. TAINTED so nothing lands on paid
  # on-demand capacity unless it explicitly tolerates it (Neo4j pins here via
  # podSpec nodeSelector+toleration in infra/helm/neo4j/values-prod.yaml).
  # expireAfter stays 720h: one PLANNED monthly bounce for node patching (PVC
  # reattaches via the EBS CSI driver) beats an unpatched pet node.
  ondemand:
    # 4 vCPU / 16 GiB — fits the 2cpu/4Gi Neo4j pod + daemonsets. m7g covers an
    # on-demand t4g ICE (InsufficientCapacity) — rarer than spot droughts but the
    # identity SoR must never sit Pending on it (AUD-OPS-033).
    instanceTypes: ["t4g.xlarge", "m7g.xlarge"]
    instanceType: t4g.xlarge         # fallback (unused when instanceTypes is set)
    capacityType: on-demand
    consolidationPolicy: WhenEmpty   # never bin-pack the stateful pod off a live node
    consolidateAfter: 5m
    expireAfter: 720h
    weight: 5                        # last resort for the scheduler — Spot pools win general pods
    limits:                          # ~0-2 nodes; scales to zero when nothing tolerates the taint
      cpu: "8"
      memory: 32Gi
    # ADR-0003: NEVER voluntarily disrupt this pool. It homes the Neo4j identity SoR
    # (Community = single replica, no HA — AUD-COST-018); any voluntary disruption
    # bounces the only writer. `WhenEmpty` already blocks bin-packing a live node;
    # a 0-node budget on the voluntary reasons blocks Drift/expiry churn too. The
    # ONE planned monthly bounce for patching is `expireAfter: 720h` (involuntary,
    # not budget-governed). Revert: drop disruptionBudgets.
    disruptionBudgets:
      - nodes: "0"
        reasons: ["Underutilized", "Drifted"]
    taints:
      - key: brain.platform/pool
        value: ondemand
        effect: NoSchedule
