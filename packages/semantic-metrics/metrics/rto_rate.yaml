# SPEC:D.2 — certified metric definition (metrics-as-code). Change ONLY via PR + recompile.
name: rto_rate
version: v1
entity: semantic_order
time_column: state_effective_at
grain: [day, week, month, all]
dimensions_allowed: [channel]
currency_handling: none
identity_basis: deterministic_only
interactive: false
owner: logistics-team
description: >-
  Return-to-origin rate per period: RTO orders divided by all TERMINAL orders (lifecycle_state='rto'
  over is_terminal). A count ratio (no currency). Deterministic order spine only (§1.4). In-flight
  orders excluded from the denominator. Null when there are zero terminal orders.
measures:
  - name: rto_orders
    agg: SUM(CASE WHEN lifecycle_state = 'rto' THEN 1 ELSE 0 END)
  - name: terminal_orders
    agg: SUM(CASE WHEN is_terminal THEN 1 ELSE 0 END)
expression: CAST(rto_orders AS double) / NULLIF(terminal_orders, 0)
examples:
  - "RTO rate at grain=month."
