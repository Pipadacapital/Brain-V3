# parity-oracle.yml — RETIRED in Brain V4 (StarRocks removal wave).
#
# WHAT THIS GATE USED TO DO: it stood up StarRocks + the lakehouse and, for every Silver/Gold mart,
# proved the Spark→Iceberg table EQUALS the StarRocks `brain_serving.mv_*` ASYNC materialized view it fed
# (row-identity + per-currency minor-unit Σ). The reconciliation existed because the StarRocks MV was an
# ASYNC COPY of the Iceberg mart and could DRIFT (stale/partial refresh) — so parity had to be proven.
#
# WHY IT IS RETIRED: Brain V4 removes StarRocks. Serving is now Trino-over-Iceberg: the `brain_serving.mv_*`
# objects are thin Trino VIEWS (db/trino/views/*.sql) defined as `SELECT <cols> FROM iceberg.brain_<gold|silver>.<mart>`.
# A view is NOT a copy — it reads the live Iceberg snapshot on every query. There is no async materialization,
# hence NOTHING to reconcile: serving == Iceberg Gold/Silver by construction (the comparison is tautological).
# (dbt was already removed in Phase 6b, so the dbt/StarRocks-mart comparison was gone too.)
#
# WHERE THE COVERAGE LIVES NOW: integration.yml stands up the real Trino serving tier (provisions the
# brain_serving Trino views over the Spark-materialized Iceberg marts) and runs the isolation-fuzz +
# *.live suites against it end-to-end — that is the V4 serving correctness gate. Redis-vs-Iceberg
# freshness (the analytics cache) is a TTL concern, not a parity concern, and is owned by the cache layer.
#
# This file is kept (not deleted) as a documented tombstone so the retirement rationale survives in-tree
# and the historical workflow name does not silently vanish. It does NO engine bring-up and is
# manual-dispatch only; it does not gate any PR (pr.yml is unaffected).

name: parity-oracle (retired)
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  retired:
    name: parity-oracle — retired (StarRocks removed; Trino views are tautological over Iceberg)
    runs-on: ubuntu-latest
    steps:
      - name: Explain retirement
        run: |
          echo "parity-oracle is RETIRED in Brain V4."
          echo "StarRocks is removed; serving is Trino VIEWS over the Iceberg Gold/Silver marts."
          echo "A view reads the live Iceberg snapshot — there is no async copy to reconcile."
          echo "Serving correctness is now covered by integration.yml (Trino live suites + isolation fuzz)."
          exit 0
