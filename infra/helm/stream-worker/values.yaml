# Default values for the stream-worker chart. Overridden by values-staging.yaml / values-prod.yaml.
# Headless Kafka/Kafka consumer: NO Service (it serves no traffic), but it DOES expose a
# health port for liveness/readiness probes (T2-10 — apps/stream-worker/src/.../HealthServer.ts).
# /healthz = liveness (process up), /readyz = readiness (consumers started + Postgres reachable).
replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: false        # headless consumer — no Service fronts it
  targetPort: ""        # unset: probes fall back to probes.port below

probes:
  enabled: true
  port: 8090            # must match HEALTH_PORT in env below + HealthServer default
  path: /healthz        # liveness: process is up
  readinessPath: /readyz # readiness: consumers started AND Postgres reachable

# Secret (External Secrets ← AWS Secrets Manager). MUST contain a brain_app (NOT superuser)
# DATABASE_URL so RLS is enforced (see apps/stream-worker/src/main.ts).
envSecretName: ""

env:
  - name: SERVICE_NAME
    value: stream-worker
  # T2-10: the health server binds this port; the helm probes (probes.port) target it.
  - name: HEALTH_PORT
    value: "8090"
  # UNIFIED-BRONZE: DQ Bronze checks read brain_bronze.events — what the deployed sink
  # (bronze_landing, prod Argo Bronze cron) writes. The code default is 'legacy' (frozen
  # pre-cutover tables, rollback-only), so set it explicitly or reads silently split-brain.
  - name: BRONZE_SOURCE
    value: events

serviceAccount:
  annotations: {}

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Horizontal Pod Autoscaler (P2.5). IMPORTANT CEILING: the worker's live consumers are Kafka
# consumer-group members bound to the collector topic's partitions — scaling BEYOND the partition
# count yields IDLE consumers (no partition to own), so maxReplicas must stay <= the live-topic
# partition count. That count is now ENV-SPECIFIC (H5): prod live topic = 96 partitions, dev/staging
# = 12 (infra/helm/strimzi-kafka → live_topic_partition_count). maxReplicas is therefore set
# PER ENV in values-{staging,prod}.yaml to match — this default (12) is the dev/non-prod ceiling.
# The P1.2 due-time work-queue (claim_due_repull_connectors, SKIP LOCKED) lets the ingest scheduler
# parallelise across these replicas without ordinals. CPU target is conservative (consumers are
# I/O-bound on PG/StarRocks).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 12        # dev/non-prod ceiling == dev live-topic partition count; prod overrides to <=96
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10m — consumer-group rebalances are disruptive; scale down slowly
