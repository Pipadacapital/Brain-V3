# integration.yml — real-engine integration suite (C5 / R-48).
#
# The PR workflow (pr.yml) runs unit/contract/isolation/parity against a Postgres service container
# ONLY — the `.live.test.ts` suites (real StarRocks Silver, real Redpanda) and the Playwright e2e are
# NOT exercised in CI, so a cross-tenant StarRocks leak or a broken live pipeline could merge green.
# This workflow closes that: it stands up the REAL engines (the repo's docker-compose stack) and runs
# the live + e2e suites against them.
#
# ⚠️ INTRODUCED NON-BLOCKING ON PURPOSE: it runs on a schedule, on master pushes, and on demand — NOT
# on pull_request — so it can stabilize (StarRocks cold-start timing, Playwright full-stack wiring)
# WITHOUT blocking PR merges while it's being proven. PROMOTE TO A PR GATE once it's reliably green:
# add `pull_request:` to the triggers below and mark it a required check.

name: integration
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *' # nightly 02:00 UTC
  push:
    branches: [master]
  # PR gate (promoted now the dbt Silver step is proven green — verified locally + on master push).
  # Path-filtered to the data/connector/medallion/infra surfaces so doc-only PRs don't pay the
  # real-engine cost. To make it BLOCKING, mark "integration" a required status check in branch
  # protection (a repo-admin setting, not expressible in this file).
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'db/**'
      - 'infra/**'
      - '.github/workflows/integration.yml'

permissions:
  contents: read

env:
  DATABASE_URL: postgres://brain:brain@localhost:5432/brain
  BRAIN_APP_DATABASE_URL: postgres://brain_app:brain_app@localhost:5432/brain
  REDIS_URL: redis://localhost:6379
  KAFKA_BROKERS: localhost:19092
  REDPANDA_BROKERS: localhost:19092
  STARROCKS_HOST: localhost
  STARROCKS_PORT: '9030'
  STARROCKS_ANALYTICS_USER: brain_analytics
  STARROCKS_ANALYTICS_PASSWORD: brain_analytics_dev

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Real-engine isolation + parity + live suites (StarRocks Silver, Redpanda).
  # ───────────────────────────────────────────────────────────────────────────
  real-engine-tests:
    name: Live suites on real engines (StarRocks + Redpanda)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Bring up real engines (Postgres + StarRocks + Redpanda + Redis + MinIO)
        run: |
          # --wait blocks until every service's compose healthcheck is healthy (StarRocks FE has a
          # 30s+ cold start; the compose healthcheck + start_period already accounts for it).
          docker compose --profile core --profile ingest up -d --wait

      - name: Provision brain_app login role + apply migrations
        run: |
          PGPASSWORD=brain psql -U brain -h localhost -d brain -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'brain_app') THEN
                CREATE ROLE brain_app LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'brain_app';
              ELSE
                ALTER ROLE brain_app LOGIN PASSWORD 'brain_app';
              END IF;
            END
            \$\$;
          "
          pnpm migrate:up

      # ── Silver marts (dbt-starrocks) ─────────────────────────────────────────
      # The ONLY place dbt runs in CI. Builds + tests the Silver marts (order_state, touchpoint,
      # order_line) against the REAL StarRocks: verifies the dbt models compile + run and that
      # their grain / money-bigint / replay singular tests pass, AND materializes Silver so the
      # live suites below read a real tier. order_line is feat-shopify-order-depth's line-item mart.
      - name: Install dbt (dbt-starrocks) into .dbt-venv + mysql client
        run: |
          python3 -m venv .dbt-venv
          .dbt-venv/bin/pip install --quiet --upgrade pip
          .dbt-venv/bin/pip install --quiet dbt-starrocks
          sudo apt-get update -qq && sudo apt-get install -y -qq default-mysql-client

      - name: Build + test Silver marts via dbt (order_state, touchpoint, order_line)
        env:
          STARROCKS_USER: root
          STARROCKS_PASSWORD: ''
        run: |
          # The Makefile auto-detects .dbt-venv/bin/dbt (absolute path, survives the cd into db/dbt).
          # Override its DB clients to the CI localhost service ports (the targets default to
          # `docker exec <container>`); the StarRocks JDBC catalog still reaches Postgres over the
          # compose network at host `postgres:5432`. *-catalog applies the read-shim views + JDBC
          # catalog; *-run does `dbt run` + `dbt test` (the singular grain/money/replay assertions).
          make silver-catalog silver-run journey-catalog journey-run orderline-catalog orderline-run \
            PG_PSQL="psql postgresql://brain:brain@localhost:5432/brain" \
            SR_MYSQL="mysql -h127.0.0.1 -P9030 -uroot --protocol=TCP"

      # Isolation fuzz + parity oracle — now against REAL StarRocks (the PR run has no Silver tier,
      # so the StarRocks cross-tenant negative-control only truly fires here).
      - name: Isolation fuzz (real engines)
        run: pnpm turbo run test:isolation
      - name: Parity oracle (real engines)
        run: pnpm turbo run test:parity

      # The *.live.test.ts suites (credit writer, reconcile, analytics, dq) read real StarRocks Silver.
      - name: Core live suites (StarRocks Silver)
        run: pnpm --filter @brain/core exec vitest run --no-file-parallelism live
      - name: Stream-worker e2e (Redpanda + Bronze)
        run: pnpm --filter @brain/stream-worker test:e2e

      - name: Dump engine logs on failure
        if: failure()
        run: docker compose --profile core --profile ingest logs --tail 200
      - name: Tear down
        if: always()
        run: docker compose --profile core --profile ingest down -v

  # ───────────────────────────────────────────────────────────────────────────
  # Playwright e2e against the full running stack.
  # ───────────────────────────────────────────────────────────────────────────
  playwright-e2e:
    name: Playwright e2e (full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Bring up engines
        run: docker compose --profile core --profile ingest up -d --wait

      - name: Provision brain_app + migrate
        run: |
          PGPASSWORD=brain psql -U brain -h localhost -d brain -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'brain_app') THEN
                CREATE ROLE brain_app LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'brain_app';
              ELSE ALTER ROLE brain_app LOGIN PASSWORD 'brain_app'; END IF;
            END \$\$;"
          pnpm migrate:up

      - name: Install Playwright browser
        run: pnpm --filter @brain/web exec playwright install --with-deps chromium

      - name: Materialize .env for the app stack (the dev scripts read --env-file=../../.env)
        run: |
          cat > .env <<'ENV'
          NODE_ENV=development
          DATABASE_URL=postgres://brain:brain@localhost:5432/brain
          BRAIN_APP_DATABASE_URL=postgres://brain_app:brain_app@localhost:5432/brain
          REDIS_URL=redis://localhost:6379
          KAFKA_BROKERS=localhost:19092
          REDPANDA_BROKERS=localhost:19092
          STARROCKS_HOST=localhost
          STARROCKS_PORT=9030
          STARROCKS_ANALYTICS_USER=brain_analytics
          STARROCKS_ANALYTICS_PASSWORD=brain_analytics_dev
          ENV

      - name: Start the app stack (core + web + collector + stream-worker)
        run: |
          pnpm turbo run dev \
            --filter=@brain/core --filter=@brain/web \
            --filter=@brain/collector --filter=@brain/stream-worker > /tmp/stack.log 2>&1 &
          echo "stack started (pid $!)"

      - name: Wait for web to be ready
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Playwright e2e
        run: pnpm --filter @brain/web test:e2e

      - name: Upload Playwright report + stack log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            /tmp/stack.log
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose --profile core --profile ingest down -v
