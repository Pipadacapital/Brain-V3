{{- /*
One ExternalSecret per consumed env Secret. dataFrom.extract flattens the SM
JSON object into Secret keys — exactly what the charts' envFrom expects.
creationPolicy Owner: ESO owns the Secret lifecycle (rotation in Secrets
Manager propagates within refreshInterval; pods pick it up on next restart).
*/ -}}
{{- range .Values.secrets }}
{{- if $.Values.createNamespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .namespace }}
  labels:
    app.kubernetes.io/part-of: brain
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: brain
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.storeName }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .key }}
{{- end }}
