replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-core-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: core-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-core-prod

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# P2.5: HPA on in prod. minReplicas matches replicaCount (3) so enabling never scales below baseline.
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
