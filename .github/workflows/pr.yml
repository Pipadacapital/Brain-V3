name: pr
# RELEASE-LAYER: checks run ONLY on the release → master promotion PR
# (owner-requested 2026-07-11). Feature → release PRs and release pushes run
# nothing; the cumulative diff is validated once, at promotion time.
on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # OIDC for AWS (security scan image push to temp ECR)

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Phase-1a BLOCKING gates (doc 05 §11/§12)
  # ─────────────────────────────────────────────────────────────────────────
  lint-typecheck-unit:
    name: Lint / Typecheck / Unit (affected)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: brain
          POSTGRES_PASSWORD: brain
          POSTGRES_DB: brain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brain -d brain"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://brain:brain@localhost:5432/brain
      BRAIN_APP_DATABASE_URL: postgres://brain_app:brain_app@localhost:5432/brain
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Provision brain_app login role and apply migrations
        run: |
          # Create brain_app as a LOGIN role with password before migrations run.
          # Migration 0001 creates it NOLOGIN (IF NOT EXISTS), so we pre-create it
          # as LOGIN here. The parity tests connect via BRAIN_APP_DATABASE_URL which
          # requires rolcanlogin=t — the same state the dev DB has (see MEMORY.md).
          PGPASSWORD=brain psql -U brain -h localhost -d brain -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'brain_app') THEN
                CREATE ROLE brain_app LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'brain_app';
              ELSE
                ALTER ROLE brain_app LOGIN PASSWORD 'brain_app';
              END IF;
            END
            \$\$;
          "
          # Apply all migrations through 0020 (includes ledger schema + named functions)
          pnpm migrate:up
          # Seed the fixture organization the *.integration suites assume (the schema-only migrate
          # seeds no tenant data; see tools/dev/seed-fixture-org.sql). Reference data is in 0136.
          PGPASSWORD=brain psql -U brain -h localhost -d brain -f tools/dev/seed-fixture-org.sql
      - name: Turbo lint + typecheck + unit (affected only)
        run: pnpm turbo run lint typecheck test:unit --affected
      # AUD-IMPL-016: DB-backed suites moved out of the hermetic test:unit tag into
      # test:integration — run here (same job = same provisioned Postgres as before),
      # so CI coverage is unchanged while local `test:unit` no longer needs a live DB.
      - name: Turbo integration (affected)
        run: pnpm turbo run test:integration --affected
      # Module-boundary fences (eslint-plugin-boundaries) only classify cross-package imports
      # correctly when eslint runs from the REPO ROOT — the per-package turbo lint above runs
      # from each package dir and cannot (audit RS-1). This dedicated root pass enforces them.
      - name: Module-boundary lint (root)
        run: pnpm run lint:boundaries
      - name: Contract tests (affected)
        run: pnpm turbo run test:contract --affected
      - name: Isolation fuzz (affected)
        run: pnpm turbo run test:isolation --affected
      - name: Parity oracle (affected)
        run: pnpm turbo run test:parity --affected

      # ── Ledger integrity gate — MOVED (medallion realignment, Epics 1+2) ──────────────────────
      # The former always-on PG ledger gate (SEC-BF-M2) guarded realized_revenue_ledger +
      # attribution_credit_ledger dedup/ON CONFLICT. Both PG ledgers are DROPPED (migrations 0098/0099):
      # revenue is now the StarRocks gold revenue ledger (Bronze→silver_order_recognition→gold, Spark) and
      # attribution is the StarRocks gold_attribution_credit (attribution-writer). StarRocks PRIMARY KEY
      # upsert handles dedup natively, so the PG partial-index ON CONFLICT drift-guard is obsolete (its
      # test files were deleted with the tables). The equivalent integrity coverage — revenue-metrics,
      # reconcile-attribution, attribution-credit-writer .live suites + the pure closed-sum parity oracle
      # (test:parity) — now runs ALWAYS-ON against real StarRocks gold in integration.yml ("core live
      # suites"). Nothing PG-only remains to gate here.

  # ─────────────────────────────────────────────────────────────────────────
  # C5 log-grep gate — scan source for raw PII / financial identifiers
  # Reads patterns from tools/eslint-rules/log-grep-patterns.json (ADR-RZ-10 /
  # COMPLIANCE.md:172). Blocks on CRITICAL/HIGH pattern matches in apps/ packages/.
  # ─────────────────────────────────────────────────────────────────────────
  log-grep-gate:
    name: C5 Log-Grep Gate (PII / financial identifiers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run C5 log-grep gate
        run: pnpm log-grep

  # ─────────────────────────────────────────────────────────────────────────
  # Brain V4 naming guard — BLOCKING. Fails on retired-dbt-DB refs (brain_gold./
  # brain_silver.), any dbt invocation, permanent feature precompute (feature_customer_daily
  # / brain_feature write), Gold/Silver reads not via mv_* / rest-Iceberg, and NEW
  # StarRocks (R5) / Spark (R6) / Trino (R7, ADR-0014) coupling.
  # See tools/lint/v4-naming-guard.sh (--selftest proves the rules; runs first).
  # Also runs the serving PII-projection guard (ADR-0007 D6: PII never reaches
  # serving) — fails if any duckdb-serving view (db/iceberg/duckdb/views/*.sql)
  # PROJECTS a raw-PII column name (email/phone/first_name/last_name/full_name/address);
  # hashed/derived forms (email_sha256, *_hash, hashed_*, has_*, email_domain)
  # are allowed. See tools/lint/serving-pii-guard.sh (self-test runs first).
  # Also runs the identity-view guard (A.2.2 / AMD-07): the bi-temporal
  # silver_identity_map may be read ONLY through a sanctioned accessor
  # (identity_current_v / identity_asof serving views). See
  # tools/lint/identity-view-guard.sh (self-test runs first).
  # ─────────────────────────────────────────────────────────────────────────
  v4-naming-guard:
    name: Brain V4 Naming Guard (no dbt / retired DBs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Self-test the guard (proves it catches each rule)
        run: tools/lint/v4-naming-guard.sh --selftest
      - name: Run the V4 naming guard over the tree
        run: tools/lint/v4-naming-guard.sh
      - name: derive-pg-env drift-check (DR-007 — the two chart copies must not diverge)
        run: tools/lint/derive-pg-env-drift.sh
      - name: Self-test the serving PII-projection guard (proves catch + allowlist)
        run: tools/lint/serving-pii-guard-test.sh
      - name: Run the serving PII-projection guard over db/iceberg/duckdb/views (ADR-0007 D6)
        run: tools/lint/serving-pii-guard.sh
      # Identity-view guard (A.2.2 / AMD-07) — silver_identity_map is bi-temporal; every read must go
      # through a sanctioned accessor (the identity_current_v / identity_asof serving views).
      # Fails on any direct read outside tools/lint/identity-view-guard-allowlist.txt.
      - name: Self-test the identity-view guard (proves catch + allowlist)
        run: tools/lint/identity-view-guard.sh --selftest
      - name: Run the identity-view guard over the tree (A.2.2)
        run: tools/lint/identity-view-guard.sh
      # Deprecation guard (D.4.5 / D.5) — Wave-D semantic layer freezes the legacy Gold/Silver marts for
      # NEW consumers (they stay live; existing readers migrate route-by-route in D.3). Fails on any NEW
      # app/BFF/metric-engine reference to a deprecated mart outside tools/lint/deprecation-guard-allowlist.txt.
      - name: Self-test the deprecation guard (proves catch + allowlist)
        run: tools/lint/deprecation-guard.sh --selftest
      - name: Run the deprecation guard over the tree (D.4.5)
        run: tools/lint/deprecation-guard.sh
      # Structured-log guard (AUD-OBS-2) — the R-05 console.*→pino sweep must STAY swept:
      # a raw console.* in deployable service source bypasses levels, correlation bindings,
      # PII redaction, and Sentry capture. Allowlist: tools/lint/structured-log-guard-allowlist.txt.
      - name: Self-test the structured-log guard (proves catch + comment-skip + allowlist)
        run: tools/lint/structured-log-guard.sh --selftest
      - name: Run the structured-log guard over the service trees (AUD-OBS-2)
        run: tools/lint/structured-log-guard.sh
      # View-drift guard (ADR-0019 WS-5 D8) — every brain_serving.mv_* an endpoint references must be
      # DEFINED in db/iceberg/duckdb/views/*.sql. A drifted ref is skipped by the serving layer and 500s →
      # core fail-safes to an empty chart (a silent failure); this makes it an author-time CI failure.
      - name: Self-test the view-drift guard (proves catch + comment/dynamic skip)
        run: tools/lint/view-drift-guard.sh --selftest
      - name: Run the view-drift guard over apps/** + packages/** (WS-5 D8)
        run: tools/lint/view-drift-guard.sh

  # ─────────────────────────────────────────────────────────────────────────
  # (REMOVED in the Spark→DuckDB cutover, feat/spark-to-duckdb-cutover) — the
  # Spark-tier guard/parity suite ran db/iceberg/spark/**/*_test.py via
  # tools/lint/spark-guard-suite.sh. The Spark tree (jobs + tests + the guard
  # script) is deleted; the DuckDB transform tier (db/iceberg/duckdb/**) was
  # parity-validated + dev-e2e GREEN before this cutover PR. If a standing
  # DuckDB-tier guard suite is wanted later, add it here.
  # ─────────────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────────────
  # Banked-cost-wins regression guard — BLOCKING. The platform-reset program
  # (docs/platform-reset/, owner-ratified 2026-07-14) is a SELECTIVE REBUILD:
  # the estate is already cost-optimized and the structural wins are one-line
  # reversible. This gate FAILS the promotion PR if a banked win regresses:
  # managed NAT reintroduced (must stay fck-nat), Aurora min-ACU above the 0.5
  # floor / unbounded max, EKS extended-support or a version downgrade below
  # 1.33, or Kafka rack-awareness disabled (the ~$194/mo cross-AZ lever). It
  # reads the tracked prod IaC SoT only (no AWS calls). See tools/lint/cost-guard.sh
  # (--selftest proves each rule; runs first).
  # ─────────────────────────────────────────────────────────────────────────
  cost-guard:
    name: Banked Cost-Wins Guard (fck-nat / Aurora ACU / EKS support / Kafka rack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Self-test the guard (proves it catches each regression)
        run: tools/lint/cost-guard.sh --selftest
      - name: Verify the banked cost wins in the prod IaC SoT
        run: tools/lint/cost-guard.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Prod placeholder guard (AUD-COST-007) — renders every prod chart
  # (helm template + values-prod) and scans the deployed ArgoCD prod manifests.
  # PR mode: fails on render breakage or any UNDOCUMENTED placeholder token
  # (allowlist: tools/lint/prod-placeholder-allowlist.txt ⇄ infra/helm/
  # PLACEHOLDERS.md). Documented fill-at-apply placeholders are allowed here —
  # they cannot exist before terraform apply. The STRICT gate (fail while ANY
  # placeholder remains) runs in deploy.yml prod-promote before a prod commit.
  # ─────────────────────────────────────────────────────────────────────────
  prod-placeholder-guard:
    name: Prod Placeholder Guard (rendered values)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Self-test the guard (proves pattern + allowlist logic)
        run: tools/lint/prod-placeholder-guard.sh --selftest
      - name: Render prod values + scan for undocumented placeholders
        run: tools/lint/prod-placeholder-guard.sh

  # ─────────────────────────────────────────────────────────────────────────
  # SLO rules parity (AUD-PROD-B8-FUP3) — the alert/SLO rules are dual-copied
  # by design (infra/observe/alerts/*.rules.yml mounted into local prometheus;
  # additionalPrometheusRulesMap in infra/helm/kube-prometheus-stack/
  # values-prod.yaml rendered into the prod PrometheusRule). This gate deep-
  # compares every canonical rules file that has a copy in the values map and
  # BLOCKS on drift — otherwise local vs prod alerting silently fork.
  # Canonical files not yet in the map are warn-only (data-driven).
  # ─────────────────────────────────────────────────────────────────────────
  slo-rules-parity:
    name: SLO Rules Parity (local vs prod dual-copy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compare canonical alert rules with the prod values copy
        run: tools/lint/slo-rules-parity.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Secret scan — gitleaks (every PR diff; must never find a secret)
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks — scan PR diff for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────────────────────
  # Container + dependency scan (affected apps only)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-scan:
    name: Build + Trivy + OSV (affected)
    runs-on: ubuntu-latest
    needs: lint-typecheck-unit
    strategy:
      matrix:
        # Dynamically populated from turbo --affected; seed with known apps
        app: [collector, stream-worker, core, web]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Check if ${{ matrix.app }} is in affected set
        id: affected
        run: |
          set -euo pipefail
          # FAIL-CLOSED: if the affected-set computation breaks (turbo/jq error,
          # output-format change, missing merge base), we must NOT silently skip the
          # security scan. A broken detector fails the job; it never green-lights an
          # unscanned image. (Previously `|| echo ""` swallowed errors → empty set →
          # skip=true → the whole scan job passed having scanned nothing.)
          if ! AFFECTED=$(pnpm turbo run build --affected --dry-run=json \
                | jq -r '[.tasks[].packageName] | map(select(. != null)) | unique | .[]'); then
            echo "::error::Could not compute the affected set — failing closed (refusing to skip the container/dependency scan)."
            exit 1
          fi
          if echo "$AFFECTED" | grep -qx "${{ matrix.app }}"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Dockerfile exists for affected app (fail-closed)
        if: steps.affected.outputs.skip == 'false'
        run: |
          if [ ! -f "apps/${{ matrix.app }}/Dockerfile" ]; then
            echo "::error::apps/${{ matrix.app }}/Dockerfile is missing — a shippable service MUST have a Dockerfile so its image can be built and scanned (audit P0-A). Failing closed instead of skipping the scan."
            exit 1
          fi

      - name: Build Docker image (affected only)
        if: steps.affected.outputs.skip == 'false'
        run: |
          docker build \
            -t brain-${{ matrix.app }}:pr-${{ github.sha }} \
            -f apps/${{ matrix.app }}/Dockerfile \
            .

      - name: Trivy image scan (HIGH/CRITICAL fail)
        if: steps.affected.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: brain-${{ matrix.app }}:pr-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy filesystem scan (deps)
        if: steps.affected.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/${{ matrix.app }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: OSV Scanner
        if: steps.affected.outputs.skip == 'false'
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=table
