name: deploy
on:
  push:
    branches: [master]   # RELEASE-LAYER v2 (owner-requested 2026-07-11): NOTHING runs on
                         # feature pushes or feature→release merges. Checks run on the
                         # release→master promotion PR (pr/integration/infra/knip), and
                         # THIS full chain (build → staging bump → prod promote) runs when
                         # the owner merges release → master. master = production.
                         # (AUD-PROD-022: file renamed main.yml → deploy.yml. Do NOT flip
                         # trigger to [main].)

# CI/CD identity (AUD-COST-002) — repo variables ↔ terraform (envs/prod, module
# oidc_github with create_cicd_roles = true; first apply is LOCAL — see
# infra/terraform/README.md "Prod go-live" + docs/runbooks/GO-LIVE.md):
#   vars.AWS_ECR_PUSH_ROLE_ARN  = `terraform output github_ecr_push_role_arn`
#                                 (role brain-prod-github-ecr-push; OIDC trust =
#                                 push to master OR release on Pipadacapital/Brain-V3
#                                 — envs/prod bootstrap.tf allowed_branches).
#   vars.ENVIRONMENT            = prod — MUST be "prod": the push role is scoped
#                                 to the brain-*-prod ECR repositories (modules/
#                                 eks creates brain-{collector,stream-worker,core,
#                                 web,spark-bronze}-prod). Single-account posture:
#                                 staging values reference the same immutable
#                                 digest in the -prod repos (build once, promote
#                                 the same artifact).
#   secrets.GITOPS_TOKEN        = PAT with contents:write (the gitops values-bump
#                                 commits; the default GITHUB_TOKEN would not
#                                 retrigger ArgoCD-relevant workflows).
#   vars.AWS_STAGING_PLAN_ROLE_ARN / vars.AWS_PROD_PLAN_ROLE_ARN — OPTIONAL
#                                 (`github_plan_role_arn` output of envs/staging /
#                                 envs/prod). The gitops jobs below run no AWS
#                                 call today, so cred configuration is skipped
#                                 while these are unset.

permissions:
  contents: write       # bump Helm values + gitops commit
  id-token: write       # OIDC for AWS ECR push
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build + cosign sign + push to ECR (affected services only)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build, Sign, Push ECR (affected)
    # NATIVE arm64 runner (GitHub-hosted ubuntu-24.04-arm): the images target the
    # Graviton nodes, and QEMU-emulated builds on amd64 runners NEVER completed
    # for the spark image (75+ min → cancelled, twice). Native = minutes.
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        app: [collector, stream-worker, core, web]
      fail-fast: false
    # NOTE: matrix legs CANNOT share job-level outputs (they race + overwrite — only the
    # last finisher survives). Each leg instead uploads its pinned image reference as an
    # artifact (imgref-<app>); the gitops job downloads all of them. See below.

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Check if ${{ matrix.app }} is affected (path-based)
        id: affected
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          # PATH-BASED (matches build-data-images). `turbo run build --affected` was
          # unreliable here for TWO reasons: (1) on a push to master it defaulted its
          # base to the default branch = master-vs-master = empty diff = everything
          # skipped; (2) even when computed, packageName is "@brain/<app>" but the
          # matrix leg is the unscoped "<app>", so `grep -qx` never matched → skip.
          # Build this app if its own dir, ANY shared workspace package, or the root
          # dependency/build config changed. Coarser but never misses a needed build.
          # Fail-OPEN to building on unknown range / diff failure (never silently skip).
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "no usable before-SHA — building ${{ matrix.app }}"
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" || echo "__diff_failed__")
          if [ "$CHANGED" = "__diff_failed__" ]; then
            echo "diff failed — building ${{ matrix.app }} (fail-open)"
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if echo "$CHANGED" | grep -qE "^apps/${{ matrix.app }}/|^packages/|^pnpm-lock.yaml|^package.json|^tsconfig|^turbo.json"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          # DB migrations ship INSIDE the core image and run via the migrate Job /
          # PreSync hook (pnpm migrate:up, scripts/migrate.mjs). A migration change
          # that doesn't touch apps/core must STILL rebuild core, or the corrected
          # migration never reaches the running image (the 0127 stale-core-digest
          # incident). Only `core` is affected by these paths.
          elif [ "${{ matrix.app }}" = "core" ] && echo "$CHANGED" | grep -qE "^db/migrations/|^scripts/migrate\.mjs"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "migration/migrate-runner change — rebuilding core"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "no changes affecting ${{ matrix.app }} — skip"
          fi

      # OIDC short-lived credentials — never static keys (PLAYBOOK-deploy + NN-3)
      - name: Configure AWS credentials (OIDC)
        if: steps.affected.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: steps.affected.outputs.skip == 'false'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # arm64 images build NATIVELY on the ubuntu-24.04-arm runner (no QEMU).

      - name: Set up Docker Buildx
        if: steps.affected.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build + push arm64 image (immutable digest — PLAYBOOK-deploy §Artifact promotion)
        if: steps.affected.outputs.skip == 'false'
        id: push
        run: |
          set -euo pipefail
          REPO="${{ steps.login-ecr.outputs.registry }}/brain-${{ matrix.app }}-${{ vars.ENVIRONMENT }}"
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            -t "${REPO}:${{ github.sha }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            -f apps/${{ matrix.app }}/Dockerfile \
            --push \
            --metadata-file /tmp/meta.json \
            .
          # Pinned, immutable reference: <registry>/<repo>@sha256:<...> — consumed by the
          # gitops job to bump the Helm chart values (image.repository + image.digest).
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          mkdir -p /tmp/imgref
          echo "${REPO}@${DIGEST}" > "/tmp/imgref/${{ matrix.app }}"

      - name: Upload pinned image reference (for gitops bump)
        if: steps.affected.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: imgref-${{ matrix.app }}
          path: /tmp/imgref/${{ matrix.app }}
          retention-days: 1

      - name: Install cosign
        if: steps.affected.outputs.skip == 'false'
        uses: sigstore/cosign-installer@v3

      - name: cosign sign image (keyless OIDC)
        if: steps.affected.outputs.skip == 'false'
        # Digest comes from the imgref file the push step wrote (same pattern as
        # build-data-images). The previous `steps.push.outputs[...]` was never set
        # by the push step → cosign got "<repo>@" and failed every affected leg.
        run: |
          set -euo pipefail
          REPO="${{ steps.login-ecr.outputs.registry }}/brain-${{ matrix.app }}-${{ vars.ENVIRONMENT }}"
          DIGEST=$(cut -d@ -f2 < "/tmp/imgref/${{ matrix.app }}")
          cosign sign --yes "${REPO}@${DIGEST}"

  # ─────────────────────────────────────────────────────────────────────────
  # 1b. Build + push the DATA-PLANE job image (duckdb — the DuckDB transform tier for the
  #     V4 Silver/Gold mart crons + the PyIceberg client for Bronze/medallion maintenance + erasure;
  #     Bronze LANDING is the kafka-connect chart, ADR-0010 — no Spark landing job anymore)
  # ─────────────────────────────────────────────────────────────────────────
  # These are NOT pnpm packages, so the turbo --affected check can't see them. They change rarely,
  # so we use PATH-BASED change detection (git diff of the push range). Same OIDC/ECR/cosign posture
  # as build-and-push; each leg uploads imgref-<image> for the gitops job to digest-pin into the
  # cronworkflows chart. Additive — does not touch the 4-app build above.
  # CUTOVER (feat/spark-to-duckdb-cutover): the Spark image (brain-spark-bronze, db/iceberg/spark) is
  # REPLACED by the DuckDB image (brain-duckdb, db/iceberg/duckdb/Dockerfile). It carries db/iceberg/
  # duckdb/** — the ~96 Silver/Gold jobs + maintenance/ (the 4 PyIceberg maintenance/erasure scripts;
  # the Trino maintenance client is REMOVED, ADR-0014). The cronworkflows chart's sparkV4 / sparkBronze
  # image blocks now point at brain-duckdb. dbt was already removed in Brain V4 (Phase 6b); Spark and
  # Trino are now removed too.
  build-data-images:
    name: Build, Sign, Push data images (duckdb, duckdb-serving)
    # NATIVE arm64 runner — the image targets the arm64 Karpenter pools (no QEMU).
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: duckdb
            dockerfile: db/iceberg/duckdb/Dockerfile
            context: db/iceberg
            paths: '^db/iceberg/duckdb/'
          # duckdb-serving (ADR-0014): the serving-tier HTTP service. Shares the db/iceberg
          # context (it COPYs _catalog.py + views/ alongside serving/); rebuilt whenever the
          # serving code, the shared catalog seam, or the serving views change.
          - image: duckdb-serving
            dockerfile: db/iceberg/duckdb/serving/Dockerfile
            context: db/iceberg
            paths: '^db/iceberg/duckdb/(serving/|views/|_catalog\.py)'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if ${{ matrix.image }} is affected (path-based)
        id: affected
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          # Fail-OPEN to building (never skip a needed data image): build if the range is unknown
          # (first push / force-push / zeros SHA) or if any file under the image's paths changed.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "no usable before-SHA — building ${{ matrix.image }}"; echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" || echo "__diff_failed__")
          if [ "$CHANGED" = "__diff_failed__" ]; then
            echo "diff failed — building ${{ matrix.image }} (fail-open)"; echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if echo "$CHANGED" | grep -qE "${{ matrix.paths }}"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"; echo "no ${{ matrix.image }} path changes — skip"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.affected.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: steps.affected.outputs.skip == 'false'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # arm64 images build NATIVELY on the ubuntu-24.04-arm runner (no QEMU).

      - name: Set up Docker Buildx
        if: steps.affected.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build + push arm64 image (immutable digest)
        if: steps.affected.outputs.skip == 'false'
        run: |
          set -euo pipefail
          REPO="${{ steps.login-ecr.outputs.registry }}/brain-${{ matrix.image }}-${{ vars.ENVIRONMENT }}"
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            -t "${REPO}:${{ github.sha }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            -f ${{ matrix.dockerfile }} \
            --push \
            --metadata-file /tmp/meta.json \
            ${{ matrix.context }}
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          mkdir -p /tmp/imgref
          echo "${REPO}@${DIGEST}" > "/tmp/imgref/${{ matrix.image }}"

      - name: Upload pinned image reference (for gitops bump)
        if: steps.affected.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: imgref-${{ matrix.image }}
          path: /tmp/imgref/${{ matrix.image }}
          retention-days: 1

      - name: Install cosign
        if: steps.affected.outputs.skip == 'false'
        uses: sigstore/cosign-installer@v3

      - name: cosign sign image (keyless OIDC)
        if: steps.affected.outputs.skip == 'false'
        run: |
          set -euo pipefail
          REPO="${{ steps.login-ecr.outputs.registry }}/brain-${{ matrix.image }}-${{ vars.ENVIRONMENT }}"
          DIGEST=$(cut -d@ -f2 < "/tmp/imgref/${{ matrix.image }}")
          cosign sign --yes "${REPO}@${DIGEST}"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Bump Helm values + ArgoCD auto-sync to staging
  # ─────────────────────────────────────────────────────────────────────────
  gitops-staging:
    name: GitOps — Staging auto-sync
    runs-on: ubuntu-latest
    needs: [build-and-push, build-data-images]
    environment: staging

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITOPS_TOKEN }}

      # No AWS call happens in this job today (pure sed/yq + git push) — skip
      # cleanly while the staging env root (and its github_plan role) is unapplied,
      # instead of hard-failing configure-aws-credentials on an empty ARN.
      - name: Configure AWS credentials (OIDC) for staging
        if: ${{ vars.AWS_STAGING_PLAN_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_PLAN_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Download pinned image references (one per affected app)
        uses: actions/download-artifact@v4
        with:
          pattern: imgref-*
          path: /tmp/imgref
          merge-multiple: true

      - name: Bump image in staging Helm chart values
        run: |
          set -euo pipefail
          # duckdb-serving rides this loop too: its chart uses the same 2-space
          # image.repository/digest block the app charts do (ADR-0014).
          for app in collector stream-worker core web duckdb-serving; do
            ref_file="/tmp/imgref/${app}"
            values="infra/helm/${app}/values-staging.yaml"
            [ -f "$ref_file" ] || { echo "no imgref for ${app} (not affected) — skip"; continue; }
            [ -f "$values" ] || { echo "::error::${values} missing"; exit 1; }
            REF="$(cat "$ref_file")"        # <registry>/brain-<app>-staging@sha256:<...>
            REPO="${REF%@*}"
            DIGEST="${REF#*@}"
            sed -i -E "s|^( {2}repository:).*|\1 ${REPO}|"        "$values"
            sed -i -E "s|^( {2}digest:).*|\1 \"${DIGEST}\"|"      "$values"
            echo "bumped ${app}: ${REPO}@${DIGEST}"
          done

      - name: Bump cronworkflows chart image digests (core/stream-worker/duckdb)
        run: |
          set -euo pipefail
          # The cronworkflows chart has distinct image blocks at distinct yaml paths, so a blanket sed
          # (which matches every `repository:`) is unsafe — use yq for path-precise edits. Each block is
          # bumped ONLY when its imgref artifact exists (i.e. that image was affected).
          values="infra/helm/cronworkflows/values-staging.yaml"
          bump() {  # $1=imgref-key  $2=yq-path-prefix (e.g. .image / .streamWorkerImage / .sparkBronze.image)
            local ref_file="/tmp/imgref/$1" path="$2"
            [ -f "$ref_file" ] || { echo "no imgref for $1 — skip ${path}"; return 0; }
            local REF REPO DIGEST; REF="$(cat "$ref_file")"; REPO="${REF%@*}"; DIGEST="${REF#*@}"
            REPO="$REPO" DIGEST="$DIGEST" yq -i "${path}.repository = strenv(REPO) | ${path}.digest = strenv(DIGEST)" "$values"
            echo "cronworkflows bumped ${path}: ${REPO}@${DIGEST}"
          }
          bump core          .image
          bump stream-worker .streamWorkerImage
          # CUTOVER: the single brain-duckdb image now backs BOTH cron image blocks — .sparkBronze.image
          # (bronze/medallion maintenance + erasure, run via the PyIceberg client the image carries) and
          # .sparkV4.image (the DuckDB Silver/Gold transform crons). One image, two blocks (the block
          # names are retained to keep the chart values diff minimal; an empty digest fail-closes each
          # template). Both are pinned from the same `duckdb` imgref.
          bump duckdb .sparkBronze.image
          bump duckdb .sparkV4.image

      - name: Commit + push staging values bump
        run: |
          git config user.name "Brain CI Bot"
          git config user.email "ci@brain-platform.io"
          git add infra/helm/
          if git diff --staged --quiet; then
            echo "No staging image changes — no gitops commit needed"
          else
            git commit -m "chore(gitops): bump staging image digests [skip ci] - ${GITHUB_SHA:0:8}"
            git push
          fi

      - name: Wait for ArgoCD staging sync
        run: |
          echo "ArgoCD auto-syncs staging after manifest push."
          echo "Manual verification: argocd app get brain-staging --server \$ARGOCD_SERVER"
          echo "Staging bake window: 5 min; auto-rollback armed on health probe failures."


  # ─────────────────────────────────────────────────────────────────────────
  # 3. Prod promotion — runs in the same master-push chain (the owner's merge to master IS the approval)
  # ─────────────────────────────────────────────────────────────────────────
  prod-promote:
    name: Promote to Production (manual gate)
    runs-on: ubuntu-latest
    needs: gitops-staging



    steps:
      # Check out the LATEST master, not the triggering SHA: gitops-staging (a
      # prior job in THIS run) just committed the staging digests to master, and
      # promote reads them from values-staging. Without ref: master this job
      # checks out the pre-staging-bump commit → empty staging digests → promotes
      # nothing (prod digests never pinned).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITOPS_TOKEN }}

      # Same as gitops-staging: no AWS call in this job — skip while unset.
      # (`github_plan_role_arn` output of envs/prod = brain-prod-github-plan.)
      - name: Configure AWS credentials (OIDC) for prod
        if: ${{ vars.AWS_PROD_PLAN_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_PLAN_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Promote staging image to prod Helm chart values
        run: |
          set -euo pipefail
          # Build-once / promote-the-same-artifact: copy the immutable repository@digest
          # from each staging chart values into the prod chart values.
          # duckdb-serving is promoted the same way (ADR-0014); the all-zeros bootstrap
          # placeholder in its values-prod is skipped until the first staging digest exists.
          for app in collector stream-worker core web duckdb-serving; do
            stg="infra/helm/${app}/values-staging.yaml"
            prd="infra/helm/${app}/values-prod.yaml"
            [ -f "$stg" ] && [ -f "$prd" ] || continue
            REPO=$(grep -E '^  repository:' "$stg" | head -1 | sed -E 's|^  repository:[[:space:]]*||')
            DIGEST=$(grep -E '^  digest:' "$stg" | head -1 | sed -E 's|^  digest:[[:space:]]*"?([^"]*)"?.*|\1|')
            [ -n "$DIGEST" ] || { echo "no staging digest for ${app} — skip"; continue; }
            sed -i -E "s|^( {2}repository:).*|\1 ${REPO}|"   "$prd"
            sed -i -E "s|^( {2}digest:).*|\1 \"${DIGEST}\"|" "$prd"
            echo "promoted ${app}: ${REPO}@${DIGEST}"
          done

      - name: Promote cronworkflows chart digests (staging → prod) — path-precise via yq
        run: |
          set -euo pipefail
          stg="infra/helm/cronworkflows/values-staging.yaml"
          prd="infra/helm/cronworkflows/values-prod.yaml"
          promote() {  # $1=yq-path-prefix
            local path="$1" SREPO SDIGEST
            SREPO="$(yq "${path}.repository" "$stg")"
            SDIGEST="$(yq "${path}.digest" "$stg")"
            [ -n "$SDIGEST" ] && [ "$SDIGEST" != "null" ] || { echo "no staging digest at ${path} — skip"; return 0; }
            # build-once/promote-same-artifact: keep the SAME image (re-tag repo from -staging to -prod
            # name but the immutable digest is identical — same artifact across envs).
            local PREPO="${SREPO/-staging/-prod}"
            PREPO="$PREPO" SDIGEST="$SDIGEST" yq -i "${path}.repository = strenv(PREPO) | ${path}.digest = strenv(SDIGEST)" "$prd"
            echo "cronworkflows promoted ${path}: ${PREPO}@${SDIGEST}"
          }
          promote .image
          promote .streamWorkerImage
          promote .sparkBronze.image
          promote .sparkV4.image

      # AUD-COST-007 STRICT gate: a prod promotion must never be committed while
      # rendered prod values / deployed ArgoCD prod manifests still carry
      # REPLACE_WITH_*/ACCOUNT_ID placeholders. Fill pass: docs/runbooks/GO-LIVE.md
      # step 3 (canonical list: infra/helm/PLACEHOLDERS.md). Runs AFTER the digest
      # promotion above (CD-filled digests are not placeholders) and BEFORE the
      # commit, so a failure leaves nothing for ArgoCD to sync.
      - name: Placeholder guard — refuse to promote unfilled prod values (strict)
        run: tools/lint/prod-placeholder-guard.sh --strict

      - name: Commit prod values promotion
        run: |
          git config user.name "Brain CI Bot"
          git config user.email "ci@brain-platform.io"
          git add infra/helm/
          if git diff --staged --quiet; then
            echo "No prod image changes"
          else
            git commit -m "chore(gitops): promote to prod [${GITHUB_SHA:0:8}] — bake window ARMED [skip ci]"
            git push
          fi

      - name: Bake window monitor armed
        run: |
          echo "PROD BAKE WINDOW ARMED — 30 min standard (2hr for billing/ledger/metric-registry changes)"
          echo "Auto-rollback signals (see PLAYBOOK-deploy.md §Auto-Rollback):"
          echo "  - Collector accept+ack rate < 99.95% for 5min → ROLLBACK"
          echo "  - Analytics API error rate > 1% for 5min → ROLLBACK"
