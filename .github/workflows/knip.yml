name: knip

# Dead-code report: flags unused files, exports, and dependencies across the pnpm
# monorepo so cruft is caught automatically going forward. NON-BLOCKING by design
# (continue-on-error + a job summary) — it reports, it does not gate merges. Promote
# to a blocking gate later once the baseline is clean.

on:
  pull_request:
    branches: [master]  # RELEASE-LAYER: only the release → master promotion PR
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  knip:
    name: Dead-code report (knip, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run knip (report-only)
        id: knip
        continue-on-error: true
        run: |
          set -o pipefail
          # Pinned, no-install-side-effect run via pnpm dlx; reads ./knip.jsonc.
          pnpm dlx knip@5 --no-exit-code --reporter markdown | tee knip-report.md

      - name: Publish report to job summary
        if: always()
        run: |
          {
            echo "## knip — dead-code report (non-blocking)"
            echo ""
            if [ -s knip-report.md ]; then
              cat knip-report.md
            else
              echo "_No knip output captured._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
