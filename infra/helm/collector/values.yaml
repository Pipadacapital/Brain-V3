# Default values for the collector chart. Overridden by values-staging.yaml / values-prod.yaml.
replicaCount: 2

image:
  # CI bumps image.digest to the immutable ECR digest at deploy time.
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-collector
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3001

# Prometheus scrape (AUD-LOCAL-016-FUP1). The collector serves /metrics on its MAIN Fastify
# port (a1965e28 — same port as /collect and the probes: :8787 in local dev, service.targetPort
# in-cluster), so the existing `http` Service port already reaches it and NO extra port is
# needed. The ServiceMonitor relabels job → "brain-collector" — the exact job name the local
# compose Prometheus uses (infra/observe/prometheus.yml) and the brain-slo rules match
# (up{job=~"brain-.*"}). Off by default (kind/staging have no Prometheus Operator CRDs);
# values-prod enables it for the prod kube-prometheus-stack.
metrics:
  serviceMonitor:
    enabled: false
    jobLabel: brain-collector
    interval: 15s

# Public edge (AUD-COST-003): shared Brain ALB (aws-load-balancer-controller),
# host-routed, ACM TLS. Off by default; enabled per env in values-prod.yaml.
ingress:
  enabled: false
  className: alb
  host: ""            # e.g. px.<domain> — the pixel endpoint (99.95% SLA edge)
  groupName: brain    # all Brain Ingresses share ONE ALB via this group
  certificateArn: ""  # ACM cert covering the host (TLS terminates at the ALB)
  annotations: {}

probes:
  enabled: true
  path: /healthz          # liveness + startup
  readinessPath: /readyz  # readiness (gated on dependencies)

# Name of a pre-provisioned Secret (External Secrets ← AWS Secrets Manager) holding
# DATABASE_URL, REDIS_URL, KAFKA_BROKERS, etc. Empty in defaults; set per env.
envSecretName: ""

# Literal, non-secret env. Secrets come via envSecretName.
env:
  - name: SERVICE_NAME
    value: collector
  - name: PORT
    value: "3001"

# AUD-OBS-2: OTel OTLP export flag — empty (default) keeps initObservability() a no-op
# (no SDK loaded; spans/metrics stay in-process). Set per env to the collector/vendor
# OTLP endpoint to turn tracing+metrics export ON; auth headers (if the endpoint needs
# them) belong in the envSecretName secret as OTEL_EXPORTER_OTLP_HEADERS.
otelExporterOtlpEndpoint: ""

serviceAccount:
  annotations: {}   # set eks.amazonaws.com/role-arn per env (IRSA)

# Node placement (AUD-PROD-006). Empty by default (staging/kind unchanged);
# values-prod pins the ingest front to the streaming pool.
nodeSelector: {}
tolerations: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Horizontal Pod Autoscaler (P2.5). The collector is the accept-before-validate ingest front — the
# most spike-prone tier (Pixel/webhook storms), so it gets the widest band and a tighter CPU target.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0     # react immediately to ingest spikes (no false-shed)
    scaleDown:
      stabilizationWindowSeconds: 300

# ── Wave-2 workload hardening (AUD-OPS-001/002/004, AUD-INFRA-022) ────────────
# AUD-OPS-001: the 99.95%-SLA edge must survive node drains / Spot reclaims /
# Karpenter consolidation — never let a drain wave evict every replica at once.
pdb:
  enabled: true
  minAvailable: 1

# AUD-OPS-002: best-effort zone + node spread (ScheduleAnyway never blocks
# scheduling on the single streaming pool or kind).
topologySpread:
  enabled: true
  constraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

# AUD-OPS-004: wider window than core/web — SIGTERM stops the drainer (flushes
# the in-flight spool batch to Kafka) after the preStop ALB-deregistration hold.
# The PG spool is durable, so this bounds request loss, never event loss.
terminationGracePeriodSeconds: 60
preStopSleepSeconds: 15

# AUD-INFRA-022: read-only root FS. OFF until verified against the runtime image
# (tsx/pnpm may write under /tmp — an emptyDir is mounted there when enabled).
readOnlyRootFilesystem: false
