replicaCount: 3

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-core-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: "sha256:0b9d2335c84899f2a0df46dc0d7bc27ea531443faee2c9c1e8b65de782422faa"

envSecretName: core-env

# The core Service (and the api.brain ingress backend, which reuses service.port)
# must expose 3001 — the container port AND the port every consumer targets
# (web BFF_BASE_URL/CORE_API_URL, seed-prod-secrets.sh). The chart default of 80
# left the Service on a port nothing dials: the web proxy to
# core.core.svc.cluster.local:3001 hit a closed service port and hung → the
# registration/BFF 500→timeout. Nothing references core on :80.
service:
  port: 3001

# AUD-COST-003: BFF/API + connector webhooks on the shared brain-prod ALB
# (host-routed, ACM TLS).
ingress:
  enabled: true
  host: api.brain.pipadacapital.com   # e.g. api.<apex-domain>
  groupName: brain-prod
  certificateArn: arn:aws:acm:ap-south-1:380254378136:certificate/684f6184-f357-46ca-8ef9-3be62239c220

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-core

# AUD-COST-011: migrations run as a PreSync hook before every core sync.
# core-env must carry DATABASE_URL_DIRECT (Aurora endpoint, NOT pgbouncer) —
# see infra/helm/external-secrets-config/README.md.
migrations:
  # DISABLED for this single-account prod: the PreSync hook runs `pnpm migrate:up`
  # as brain_app over DATABASE_URL_DIRECT, which cannot work by design — (1) the
  # Brain migrations are owner-only DDL that REVOKE from brain_app + own the
  # pgmigrations meta-table as role `brain`, and (2) DATABASE_URL_DIRECT uses
  # sslmode=require (pg verify-full) against Aurora's Amazon-RDS-CA cert that is
  # absent from Node's trust store. Migrations are applied OUT-OF-BAND via
  # tools/deploy/run-migrations.sh (ROUTINE, non-destructive: brainadmin +
  # `-c role=brain` + TLS-skip; schema is current through 0126). The destructive
  # first-boot reset lives ONLY in tools/deploy/reset-and-migrate.sh (guarded —
  # refuses to run if any user table has rows). AUD-OPS-017.
  # Re-enable only once the hook is reworked to run as a privileged owner role.
  enabled: false
  appEnv: prod
  databaseUrlFromKey: DATABASE_URL_DIRECT

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# P2.5: HPA on in prod. minReplicas matches replicaCount (3) so enabling never scales below baseline.
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
