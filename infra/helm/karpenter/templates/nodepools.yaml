# NodePools — one per blueprint node group (streaming / batch / trino). Cluster-scoped.
# Karpenter v1 API: karpenter.sh/v1. All pools are arm64 + Spot, bounded above by `limits`
# (no fixed minimum). See values.yaml for the per-pool rationale.
{{- range $name, $pool := .Values.nodePools }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ $name }}
  labels:
    project: brain
    environment: {{ $.Values.tags.environment | default "prod" }}
    brain.platform/pool: {{ $name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  template:
    metadata:
      labels:
        brain.platform/pool: {{ $name }}
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ $.Values.ec2NodeClass.name }}
      expireAfter: {{ $pool.expireAfter | default "720h" }}
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          # capacityType may be a single string ("spot") or a list
          # (["spot", "on-demand"]) — a list lets Karpenter prefer Spot but fall
          # back to on-demand when the pinned Spot instance types have no capacity
          # (the go-live spot-reclaim incident left Kafka/app pods unschedulable).
          values: [{{- if kindIs "slice" $pool.capacityType -}}
            {{- range $i, $ct := $pool.capacityType }}{{ if $i }}, {{ end }}{{ $ct | quote }}{{- end }}
            {{- else }}{{ $pool.capacityType | quote }}{{- end }}]
        - key: node.kubernetes.io/instance-type
          operator: In
          # Accept a LIST (instanceTypes) so Karpenter right-sizes per workload
          # (e.g. a 6Gi Kafka broker → t4g.xlarge, a light consumer → t4g.large),
          # falling back to the single instanceType for pools that pin one.
          {{- if $pool.instanceTypes }}
          values:
          {{- range $pool.instanceTypes }}
            - {{ . | quote }}
          {{- end }}
          {{- else }}
          values: [{{ $pool.instanceType | quote }}]
          {{- end }}
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      {{- with $pool.taints }}
      taints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  disruption:
    consolidationPolicy: {{ $pool.consolidationPolicy }}
    consolidateAfter: {{ $pool.consolidateAfter }}
    {{- /*
      ADR-0003: INTEGER disruption budgets (never a %). On a ≤4-node Spot pool a
      percentage budget rounds up to "disrupt anytime" (Karpenter rounds nodes×% up),
      which defeats the guard entirely. Each entry caps how many nodes Karpenter may
      voluntarily disrupt (consolidate/drift/expire) at once; an optional `schedule`
      + `duration` freezes voluntary disruption during business hours. Omitting
      `budgets` on a pool falls back to Karpenter's built-in default (10%), so this
      is purely additive/reversible — delete a pool's `disruptionBudgets` to revert.
    */}}
    {{- with $pool.disruptionBudgets }}
    budgets:
      {{- range . }}
      - nodes: {{ .nodes | quote }}
        {{- with .reasons }}
        reasons:
          {{- range . }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .schedule }}
        schedule: {{ .schedule | quote }}
        duration: {{ .duration | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  limits:
    cpu: {{ $pool.limits.cpu | quote }}
    memory: {{ $pool.limits.memory }}
  weight: {{ $pool.weight | default 10 }}
{{- end }}
