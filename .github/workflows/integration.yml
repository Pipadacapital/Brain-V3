# integration.yml — real-engine integration suite (C5 / R-48).
#
# The PR workflow (pr.yml) runs unit/contract/isolation/parity against a Postgres service container
# ONLY — the `.live.test.ts` suites (real duckdb-serving-over-Iceberg, real Kafka) and the Playwright
# e2e are NOT exercised in CI, so a cross-tenant serving leak or a broken live pipeline could merge green.
# This workflow closes that: it stands up the REAL engines (the repo's docker-compose stack) and runs
# the live + e2e suites against them.
#
# BRAIN V4: StarRocks is REMOVED; Trino is REMOVED (ADR-0014). Serving is duckdb-serving (DuckDB
# read-only over the Iceberg REST catalog, fronted by Redis). The brain_serving VIEWS
# (db/iceberg/duckdb/views/*.sql) are applied BY the service at startup — /readyz gates on them.
#
# ⚠️ INTRODUCED NON-BLOCKING ON PURPOSE: it runs on a schedule, on master pushes, and on demand — NOT
# on pull_request — so it can stabilize (engine cold-start timing, Playwright full-stack wiring)
# WITHOUT blocking PR merges while it's being proven. PROMOTE TO A PR GATE once it's reliably green:
# add `pull_request:` to the triggers below and mark it a required check.

name: integration
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *' # nightly 02:00 UTC
  push:
    branches: [master]  # RELEASE-LAYER: checks only at promotion (master) — release pushes run nothing
  # PR gate (promoted now the dbt Silver step is proven green — verified locally + on master push).
  # Path-filtered to the data/connector/medallion/infra surfaces so doc-only PRs don't pay the
  # real-engine cost. To make it BLOCKING, mark "integration" a required status check in branch
  # protection (a repo-admin setting, not expressible in this file).
  pull_request:
    branches: [master]  # RELEASE-LAYER: only the release → master promotion PR
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'db/**'
      - 'infra/**'
      - '.github/workflows/integration.yml'

permissions:
  contents: read

env:
  DATABASE_URL: postgres://brain:brain@localhost:5432/brain
  BRAIN_APP_DATABASE_URL: postgres://brain_app:brain_app@localhost:5432/brain
  REDIS_URL: redis://localhost:6379
  KAFKA_BROKERS: localhost:19092
  # Brain V4 serving engine: duckdb-serving-over-Iceberg (StarRocks removed; Trino removed, ADR-0014).
  # The metric-engine/core read the brain_serving views; createDuckDbServingPool targets
  # DUCKDB_SERVING_HOST:DUCKDB_SERVING_PORT (the compose duckdb-serving service, host port 8091).
  DUCKDB_SERVING_HOST: localhost
  DUCKDB_SERVING_PORT: '8091'
  DUCKDB_SERVING_URL: http://localhost:8091

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Real-engine isolation + parity + live suites (duckdb-serving-over-Iceberg, Kafka).
  # ───────────────────────────────────────────────────────────────────────────
  real-engine-tests:
    name: Live suites on real engines (duckdb-serving + Kafka)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Bring up real engines (Postgres + duckdb-serving + Kafka + Redis + MinIO + Iceberg REST)
        run: |
          # NOT `up --wait`: it exits 1 when a one-shot init container (minio-init, kafka-init,
          # iceberg-catalog-init) exits 0 DURING the wait window — the exact cold-start behavior
          # here. The shared helper polls health deterministically instead (same one dev-up uses).
          # `core` is the whole engine set; the old `ingest`/`lakehouse` profiles no longer exist.
          bash tools/dev/compose-up-healthy.sh --profile core

      - name: Map Kafka EXTERNAL advertised host to localhost
        # Kafka advertises EXTERNAL://brain-kafka-ext:19092 (docker-compose.yml) — a docker-network
        # alias. Host-side Kafka clients (the Bronze seeder below + the stream-worker e2e) bootstrap
        # localhost:19092 but then RECONNECT to the advertised `brain-kafka-ext`, which doesn't resolve
        # on the runner (EAI_AGAIN). The broker's :19092 is published to the host, so aliasing
        # brain-kafka-ext → 127.0.0.1 makes the advertised address reachable.
        run: echo "127.0.0.1 brain-kafka-ext" | sudo tee -a /etc/hosts

      - name: Provision brain_app login role + apply migrations
        run: |
          PGPASSWORD=brain psql -U brain -h localhost -d brain -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'brain_app') THEN
                CREATE ROLE brain_app LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'brain_app';
              ELSE
                ALTER ROLE brain_app LOGIN PASSWORD 'brain_app';
              END IF;
            END
            \$\$;
          "
          pnpm migrate:up

      # Provision the DuckDB transform venv (duckdb + numpy + splink + pyiceberg + neo4j) — the SAME
      # deps the brain-duckdb cron image carries (db/iceberg/duckdb/requirements.txt). Shared by the
      # Bronze seed below AND the V4 refresh, so it is created ONCE here.
      - name: Set up DuckDB transform venv
        run: |
          python3 -m venv /tmp/duckvenv
          /tmp/duckvenv/bin/pip install --quiet --upgrade pip
          /tmp/duckvenv/bin/pip install --quiet -r db/iceberg/duckdb/requirements.txt

      # Seed a minimal Bronze fixture BEFORE the refresh. On a cold catalog the DuckDB transform tier
      # has no brain_bronze.collector_events_connect to read → the keystone never creates brain_silver
      # → every Silver/Gold job fails with "Namespace brain_silver does not exist". This writes the
      # fixture STRAIGHT to the Iceberg Bronze table via DuckDB (deterministic) rather than producing to
      # Kafka and waiting on the iceberg-sink Connect worker — whose single-broker cold-start commit
      # coordination churns and completes "committed to 0 table(s)", so Bronze never lands in the poll
      # window. The real Kafka → Connect landing path is covered by the stream-worker Kafka e2e; the
      # seed's only job is to give the medallion refresh some Bronze rows to build from.
      - name: Seed Bronze fixture (direct DuckDB → Iceberg, deterministic)
        env:
          S3_ENDPOINT: http://localhost:9000
          ICEBERG_REST_URI: http://localhost:8181
          ICEBERG_WAREHOUSE: s3://brain-bronze/
          AWS_ACCESS_KEY_ID: brain
          AWS_SECRET_ACCESS_KEY: brainbrain
          AWS_REGION: us-east-1
        run: /tmp/duckvenv/bin/python db/iceberg/duckdb/maintenance/seed_bronze_fixture.py

      # ── V4 transform: DuckDB Silver → DuckDB Gold → Iceberg, served by duckdb-serving views (REPLACES dbt+StarRocks+Spark+Trino) ──
      # Brain V4 removed dbt (Phase 6b), StarRocks (serving → Trino), Spark (transform → DuckDB, PR
      # #148), AND Trino (serving → duckdb-serving, ADR-0014). The analytics transform is
      # DuckDB-on-Iceberg: db/iceberg/duckdb/{silver,gold}/*.py materialize the EXTERNAL Iceberg
      # Gold/Silver marts from Bronze. This step runs the DuckDB oneshot refresh (so the marts exist),
      # then the next step rotates duckdb-serving onto them and gates on /readyz. The *.live suites
      # below read the same duckdb-serving tier the dashboards read.
      #
      # Runs on the HOST against the published compose ports (minio :9000, iceberg-rest :8181, neo4j
      # :7687) — exactly as `pnpm dev:v4-refresh` does in dev, and the same localhost path the other
      # steps use for duckdb-serving :8091. No Spark, no kafka-netns join, no StarRocks MV SYNC.
      - name: V4 refresh — DuckDB Silver/Gold materialize Iceberg (oneshot)
        env:
          # DuckDB job connection contract (db/iceberg/duckdb/_catalog.py) → the compose services on
          # localhost. Creds/warehouse mirror the iceberg-rest + minio config in docker-compose.yml.
          S3_ENDPOINT: http://localhost:9000
          ICEBERG_REST_URI: http://localhost:8181
          ICEBERG_WAREHOUSE: s3://brain-bronze/
          AWS_ACCESS_KEY_ID: brain
          AWS_SECRET_ACCESS_KEY: brainbrain
          AWS_REGION: us-east-1
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: brain_neo4j
        run: |
          # The DuckDB transform venv was provisioned in the "Set up DuckDB transform venv" step above.
          # duckdb-refresh.sh runs keystone → silver ×2 → gold in dependency order (best-effort per job).
          # PYTHON points it at the venv; ONESHOT is a no-op (kept for call-site compatibility with the
          # retired v4-refresh-loop.sh).
          #
          # Best-effort, matching tools/dev/dev-up.sh: with only the minimal order seed, peripheral marts
          # (identity → Neo4j, attribution → pixel touchpoints, ad-spend → connector rows) legitimately
          # have no inputs and may no-op/fail — that must NOT fail the job. The REAL gates are the
          # duckdb-serving /readyz view gate + the live suites below, which assert the marts the serving
          # tier feeds.
          PYTHON=/tmp/duckvenv/bin/python ONESHOT=1 bash tools/dev/duckdb-refresh.sh \
            || echo "::warning::DuckDB refresh reported issues (often empty cold-DB peripheral marts) — continuing to the /readyz gate + live suites (the real gates)"

      # PyIceberg maintenance capability probe (plan §D3) — the merge precondition for the maintenance
      # tier: proves against the REAL catalog that snapshot expiry physically deletes S3 objects (the
      # RTBF bytes-gone requirement), that COW delete/overwrite works on DuckDB-written tables (the
      # ManifestEntry.snapshot_id shim), and that commit conflicts retry. Scratch namespace only —
      # never touches the marts the live suites read. 0 FAIL gates the job.
      - name: PyIceberg maintenance capability probe
        env:
          S3_ENDPOINT: http://localhost:9000
          ICEBERG_REST_URI: http://localhost:8181
          ICEBERG_WAREHOUSE: s3://brain-bronze/
          AWS_ACCESS_KEY_ID: brain
          AWS_SECRET_ACCESS_KEY: brainbrain
          AWS_REGION: us-east-1
        run: /tmp/duckvenv/bin/python db/iceberg/duckdb/maintenance/maintenance_capability_probe.py

      - name: Wait for duckdb-serving views (readyz gate — replaces run-trino-views.sh)
        run: |
          # The brain_serving.mv_* views are applied BY duckdb-serving at epoch build (startup +
          # rotation), continue-on-error — a view over a not-yet-materialized mart is SKIPPED and
          # self-heals on the next rotation. The refresh above just materialized the marts, so force a
          # fresh epoch now (restart = re-attach + re-apply) instead of waiting out the rotation
          # interval, then poll /readyz until every view applied (views_skipped == []).
          docker compose --profile core restart duckdb-serving
          for i in $(seq 1 60); do
            body="$(curl -fsS http://localhost:8091/readyz 2>/dev/null || true)"
            if [ -n "$body" ] && [ "$(printf '%s' "$body" | jq -r '.views_skipped | length' 2>/dev/null)" = "0" ]; then
              echo "duckdb-serving ready: $(printf '%s' "$body" | jq -c '{views_applied, views_skipped}')"
              exit 0
            fi
            sleep 5
          done
          echo "duckdb-serving never reached views_skipped=[] — last /readyz: ${body:-<no response>}"
          exit 1

      # Isolation fuzz + parity oracle — now against the REAL duckdb-serving tier (the PR run has no Silver
      # tier, so the cross-tenant negative-control on the ${BRAND_PREDICATE} seam only truly fires here).
      - name: Isolation fuzz (real engines)
        run: pnpm turbo run test:isolation
      - name: Parity oracle (real engines)
        run: pnpm turbo run test:parity

      # The *.live.test.ts suites (credit writer, reconcile, analytics, dq) read the real duckdb-serving tier.
      - name: Core live suites (duckdb-serving-over-Iceberg)
        run: pnpm --filter @brain/core exec vitest run --no-file-parallelism live
      - name: Stream-worker e2e (Kafka + Bronze)
        run: pnpm --filter @brain/stream-worker test:e2e

      - name: Dump engine logs on failure
        if: failure()
        run: docker compose --profile core logs --tail 200
      - name: Tear down
        if: always()
        run: docker compose --profile core down -v

  # ───────────────────────────────────────────────────────────────────────────
  # Playwright e2e against the full running stack.
  # ───────────────────────────────────────────────────────────────────────────
  playwright-e2e:
    name: Playwright e2e (full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Bring up engines
        # shared poll helper — `up --wait` dies on one-shot inits exiting 0 mid-wait
        run: bash tools/dev/compose-up-healthy.sh --profile core

      - name: Provision brain_app + migrate
        run: |
          PGPASSWORD=brain psql -U brain -h localhost -d brain -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'brain_app') THEN
                CREATE ROLE brain_app LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'brain_app';
              ELSE ALTER ROLE brain_app LOGIN PASSWORD 'brain_app'; END IF;
            END \$\$;"
          pnpm migrate:up

      - name: Install Playwright browser
        run: pnpm --filter @brain/web exec playwright install --with-deps chromium

      - name: Materialize .env.local-prod for the app stack (dev scripts read --env-file=../../.env.local-prod)
        run: |
          cat > .env.local-prod <<'ENV'
          NODE_ENV=development
          DATABASE_URL=postgres://brain:brain@localhost:5432/brain
          BRAIN_APP_DATABASE_URL=postgres://brain_app:brain_app@localhost:5432/brain
          REDIS_URL=redis://localhost:6379
          KAFKA_BROKERS=localhost:19092
          DUCKDB_SERVING_HOST=localhost
          DUCKDB_SERVING_PORT=8091
          DUCKDB_SERVING_URL=http://localhost:8091
          ENV

      - name: Start the app stack (core + web + collector + stream-worker)
        run: |
          pnpm turbo run dev \
            --filter=@brain/core --filter=@brain/web \
            --filter=@brain/collector --filter=@brain/stream-worker > /tmp/stack.log 2>&1 &
          echo "stack started (pid $!)"

      - name: Wait for web to be ready
        # Next.js runs in dev mode here (turbo run dev) and cold-compiles the whole monorepo app on
        # first request — 120s regularly wasn't enough on CI runners (chronic wait-on timeout). 300s
        # (well under the 40-min job cap) covers the cold compile; a genuine crash is surfaced by the
        # stack-log dump below rather than hidden behind the timeout.
        run: npx wait-on http://localhost:3000 --timeout 300000

      - name: Dump stack log if web never came up
        if: failure()
        run: |
          echo "─── /tmp/stack.log (app stack: core + web + collector + stream-worker) ───"
          tail -n 200 /tmp/stack.log || echo "(no stack log)"

      - name: Playwright e2e
        run: pnpm --filter @brain/web test:e2e

      - name: Upload Playwright report + stack log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            /tmp/stack.log
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose --profile core down -v
