# ClusterIP Service the BFF / metric-engine POST /v1/query against. Every replica is a complete,
# identical engine (read-only catalog attach + local views), so the Service load-balances across
# ALL pods — no coordinator/worker asymmetry like the retired trino chart.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "duckdb-serving.fullname" . }}
  labels:
    {{- include "duckdb-serving.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "duckdb-serving.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
