version: 2

models:
  - name: gold_cohorts
    description: "Acquisition cohorts (brain_gold): customers first-seen by month + lifetime value/orders. Additive."
    columns:
      - name: brand_id
        tests: [not_null]
      - name: cohort_month
        tests: [not_null]
      - name: cohort_size
        tests: [not_null]
  - name: gold_customer_segments
    description: "Deterministic value-tier customer segments (brain_gold): customer_count + value per tier. Additive."
    columns:
      - name: brand_id
        tests: [not_null]
      - name: segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['high_value', 'mid_value', 'low_value', 'no_realized_value']
      - name: customer_count
        tests: [not_null]
