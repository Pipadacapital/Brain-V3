{{- /*
Brain V4 Spark Silver/Gold transform CronWorkflows.

V4 makes Spark the SOLE compute: Iceberg (brain_bronze/silver/gold) holds the medallion and is the
system of record; the brain_serving.mv_* Trino views are thin projections straight over the Iceberg
Gold/Silver marts. dbt is GONE; StarRocks is GONE. These CronWorkflows spark-submit the Silver/Gold mart
jobs the image now CARRIES (db/iceberg/spark/{silver,gold}/*.py, COPYed into /opt/brain by the Dockerfile)
— mirroring the spark-bronze.yaml pattern (single spark-submit --master local[*] pod, no Spark
Operator/cluster). There is NO separate mv-refresh leg: once the Spark jobs commit the new Iceberg
snapshot, the Trino mv_* views resolve it directly (the dev mirror tools/dev/v4-refresh-loop.sh runs the
same Silver→Gold→mv SYNC sequence).

DEPENDENCY ORDER is enforced by STAGGERED SCHEDULES (this chart's one-container-per-CronWorkflow
convention — NOT an Argo DAG) + idempotency (every Spark MERGE is replay-safe; Forbid + startingDeadline
make a missed/retried run safe). The full V4 attribution chain — identity → order-state → silver →
journey-stitch → gold — is split across the node `.Values.jobs` (identity-export,
journey-stitch-from-identity, journey-stitch-export) and these Spark crons:

  :05  v4-silver       spark-submit silver_order_state.py (order_state spine, brain_id) + the rest of Silver.
       (identity-export at :02 + the node journey-stitch jobs at :15/:16 sequence around these via schedule.)
  :25  v4-gold         spark-submit gold_revenue_ledger.py (recognized basis) + gold_attribution_credit.py +
                       customer/gap/executive marts (reads the stitched silver_touchpoint).

ENABLED by default (.Values.sparkV4.enabled=true): running needs the CI-built+digest-pinned Spark image
carrying the V4 marts (B3 fail-closed below) + a cluster — same external gate as spark-bronze.

Image MUST be pinned by digest (B3) — same fail-closed rule as the generic + Bronze templates.
*/ -}}
{{- if .Values.sparkV4.enabled }}
{{- $img := .Values.sparkV4.image -}}
{{- $ref := "" -}}
{{- if $img.digest -}}
  {{- $ref = printf "%s@%s" $img.repository $img.digest -}}
{{- else if and $img.tag (ne $img.tag "latest") -}}
  {{- $ref = printf "%s:%s" $img.repository $img.tag -}}
{{- else -}}
  {{- fail "sparkV4.image.digest (preferred) or an immutable non-':latest' tag is required (B3) — refusing to deploy an unpinned image" -}}
{{- end -}}
{{- $envFrom := .Values.envSecretName -}}
{{- $sa := .Values.serviceAccount.name -}}
{{- $tz := .Values.timezone -}}
{{- $dm := .Values.sparkV4.driverMemory -}}
{{/* ── Execution-mode submit flags (local[*] vs Spark-on-K8s cluster). See docs/ops/spark-on-k8s-migration.md.
     $submitFlags is interpolated at every spark-submit site; $lp is the in-image path scheme ("" for local;
     "local://" for cluster mode, where the driver pod reads the app + --py-files from the SAME image, no upload). */}}
{{- $mode := .Values.sparkV4.executionMode | default "local" -}}
{{- $lp := "" -}}
{{- $submitFlags := printf "--master local[*] --driver-memory %s" $dm -}}
{{- if eq $mode "k8s" -}}
  {{- $k := .Values.sparkV4.k8s -}}
  {{- $ns := $k.namespace | default .Release.Namespace -}}
  {{- $lp = "local://" -}}
  {{- $submitFlags = printf "--master %s --deploy-mode cluster --conf spark.kubernetes.container.image=%s --conf spark.kubernetes.namespace=%s --conf spark.kubernetes.authenticate.driver.serviceAccountName=%s --conf spark.driver.memory=%s --conf spark.executor.instances=%s --conf spark.executor.cores=%s --conf spark.executor.memory=%s --conf spark.dynamicAllocation.enabled=true --conf spark.dynamicAllocation.shuffleTracking.enabled=true --conf spark.dynamicAllocation.minExecutors=%s --conf spark.dynamicAllocation.maxExecutors=%s" $k.apiServer $ref $ns $k.serviceAccountName $dm $k.executor.instances $k.executor.cores $k.executor.memory $k.executor.minExecutors $k.executor.maxExecutors -}}
{{- end -}}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: v4-silver
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: v4-silver
spec:
  schedule: {{ .Values.sparkV4.silverSchedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid            # never overlap a Silver build with itself (idempotent, but serialize)
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}      # IRSA: S3 (Iceberg warehouse) + Glue/REST catalog access
    entrypoint: run
    {{- /* AUD-PROD-006: pin the Spark cron pods to the batch pool (values-prod). */}}
    {{- with .Values.sparkV4.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.sparkV4.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    activeDeadlineSeconds: {{ .Values.sparkV4.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}    # bounded retry: every Silver MERGE is idempotent
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          # The image CARRIES db/iceberg/spark → /opt/brain. The run-*.sh scripts spin docker (compose-only),
          # so on the cluster we spark-submit the mart py files DIRECTLY. order_state (the brain_id spine)
          # FIRST, then the rest of Silver, then a touchpoint re-pass (after the node stitch jobs land the
          # stitch). SPARK_MAX_RETRIES gives each submit a bounded in-pod retry too (idempotent MERGE).
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              source /opt/brain/_retry.sh
              PFX="{{ $lp }}"   # "" (local[*]) or "local://" (k8s cluster — driver reads app + py-files from the image, no upload)
              pyf() { if [ -n "$PFX" ]; then echo "$1" | sed "s#[^,][^,]*#${PFX}&#g"; else echo "$1"; fi; }  # local://-prefix each comma element in k8s mode; no-op in local
              submit() { spark_retry "v4-silver/$1" /opt/spark/bin/spark-submit {{ $submitFlags }} --py-files "$(pyf /opt/brain/iceberg_base.py)" "${PFX}/opt/brain/silver/$1"; }
              submit silver_order_state.py        # spine — resolves brain_id from brain_ops.silver_identity_link
              for j in /opt/brain/silver/silver_*.py; do
                b="$(basename "$j")"; [ "$b" = "silver_order_state.py" ] && continue
                spark_retry "v4-silver/$b" /opt/spark/bin/spark-submit {{ $submitFlags }} --py-files "$(pyf /opt/brain/iceberg_base.py)" "${PFX}$j"
              done
          env:
            - { name: SPARK_MAX_RETRIES, value: {{ .Values.sparkV4.sparkMaxRetries | quote }} }
            # ADR-0010: the silver jobs read the Kafka Connect Bronze tables (collector_events_connect
            # + <lane>_raw_connect) — fixed, no BRONZE_SOURCE switch (rollback = git revert).
            {{- toYaml .Values.sparkV4.env | nindent 12 }}
            {{- if eq $mode "k8s" }}
            {{- toYaml .Values.sparkV4.k8s.env | nindent 12 }}  {{/* cluster-scale tuning knobs (spark_perf_configs reads these) */}}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI/Glue + AWS_* + NEO4J_* (mart dim reads)
          {{- end }}
          resources:
            {{- toYaml .Values.sparkV4.resources | nindent 12 }}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: v4-gold
  labels:
    {{- include "brain.labels" . | nindent 4 }}
    brain.io/job: v4-gold
spec:
  schedule: {{ .Values.sparkV4.goldSchedule | quote }}
  timezone: {{ $tz | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $sa }}
    entrypoint: run
    {{- /* AUD-PROD-006: pin the Spark cron pods to the batch pool (values-prod). */}}
    {{- with .Values.sparkV4.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.sparkV4.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    activeDeadlineSeconds: {{ .Values.sparkV4.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ .Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          # gold_revenue_ledger (recognized basis) FIRST, then attribution (reads the stitched
          # silver_touchpoint + the ledger basis), then the remaining Gold marts. _attribution_math.py is a
          # --py-files dep for the credit job (exact minor-unit apportionment port).
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              source /opt/brain/_retry.sh
              PFX="{{ $lp }}"   # "" (local[*]) or "local://" (k8s cluster — driver reads app + py-files from the image, no upload)
              pyf() { if [ -n "$PFX" ]; then echo "$1" | sed "s#[^,][^,]*#${PFX}&#g"; else echo "$1"; fi; }  # local://-prefix each comma element in k8s mode; no-op in local
              submit() { spark_retry "v4-gold/$1" /opt/spark/bin/spark-submit {{ $submitFlags }} --py-files "$(pyf "$2")" "${PFX}/opt/brain/gold/$1"; }
              submit gold_revenue_ledger.py        /opt/brain/iceberg_base.py
              submit gold_attribution_credit.py    /opt/brain/iceberg_base.py,/opt/brain/gold/_attribution_math.py
              submit gold_marketing_attribution.py /opt/brain/iceberg_base.py,/opt/brain/gold/_attribution_math.py
              submit gold_attribution_paths.py     /opt/brain/iceberg_base.py
              for j in /opt/brain/gold/gold_*.py /opt/brain/gold/snap_*.py; do
                b="$(basename "$j")"
                case "$b" in gold_revenue_ledger.py|gold_attribution_credit.py|gold_marketing_attribution.py|gold_attribution_paths.py) continue;; esac
                case "$b" in _*) continue;; esac
                spark_retry "v4-gold/$b" /opt/spark/bin/spark-submit {{ $submitFlags }} --py-files "$(pyf /opt/brain/iceberg_base.py)" "${PFX}$j"
              done
          env:
            - { name: SPARK_MAX_RETRIES, value: {{ .Values.sparkV4.sparkMaxRetries | quote }} }
            # ADR-0010: the gold jobs' Silver inputs derive from the Kafka Connect Bronze tables —
            # fixed, no BRONZE_SOURCE switch (rollback = git revert).
            {{- toYaml .Values.sparkV4.env | nindent 12 }}
            {{- if eq $mode "k8s" }}
            {{- toYaml .Values.sparkV4.k8s.env | nindent 12 }}  {{/* cluster-scale tuning knobs (spark_perf_configs reads these) */}}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}
          {{- end }}
          resources:
            {{- toYaml .Values.sparkV4.resources | nindent 12 }}
{{- end }}
