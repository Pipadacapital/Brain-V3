# analysis-templates.yaml — Argo Rollouts auto-rollback criteria as code (B6 / R-06).
#
# Encodes the bake-window rollback signals documented in .github/workflows/deploy.yml + PLAYBOOK-deploy.md
# as Argo Rollouts AnalysisTemplates. During a canary/bake step a Rollout runs these against Prometheus;
# a failed metric automatically aborts the rollout → Argo rolls back to the last stable ReplicaSet. This
# turns the currently-MANUAL bake watch ("echo the criteria, watch a dashboard") into automation.
#
# Grounded ONLY in metrics that exist today (C2): collector_accept_total / collector_backpressure_shed_total
# (the 99.95% accept+ack SLO) and bronze_write_total (ingest freshness). The Analytics-API RED metrics
# (error rate, p95) referenced in the bake window need OTel HTTP instrumentation first — tracked as a
# C1 follow-up; their template is included DISABLED below so it can't fire a fantasy (never-true) check.
#
# ⚠️ Requires the Argo Rollouts controller in-cluster. Attach via a Rollout's `strategy.canary.steps`
# (see collector-rollout.yaml). prometheus-address defaults to the in-cluster kube-prometheus-stack
# Prometheus (infra/argocd/envs/prod/kube-prometheus-stack.yaml, ns monitoring — AUD-PROD-002);
# override the arg per-env if a different query endpoint fronts the metrics.
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: collector-accept-ack-slo
  labels: { app.kubernetes.io/part-of: brain }
spec:
  args:
    - name: prometheus-address
      value: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
  metrics:
    - name: accept-ack-success-rate
      # availability = accepted / (accepted + shed). SLO ≥ 99.95% (matches the bake-window rule).
      interval: 1m
      count: 5                 # 5 probes over 5m (the documented window)
      successCondition: result >= 0.9995
      failureLimit: 1          # one breach within the window aborts → auto-rollback
      provider:
        prometheus:
          address: "{{ args.prometheus-address }}"
          query: |
            sum(rate(collector_accept_total[5m]))
              /
            (sum(rate(collector_accept_total[5m])) + sum(rate(collector_backpressure_shed_total[5m])))
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ingest-freshness
  labels: { app.kubernetes.io/part-of: brain }
spec:
  args:
    - name: prometheus-address
      value: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
  metrics:
    - name: bronze-writes-flowing
      # During a bake the spine must keep writing Bronze. Zero writes over the window = stalled spine.
      interval: 1m
      count: 5
      successCondition: result > 0
      failureLimit: 1
      provider:
        prometheus:
          address: "{{ args.prometheus-address }}"
          query: sum(increase(bronze_write_total[5m]))
---
