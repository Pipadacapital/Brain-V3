{{- /*
ClusterSecretStore → AWS Secrets Manager. NO explicit auth block: the ESO
controller pod's IRSA role (eks.amazonaws.com/role-arn on its ServiceAccount,
set in infra/argocd/envs/<env>/external-secrets.yaml) supplies credentials via
the default AWS provider chain. Least-privilege: that role only needs
secretsmanager:GetSecretValue/DescribeSecret on brain/<env>/k8s/*.
*/ -}}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.storeName }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: brain
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.region }}
