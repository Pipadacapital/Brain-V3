version: 2

models:
  - name: silver_order_state
    description: >
      Canonical Silver order-lifecycle mart. One row per (brand_id, order_id) — the latest
      lifecycle state per order, folded deterministically from the realized_revenue_ledger
      event stream. Additive (latest-state projection) only; non-additive status-mix lives
      in packages/metric-engine (ADR-004). Money is BIGINT minor units + currency_code (I-S07).
      brand_id is the tenant key; per-brand isolation is enforced at the Silver READ seam.
    columns:
      - name: brand_id
        description: "Tenant key (UUID). First key/distribution/order column."
        tests:
          - not_null
      - name: order_id
        description: "Order natural key."
        tests:
          - not_null
      - name: lifecycle_state
        description: "Canonical latest state: placed|confirmed|delivered|cancelled|rto|refunded."
        tests:
          - not_null
          - accepted_values:
              values: ['placed', 'confirmed', 'delivered', 'cancelled', 'rto', 'refunded']
      - name: is_terminal
        description: "Whether lifecycle_state is a terminal outcome."
        tests:
          - not_null
      - name: order_value_minor
        description: "Realized order value, SIGNED BIGINT minor units (I-S07). 0 for placed-only orders."
        tests:
          - not_null
      - name: currency_code
        description: "CHAR(3), paired with order_value_minor."
        tests:
          - not_null
    # Grain guarantee (exactly one row per (brand_id, order_id)) is asserted by the
    # singular test tests/assert_order_state_grain.sql (dependency-free, no dbt_utils).
