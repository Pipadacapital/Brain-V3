{{- /*
Silver/Gold Iceberg maintenance (was spark-v4-maintenance.yaml — Spark→DuckDB cutover).
AUD-COST-013 (prod counterpart of AUD-PERF-004).

The hourly-rewritten Silver/Gold marts accumulate snapshots unbounded and no tier sweeps orphan files
(failed/aborted writes leave data files expire_snapshots never touches) — unbounded object-store growth
on the medallion. This weekly job runs db/iceberg/duckdb/maintenance/medallion_maintenance.py (carried
in the brain-duckdb image at /opt/brain/duckdb/maintenance) via the PyIceberg + DuckDB maintenance
client (Trino removed per ADR-0014): optimize (COW compaction rewrite) + expire_snapshots (7d TTL,
with the physical file sweep) over the brain_silver + brain_gold namespaces. remove_orphan_files is a
DEFERRED GAP — pyiceberg has no orphan-sweep API yet, so the job emits a loud greppable SKIP per table
until it lands (ADR-0014).

Orphan-sweep guardrails (preserved for the day the sweep lands; per the audit risk note):
  - older_than is clamped >= 3 days IN the job; we pin 7d here so a file can never belong to an
    in-flight commit (the marts rewrite hourly — there is no write-silent window to schedule into;
    the age guard is the safety).
  - ORPHAN_FILES=0 stays the escape hatch (compaction+expiry only). In prod S3_ENDPOINT is unset →
    the default AWS credential chain (IRSA), no static keys.
Single-pod convention (maintenance is single-client Iceberg commits — no fleet needed).
*/ -}}
{{- if and .Values.sparkV4.enabled .Values.sparkV4.maintenance.enabled }}
{{- $img := .Values.sparkV4.image -}}
{{- $ref := "" -}}
{{- if $img.digest -}}
  {{- $ref = printf "%s@%s" $img.repository $img.digest -}}
{{- else if and $img.tag (ne $img.tag "latest") -}}
  {{- $ref = printf "%s:%s" $img.repository $img.tag -}}
{{- else -}}
  {{- fail "sparkV4.image.digest (preferred) or an immutable non-':latest' tag is required (B3) — refusing to deploy an unpinned image" -}}
{{- end -}}
{{- $envFrom := .Values.envSecretName -}}
{{- $m := .Values.sparkV4.maintenance -}}
{{- /*
LANE SPLIT (2026-07-17 fragmentation incident): the maintenance sweep is rendered once PER LANE in
`$m.lanes`, so Gold and Silver can run on independent cadences/deadlines and neither can starve the
other. Previously a single cron swept both namespaces table-by-table (Silver first, alphabetically);
when Silver's heavy tables (silver_job_watermark ~7.3k tiny files) burned the whole activeDeadlineSeconds,
Gold never got compacted → the serving marts (gold_customer_360) fragmented to ~50 files → 8s cold scans.
Default values ship an EMPTY `lanes` list → the template falls back to ONE lane (name:"" → full Gold-first
sweep, unchanged behavior). Prod overrides `lanes` with a frequent Gold-only lane + a daily Silver-only lane.
Each lane sets MAINT_NAMESPACES so the job scopes to that namespace (empty → both, Gold-first per
medallion_maintenance.py).

MERGE SAFETY (2026-07-17): `lanes` default MUST be empty. Argo CD / Helm merge overlapping list indices
element-wise (base-wins), so a non-empty default list here silently swallowed prod's Gold lane at index 0
(prod deployed the default lane + Silver, no Gold). An empty base list can't collide → prod's [gold,silver]
survives verbatim. The fallback below reconstructs the single default lane when `lanes` is empty.
*/ -}}
{{- $lanes := $m.lanes | default (list) -}}
{{- if not $lanes -}}
{{- $lanes = list (dict "name" "" "orphanFiles" "1") -}}
{{- end -}}
{{- range $lane := $lanes }}
{{- $laneName := $lane.name | default "" -}}
{{- $cronName := ternary "v4-maintenance" (printf "v4-maintenance-%s" $laneName) (eq $laneName "") -}}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $cronName }}
  labels:
    {{- include "brain.labels" $ | nindent 4 }}
    brain.io/job: {{ $cronName }}
spec:
  # NOTE: the ERASURE mode (ERASE_BRAND_ID=…) is NOT this cron — it is invoked on-demand by the
  # right-to-erasure orchestrator (same as Bronze).
  schedule: {{ $lane.schedule | default $m.schedule | quote }}
  timezone: {{ $.Values.timezone | quote }}
  concurrencyPolicy: Forbid            # never overlap a maintenance sweep with itself
  startingDeadlineSeconds: {{ $.Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ $.Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $.Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $.Values.serviceAccount.name }}   # IRSA: S3 (medallion buckets) + REST catalog
    entrypoint: run
    {{- /* AUD-PROD-006: pin the maintenance cron pod to the streaming pool (values-prod). */}}
    {{- with $.Values.sparkV4.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $.Values.sparkV4.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    activeDeadlineSeconds: {{ $lane.activeDeadlineSeconds | default $m.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ $.Values.defaults.backoffLimit | quote }}   # idempotent Iceberg procedures — retry-safe
          retryPolicy: OnError
        container:
          image: {{ $ref | quote }}
          imagePullPolicy: {{ $img.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              exec python /opt/brain/duckdb/maintenance/medallion_maintenance.py
          env:
            - { name: MODE, value: "maintain" }
            {{- if $lane.namespaces }}
            - { name: MAINT_NAMESPACES, value: {{ $lane.namespaces | quote }} }
            {{- end }}
            {{- if hasKey $lane "orphanFiles" }}
            - { name: ORPHAN_FILES, value: {{ $lane.orphanFiles | quote }} }
            {{- end }}
            {{- with $m.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $envFrom }}
          envFrom:
            - secretRef:
                name: {{ $envFrom }}    # ICEBERG_REST_URI + AWS_* (REST catalog + S3 seams)
          {{- end }}
          resources:
            {{- toYaml $.Values.sparkV4.resources | nindent 12 }}
{{- end }}
{{- end }}
