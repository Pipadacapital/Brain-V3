apiVersion: v1
kind: Service
metadata:
  name: {{ include "iceberg-rest.name" . }}
  labels:
    {{- include "iceberg-rest.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "iceberg-rest.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest
      port: {{ .Values.service.port }}
      targetPort: rest
