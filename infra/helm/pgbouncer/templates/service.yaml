apiVersion: v1
kind: Service
metadata:
  name: {{ include "brain.fullname" . }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "brain.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.service.port }}    # core's DATABASE_URL → <fullname>:{{ .Values.service.port }}
      targetPort: postgres
      protocol: TCP
