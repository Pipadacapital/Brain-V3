################################################################################
# Brain – ArgoCD App-of-Apps (PROD root)
# Root application that manages all per-service PROD ArgoCD Applications
# (children in infra/argocd/envs/prod keep their own MANUAL promotion gate —
# the root only creates/updates the Application CRs, it deploys no workload).
# Staging clusters use infra/argocd/bootstrap/root-app-staging.yaml instead —
# each cluster gets ONLY its env's apps (destinations are all in-cluster).
# revisionHistoryLimit: 10 — keeps 10 rollback entries per PLAYBOOK-deploy.
# Applied by infra/argocd/bootstrap/install.sh AFTER the AppProjects
# (bootstrap/appprojects.yaml) — ArgoCD refuses Applications whose project
# doesn't exist (AUD-COST-005).
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brain-app-of-apps
  namespace: argocd
  labels:
    project: brain
    managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: brain

  source:
    repoURL: https://github.com/Pipadacapital/Brain-V3.git
    targetRevision: master
    # AUD-COST-005: was infra/argocd/envs (a directory of subdirectories —
    # matched NO manifests without recurse, and with recurse would leak staging
    # apps onto the prod cluster). Env-scoped instead.
    path: infra/argocd/envs/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
