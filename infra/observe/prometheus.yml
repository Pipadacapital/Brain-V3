global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules (C2 / R-05): SLO/burn-rate, freshness, DLQ-depth, consumer-lag, liveness.
rule_files:
  - 'alerts/*.rules.yml'

# Route fired alerts to Alertmanager (notification targets injected at deploy time).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'brain-collector'
    static_configs:
      - targets: ['host.docker.internal:9091']  # collector metrics endpoint (local dev)

  - job_name: 'brain-stream-worker'
    static_configs:
      - targets: ['host.docker.internal:9092']  # stream-worker metrics endpoint (local dev)

  # Broker metrics — repointed from the retired Redpanda /public_metrics (redpanda_kafka_*) to the
  # Apache Kafka (KRaft) broker, which emits ONLY JMX. The broker runs the prometheus/jmx_exporter
  # Java agent (config: kafka-jmx-exporter.yml) exposing kafka_* metrics on :9404. brain-slo.rules.yml
  # reads kafka_log_log_logendoffset (DLQ growth / ingest freshness) + under-replicated from here.
  - job_name: 'kafka-jmx-exporter'
    static_configs:
      - targets: ['host.docker.internal:9404']  # Kafka broker JMX-exporter agent (local dev)

  # Consumer-group LAG is not a broker JMX metric — sourced from the danielqsj/kafka_exporter
  # companion, which exposes kafka_consumergroup_lag / kafka_topic_*. Drives BrainConsumerLagHigh.
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['host.docker.internal:9308']  # kafka_exporter (local dev)
