{{- /*
One Argo CronWorkflow per entry in .Values.jobs. Each runs the job-entrypoint CLI in the core
(or stream-worker) image. Idempotent jobs + concurrencyPolicy: Forbid + startingDeadlineSeconds
mean a missed or retried run never double-applies and never piles up.
*/ -}}
{{- $root := . -}}
{{- range .Values.jobs }}
{{- /* Per-job opt-out: a job with `enabled: false` (e.g. one needing an image not yet published)
       is skipped entirely — so its fail-closed digest check never trips. Default true. */ -}}
{{- if ne (default true .enabled) false }}
{{- /* Image selection: stream-worker > core (default). */ -}}
{{- $image := $root.Values.image -}}
{{- if .useStreamWorkerImage }}{{- $image = $root.Values.streamWorkerImage -}}{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ .name }}
  labels:
    {{- include "brain.labels" $root | nindent 4 }}
    brain.io/job: {{ .name }}
spec:
  schedule: {{ .schedule | quote }}
  timezone: {{ $root.Values.timezone | quote }}
  concurrencyPolicy: {{ $root.Values.defaults.concurrencyPolicy }}
  startingDeadlineSeconds: {{ $root.Values.defaults.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ $root.Values.defaults.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $root.Values.defaults.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ $root.Values.serviceAccount.name }}
    entrypoint: run
    activeDeadlineSeconds: {{ $root.Values.defaults.activeDeadlineSeconds }}
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: run
        retryStrategy:
          limit: {{ $root.Values.defaults.backoffLimit | quote }}
          retryPolicy: OnError
        container:
          image: "{{ $image.repository }}{{ if $image.digest }}@{{ $image.digest }}{{ else if and $image.tag (ne $image.tag "latest") }}:{{ $image.tag }}{{ else }}{{ fail "image.digest (preferred) or an immutable, non-':latest' image.tag is required (B3) — refusing to deploy an unpinned/mutable image" }}{{ end }}"
          imagePullPolicy: {{ $image.pullPolicy }}
          command: {{ .command | toJson }}
          {{- if $root.Values.envSecretName }}
          envFrom:
            - secretRef:
                name: {{ $root.Values.envSecretName }}
          {{- end }}
          {{- $mergedEnv := concat (default (list) $root.Values.env) (default (list) .env) }}
          {{- with $mergedEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $root.Values.defaults.resources | nindent 12 }}
{{- end }}
{{- end }}
