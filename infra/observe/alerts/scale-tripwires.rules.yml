# ── Brain scale-posture tripwires (Wave-3: AUD-IMPL-027 / AUD-OPS-029 / AUD-OPS-030) ──
# CANONICAL, promtool-checkable source. VERBATIM-copied into
# infra/helm/kube-prometheus-stack/values-prod.yaml (additionalPrometheusRulesMap.scale-tripwires)
# — KEEP THE TWO IN LOCKSTEP when a rule changes (same doctrine as brain-slo.rules.yml).
#
# Series source: the Argo Workflows CONTROLLER /metrics endpoint (metricsConfig +
# ServiceMonitor enabled in infra/argocd/envs/prod/argo-workflows.yaml). The v4 transform
# CronWorkflows emit brain_transform_workflow_duration_seconds (REALTIME gauge — ticks while
# the tier runs) and brain_transform_workflow_failed_total per run
# (infra/helm/cronworkflows/templates/v4-transform.yaml; the Spark→DuckDB cutover renamed the
# brain_spark_workflow_* series — this file tracked the rename 2026-07-18, the alerts were
# silently dead-keyed on the old names in between). bronze-maintenance emits the SAME failed
# counter (tier=bronze-maintenance, plus tier=bronze-dedup for the fail-soft dedup step —
# templates/bronze-maintenance.yaml), so TransformTierRunFailed covers Bronze maintenance too.
# Per-MART drill-down lives in each DuckDB job's structured stdout result line
# ({"job":…,"upserted":…}) — kubectl logs, not Prometheus.
#
# HONESTY NOTE (AUD-OPS-032): the Aurora ACU-utilization and Redis eviction tripwires are
# NOT here — those series live in CloudWatch and NO CloudWatch exporter runs in-cluster,
# so a PromQL rule over them would be loaded-but-dead (false safety). They are CloudWatch
# metric alarms in terraform instead (modules/aurora + modules/elasticache,
# *_tripwire alarms) — knob decisions in docs/ops/scale-knobs.md.
groups:
  - name: brain-scale-tripwires
    rules:
      - alert: TransformTierSlow
        # A Silver/Gold tier sustaining >20 min wall-time — far past the incremental steady state
        # (minutes) and eating into the 9000s bootstrap ceiling. Realtime gauge → this fires
        # DURING the slow run, and the frozen final value keeps it visible after completion.
        expr: max by (tier) (brain_transform_workflow_duration_seconds) > 1200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Transform {{ $labels.tier }} tier ran > 20 min"
          description: "The {{ $labels.tier }} CronWorkflow wall-time exceeded 1200s (value {{ $value | humanizeDuration }}). At the */5 realtime cadence Forbid is skipping ticks — freshness is degrading. Per-mart durations: kubectl -n argo logs the workflow pod (structured {\"job\":…} result lines)."

      - alert: TransformTierNearDeadline
        # 8100s = 90% of the 9000s activeDeadlineSeconds — the run is about to be killed and the
        # medallion (and every mv_* serving view over it) goes stale platform-wide.
        expr: max by (tier) (brain_transform_workflow_duration_seconds) > 8100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Transform {{ $labels.tier }} tier at {{ $value | humanizeDuration }} — approaching the 9000s deadline"
          description: "The {{ $labels.tier }} CronWorkflow is within ~15 min of activeDeadlineSeconds (9000s). If it is killed, Silver/Gold freshness stalls platform-wide (serving reads only brain_serving.mv_* over these marts). Check for a re-bootstrap (lost watermark) or keystone fragmentation before it recurs."

      - alert: TransformTierRunFailed
        # A tier run ended Failed (deadline, OOMKill, retries exhausted) — covers the chained
        # v4-medallion transform tier AND the bronze-maintenance workflow + its fail-soft
        # bronze-dedup step (H4: dedup failure no longer aborts compaction/expiry — it surfaces
        # HERE as tier=bronze-dedup instead). Downstream mart staleness is caught by the freshness
        # rules; this points at the CAUSE hours earlier.
        expr: sum by (tier) (increase(brain_transform_workflow_failed_total[2h])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.tier }} workflow FAILED in the last 2h"
          description: "A {{ $labels.tier }} CronWorkflow run (or fail-soft step) ended Failed (deadline overrun, OOMKill, valve refusal, or retries exhausted). Inspect: argo -n argo list; kubectl -n argo logs <pod>. tier=bronze-dedup ⇒ Bronze may still hold duplicates (Silver MERGE remains the backstop) — see bronze_dedup.py output for the memory-valve / BRONZE_DEDUP_FORCE guidance."
