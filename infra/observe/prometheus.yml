global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules (C2 / R-05): SLO/burn-rate, freshness, DLQ-depth, consumer-lag, liveness.
rule_files:
  - 'alerts/*.rules.yml'

# Route fired alerts to Alertmanager (notification targets injected at deploy time).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'brain-collector'
    static_configs:
      - targets: ['host.docker.internal:9091']  # collector metrics endpoint (local dev)

  - job_name: 'brain-stream-worker'
    static_configs:
      - targets: ['host.docker.internal:9092']  # stream-worker metrics endpoint (local dev)

  # Broker metrics — DISABLED after the Redpanda → Apache Kafka (KRaft) swap.
  # Redpanda exposed a Prometheus endpoint at redpanda:9644/public_metrics (redpanda_kafka_*);
  # Apache Kafka only emits JMX, so there is no scrape target until a JMX-exporter sidecar is
  # added. Re-enable with a kafka-jmx-exporter job (and update brain-slo.rules.yml) when wired.
  # - job_name: 'redpanda'
  #   metrics_path: '/public_metrics'
  #   static_configs:
  #     - targets: ['redpanda:9644']
