# Kafka topic declarations — source of truth for topic provisioning.
# Applied by infra/helm/strimzi-kafka (production) and
# docker-compose kafka-init service (local dev).
#
# Naming: {env}.{domain}.{event}.v{n}
# Partition key: brand_id + ":" + event_id  (brand-prefixed composite)

topics:
  - name: "{env}.collector.event.v1"
    lane: live
    partitions: 12
    replication_factor: 1   # 1 for local/dev; 3 for prod
    config:
      retention.ms: "604800000"          # 7 days (live lane)
      cleanup.policy: "delete"
      compression.type: "snappy"
      min.insync.replicas: "1"           # 2 for prod
    description: "Live ingest lane — Pixel/collector → stream-worker"

  - name: "{env}.collector.event.v1.backfill"
    lane: backfill
    partitions: 12
    replication_factor: 1
    config:
      retention.ms: "2592000000"         # 30 days (backfill lane)
      cleanup.policy: "delete"
      compression.type: "snappy"
      min.insync.replicas: "1"
    description: "Backfill/replay lane — separate consumer group; same stream-worker code"

  - name: "{env}.collector.order.backfill.v1"
    lane: backfill-orders
    partitions: 1
    replication_factor: 1
    config:
      retention.ms: "2592000000"          # 30 days (backfill lane)
      cleanup.policy: "delete"
      compression.type: "snappy"
      min.insync.replicas: "1"
    description: "Order backfill lane — shopify-backfill worker → Kafka Connect Iceberg sink (ADR-0015 WS2 single Bronze writer; the topic is in the collector sink's topics list). Single partition = natural throughput cap (ADR-BF-7 / D-3). Separate topic keeps backfill volume off the live lane."

  - name: "{env}.collector.order.backfill.v1.dlq"
    lane: dlq
    partitions: 1
    replication_factor: 1
    config:
      retention.ms: "2592000000"          # 30 days
      cleanup.policy: "delete"
      compression.type: "snappy"
    description: "DLQ for backfill order lane — unrecoverable parse / write errors"

  - name: "{env}.collector.event.v1.dlq"
    lane: dlq
    partitions: 12
    replication_factor: 1
    config:
      retention.ms: "2592000000"         # 30 days (DLQ — enough for investigation)
      cleanup.policy: "delete"
      compression.type: "snappy"
    description: "Dead-letter queue — schema rejection, parse failures, unrecoverable errors"

  - name: "{env}.collector.event.v1.quarantine"
    lane: quarantine
    partitions: 12
    replication_factor: 1
    config:
      retention.ms: "2592000000"         # 30 days (forensic sink — enough for investigation)
      cleanup.policy: "delete"
      compression.type: "snappy"
    description: "Quarantine sink (R3) — events that PARSED but FAILED a security/compliance gate: unresolved/mismatched install_token → brand (R2 tenant-unresolved / brand_mismatch) or absent consent_flags. Distinct from .dlq (malformed/unparseable). Reuses the shipped DlqProducer with a .quarantine topic suffix — no new producer, no new topic family."

consumer_groups:
  # ADR-0015 WS3/WS4 (identity in Silver): the stream-worker's identity/consent/CAPI/ledger/
  # cache/touchpoint consumer groups are RETIRED — identity resolves in the Silver batch stage
  # (apps/stream-worker/src/jobs/silver-identity), which also folds consent projection, CAPI
  # deletion triggering, the dirty-set writes, and direct serving-cache eviction. The erasure
  # orchestrator is the ONLY remaining group on the live collector topic.
  - id: "stream-worker-erasure-orchestrator"
    topic: "{env}.collector.event.v1"
    description: "DPDP/PDPL crypto-shred erasure orchestrator (ERASURE_ORCHESTRATOR_CONSUMER_GROUP_ID)"

  - id: "brain.stream-worker.dlq-redrive"
    topic: "{env}.collector.event.v1.dlq"
    description: "DLQ redrive — operator CLI replays dead-lettered messages back to origin topic (apps/stream-worker/src/jobs/dlq-redrive)"

schema_registry:
  compatibility: FULL_TRANSITIVE
  artifact_group: brain
  schemas:
    - artifact_id: "collector.event.v1"
      file: "infra/kafka/schemas/collector.event.v1.avsc"
      description: "Canonical event envelope — all collector events"
