# Tempo config — local dev (docker-compose observe profile).
# Accepts OTLP traces from the OTel Collector and stores them in a local tmp directory.
# Grafana queries traces via the Tempo HTTP API on port 3200.
#
# Production: deployed on EKS; backend switches to S3 (object_storage) with IRSA credentials.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h       # 2 days of local traces

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

querier:
  frontend_worker:
    frontend_address: 127.0.0.1:9095

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
