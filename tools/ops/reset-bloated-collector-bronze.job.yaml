# Reset the bloated Bronze collector_events_connect table. One-off Job.
#
# WHY: the table held ~5.2M rows, 98% duplicates (only ~95K unique). bronze-dedup kept getting
# SIGTERM-killed (exit 143) on that backlog, so it never cleared → serving views that scan it
# (recent-events, data-health, tracking, medallion-journey) full-scanned 5.2M rows + JSON-parsed each
# → >25s → 504. Connect/collector are stable now, so this is a one-time historical backlog: truncate
# once and it stays clean (Kafka-Connect keeps landing NEW events into the emptied table).
#
# Data is disposable (owner) → TRUNCATE (delete all rows), no dedup wait, no backup. The table object
# stays so the Iceberg sink keeps writing to it. Run at low traffic to avoid a concurrent-commit retry.
#
# RUN:   kubectl --context brain-prod-ssm apply -f tools/ops/reset-bloated-collector-bronze.job.yaml
# WATCH: kubectl --context brain-prod-ssm -n argo logs -f job/reset-collector-bronze
apiVersion: batch/v1
kind: Job
metadata:
  name: reset-collector-bronze
  namespace: argo
  labels:
    app.kubernetes.io/part-of: brain
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: brain-jobs   # IRSA brain-prod-jobs — Bronze catalog RW
      restartPolicy: Never
      nodeSelector:
        karpenter.sh/nodepool: streaming
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reset-collector-bronze
          image: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-prod@sha256:32086d1b05c8f99097f34dbcb286c7d6151bd198319ca30573adaea8c49c53d8
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: core-env
          command: ["python", "-c"]
          args:
            - |
              import sys
              sys.path.insert(0, "/opt/brain/duckdb")
              sys.path.insert(0, "/opt/brain/duckdb/maintenance")
              from _maintenance_base import pyiceberg_catalog
              from pyiceberg.expressions import AlwaysTrue
              cat = pyiceberg_catalog()
              t = cat.load_table("brain_bronze.collector_events_connect")
              before = t.scan().to_arrow().num_rows
              print(f"before: {before} rows", flush=True)
              t.delete(delete_filter=AlwaysTrue())      # truncate — drops all data files (metadata-fast)
              t.refresh()
              after = t.scan().to_arrow().num_rows
              print(f"after: {after} rows — collector_events_connect reset (Connect keeps landing new)", flush=True)
              # Old snapshots' physical files are swept by the next bronze-maintenance run (now trivial —
              # the table is empty, so dedup no longer SIGTERMs). Nothing else to do here.
              print("=== reset complete ===", flush=True)
