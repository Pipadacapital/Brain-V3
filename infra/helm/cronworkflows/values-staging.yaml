    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-spark-bronze-prod
    tag: ""
    digest: "sha256:da16849d45362d672bb8f5d02ced0040e32317e96b743841737820cc3eae74f3"
