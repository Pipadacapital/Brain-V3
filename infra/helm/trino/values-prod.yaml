environment: prod

image:
  repository: trinodb/trino
  tag: "455"

coordinator:
  replicaCount: 1
  # AUD-PROD-006/-011: the single coordinator (discovery + the BFF's HTTP/JDBC endpoint —
  # the SOLE serving entry) must not ride Spot. NOT `role: system` despite the spec: the
  # system MNG is t4g.medium (4 GiB) and the coordinator's RATIFIED memory bound below
  # (6Gi request / 7Gi limit, measured OOM evidence) can never schedule there — so it pins
  # to the tainted ON-DEMAND Karpenter pool (t4g.xlarge, AUD-COST-018 — same on-demand
  # stability guarantee, fits the bound; Neo4j precedent). Selector + toleration both
  # required (the pool is tainted).
  nodeSelector:
    brain.platform/pool: ondemand
  tolerations:
    - key: brain.platform/pool
      operator: Equal
      value: ondemand
      effect: NoSchedule
  resources:
    requests:
      cpu: "2"
      memory: 6Gi
    limits:
      cpu: "4"
      memory: 7Gi

workers:
  replicaCount: 3
  # AUD-PROD-006/-011: workers pin to the dedicated `trino` Karpenter pool (t4g.xlarge
  # Spot, infra/helm/karpenter/values.yaml) via Karpenter's automatic nodepool label —
  # without this, pool weights preferred the streaming pool for worker pods.
  nodeSelector:
    karpenter.sh/nodepool: trino
  resources:
    requests:
      cpu: "2"
      memory: 6Gi
    limits:
      cpu: "4"
      memory: 7Gi
  # KEDA worker autoscaling stays OFF until KEDA is installed + a scale baseline is measured in prod.
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 8

# Real AWS S3 Iceberg buckets reached via the pod IRSA role — no static keys, no MinIO endpoint.
iceberg:
  restUri: "http://iceberg-rest.iceberg.svc.cluster.local:8181"
  s3:
    # AUD-COST-008: MUST be ap-south-1 — every bucket/VPC/endpoint lives there; a SigV4
    # region mismatch 400s (AuthorizationHeaderMalformed) every S3 read through the sole
    # serving engine at go-live.
    region: ap-south-1
    endpoint: ""
    pathStyleAccess: false
  s3SecretName: ""

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-prod-trino
