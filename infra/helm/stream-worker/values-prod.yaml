replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-stream-worker-prod
  tag: latest

envSecretName: stream-worker-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-stream-worker-prod

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi
