# brain-slo.rules.yml — production alert rules for the Brain data spine (C2 / R-05).
#
# Covers the GA-gating signal classes the audit requires: SLO/burn-rate, ingest freshness,
# DLQ depth, consumer lag — plus target-down liveness. Every rule is grounded in a metric that
# is ACTUALLY emitted today (no fantasy alerts that silently never fire — the exact false-safety
# anti-pattern C2 closes). Each rule names its metric SOURCE.
#
# Metric sources (all live):
#   • up                              — Prometheus scrape liveness.
#   • collector_accept_total          — @brain/observability counter; +1 per ACK'd /collect (200/202).
#   • collector_spool_full_total      — counter; +1 per 503 SPOOL_FULL shed (back-pressure, C4).
#   • collector_dedup_conflict_total  — counter; +1 per pk_conflict/dedup_hit (R4).
#   • bronze_write_total              — counter; +1 per durable Bronze write (stream-worker).
#   • redpanda_kafka_*                — Redpanda native /public_metrics (scrape job 'redpanda').
#
# Collector ingest SLO = 99.95% accept+ack (matches the bake-window rule in main.yml).
#
# Validate: promtool check rules infra/observe/alerts/brain-slo.rules.yml

groups:
  # ── Liveness ────────────────────────────────────────────────────────────────
  - name: brain-liveness
    rules:
      - alert: BrainTargetDown
        expr: up{job=~"brain-.*|redpanda"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target down"
          description: "Prometheus has not scraped {{ $labels.job }} ({{ $labels.instance }}) for 2m."

  # ── Collector ingest SLO / burn-rate (the 99.95% accept+ack durability guarantee) ──
  # Multi-window burn-rate (Google SRE): availability = accept / (accept + shed).
  # Error budget = 0.05%. Fast burn = 14.4× over 5m+1h; slow burn = 6× over 30m+6h.
  # Two windows per alert suppress single-spike flapping.
  - name: brain-collector-slo
    rules:
      - alert: BrainCollectorErrorBudgetFastBurn
        expr: |
          (
            sum(rate(collector_spool_full_total[5m]))
              / (sum(rate(collector_accept_total[5m])) + sum(rate(collector_spool_full_total[5m]))) > (14.4 * 0.0005)
          )
          and
          (
            sum(rate(collector_spool_full_total[1h]))
              / (sum(rate(collector_accept_total[1h])) + sum(rate(collector_spool_full_total[1h]))) > (14.4 * 0.0005)
          )
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Collector accept+ack error budget burning fast (>14.4×)"
          description: "Shed ratio exceeds 14.4× the 0.05% budget over 5m AND 1h — the durability SLO is being consumed in hours, not weeks."

      - alert: BrainCollectorErrorBudgetSlowBurn
        expr: |
          (
            sum(rate(collector_spool_full_total[30m]))
              / (sum(rate(collector_accept_total[30m])) + sum(rate(collector_spool_full_total[30m]))) > (6 * 0.0005)
          )
          and
          (
            sum(rate(collector_spool_full_total[6h]))
              / (sum(rate(collector_accept_total[6h])) + sum(rate(collector_spool_full_total[6h]))) > (6 * 0.0005)
          )
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Collector accept+ack error budget burning slowly (>6×)"
          description: "Shed ratio exceeds 6× the 0.05% budget over 30m AND 6h."

      - alert: BrainCollectorSheddingNow
        # Any sustained back-pressure shedding — the drainer (→ Redpanda) is behind RIGHT NOW.
        expr: sum(rate(collector_spool_full_total[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Collector is shedding ingest (503 SPOOL_FULL)"
          description: "/collect has returned SPOOL_FULL for 2m — the spool backlog crossed the high-water mark and the drainer is behind."

  # ── Stream-worker: DLQ depth + consumer lag + ingest freshness ──────────────
  - name: brain-stream-worker
    rules:
      - alert: BrainDlqGrowing
        # DLQ is a topic; a still-advancing high-watermark on a .dlq topic = terminal failures.
        expr: |
          sum by (redpanda_topic) (
            rate(redpanda_kafka_max_offset{redpanda_topic=~".*\\.dlq"}[15m])
          ) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "DLQ topic {{ $labels.redpanda_topic }} is growing"
          description: "Events are landing in the DLQ (offset advancing for 10m) — terminal processing failures after MAX_RETRY."

      - alert: BrainConsumerLagHigh
        expr: |
          sum by (redpanda_group) (
            redpanda_kafka_consumer_group_lag_sum{redpanda_group=~"stream-worker-.*|.*-bridge"}
          ) > 50000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Consumer group {{ $labels.redpanda_group }} lag > 50k"
          description: "The consumer group is >50,000 messages behind for 10m — projection is falling behind production rate."

      - alert: BrainIngestStale
        # Freshness: collector topic advancing but ZERO Bronze writes for 10m → the spine stalled.
        expr: |
          (sum(rate(redpanda_kafka_max_offset{redpanda_topic=~".*\\.collector\\.event\\.v1"}[10m])) > 0)
          and
          (sum(increase(bronze_write_total[10m])) == 0)
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Ingest stalled — events produced but no Bronze writes in 10m"
          description: "The collector topic is advancing but the stream-worker wrote zero Bronze rows for 10m. The data spine is stalled."

      # P1 — the scale-limiting tier. BrainIngestStale only fires at TOTAL zero; these catch the
      # DEGRADATION before it reaches zero (the signals the audit flagged as having no metric).
      - alert: BrainIngestSchedulerOverrun
        # The sequential scheduler tick can no longer finish within its interval → connector freshness
        # silently slips into minutes. The first symptom of "too many brands per replica" (shard/scale).
        expr: sum(increase(ingest_scheduler_tick_overrun_total[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Ingest scheduler tick overrunning its interval"
          description: "A scheduler tick took longer than its poll interval — ingest freshness is degrading. Shard brands across replicas or shorten the per-connector work."

      - alert: BrainConnectorDispatchErrors
        # A provider's repulls are failing on dispatch (rate limit / credential / API) — stale data for
        # that connector with NO other signal today (per-connector observability was missing).
        expr: |
          sum by (provider) (rate(ingest_scheduler_dispatch_error_total[10m]))
            / clamp_min(sum by (provider) (rate(ingest_scheduler_dispatch_total[10m]) + rate(ingest_scheduler_dispatch_error_total[10m])), 1) > 0.25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Connector {{ $labels.provider }} repulls failing > 25%"
          description: "More than a quarter of {{ $labels.provider }} repull dispatches are failing — likely a rate limit, expired credential, or provider outage. That connector's data is going stale."

      - alert: BrainConnectorRateLimited
        # The global per-provider rate limiter is throttling dispatches sustainedly → that provider's
        # shared app quota is the bottleneck at the current brand count. Raise the cap or add capacity.
        expr: sum by (provider) (rate(ingest_scheduler_rate_limited_total[15m])) > 0.1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Connector {{ $labels.provider }} sustainedly rate-limited"
          description: "Brain is throttling {{ $labels.provider }} repulls to protect its shared app quota — those connectors are re-pulling slower than their interval. Quota is the scaling bottleneck for this provider."

      # P2.2 — DLQ redrive. The redrive tool replays transient-failure messages back to their
      # source topic; messages that exhaust the loop guard (x-redrive-count ≥ max) are GENUINE
      # poison left parked. A non-zero exhausted rate means human investigation is needed — the
      # DLQ is no longer self-healing for those messages.
      - alert: BrainDlqRedriveExhausted
        # dlq_redrive_exhausted_total: stream-worker counter (P2.2). A redrive pass left messages
        # parked because they hit the max-redrive ceiling — they keep failing on replay.
        expr: sum by (target_topic) (increase(dlq_redrive_exhausted_total[1h])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ redrive left poison parked for {{ $labels.target_topic }}"
          description: "A redrive pass exhausted the loop guard for messages targeting {{ $labels.target_topic }} — they fail every replay. Investigate the payload/schema; they will not self-heal."

      - alert: BrainDlqRedriveErrors
        # dlq_redrive_error_total: republish to the source topic failed during a redrive (broker
        # issue) — the operator's drain is not making progress.
        expr: sum by (target_topic) (increase(dlq_redrive_error_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ redrive republish failing for {{ $labels.target_topic }}"
          description: "Redrive could not republish to {{ $labels.target_topic }} — the operator drain is stalling. Check broker health."

  # ── Revenue truth integrity ─────────────────────────────────────────────────
  - name: brain-revenue-integrity
    rules:
      - alert: BrainRevenueOverReversal
        # revenue_over_reversal_total: stream-worker counter (F2). Cumulative reversals exceeded the
        # recognized sale for an order → realized revenue for that order went negative. Usually a
        # duplicate refund or a refund+chargeback on one order — needs reconciliation, not silence.
        expr: sum(increase(revenue_over_reversal_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Over-reversal detected in the revenue ledger"
          description: "An order's cumulative reversals exceeded its recognized sale (realized went negative). Reconcile — likely a duplicate refund or refund+chargeback."
