# Trino Iceberg catalog — ad-hoc / federated exploration ONLY.
#
# Points at the SAME Iceberg REST catalog + MinIO that Spark and StarRocks use,
# so Trino can read any Bronze/Silver/Gold Iceberg table for exploration without
# duplicating data. This catalog MUST NOT become an app serving dependency.
#
# PRIME DIRECTIVE: app / BFF / metric-engine read StarRocks brain_serving.mv_* only.
# Trino is a read-only exploration layer — never route a known metric here.

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181

# Native S3 FileIO — mirrors the Spark/StarRocks MinIO addressing exactly
# (same credentials, same path-style endpoint, same region).
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=brain
s3.aws-secret-key=brainbrain
s3.region=us-east-1
