{{- /*
The workflow-pod ServiceAccount every CronWorkflow runs as (workflowSpec.
serviceAccountName). Terraform creates the matching IRSA role (module
irsa_spark_jobs → trust on system:serviceaccount:argo:brain-jobs) but only the
IAM side — nothing else creates the K8s ServiceAccount, so without this
template every workflow pod fails admission with
'serviceaccount "brain-jobs" not found' (first prod run, 2026-07-11).
The per-env eks.amazonaws.com/role-arn annotation comes from values-*.yaml.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
