{{- if and .Values.autoscaling.enabled (not .Values.autoscaling.keda.enabled) }}
# HorizontalPodAutoscaler (P2.5). Enabled per-env via values-*.yaml. Requires resources.requests
# (set in values.yaml) — HPA computes utilization as usage/request. When autoscaling is enabled the
# Deployment OMITS a static replicas count (see deployment.yaml) so helm upgrades don't fight the HPA.
# AUD-OPS-030: SUPPRESSED when autoscaling.keda.enabled — KEDA materialises its own HPA from the
# ScaledObject (templates/scaledobject.yaml); two controllers must never fight over one Deployment.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "brain.fullname" . }}
  labels:
    {{- include "brain.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "brain.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
