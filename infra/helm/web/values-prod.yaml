replicaCount: 3

image:
  repository: REPLACE_WITH_ECR_REGISTRY/brain-web-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: ""

envSecretName: web-env

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/brain-web-prod

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# P2.5: HPA on in prod.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
