# spark image — runs the bronze-maintenance cron (db/iceberg/spark/Dockerfile). Also reused by the
# V4 Spark silver/gold/mv-refresh crons (.sparkV4.image — CI digest-pins both). Bronze LANDING is
# the kafka-connect chart (ADR-0010) — the Spark landing cron was removed 2026-07-05.
sparkBronze:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-spark-bronze-staging
    tag: ""
    digest: ""
# spark V4 Silver/Gold transform + mv refresh crons — same image as sparkBronze (the Dockerfile now
# COPYs the V4 marts). GATED OFF by default; flip sparkV4.enabled once the V4 cluster + digest are ready.
sparkV4:
  image:
    repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-spark-bronze-staging
    tag: ""
    digest: ""
# The job pods read the same secret as the core/stream-worker deployments (DATABASE_URL,
# BRAIN_APP_DATABASE_URL, STARROCKS_*). External Secrets ← AWS Secrets Manager.
envSecretName: core-env
serviceAccount:
  name: brain-jobs
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-staging-jobs
