apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iceberg-rest.name" . }}
  labels:
    {{- include "iceberg-rest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "iceberg-rest.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iceberg-rest.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      # PodSecurity Admission `restricted` compliant (Wave-2 hardening extension —
      # only the 4 app charts were covered; iceberg-rest tripped a restricted warning
      # on pod restart). runAsUser is NUMERIC: the apache/iceberg-rest-fixture image
      # declares a non-numeric user (`iceberg`, uid 1000), and runAsNonRoot needs a
      # numeric uid or kubelet refuses the pod (same as pgbouncer's `postgres` user).
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup }}
        seccompProfile:
          type: {{ .Values.podSecurityContext.seccompProfile.type }}
      containers:
        - name: iceberg-rest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: rest
              containerPort: 8181
          env:
            # ADR-0002: FLAG-GATED catalog backend. `catalog.backend` selects sqlite (durable
            # PVC-backed JdbcCatalog — the rollback path) or postgres (Aurora JdbcCatalog).
            - name: CATALOG_CATALOG__IMPL
              value: org.apache.iceberg.jdbc.JdbcCatalog
            {{- if eq .Values.catalog.backend "postgres" }}
            # --- backend: postgres — JdbcCatalog over Aurora PG (durable, multi-writer, no SQLite lock) ---
            - name: CATALOG_URI
              value: "jdbc:postgresql://{{ .Values.catalog.jdbcHost }}:{{ .Values.catalog.jdbcPort }}/{{ .Values.catalog.jdbcDatabase }}"
            - name: CATALOG_JDBC_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.jdbcUserKey }}
            - name: CATALOG_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.jdbcPasswordKey }}
            {{- else if eq .Values.catalog.backend "sqlite" }}
            # --- backend: sqlite — file-backed JdbcCatalog on a PVC (ROLLBACK path) ---
            # WAL + busy_timeout: a contending writer WAITS for the file lock instead of erroring.
            - name: CATALOG_URI
              value: "jdbc:sqlite:file:{{ .Values.catalog.sqlite.persistence.mountPath }}/{{ .Values.catalog.sqlite.persistence.dbFile }}?journal_mode=WAL&busy_timeout=30000&synchronous=NORMAL"
            # Pin JdbcClientPool to ONE connection so every catalog op serializes (SQLite = single writer).
            - name: CATALOG_CLIENTS
              value: {{ .Values.catalog.sqlite.clients | quote }}
            - name: CATALOG_JDBC_USER
              value: {{ .Values.catalog.sqlite.jdbcUser | quote }}
            - name: CATALOG_JDBC_PASSWORD
              value: {{ .Values.catalog.sqlite.jdbcPassword | quote }}
            {{- else }}
            {{- fail (printf "catalog.backend must be 'sqlite' or 'postgres', got %q" .Values.catalog.backend) }}
            {{- end }}
            # DATA files in S3 via S3FileIO; credentials from the pod IRSA role (NO static keys).
            - name: CATALOG_WAREHOUSE
              value: "{{ .Values.catalog.warehouse }}"
            - name: CATALOG_IO__IMPL
              value: org.apache.iceberg.aws.s3.S3FileIO
            - name: AWS_REGION
              value: "{{ .Values.catalog.s3Region }}"
            {{- if .Values.javaToolOptions }}
            # AUD-INFRA-023: suppress the fixture's startup config dump (it prints the
            # plaintext jdbc.password to stdout). See values.yaml `javaToolOptions`.
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.javaToolOptions | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/config
              port: rest
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/config
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if and (eq .Values.catalog.backend "sqlite") .Values.catalog.sqlite.persistence.enabled }}
          volumeMounts:
            # Durable SQLite catalog file (rollback backend). PVC is ReadWriteOnce → keep replicaCount 1.
            - name: catalog
              mountPath: {{ .Values.catalog.sqlite.persistence.mountPath }}
          {{- end }}
      {{- if and (eq .Values.catalog.backend "sqlite") .Values.catalog.sqlite.persistence.enabled }}
      volumes:
        - name: catalog
          persistentVolumeClaim:
            claimName: {{ include "iceberg-rest.name" . }}-catalog
      {{- end }}
