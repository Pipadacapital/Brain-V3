replicaCount: 1

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-stream-worker-prod
  tag: ""              # B3: no mutable :latest — CI populates image.digest at deploy (fail-closed in the template)
  digest: "sha256:7c2b203de590c5800905963b4261e25ebe6ad776f0e94047908d3b699fa1e7d7"

envSecretName: stream-worker-env

# Helm lists REPLACE (no merge) — the two defaults are repeated verbatim, then the staging wiring.
env:
  - name: SERVICE_NAME
    value: stream-worker
  # T2-10: the health server binds this port; the helm probes (probes.port) target it.
  - name: HEALTH_PORT
    value: "8090"
  # AUD-OPS-037: staging bakes the same Bronze raw-PII erasure submit as prod (k8s mode —
  # the staging argo-workflows app is also controller-only). See values-prod.yaml.
  - name: ARGO_SERVER_URL
    value: https://kubernetes.default.svc

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-staging-stream-worker

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
