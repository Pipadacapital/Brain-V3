environment: prod

image:
  repository: 380254378136.dkr.ecr.ap-south-1.amazonaws.com/brain-duckdb-serving-prod
  tag: ""
  # PLACEHOLDER — the first master build of brain-duckdb-serving-prod (deploy.yml
  # build-data-images) promotes the real digest here; until then the template fails-closed on the
  # unpullable all-zeros digest (same posture as the cronworkflows brain-duckdb-prod bootstrap).
  digest: "sha256:5d38897dcfd839890ca4a7ba7ac6eba1124d373b70871a0c250001940b8b5f41"

# Replicas ride the untainted `streaming` Spot pool (infra/helm/karpenter) — no dedicated pool:
# the `trino` Karpenter pool is retired with the trino chart (ADR-0014), and at ≥2 replicas a Spot
# reclaim only drops capacity to the surviving replica (each pod is a COMPLETE engine, unlike the
# coordinator/worker split where one loss was a full serving outage). 1cpu/3.5Gi requests bin-pack
# two replicas onto one t4g.xlarge alongside daemonsets.
nodeSelector:
  karpenter.sh/nodepool: streaming

resources:
  requests:
    cpu: "1"
    memory: 3.5Gi
  limits:
    cpu: "2"
    memory: 4Gi

# HPA ON: min 2 (a Spot reclaim or rollout never leaves zero serving replicas), CPU target 60%
# (scale out BEFORE queries queue on the per-replica admission semaphore). maxReplicas 4 keeps the
# tier inside the streaming pool's capacity math (AUD-OPS-033) — raise together with pool limits.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60

# EPOCH PRE-WARM (2026-07-21 keystone cold-scan incident): the duckdb-iceberg EXECUTE phase pays
# ~200ms/data-file on a COLD connection (keystone measured: 289s cold vs 2s warm; EXPLAIN/bind is
# 3.9s — the cost is the per-file opens), and every epoch rotation is a new cold connection — so a
# churn-heavy table blew the statement watchdog on EVERY read, uninterruptibly (the silver-identity
# stuck-watermark chain). Listed tables are scan-warmed on the fresh epoch BEFORE it goes live; the
# old epoch serves during the warm, so rotation stays invisible. Warmed via serving VIEW names (no
# catalog-alias coupling). NOTE: a fresh pod's FIRST epoch also warms → /readyz turns ready minutes
# later on a fragmented keystone; rolling updates keep old pods serving meanwhile, and the
# silver-hot maintenance lane (same incident, cronworkflows values) bounds the file count.
extraEnv:
  - name: DUCKDB_SERVING_PREWARM_TABLES
    value: "brain_serving.mv_silver_collector_event,brain_serving.mv_silver_touchpoint"

# Real AWS S3 + REST catalog reached via the pod IRSA role — no static keys, no MinIO endpoint.
iceberg:
  catalog: iceberg
  # The Iceberg REST catalog is the chart-fullname service in ns `iceberg-rest`
  # (NOT a plain `iceberg-rest` in ns `iceberg`). Wrong DNS = the serving engine can't read any
  # Iceberg mart → every BFF analytics read 500s at go-live.
  restUri: "http://brain-prod-iceberg-rest.iceberg-rest.svc.cluster.local:8181"
  # The SINGLE medallion warehouse root (terraform output warehouse_bucket_name — matches
  # iceberg-rest values-prod); _catalog.py derives the REST warehouse NAME from it.
  warehouse: "s3://brain-bronze-prod-380254378136/"
  restAuth: none
  s3Endpoint: ""
  # AUD-COST-008: MUST be ap-south-1 — every bucket/VPC/endpoint lives there; a SigV4 region
  # mismatch 400s (AuthorizationHeaderMalformed) every S3 read through the sole serving engine.
  region: ap-south-1

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::380254378136:role/brain-prod-duckdb-serving

# ADR-0016 P1.3 (near-real-time serving): pin the epoch rotation to 60s in prod so a brand-NEW
# Gold mart's view is reapplied within the ≤60s freshness SLO. This is the re-attach/view-reapply
# cadence, NOT commit frequency — data for already-applied views is fresh on re-query regardless,
# and the commit-driven serving-cache evict (gold-rewritten-publish) removes the Redis-TTL lag on
# top. Iceberg small-file/commit pressure is a function of the TRANSFORM tick (not this knob); the
# maintenance lane (db/iceberg/duckdb/maintenance/**) compacts it. Explicit here so prod is pinned
# even if the base chart default drifts. Configurable.
serving:
  catalogRefreshSeconds: 60

# Scrape the sole serving engine (native /metrics + PodMonitor, job "duckdb-serving") — lights up
# DuckDBServingDown / DuckDBServingQueryFailureRateHigh in kube-prometheus-stack values-prod.
metrics:
  enabled: true
