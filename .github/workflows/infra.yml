name: infra

# Trigger only on infrastructure changes — keeps app PRs fast
on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/policy/**"
      - "policy/**"
      - ".checkov.yaml"
  push:
    branches: [master]   # default branch — the infra TF lane fires on real merges to master
    paths:
      - "infra/**"
      - ".github/policy/**"
      - "policy/**"

permissions:
  contents: read
  id-token: write       # OIDC for AWS terraform plan
  pull-requests: write  # Post plan output as PR comment

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Terraform format check
  # ─────────────────────────────────────────────────────────────────────────
  tf-fmt:
    name: terraform fmt -check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: fmt check (all modules + envs)
        run: terraform fmt -check -recursive infra/terraform/
        id: fmt

  # ─────────────────────────────────────────────────────────────────────────
  # Terraform validate (init -backend=false, per directive)
  # ─────────────────────────────────────────────────────────────────────────
  tf-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: tf-fmt
    strategy:
      matrix:
        target:
          - infra/terraform/envs/dev
          - infra/terraform/envs/staging
          - infra/terraform/envs/prod
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: terraform init -backend=false (${{ matrix.target }})
        run: terraform -chdir=${{ matrix.target }} init -backend=false
      - name: terraform validate (${{ matrix.target }})
        run: terraform -chdir=${{ matrix.target }} validate

  # Also validate each module independently
  tf-validate-modules:
    name: terraform validate (modules)
    runs-on: ubuntu-latest
    needs: tf-fmt
    strategy:
      matrix:
        module:
          - infra/terraform/modules/network
          - infra/terraform/modules/eks
          - infra/terraform/modules/irsa
          - infra/terraform/modules/kms
          - infra/terraform/modules/rds
          - infra/terraform/modules/elasticache
          - infra/terraform/modules/s3-iceberg
          - infra/terraform/modules/s3-audit
          - infra/terraform/modules/secrets
          - infra/terraform/modules/observability
          - infra/terraform/modules/oidc-github
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: terraform init -backend=false (${{ matrix.module }})
        run: terraform -chdir=${{ matrix.module }} init -backend=false
      - name: terraform validate (${{ matrix.module }})
        run: terraform -chdir=${{ matrix.module }} validate

  # ─────────────────────────────────────────────────────────────────────────
  # Checkov IaC scan — enforces NN-3/4/5 + AWS security baseline
  # ─────────────────────────────────────────────────────────────────────────
  checkov:
    name: Checkov IaC Scan (NN-3/4/5)
    runs-on: ubuntu-latest
    needs: tf-validate
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python (for custom Checkov checks)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov with custom NN-3/4/5 checks
        # H-01 FIX: removed || true — Checkov must hard-fail on CRITICAL/HIGH.
        # .checkov.yaml sets soft_fail: false + severity: HIGH; any violation
        # in infra/terraform exits non-zero and blocks the job. Do NOT add
        # || true here — it renders the NN-3/4/5 IaC policy gate completely
        # non-blocking (security-review H-01 finding).
        run: |
          checkov \
            --directory infra/terraform \
            --config-file .checkov.yaml \
            --external-checks-dir policy/checkov \
            --output cli \
            --output json \
            --output-file-path checkov-results.json \
            --compact \
            --quiet
        id: checkov
      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.json

  # ─────────────────────────────────────────────────────────────────────────
  # OPA/Conftest policy gate — NN-3/4/5 (plan-level enforcement)
  # ─────────────────────────────────────────────────────────────────────────
  opa-conftest:
    name: OPA/Conftest Policy Gate (NN-3/4/5)
    runs-on: ubuntu-latest
    needs: tf-validate
    steps:
      - uses: actions/checkout@v6

      # OIDC: assume the CI plan role (NN-3: StringEquals, repo-scoped).
      # PRE-BOOTSTRAP GUARD (Sprint-0): until the dev AWS account + OIDC plan role exist,
      # the AWS_DEV_PLAN_ROLE_ARN repo variable is unset → the AWS-dependent plan steps
      # skip cleanly. The STATIC NN-3/4/5 enforcement still runs in the `checkov` job
      # (no AWS needed), so the policy gate is NOT weakened — only the plan-level
      # (post-bootstrap) OPA check is deferred. Set AWS_DEV_PLAN_ROLE_ARN to activate.
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_DEV_PLAN_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEV_PLAN_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: GitHubActions-Plan-${{ github.run_id }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Install conftest
        if: ${{ vars.AWS_DEV_PLAN_ROLE_ARN != '' }}
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: terraform plan (dev — against real state bucket)
        if: ${{ vars.AWS_DEV_PLAN_ROLE_ARN != '' }}
        # L-01 FIX: continue-on-error is intentionally BOOTSTRAP-ONLY.
        # The plan step may fail on first-ever run because the S3 state bucket
        # does not yet exist (it is created by infra/terraform/bootstrap/).
        # After bootstrap is applied, remove continue-on-error from this step.
        # TODO(post-bootstrap): remove continue-on-error once DEV_TF_STATE_BUCKET
        # is confirmed created in the dev account. Track in ADR/EC10 follow-up.
        run: |
          terraform -chdir=infra/terraform/envs/dev init \
            -backend-config="bucket=${{ vars.DEV_TF_STATE_BUCKET }}" \
            -backend-config="key=envs/dev/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=${{ vars.DEV_TF_LOCK_TABLE }}"
          terraform -chdir=infra/terraform/envs/dev plan \
            -out=tfplan-dev.binary \
            -var="github_org=${{ vars.GITHUB_ORG }}" \
            -var="github_repo=${{ github.event.repository.name }}"
          terraform -chdir=infra/terraform/envs/dev show -json tfplan-dev.binary > tfplan-dev.json
        continue-on-error: true  # BOOTSTRAP-ONLY: remove after DEV_TF_STATE_BUCKET is created (see TODO above)

      - name: Run OPA/Conftest against plan JSON (NN-3/4/5)
        # L-01 FIX: when the plan JSON is absent (bootstrap phase), this step
        # logs clearly and exits 0. This is the ONLY acceptable silent skip —
        # it is gated strictly on the absence of the plan file, not on a blanket
        # || true or continue-on-error on the policy gate itself.
        # Post-bootstrap: the plan will always succeed, tfplan-dev.json will
        # always exist, and this branch becomes dead code — remove the else
        # clause at that point (see TODO on the plan step above).
        run: |
          if [ -f tfplan-dev.json ]; then
            conftest test \
              --policy .github/policy \
              --namespace brain.iac \
              tfplan-dev.json
          else
            echo "BOOTSTRAP-ONLY SKIP: No plan JSON available (state bucket not yet created)."
            echo "Run bootstrap/main.tf first to create the state bucket, then remove continue-on-error."
            echo "This skip is intentional and narrowly scoped; it will not occur post-bootstrap."
          fi

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Terraform Plan Summary\n\n';
            if (fs.existsSync('tfplan-dev.json')) {
              body += '**Plan completed.** OPA/Conftest policy gate passed.\n';
              body += 'See Checkov results artifact for full IaC scan.\n';
            } else {
              body += '**No plan JSON** — bootstrap state bucket not yet created.\n';
              body += 'Run `bootstrap/main.tf` first.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
